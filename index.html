    ],
    "title": "奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制",
    "id": "ce71032a-c075-492c-9554-51eb080348a5"
  },
  {
    "author": "王維",
    "paragraphs": [
      "絳幘雞人送曉籌，尚衣方進翠雲裘。",
      "九天閶闔開宮殿，萬國衣冠拜冕旒。",
      "日色纔臨仙掌動，香煙欲傍衮龍浮。",
      "朝罷須裁五色詔，佩聲歸向鳳池頭。"
    ],
    "tags": [
      "唐诗三百首",
      "宫廷",
      "七言律诗",
      "早朝"
    ],
    "title": "和賈舍人早朝大明宮之作",
    "id": "a364504e-3cfc-44c6-9203-173856452cdd"
  },
  {
    "author": "王維",
    "paragraphs": [
      "洞門高閣靄餘輝，桃李陰陰柳絮飛。",
      "禁裏疎鐘官舍晚，省中啼鳥吏人稀。",
      "晨搖玉佩趨金殿，夕奉天書拜瑣闈。",
      "強欲從君無那老，將因臥病解朝衣。"
    ],
    "tags": [
      "唐诗三百首",
      "酬和",
      "七言律诗"
    ],
    "title": "酬郭給事",
    "id": "7950a49f-f51d-4926-9d1e-e5f76b153829"
  },
  {
    "author": "王維",
    "paragraphs": [
      "積雨空林煙火遲，蒸藜炊黍餉東菑。",
      "漠漠水田飛白鷺，陰陰夏木囀黃鸝。",
      "山中習靜觀朝槿，松下清齋折露葵。",
      "野老與人爭席罷，海鷗何事更相疑。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "田园"
    ],
    "title": "積雨輞川莊作",
    "id": "0949fe2a-aadf-4cd4-b1c3-25fcdaecdb96"
  },
  {
    "author": "王維",
    "paragraphs": [
      "獨在異鄉爲異客，每逢佳節倍思親。",
      "遙知兄弟登高處，遍插茱萸少一人。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "思乡",
      "三年级上册",
      "重阳节",
      "小学古诗"
    ],
    "title": "九月九日憶山東兄弟",
    "id": "6bbd1c2c-8c43-4ffb-b7b3-506d74266cee"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "岧嶤太華俯咸京，天外三峰削不成。",
      "武帝祠前雲欲散，仙人掌上雨初晴。",
      "河山北枕秦關險，驛樹西連漢畤平。",
      "借問路傍名利客，無如此處學長生。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "怀古",
      "山水"
    ],
    "title": "行經華陰",
    "id": "39b2954c-04df-4561-ad6e-f4ddbae0db1e"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "君家何處住？妾住在橫塘。",
      "停船暫借問，或恐是同鄉。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "女子",
      "思乡",
      "乐府"
    ],
    "title": "長干曲四首 一",
    "id": "c39225f9-16b2-4713-a11c-d7030ec3b1c9"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "家臨九江水，來去九江側。",
      "同是長干人，自小不相識。"
    ],
    "tags": [
      "唐诗三百首",
      "家乡",
      "女子",
      "热爱",
      "乐府"
    ],
    "title": "長干曲四首 二",
    "id": "4a732464-35a5-4ffc-94d0-37d653eef2a1"
  },
  {
    "author": "祖詠",
    "paragraphs": [
      "燕臺一望客心驚，簫鼓喧喧漢將營。",
      "萬里寒光生積雪，三邊曙色動危旌。",
      "沙場烽火連胡月，海畔雲山擁薊城。",
      "少小雖非投筆吏，論功還欲請長纓。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "冬天",
      "边塞"
    ],
    "title": "望薊門",
    "id": "6beb5cc2-ae49-4e23-952a-1cb92fa11512"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "白日登山望烽火，黃昏飲馬傍交河。",
      "行人刁斗風沙暗，公主琵琶幽怨多。",
      "野雲萬里無城郭，雨雪紛紛連大漠。",
      "胡鴈哀鳴夜夜飛，胡兒眼淚雙雙落。",
      "聞道玉門猶被遮，應將性命逐輕車。",
      "年年戰骨埋荒外，空見蒲桃入漢家。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "冬天",
      "乐府",
      "边塞",
      "相和歌辞"
    ],
    "title": "古從軍行",
    "id": "bea6f283-8f90-49b5-8842-1cb906816548"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "主人有酒歡今夕，請奏鳴琴廣陵客。",
      "月照城頭烏半飛，霜淒萬樹風入衣。",
      "銅鑪華燭燭增輝，初彈淥水後楚妃。",
      "一聲已動物皆靜，四座無言星欲稀。",
      "清淮奉使千餘里，敢告雲山從此始。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "宴会",
      "七言古诗"
    ],
    "title": "琴歌",
    "id": "7d906794-b4d1-4922-9c59-eee5b19602ad"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "四月南風大麥黃，棗花未落桐陰長。",
      "青山朝別暮還見，嘶馬出門思舊鄉。",
      "陳侯立身何坦蕩，虬鬚虎眉仍大顙。",
      "腹中貯書一萬卷，不肯低頭在草莽。",
      "東門酤酒飲我曹，心輕萬事皆鴻毛。",
      "醉臥不知白日暮，有時空望孤雲高。",
      "長河浪頭連天黑，津口停舟渡不得。",
      "鄭國遊人未及家，洛陽行子空歎息。",
      "聞道故林相識多，罷官昨日今如何。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "七言古诗"
    ],
    "title": "送陳章甫",
    "id": "9e6cbc1b-95ed-406b-8c9d-d05876a1342c"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "南山截竹爲觱篥，此樂本自龜茲出。",
      "流傳漢地曲轉奇，涼州胡人爲我吹。",
      "傍鄰聞者多歎息，遠客思鄉皆淚垂。",
      "世人解聽不解賞，長飆風中自來往。",
      "枯桑老柏寒颼飀，九雛鳴鳳亂啾啾。",
      "龍吟虎嘯一時發，萬籟百泉相與秋。",
      "忽然更作漁陽摻，黃雲蕭條白日暗。",
      "變調如聞楊柳春，上林繁花照眼新。",
      "歲夜高堂列明燭，美酒一杯聲一曲。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "七言古诗"
    ],
    "title": "聽安萬善吹觱篥歌",
    "id": "2d66a9e4-7b4d-4be4-91fd-6a4b2cd8817b"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "男兒事長征，少小幽燕客。",
      "賭勝馬蹄下，由來輕七尺。",
      "殺人莫敢前，鬚如蝟毛磔。",
      "黃雲隴底白雪飛，未得報恩不能歸。",
      "遼東小婦年十五，慣彈琵琶解歌舞。",
      "今爲羗笛出塞聲，使我三軍淚如雨。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "豪侠",
      "拟古",
      "戍边",
      "七言古诗"
    ],
    "title": "古意",
    "id": "f1496cf4-4f85-4f9e-9e0e-dd05370641d3"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "蔡女昔造胡笳聲，一彈一十有八拍。",
      "胡人落淚沾邊草，漢使斷腸對歸客。",
      "古戍蒼蒼烽火寒，大荒沈沈飛雪白。",
      "先拂商弦後角羽，四郊秋葉驚摵摵。",
      "董夫子，通神明，深山竊聽來妖精。",
      "言遲更速皆應手，將往復旋如有情。",
      "空山百鳥散還合，萬里浮雲陰且晴。",
      "嘶酸雛鴈失羣夜，斷絕胡兒戀母聲。",
      "川爲淨其波，鳥亦罷其鳴。",
      "烏孫部落家鄉遠，邏娑沙塵哀怨生。",
      "幽音變調忽飄灑，長風吹林雨墮瓦。",
      "迸泉颯颯飛木末，野鹿呦呦走堂下。",
      "長安城連東掖垣，鳳凰池對青瑣門。",
      "高才脫略名與利，日夕望君抱琴至。"
    ],
    "tags": [
      "唐诗三百首",
      "长诗",
      "七言古诗",
      "抒情",
      "古体"
    ],
    "title": "聽董大彈胡笳聲兼寄語弄房給事",
    "id": "361a3e5e-ef71-4749-b39a-aa2f5d9180e4"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "朝聞遊子唱離歌，昨夜微霜初渡河。",
      "鴻鴈不堪愁裏聽，雲山況是客中過。",
      "關城樹色催寒近，御苑砧聲向晚多。",
      "莫見長安行樂處，空令歲月易蹉跎。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "七言律诗",
      "写景",
      "友情",
      "抒情",
      "送别"
    ],
    "title": "送魏萬之京",
    "id": "6340ef19-35e2-4194-96a9-3ee0a667905b"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "蟬鳴空桑林，八月蕭關道。",
      "出塞入塞寒，處處黃蘆草。",
      "從來幽幷客，皆共塵沙老。",
      "莫學遊俠兒，矜夸紫騮好。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "游侠",
      "乐府",
      "讽刺",
      "边塞",
      "新乐府辞"
    ],
    "title": "塞下曲四首 一",
    "id": "8d58a158-1a9b-4085-8ef7-b7b4e6adb66d"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "飲馬渡秋水，水寒風似刀。",
      "平沙日未沒，黯黯見臨洮。",
      "昔日長城戰，咸言意氣高。",
      "黃塵足今古，白骨亂蓬蒿。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "新乐府辞",
      "乐府"
    ],
    "title": "塞下曲四首 二",
    "id": "59fb3f01-65b2-416a-aefb-c13e502bfba1"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "高臥南齋時，開帷月初吐。",
      "清輝淡水木，演漾在窗戶。",
      "苒苒幾盈虛，澄澄變今古。",
      "美人清江畔，是夜越吟苦。",
      "千里其如何，微風吹蘭杜。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "月亮",
      "怀人"
    ],
    "title": "同從弟銷南齋玩月憶山陰崔少府",
    "id": "e2fec465-cea1-4829-b12d-3ba37a267562"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "昨夜風開露井桃，未央前殿月輪高。",
      "平陽歌舞新承寵，簾外春寒賜錦袍。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "宫怨",
      "女子"
    ],
    "title": "春宮曲",
    "id": "d0fa1454-f337-4343-ab4a-2a42dfdf4e8f"
  },
  {
    "author": "常建",
    "paragraphs": [
      "清溪深不測，隱處唯孤雲。",
      "松際露微月，清光猶爲君。",
      "茅亭宿花影，藥院滋苔紋。",
      "余亦謝時去，西山鸞鶴羣。"
    ],
    "tags": [
      "唐诗三百首",
      "隐逸",
      "五言古诗",
      "山水"
    ],
    "title": "宿王昌齡隱居",
    "id": "c854a853-b015-4848-823b-a786659d33b3"
  },
  {
    "author": "李白",
    "paragraphs": [
      "名花傾國兩相歡，常得君王帶笑看。",
      "解得春風無限恨，沈香亭北倚闌干。"
    ],
    "tags": [
      "唐诗三百首",
      "乐府",
      "写人",
      "花",
      "写花"
    ],
    "title": "清平調 三",
    "id": "f91f3117-2bf2-4d12-999a-aca174124715"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "漢皇重色思傾國，御宇多年求不得。",
      "楊家有女初長成，養在深閨人未識。",
      "天生麗質難自棄，一朝選在君王側。",
      "回眸一笑百媚生，六宮粉黛無顏色。",
      "春寒賜浴華清池，溫泉水滑洗凝脂。",
      "侍兒扶起嬌無力，始是新承恩澤時。",
      "雲鬢花顏金步搖，芙蓉帳暖度春宵。",
      "春宵苦短日高起，從此君王不早朝。",
      "承歡侍宴無閑暇，春從春遊夜專夜。",
      "後宮佳麗三千人，三千寵愛在一身。",
      "金屋妝成嬌侍夜，玉樓宴罷醉和春。",
      "姊妹弟兄皆列土，可憐光彩生門戶。",
      "遂令天下父母心，不重生男重生女。",
      "驪宮高處入青雲，仙樂風飄處處聞。",
      "緩歌慢舞凝絲竹，盡日君王看不足。",
      "漁陽鞞鼓動地來，驚破霓裳羽衣曲。",
      "九重城闕煙塵生，千乘萬騎西南行。",
      "翠華搖搖行復止，西出都門百餘里。",
      "六軍不發無奈何，宛轉蛾眉馬前死。",
      "花鈿委地無人收，翠翹金雀玉搔頭。",
      "君王掩面救不得，回看血淚相和流。",
      "黃埃散漫風蕭索，雲棧縈紆登劒閣。",
      "峨嵋山下少人行，旌旗無光日色薄。",
      "蜀江水碧蜀山青，聖主朝朝暮暮情。",
      "行宮見月傷心色，夜雨聞鈴腸斷聲。",
      "天旋日轉迴龍馭，到此躊躇不能去。",
      "馬嵬坡下泥土中，不見玉顏空死處。",
      "君臣相顧盡霑衣，東望都門信馬歸。",
      "歸來池苑皆依舊，太液芙蓉未央柳。",
      "芙蓉如面柳如眉，對此如何不淚垂？",
      "春風桃李花開夜，秋雨梧桐葉落時。",
      "西宮南苑多秋草，宮葉滿階紅不埽。",
      "棃園弟子白髮新，椒房阿監青娥老。",
      "夕殿螢飛思悄然，孤燈挑盡未成眠。",
      "遲遲鐘鼓初長夜，耿耿星河欲曙天。",
      "鴛鴦瓦冷霜華重，翡翠衾寒誰與共。",
      "悠悠生死別經年，魂魄不曾來入夢。",
      "臨邛道士鴻都客，能以精誠致魂魄。",
      "爲感君王展轉思，遂教方士殷勤覓。",
      "排空馭氣奔如電，升天入地求之徧。",
      "上窮碧落下黃泉，兩處茫茫皆不見。",
      "忽聞海上有仙山，山在虛無縹緲間。",
      "樓閣玲瓏五雲起，其中綽約多仙子。",
      "中有一人字太真，雪膚花貌參差是。",
      "金闕西廂叩玉扃，轉教小玉報雙成。",
      "聞道漢家天子使，九華帳裏夢魂驚。",
      "攬衣推枕起裴回，珠箔銀屏邐迤開。",
      "雲鬢半偏新睡覺，花冠不整下堂來。",
      "風吹仙袂飄颻舉，猶似霓裳羽衣舞。",
      "玉容寂莫淚闌干，棃花一枝春帶雨。",
      "含情凝睇謝君王，一別音容兩渺茫。",
      "昭陽殿裏恩愛絕，蓬萊宮中日月長。",
      "回頭下望人寰處，不見長安見塵霧。",
      "唯將舊物表深情，鈿合金釵寄將去。",
      "釵留一股合一扇，釵擘黃金合分鈿。",
      "但教心似金鈿堅，天上人間會相見。",
      "臨別殷勤重寄詞，詞中有誓兩心知。",
      "七月七日長生殿，夜半無人私語時。",
      "在天願作比翼鳥，在地願爲連理枝。",
      "天長地久有時盡，此恨緜緜無絕期。"
    ],

  {
    "author": "白居易",
    "paragraphs": [
      "潯陽江頭夜送客，楓葉荻花秋索索。",
      "主人下馬客在船，舉酒欲飲無管弦。",
      "醉不成歡慘將別，別時茫茫江浸月。",
      "忽聞水上琵琶聲，主人忘歸客不發。",
      "尋聲暗問彈者誰，琵琶聲停欲語遲。",
      "移船相近邀相見，添酒迴燈重開宴。",
      "千呼萬喚始出來，猶抱琵琶半遮面。",
      "轉軸撥弦三兩聲，未成曲調先有情。",
      "弦弦掩抑聲聲思，似訴平生不得意。",
      "低眉信手續續彈，說盡心中無限事。",
      "輕攏慢撚抹復挑，初爲霓裳後六幺。",
      "大弦嘈嘈如急雨，小弦切切如私語。",
      "嘈嘈切切錯雜彈，大珠小珠落玉盤。",
      "間關鶯語花底滑，幽咽泉流水下灘。",
      "水泉冷澀弦疑絕，疑絕不通聲暫歇。",
      "別有幽愁暗恨生，此時無聲勝有聲。",
      "銀缾乍破水漿迸，鐵騎突出刀槍鳴。",
      "曲終收撥當心畫，四弦一聲如裂帛。",
      "東舟西舫悄無言，唯見江心秋月白。",
      "沈吟放撥插弦中，整頓衣裳起斂容。",
      "自言本是京城女，家在蝦蟇陵下住。",
      "十三學得琵琶成，名蜀教坊第一部。",
      "曲罷曾教善才伏，妝成每被秋娘妬。",
      "五陵年少爭纏頭，一曲紅綃不知數。",
      "鈿頭雲箆擊節碎，血色羅帬飜酒汙。",
      "今年歡笑復明年，秋月春風等閑度。",
      "弟走從軍阿姨死，暮去朝來顏色故。",
      "門前冷落鞍馬稀，老大嫁作商人婦。",
      "商人重利輕別離，前月浮梁買茶去。",
      "去來江口守空船，繞船月明江水寒。",
      "夜深忽夢少年事，夢啼妝淚紅闌干。",
      "我聞琵琶已歎息，又聞此語重唧唧。",
      "同是天涯淪落人，相逢何必曾相識。",
      "我從去年辭帝京，謫居臥病潯陽城。",
      "潯陽小處無音樂，終歲不聞絲竹聲。",
      "住近湓江地低濕，黃蘆苦竹繞宅生。",
      "其間旦暮聞何物，杜鵑啼血猨哀鳴。",
      "春江花朝秋月夜，往往取酒還獨傾。",
      "豈無山歌與村笛，嘔啞嘲哳難爲聽。",
      "今夜聞君琵琶語，如聽仙樂耳暫明。",
      "莫辭更坐彈一曲，爲君飜作琵琶行。",
      "感我此言良久立，却坐促弦弦轉急。",
      "淒淒不似向前聲，滿座重聞皆掩泣。",
      "座中泣下誰最多，江州司馬青衫濕。"
    ],

      "時難年饑世業空，弟兄羇旅各西東。",
      "田園寥落干戈後，骨肉流離道路中。",
      "弔影分爲千里鴈，辭根散作九秋蓬。",

      "波上馬嘶看櫂去，柳邊人歇待船歸。",
      "數叢沙草羣鷗散，萬頃江田一鷺飛。",
      "誰解乘舟尋范蠡，五湖煙水獨忘機。"

  {

    "paragraphs": [
      "冰簟銀牀夢不成，碧天如水夜雲輕。",
      "雁聲遠過瀟湘去，十二樓中月自明。"
    ],

  {

    "paragraphs": [
      "荒戍落黃葉，浩然離故關。",
      "高風漢陽渡，初日郢門山。",
      "江上幾人在，天涯孤櫂還。",
      "何當重相見，尊酒慰離顏。"
    ],

  {

    "paragraphs": [
      "蘇武魂銷漢使前，古祠高樹兩茫然。",
      "雲邊雁斷胡天月，隴上羊歸塞草煙。",
      "廻日樓臺非甲帳，去時冠劒是丁年。",
      "茂陵不見封侯印，空向秋波哭逝川。"

  {

    "paragraphs": [
      "禁門宮樹月痕過，媚眼唯看宿燕窠。",
      "斜拔玉釵燈影畔，剔開紅焰救飛蛾。"
    ],

  {

    "paragraphs": [
      "日光斜照集靈臺，紅樹花迎曉露開。",
      "昨夜上皇新授籙，太真含笑入簾來。"

  {
    "author": "張祜",
    "paragraphs": [
      "虢國夫人承主恩，平明騎馬入宮門。",

  {

    "paragraphs": [
      "金陵津渡小山樓，一宿行人自可愁。",
      "潮落夜江斜月裏，兩三星火是瓜州。"

  {
    "author": "朱慶餘",
    "paragraphs": [
      "寂寂花時閉院門，美人相並立瓊軒。",
      "含情欲說宮中事，鸚鵡前頭不敢言。"
    ],

  {
    "author": "韓愈",
    "paragraphs": [
      "張生手持石鼓文，勸我試作石鼓歌。",
      "少陵無人謫仙死，才薄將奈石鼓何。",
      "周綱陵遲四海沸，宣王憤起揮天戈。",
      "大開明堂受朝賀，諸侯劒佩鳴相磨。",
      "蒐于岐陽騁雄俊，萬里禽獸皆遮羅。",
      "鐫功勒成告萬世，鑿石作鼓隳嵯峨。",
      "從臣才藝咸第一，揀選撰刻留山阿。",
      "雨淋日炙野火燎，鬼物守護煩撝呵。",
      "公從何處得紙本，毫髮盡備無差訛。",
      "辭嚴義密讀難曉，字體不類隸與科。",
      "年深豈免有缺畫，快劒斫斷生蛟鼉。",
      "鸞翔鳳翥衆僊下，珊瑚碧樹交枝柯。",
      "金繩鐵索鎖紐壯，古鼎躍水龍騰梭。",
      "陋儒編詩不收入，二雅褊迫無委蛇。",
      "孔子西行不到秦，掎摭星宿遺羲娥。",
      "嗟予好古生苦晚，對此涕淚雙滂沱。",
      "憶昔初蒙博士徴，其年始改稱元和。",
      "故人從軍在右輔，爲我度量掘臼科。",
      "濯冠沐浴告祭酒，如此至寶存豈多。",
      "氊包席裹可立致，十鼓祗載數駱駝。",
      "薦諸太廟比郜鼎，光價豈止百倍過。",
      "聖恩若許留太學，諸生講解得切磋。",
      "觀經鴻都尚填咽，坐見舉國來奔波。",
      "剜苔剔蘚露節角，安置妥帖平不頗。",
      "大廈深簷與蓋覆，經歷久遠期無佗。",
      "中朝大官老於事，詎肯感激徒媕婀。",
      "牧童敲火牛礪角，誰復著手爲摩挲。",
      "日銷月鑠就埋沒，六年西顧空吟哦。",
      "羲之俗書趁姿媚，數紙尚可博白鵝。",
      "繼周八代爭戰罷，無人收拾理則那。",
      "方今太平日無事，柄任儒術崇丘軻。",
      "安能以此上論列，願借辨口如懸河。",
      "石鼓之歌止於此，嗚呼吾意其蹉跎。"
    ],
    "tags": [

      "七言古诗",
      "题咏"
    ],

    "id": "1b9b8047-2410-47ae-a24c-aad7342b338f"

  {
    "author": "柳宗元",
    "paragraphs": [
      "汲井漱寒齒，清心拂塵服。",
      "閒持貝葉書，步出東齋讀。",
      "真源了無取，妄跡世所逐。",
      "遺言冀可冥，繕性何由熟。",
      "道人庭宇靜，苔色連深竹。",
      "日出霧露餘，青松如膏沐。",
      "澹然離言說，悟悅心自足。"
    ],

  {
    "author": "柳宗元",

      "城上高樓接大荒，海天愁思正茫茫。",
      "驚風亂颭芙蓉水，密雨斜侵薜荔牆。",
      "嶺樹重遮千里目，江流曲似九廻腸。",
      "共來百越文身地，猶自音書滯一鄉。"
    ],

  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "久爲簪組累，幸此南夷謫。",
      "閑依農圃鄰，偶似山林客。",
      "曉耕翻露草，夜榜響溪石。",
      "來往不逢人，長歌楚天碧。"
    ],

  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "漁翁夜傍西巖宿，曉汲清湘燃楚竹。",
      "煙銷日出不見人，[欸]乃一聲山水綠。",
      "迴看天際下中流，巖上無心雲相逐。"
    ],

  {
    "author": "劉禹錫",
    "paragraphs": [
      "天地英雄氣，千秋尚凜然。",
      "勢分三足鼎，業復五銖錢。",
      "得相能開國，生兒不象賢。",
      "淒涼蜀故妓，來舞魏宮前。"
    ],

    "paragraphs": [
      "今夜鄜州月，閨中只獨看。",
      "遙憐小兒女，未解憶長安。",
      "香霧雲鬟濕，清輝玉臂寒。",
      "何時倚虛幌，雙照淚痕乾。"

  {
    "author": "杜甫",
    "paragraphs": [
      "花隱掖垣暮，啾啾棲鳥過。",
      "星臨萬戶動，月傍九霄多。",
      "不寢聽金鑰，因風想玉珂。",
      "明朝有封事，數問夜如何。"

  {
    "author": "杜甫",
    "paragraphs": [
      "此道昔歸順，西郊胡正繁。",
      "至今殘破膽，應有未招魂。",
      "近得歸京邑，移官豈至尊。",
      "無才日衰老，駐馬望千門。"

    "id": "f88a6dbd-bf83-458c-b5e2-85fdd1ed98b2"

  {
    "author": "杜甫",
    "paragraphs": [
      "戍鼓斷人行，秋邊一雁聲。",
      "露從今夜白，月是故鄉明。",
      "有弟皆分散，無家問死生。",
      "寄書長不避，況乃未休兵。"

    ],

    "id": "c1280e87-ac81-4f9b-9de5-377d6af38ae8"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "涼風起天末，君子意如何。",
      "鴻雁幾時到，江湖秋水多。",
      "文章憎命達，魑魅喜人過。",
      "應共冤魂語，投詩贈汩羅。"
    ],
    "tags": [

      "写风",

    "title": "天末憶李白",
    "id": "2c036362-9f1d-434c-854f-b97a2a4bb19b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "丞相祠堂何處尋，錦官城外柏森森。",
      "映堦碧草自春色，隔葉黃鸝空好音。",
      "三顧頻煩天下計，兩朝開濟老臣心。",
      "出師未捷身先死，長使英雄淚滿襟。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "忧国忧民",
      "写人",
      "咏史怀古",
      "赞颂"
    ],
    "title": "蜀相",
    "id": "a353dcb1-12cc-4ca8-af1e-55d1d62445f8"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "舍南舍北皆春水，但見羣鷗日日來。",
      "花徑不曾緣客掃，蓬門今始爲君開。",
      "盤餐市遠無兼味，樽酒家貧只舊醅。",
      "肯與鄰翁相對飲，隔籬呼取盡餘桮。"
    ],
    "tags": [
      "唐诗三百首",
      "喜悦",
      "写景",
      "友情",
      "待客"
    ],
    "title": "客至",
    "id": "9da0cbe5-52d4-4efc-8be2-2f78f1a8f097"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "西山白雪三奇戍，南浦清江萬里橋。",
      "海內風塵諸弟隔，天涯涕淚一身遙。",
      "唯將遲暮供多病，未有涓埃荅聖朝。",
      "跨馬出郊時極目，不堪人事日蕭條。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "写景",
      "抒情"
    ],
    "title": "野望",
    "id": "d77f340f-1a04-4c5b-9704-2536e4249c6b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "遠送從此別，青山空復情。",
      "幾時桮重把，昨夜月同行。",
      "列郡謳歌惜，三朝出入榮。",
      "江村獨歸處，寂寞養殘生。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言律诗",
      "惜别"
    ],
    "title": "奉濟驛重送嚴公四韻",
    "id": "c2c83ee2-940f-4ae3-9ab3-4f509d2991f3"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "劒外忽傳收薊北，初聞涕淚滿衣裳。",
      "却看妻子愁何在，漫卷詩書喜欲狂。",
      "白日放歌須縱酒，青春作伴好還鄉。",
      "即從巴峽穿巫峽，便下襄陽向洛陽。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "思归",
      "六年级下册",
      "小学古诗"
    ],
    "title": "聞官軍收河南河北",
    "id": "22e90c0d-2b59-4500-8e5d-80d38ec4692c"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "風急天高猨嘯哀，渚清沙白鳥飛迴。",
      "無邊落木蕭蕭下，不盡長江衮衮來。",
      "萬里悲秋常作客，百年多病獨登臺。",
      "艱難苦恨繁霜鬢，潦倒新停濁酒桮。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "七言律诗",
      "写景",
      "忧国忧民",
      "秋天",
      "登高",
      "抒情"
    ],
    "title": "登高",
    "id": "a4d718ee-c020-42b4-97df-499cd0076f7b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "他鄉復行役，駐馬別孤墳。",
      "近淚無乾土，低空有斷雲。",
      "對碁陪謝傅，把劒覓徐君。",
      "唯見林花落，鸎啼送客聞。"
    ],
    "tags": [
      "唐诗三百首",
      "忧国忧民",
      "感伤",
      "五言律诗",
      "悼亡"
    ],
    "title": "別房太尉墓",
    "id": "c19e64b1-604b-40b7-9e41-6ef57b9c6f7b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "花近高樓傷客心，萬方多難此登臨。",
      "錦江春色來天地，玉壘浮雲變古今。",
      "北極朝廷終不改，西山寇盜莫相侵。",
      "可憐後主還祠廟，日暮聊爲梁甫吟。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "写景",
      "怀古",
      "一年级下册",
      "忧国忧民",
      "感时",
      "初中古诗",
      "高中古诗",
      "九年级下册(课外)"
    ],
    "title": "登樓",
    "id": "12919986-2d09-4d2e-b5ad-f2485e40ada5"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "清秋幕府井梧寒，獨宿江城蠟炬殘。",
      "永夜角聲悲自語，中天月色好誰看。",
      "風塵荏苒音書絕，關塞蕭條行路難。",
      "已忍伶俜十年事，強移栖息一枝安。"
    ],
    "tags": [
      "唐诗三百首",
      "感时",
      "孤独",
      "七言律诗"
    ],
    "title": "宿府",
    "id": "f540f519-e3c4-41c2-b299-f1d255977705"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "細草微風岸，危檣獨夜舟。",
      "星垂平野闊，月湧大江流。",
      "名豈文章著，官因老病休。",
      "飄飄何所似，天地一沙鷗。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "孤独",
      "抒怀",
      "五言律诗"
    ],
    "title": "旅夜書懷",
    "id": "f96506ea-e8ac-47e0-a0a6-ccd306e56645"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "歲暮陰陽催短景，天涯霜雪霽寒宵。",
      "五更鼓角聲悲壯，三峽星河影動搖。",
      "野哭幾家聞戰伐，夷歌數處起漁樵。",
      "臥龍躍馬終黃土，人事依依漫寂寥。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "閣夜",
    "id": "0f5874bf-3748-44c9-bc3a-be4a8c3eb2f6"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "功蓋三分國，名高八陣圖。",
      "江流石不轉，遺恨失吞吳。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "怀古",
      "哲理",
      "写人",
      "五言绝句"
    ],
    "title": "八陣圖",
    "id": "927908c0-999f-4d3f-8192-d67d28f93576"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "支離東北風塵際，漂泊西南天地間。",
      "三峽樓臺淹日月，五溪衣服共雲山。",
      "羯胡事主終無賴，詞客衰時且未還。",
      "庾信平生最蕭瑟，暮年詩賦動江關。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "感叹",
      "怀古"
    ],
    "title": "詠懷古跡五首 一",
    "id": "03eb4001-023a-4920-bbc7-a0fc52b2836d"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "搖落深知宋玉悲，風流儒雅亦吾師。",
      "悵望千秋一灑淚，蕭條異代不同時。",
      "江山故宅空文藻，雲雨荒臺豈夢思。",
      "最是楚宮俱泯滅，舟人指點到今疑。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "抒怀"
    ],
    "title": "詠懷古跡五首 二",
    "id": "acbe1729-cefd-4678-9719-09c5c9c27db0"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "羣山萬壑赴荆門，生長明妃尚有村。",
      "一去紫臺連朔漠，獨留青塚向黃昏。",
      "畫圖省識春風面，環佩空歸月夜魂。",
      "千載琵琶作胡語，分明怨恨曲中論。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "思乡"
    ],
    "title": "詠懷古跡五首 三",
    "id": "3b5db620-1964-4674-a01d-ad70ba3ebd2a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "蜀主窺吳幸三峽，崩年亦在永安宮。",
      "翠華想像空山裏，玉殿虛無野寺中。",
      "古廟杉松巢水鶴，歲時伏臘走村翁。",
      "武侯祠屋常鄰近，一體君臣祭祀同。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "抒怀"
    ],
    "title": "詠懷古跡五首 四",
    "id": "733afc7b-e370-4724-b755-e9342c574d22"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "諸葛大名垂宇宙，宗臣遺像肅清高。",
      "三分割據紆籌策，萬古雲霄一羽毛。",
      "伯仲之間見伊呂，指揮若定失蕭曹。",
      "福移漢祚難恢復，志決身殲軍務勞。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "议论"
    ],
    "title": "詠懷古跡五首 五",
    "id": "87f5949b-bdad-4b5e-b488-7015bd45cc4f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "歧王宅裏尋常見，崔九堂前幾度聞。",
      "正是江南好風景，落花時節又逢君。"
    ],
    "tags": [
      "唐诗三百首",
      "初中古诗",
      "七言绝句",
      "怀念",
      "感伤",
      "七年级下册(课外)"
    ],
    "title": "江南逢李龜年",
    "id": "ae5b1a15-0b5c-4578-8f31-1b60030633a4"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "昔聞洞庭水，今上岳陽樓。",
      "吳楚東南坼，乾坤日夜浮。",
      "親朋無一字，老病有孤舟。",
      "戎馬關山北，憑軒涕泗流。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "岳阳楼",
      "抱负",
      "五言律诗",
      "山水"
    ],
    "title": "登岳陽樓",
    "id": "5d05fef6-e4aa-48e5-917d-c29d0e6d6b33"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "陽月南飛雁，傳聞至此回。",
      "我行殊未已，何日復歸來？江靜潮初落，林昏瘴不開。",
      "明朝望鄉處，應見隴頭梅。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗",
      "思乡",
      "带有地名",
      "地名"
    ],
    "title": "題大庾嶺北驛",
    "id": "058db0d1-0656-4e8f-ac49-87622e16b19b"
  },
  {
    "author": "朱斌",
    "paragraphs": [
      "白日依山盡，黃河入海流。",
      "欲窮千里目，更上一層樓。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "山水",
      "励志",
      "登楼",
      "写景",
      "哲理",
      "名楼、庙宇",
      "五言绝句"
    ],
    "title": "登樓",
    "id": "19340af6-e25d-41c8-90fc-b465d9be1134"
  },
  {
    "author": "高適",
    "paragraphs": [
      "嗟君此別意何如，駐馬銜桮問謫居。",
      "巫峽啼猿數行淚，衡陽歸雁幾封書。",
      "青楓江上秋天遠，白帝城邊古木疎。",
      "聖代即今多雨露，暫時分手莫躊躇。"
    ],
    "tags": [
      "唐诗三百首",
      "同情",
      "送别",
      "贬谪",
      "边塞",
      "七言律诗"
    ],
    "title": "送李少府貶峽中王少府貶長沙",
    "id": "2c24cec1-4105-4511-bf8b-bc6d5d8d48c7"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "車轔轔，馬蕭蕭，行人弓箭各在腰。",
      "耶孃妻子走相送，塵埃不見咸陽橋。",
      "牽衣頓足闌道哭，哭聲直上干雲霄。",
      "道傍過者問行人，行人但云點行頻。",
      "或從十五北防河，便至四十西營田。",
      "去時里正與裹頭，歸來頭白還戍邊。",
      "邊亭流血成海水，武皇開邊意未已。",
      "君不聞漢家山東二百州，千村萬落生荆杞。",
      "縱有健婦把鋤犂，禾生隴畝無東西。",
      "況復秦兵耐苦戰，被驅不異犬與雞。",
      "長者雖有問，役夫敢申恨。",
      "且如今年冬，未休關西卒。",
      "縣官急索租，租稅從何出？信知生男惡，反是生女好。",
      "生女猶是嫁比鄰，生男埋沒隨百草。",
      "君不見青海頭，古來白骨無人收。",
      "新鬼煩冤舊鬼哭，天陰雨濕聲啾啾。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "战争",
      "忧国忧民",
      "乐府",
      "新乐府辞"
    ],
    "title": "兵車行",
    "id": "bd57a0b0-28a1-4d53-bc09-51899d2dac38"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "人生不相見，動如參與商。",
      "今夕復何夕，共此燈燭光。",
      "少壯能幾時，鬢髮各已蒼。",
      "訪舊半爲鬼，驚呼熱中腸。",
      "焉知二十載，重上君子堂。",
      "昔別君未婚，兒女忽成行。",
      "怡然敬父執，問我來何方。",
      "問荅乃未已，兒女羅酒漿。",
      "夜雨剪春韭，新炊間黃粱。",
      "主稱會面難，一舉累十觴。",
      "十觴亦不醉，感子故意長。",
      "明日隔山岳，世事兩茫茫。"
    ],
    "tags": [
      "唐诗三百首",
      "时光",
      "五言古诗",
      "人生",
      "友情"
    ],
    "title": "贈衛八處士",
    "id": "6c7c45a6-c944-4ff3-aa99-f5cb0440436f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "三月三日天氣新，長安水邊多麗人。",
      "態濃意遠淑且真，肌理細膩骨肉勻。",
      "繡羅衣裳照暮春，蹙金孔雀銀麒麟。",
      "頭上何所有，翠微㔩葉垂鬢脣。",
      "背後何所見，珠壓腰衱穩稱身。",
      "就中雲幕椒房親，賜名大國虢與秦。",
      "紫駝之峰出翠釜，水精之盤行素鱗。",
      "犀箸厭飫久未下，鑾刀縷切空紛綸。",
      "黃門飛鞚不動塵，御廚絡繹送八珍。",
      "簫鼓哀吟感鬼神，賓從雜遝實要津。",
      "後來鞍馬何逡巡，當軒下馬入錦茵。",
      "楊花雪落覆白蘋，青鳥飛去銜紅巾。",
      "炙手可熱勢絕倫，慎莫近前丞相嗔。"
    ],
    "tags": [
      "杂曲歌辞",
      "唐诗三百首",
      "乐府",
      "讽刺",
      "咏叹"
    ],
    "title": "麗人行",
    "id": "370b53ae-949e-45cf-92b0-3aca072c1b86"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "少陵野老吞聲哭，春日潛行曲江曲。",
      "江頭宮殿鎖千門，細柳新蒲爲誰綠。",
      "憶昔霓旌下南苑，苑中萬物生顏色。",
      "昭陽殿裏第一人，同輦隨君侍君側。",
      "輦前才人帶弓箭，白馬嚼齧黃金勒。",
      "翻身向天仰射雲，一箭正墜雙飛翼。",
      "明眸皓齒今何在，血污遊魂歸不得。",
      "清渭東流劒閣深，去住彼此無消息。",
      "人生有情淚霑臆，江水江花豈終極。",
      "黃昏胡騎塵滿城，欲往城南忘南北。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "爱国",
      "伤怀",
      "乐府",
      "新乐府辞",
      "写水"
    ],
    "title": "哀江頭",
    "id": "8474f5c4-d18e-4b42-9702-19ad909b9ea2"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "長安城頭頭白烏，夜飛延秋門上呼。",
      "又向人家啄大屋，屋底達官走避胡。",
      "金鞭斷折九馬死，骨肉不待同馳驅。",
      "腰下實玦青珊瑚，可憐王孫泣路隅。",
      "問之不肯道姓名，但道困苦乞爲奴。",
      "已經百日竄荆棘，身上無有完肌膚。",
      "高帝子孫盡隆準，龍種自與常人殊。",
      "豺狼在邑龍在野，王孫善保千金軀。",
      "不敢長語臨交衢，且爲王孫立斯須。",
      "昨夜東風吹血腥，東來橐駝滿舊都。",
      "朔方健兒好身手，昔何勇銳今何愚。",
      "竊聞天子已傳位，賢德北服南單于。",
      "花門剺面請雪恥，慎勿出口他人狙。",
      "哀哉王孫慎勿疎，五陵佳氣無時無。"
    ],
    "tags": [
      "唐诗三百首",

      "抒情",

    ],
    "title": "哀王孫",
    "id": "bd7949f8-c961-4bfd-a307-1fe9e621028c"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "絕代有佳人，幽居在空谷。",
      "自云良家子，零落依草木。",
      "關中昔喪敗，兄弟遭殺戮。",
      "官高何足論，不得收骨肉。",
      "世情惡衰歇，萬事隨轉燭。",
      "夫壻輕薄兒，新人已如玉。",
      "合昏尚知時，鴛鴦不獨宿。",
      "但見新人笑，那聞舊人哭。",
      "在山泉水清，出山泉水濁。",
      "侍婢賣珠回，牽蘿補茅屋。",
      "摘花不插髮，采柏動盈匊。",
      "天寒翠袖薄，日暮倚修竹。"
    ],
    "tags": [
      "唐诗三百首",
      "赞美",
      "五言古诗",
      "闺怨",
      "女子"
    ],
    "title": "佳人",
    "id": "f2db30a1-f125-44b9-a8d8-287ccb69238a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "死別已吞聲，生別常惻惻。",
      "江南瘴癘地，逐客無消息。",
      "故人入我夢，明我長相憶。",
      "恐非平生魂，路遠不可測。",
      "魂來楓葉青，魂返關塞黑。",
      "君今在羅網，何以有羽翼。",
      "落月滿屋梁，猶疑照顏色。",
      "水深波浪闊，無使蛟龍得。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "夢李白二首 一",
    "id": "c9362aba-fb50-481b-a4cd-08ddd65cdd2a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "浮雲終日行，遊子久不至。",
      "三夜頻夢君，情親見君意。",
      "告歸常局促，苦道來不易。",
      "江湖多風波，舟楫恐失墜。",
      "出門搔白首，若負平生志。",
      "冠蓋滿京華，斯人獨顦顇。",
      "孰云網恢恢，將老身反累。",
      "千秋萬歲名，寂莫身後事。"
    ],
    "tags": [
      "唐诗三百首",
      "友人",
      "同情",
      "记梦",
      "五言古诗"
    ],
    "title": "夢李白二首 二",
    "id": "0710a746-8660-4bc1-b073-8ce51ac9f4d9"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "國初已來畫鞍馬，神妙獨數江都王。",
      "將軍得名三十載，人間又見真乘黃。",
      "曾貌先帝照夜白，龍池十日飛霹靂。",
      "內府殷紅馬腦盌，倢伃傳詔才人索。",
      "盌賜將軍拜舞歸，輕紈細綺相追飛。",
      "貴戚權門得筆跡，始覺屏障生光輝。",
      "昔日太宗拳毛騧，近時郭家師子花。",
      "今之新圖有二馬，復令識者久歎嗟。",
      "此皆騎戰一敵萬，縞素漠漠開風沙。",
      "其餘七匹亦殊絕，迥若寒空動煙雪。",
      "霜蹄蹴踏長楸間，馬官廝養森成列。",
      "可憐九馬爭神駿，顧視清高氣深穩。",
      "借問苦心愛者誰，後有韋諷前支遁。",
      "憶昔巡幸新豐宮，翠華拂天來向東。",
      "騰驤磊落三萬匹，皆與此圖筋骨同。",
      "自從獻寶朝河宗，無復射蛟江水中。",
      "君不見金粟堆前松柏裏，龍媒去盡鳥呼風。"
    ],
    "tags": [
      "唐诗三百首",
      "写马",
      "七言古诗",
      "题画",
      "马"
    ],
    "title": "韋諷錄事宅觀曹將軍畫馬圖",
    "id": "827e44b1-7064-4ff7-9a9c-192eece94e2d"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "將軍魏武之子孫，於今爲庶爲清門。",
      "英雄割據雖已矣，文彩風流猶尚存。",
      "學書初學衛夫人，但恨無過王右軍。",
      "丹青不知老將至，富貴於我如浮雲。",
      "開元之中常引見，承恩數上南熏殿。",
      "凌煙功臣少顏色，將軍下筆開生面。",
      "良相頭上進賢冠，猛將腰間大羽箭。",
      "褒公鄂公毛髮動英姿颯爽來酣戰。",
      "先帝天馬玉花驄，畫工如山貌不同。",
      "是日牽來赤墀下，迥立閶闔生長風。",
      "詔謂將軍拂絹素，意匠慘澹經營中。",
      "斯須九重真龍出，一洗萬古凡馬空。",
      "玉花却在御榻上，榻上庭前屹相向。",
      "至尊含笑催賜金，圉人太僕皆惆悵。",
      "弟子韓幹早入室，亦能畫馬窮殊相。",
      "幹惟畫肉不畫骨，忍使驊騮氣凋喪。",
      "將軍畫善蓋有神，必逢佳士亦寫真。",
      "即今飄泊干戈際，屢貌尋常行路人。",
      "途窮反遭俗眼白，世上未有如公貧。",
      "但看古來盛名下，終日坎壈纏其身。"
    ],
    "tags": [
      "写人",
      "同情",
      "唐诗三百首",
      "七言古诗",
      "怅惘"
    ],
    "title": "丹青引贈曹將軍霸",
    "id": "13b12259-3750-4c6d-87ee-35283ad63dab"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "今我不樂思岳陽，身欲奮飛病在牀。",
      "美人娟娟隔秋水，濯足洞庭望八荒。",
      "鴻飛冥冥日月白，青楓葉赤天雨霜。",
      "玉京羣帝集北斗，或騎騏驎翳鳳皇。",
      "芙蓉旌旗煙霧樂，影動倒景搖瀟湘。",
      "星宮之君醉瓊漿，羽人稀少不在旁。",
      "似聞昨者赤松子，恐是漢代韓張良。",
      "昔隨劉氏定長安，帷幄未改神慘傷。",
      "國家成敗吾豈敢，色難腥腐餐風香。",
      "周南留滯古所惜，南極老人應壽昌。",
      "美人胡爲隔秋水，焉得置之貢玉堂。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "游仙",
      "七言古诗"
    ],
    "title": "寄韓諫議",
    "id": "6d303931-f900-4f29-a8b9-caea611a521f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "孔明廟前有老柏，柯如青銅根如石。",
      "霜皮溜雨四十圍，黛色參天二千尺。",
      "君臣已與時際會，樹木猶爲人愛惜。",
      "雲來氣接巫峽長，月出寒通雪山白。",
      "憶昨路繞錦亭東，先主武侯同閟宮。",
      "崔嵬枝幹郊原古，窈窕丹青戶牖空。",
      "落落盤踞雖得地，冥冥孤高多烈風。",
      "扶持自是神明力，正直原因造化功。",
      "大廈如傾要梁棟，萬牛回首丘山重。",
      "不露文章世已驚，未辭剪伐誰能送。",
      "苦心豈免容螻蟻，香葉終經宿鸞鳳。",
      "志士幽人莫怨嗟，古來材大難爲用。"
    ],
    "tags": [
      "隋・唐・五代",
      "咏物",
      "唐诗三百首",
      "七言古诗",
      "咏物诗",
      "怀才不遇"
    ],
    "title": "古柏行",
    "id": "383d41a8-5155-4fff-b91f-87d5585ff03e"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "昔有佳人公孫氏，一舞劒氣動四方。",
      "觀者如山色沮喪，天地爲之久低昂。",
      "㸌如羿射九日落，矯如羣帝驂龍翔。",
      "來如雷霆收震怒，罷如江海凝清光。",
      "絳脣珠袖兩寂莫，況有弟子傳芬芳。",
      "臨潁美人在白帝，妙舞此曲神揚揚。",
      "與余問答既有以，感時撫事增惋傷。",
      "先帝侍女八千人，公孫劒器初第一。",
      "五十年間似反掌，風塵傾動昏王室。",
      "棃園子弟散如煙，女樂餘姿映寒日。",
      "金粟堆南木已拱，瞿唐石城草蕭瑟。",
      "玳筵急管曲復終，樂極哀來月東出。",
      "老夫不知其所往，足繭荒山轉愁疾。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "觀公孫大娘弟子舞劒器行",
    "id": "61304178-6b16-4f98-87b2-4ad6bc98da98"
  },
  {
    "author": "皎然",
    "paragraphs": [
      "移家雖帶郭，野徑入桑麻。",
      "近種籬邊菊，秋來未著花。",
      "扣門無犬吠，欲去問西家。",
      "報道山中去，歸時每日斜。"
    ],
    "tags": [
      "唐诗三百首",
      "隐士",
      "访友",
      "生活",
      "五言律诗"
    ],
    "title": "尋陸鴻漸不遇",
    "id": "565d931a-ff49-4f37-b633-524b48c2f4f0"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "西晉樓船下益州，金陵王氣黯然收。",
      "千尋鐵鎖沈江底，一片降旛出石頭。",
      "人世幾回傷往事，山形依舊枕江流。",
      "今逢四海爲家日，故壘蕭蕭蘆荻秋。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "咏史怀古"
    ],
    "title": "西塞山懷古",
    "id": "80beb8cc-8338-44d4-8b96-7f9d32133c97"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "朱雀橋邊野草花，烏衣巷口夕陽斜。",
      "舊時王謝堂前燕，飛入尋常百姓家。"
    ],
    "tags": [
      "唐诗三百首",
      "怀古",
      "七言绝句",
      "带有地名",
      "地名"
    ],
    "title": "金陵五題 烏衣巷",
    "id": "4fa92777-9bd6-45ca-9272-bac30459cf5e"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "新妝面面下朱樓，深鎖春光一院愁。",
      "行到中庭數花朵，蜻蜓飛上玉搔頭。"
    ],
    "tags": [

      "孤独",
      "春天",
      "女子",
      "七言绝句"
    ],
    "title": "和樂天春詞",
    "id": "297dd100-6aab-4685-a52d-983fb0999c7a"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "泉壑帶茅茨，雲霞生薜帷。",
      "竹憐新雨後，山愛夕陽時。",
      "閑鷺棲常早，秋花落更遲。",
      "家童掃蘿逕，昨與故人期。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "五言律诗",
      "邀请"
    ],
    "title": "谷口書齋寄楊補闕",
    "id": "b700208d-d859-4e36-96bf-883c81d4df0f"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "上國隨緣住，來途若夢行。",
      "浮天滄海遠，去世法舟輕。",
      "水月通禪觀，魚龍聽梵聲。",
      "惟憐一燈影，萬里眼中明。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言律诗",
      "惜别"
    ],
    "title": "送僧歸日本",
    "id": "15274300-bd45-4898-ab14-9a3dead4b620"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "二月黃鶯飛上林，春城紫禁曉陰陰。",
      "長樂鐘聲花外盡，龍池柳色雨中深。",
      "陽和不散窮途恨，霄漢長懷捧日新。",
      "獻賦十年猶未遇，羞將白髮對華簪。"
    ],
    "tags": [
      "唐诗三百首",
      "援引",
      "七言律诗"
    ],
    "title": "贈闕下裴舍人",
    "id": "42f17f00-bbc1-4b5b-82c1-3e9e012725ba"
  },
  {
    "author": "元結",
    "paragraphs": [
      "昔歲逢太平，山林二十年。",
      "泉源在庭戶，洞壑當門前。",
      "井稅有常期，日[晏]猶得眠。",
      "忽然遭世變，數歲親戎旃。",
      "今來典斯郡，山夷又紛然。",
      "城小賊不屠，人貧傷可憐。",
      "是以陷隣境，此州獨見全。",
      "使臣將王命，豈不如賊焉。",
      "今彼徴斂者，迫之如火煎。",
      "誰能絕人命，以作時世賢。",
      "思欲委符節，引竿自刺船。",
      "將家就魚麥，歸老江湖邊。"
    ],
    "tags": [
      "唐诗三百首",
      "同情",
      "五言古诗"
    ],
    "title": "賊退示官吏",
    "id": "1ce94bde-41ec-42b8-abef-e1e1be55be7c"
  },
  {
    "author": "元結",
    "paragraphs": [
      "石魚湖，似洞庭，夏水欲滿君山青。",
      "山爲樽，水爲沼，酒徒歷歷坐洲島。",
      "長風連日作大浪，不能廢人運酒舫。",
      "我持長瓢坐巴丘，酌飲四坐以散愁。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖"
    ],
    "title": "石魚湖上醉歌",
    "id": "8af643c9-a8b0-49b7-b8e9-88920ab0bbd8"
  },
  {
    "author": "韓翃",
    "paragraphs": [
      "長簟迎風早，空城澹月華。",
      "星河秋一雁，砧杵夜千家。",
      "節候看應晚，心期臥亦賒。",
      "向來吟秀句，不覺已鳴鴉。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "酬答",
      "五言律诗"
    ],
    "title": "酬程延秋夜即事見贈",
    "id": "ce493923-7c4b-41a9-94e9-cf95741c018c"
  },
  {
    "author": "韓翃",
    "paragraphs": [
      "仙臺下見五城樓，風物淒淒宿雨收。",
      "山色遙連秦樹晚，砧聲近報漢宮秋。",
      "疎松影落空壇靜，細草香閑小洞幽。",
      "何用別尋方外去，人間亦自有丹丘。"
    ],
    "tags": [
      "唐诗三百首",
      "向往",
      "七言律诗",
      "游历"
    ],
    "title": "同題仙游觀",
    "id": "b411ce1e-ac09-4427-ab32-f8dc7a57e566"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "去年花裏逢君別，今日花開已一年。",
      "世事茫茫難自料，春愁黯黯獨成眠。",
      "身多疾病思田里，邑有流亡愧俸錢。",
      "聞道欲來相問訊，西樓望月幾廻圓。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "友人",
      "忧国忧民",
      "七言律诗"
    ],
    "title": "寄李儋元錫",
    "id": "8435b46d-bbf1-49e5-af66-6f2d5681f1bf"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "今朝郡齋冷，忽念山中客。",
      "澗底束荆薪，歸來煮白石。",
      "欲持一瓢酒，遠慰風雨夕。",
      "落葉滿空山，何處尋行跡。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "怀念"
    ],
    "title": "寄全椒山中道士",
    "id": "46503396-3bb3-449c-9c84-f2ff232f7949"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "懷君屬秋夜，散步詠涼天。",
      "山空松子落，幽人應未眠。"
    ],
    "tags": [
      "唐诗三百首",
      "秋天",
      "怀人",
      "五言绝句"
    ],
    "title": "秋夜寄丘二十二員外",
    "id": "96455db1-a0c6-402c-8892-05c6b9a3d029"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "楚江微雨裏，建業暮鐘時。",
      "漠漠帆來重，冥冥鳥去遲。",
      "海門深不見，浦樹遠含滋。",
      "相送情無限，沾襟比散絲。"
    ],
    "tags": [
      "唐诗三百首",
      "写雨",
      "友情",
      "送别",
      "五言律诗",
      "雨"
    ],
    "title": "賦得暮雨送李胄",
    "id": "83dcb67c-ccbc-4592-b232-368a6b5275ce"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "永日方慼慼，出門復悠悠。",
      "女子今有行，大江泝輕舟。",
      "爾輩況無恃，撫念益慈柔。",
      "幼爲長所育，兩別泣不休。",
      "對此結中腸，義往難復留。",
      "自小闕內訓，事姑貽我憂。",
      "賴茲託令門，仁恤庶無尤。",
      "貧儉誠所尚，資從豈待周。",
      "孝恭遵婦道，容止順其猷。",
      "別離在今晨，見爾當何秋。",
      "居閑始自遣，臨感忽難收。",
      "歸來視幼女，零淚緣纓流。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "感伤",
      "五言古诗"
    ],
    "title": "送楊氏女",
    "id": "f800050a-d7a0-4f12-a614-17fe23df8f41"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "客從東方來，衣上灞陵雨。",
      "問客何爲來，采山因買斧。",
      "冥冥花正開，颺颺燕新乳。",
      "昨別今已春，鬢絲生幾縷。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "同情",
      "抒情",
      "五言古诗"
    ],
    "title": "長安遇馮著",
    "id": "b8ae44b3-ba8d-42d3-85a7-a70aa8608379"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "落帆逗淮鎮，停舫臨孤驛。",
      "浩浩風起波，冥冥日沈夕。",
      "人歸山郭暗，雁下蘆洲白。",
      "獨夜憶秦關，聽鐘未眠客。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "写景",
      "抒情",
      "思乡"
    ],
    "title": "夕次盱眙縣",
    "id": "11424603-9a22-4564-89a4-95e1766f9685"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "吏舍跼終年，出郊曠清曙。",
      "楊柳散和風，青山澹吾慮。",
      "依叢適自憩，緣澗還復去。",
      "微雨靄芳原，春鳩鳴何處？樂幽心屢止，遵事跡猶遽。",
      "終罷斯結廬，慕陶真可庶。"
    ],
    "tags": [
      "唐诗三百首",
      "春天",
      "生活"
    ],
    "title": "東郊",
    "id": "3e0e1d96-c249-47c4-b16d-4d91dd6e7cce"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "塔勢如湧出，孤高聳天宮。",
      "登臨出世界，磴道盤虛空。",
      "突兀壓神州，崢嶸如鬼工。",
      "四角礙白日，七層摩蒼穹。",
      "下窺指高鳥，俯聽聞驚風。",
      "連山若波濤，奔湊似朝東。",
      "青槐夾馳道，宮館何玲瓏。",
      "秋色從西來，蒼然滿關中。",
      "五陵北原上，萬古青濛濛。",
      "淨理了可悟，勝因夙所宗。",
      "誓將挂冠去，覺道資無窮。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "景点",
      "写景",
      "忧思",
      "写塔"
    ],
    "title": "與高適薛據慈恩寺浮圖",
    "id": "93d82a12-5e4d-45c2-b837-d0c54447fba3"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "北風捲地白草折，胡天八月即飛雪。",
      "忽然一夜春風來，千樹萬樹梨花開。",
      "散入珠簾濕羅幕，狐裘不煖錦衾薄。",
      "將軍角弓不得控，都護鐵衣冷難着。",
      "瀚海闌干百丈冰，愁雲黲淡萬里凝。",
      "中軍置酒飲歸客，胡琴琵琶與羌笛。",
      "紛紛暮雪下轅門，風掣紅旗凍不翻。",
      "輪臺東門送君去，去時雪滿天山路。",
      "山迴路轉不見君，雪上空留馬行處。"
    ],
    "tags": [
      "唐诗三百首",
      "写雪",
      "友情",
      "咏物",
      "八年级下册(课内)",
      "送别",
      "雪",
      "初中古诗",
      "冬天",
      "山",
      "七言古诗",
      "咏物诗"
    ],
    "title": "白雪歌送武判官歸京",
    "id": "294bc7b2-b4f8-4a53-be17-a40ded4afd1a"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "輪臺城頭夜吹角，輪臺城北旄頭落。",
      "羽書昨夜過渠黎，單于已在金山西。",
      "戍樓西望煙塵黑，漢兵屯在輪臺北。",
      "上將擁旄西出征，平明吹笛大軍行。",
      "四邊伐鼓雪海湧，三軍大呼陰山動。",
      "虜塞兵氣連雲屯，戰場白骨纏草根。",
      "劒河風急雪片闊，沙口石凍馬蹄脫。",
      "亞相勤王甘苦辛，誓將報主靜邊塵。",
      "古來青史誰不見，今見功名勝古人。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "生活",
      "七言古诗",
      "赞扬",
      "边塞",
      "将士"
    ],
    "title": "輪臺歌奉送封大夫出師西征",
    "id": "d129dc0f-cec9-4073-bb89-cb9312564d9d"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "君不見走馬川行雪海邊，平沙莽莽黃入天。",
      "輪臺九月風夜吼，一川碎石大如斗，隨風滿地石亂走。",
      "匈奴草黃馬正肥，金山西見煙塵飛。",
      "漢家大將西出師，將軍金甲夜不脫。",
      "半夜軍行戈相撥，風頭如刀面如割。",
      "馬毛帶雪汗氣蒸，五花連錢旋作冰。",
      "幕中草檄硯水凝，虜騎聞之應膽懾。",
      "料知短兵不敢接，車師西門佇獻捷。"
    ],
    "tags": [
      "唐诗三百首",
      "写马",
      "写风",
      "送别",
      "初中古诗",
      "七言古诗",
      "九年级下册(课外)",
      "风",
      "边塞",
      "赞美",
      "马",
      "将士"
    ],
    "title": "走馬川行奉送出師西征",
    "id": "f5e021d7-ea56-4341-947c-8fd024018e1c"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "聯步趨丹陛，分曹限紫微。",
      "曉隨天仗入，暮惹御香歸。",
      "白髮悲花落，青雲羨鳥飛。",
      "聖朝無闕事，自覺諫書稀。"
    ],
    "tags": [
      "唐诗三百首",
      "仕途",
      "五言律诗",
      "感慨"
    ],
    "title": "寄左省杜拾遺",
    "id": "2779f710-4ab4-46cb-a2b6-1889752f26c2"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "雞鳴紫陌曙光寒，鶯囀皇州春色闌。",
      "金闕曉鐘開萬戶，玉階仙仗擁千官。",
      "花迎劒珮星初落，柳拂旌旗露未乾。",
      "獨有鳳皇池上客，陽春一曲和皆難。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "唱和"
    ],
    "title": "奉和中書舍人賈至早朝大明宮",
    "id": "8df8e94b-ffe4-4930-af4c-491d7cb04651"
  },
  {
    "author": "張喬",
    "paragraphs": [
      "調角斷清秋，征人倚戍樓。",
      "春風對青塚，白日落梁州。",
      "大漢無兵阻，窮邊有客遊。",
      "蕃情似此水，長願向南流。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "五言律诗",
      "边塞"
    ],
    "title": "書邊事",
    "id": "8324db66-b75a-40ff-9469-cba276d2f88f"
  },
  {
    "author": "李白",
    "paragraphs": [
      "金樽清酒斗十千，玉盤珍羞直萬錢。",
      "停杯投筯不能食，拔劒四顧心茫然。",
      "欲渡黃河冰塞川，將登太行雪滿山。",
      "閑來垂釣碧溪上，忽復乘舟夢日邊。",
      "行路難，行路難，多岐路，今安在。",
      "長風破浪會有時，直挂雲帆濟滄海。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "励志",
      "友情",
      "八年级下册(课内)",
      "初中古诗",
      "乐府",
      "宴饮",
      "哲理",
      "怀才不遇"
    ],
    "title": "行路難三首 一",
    "id": "c348bc2e-f50d-436b-88b7-c198d63dacfc"
  },
  {
    "author": "李白",
    "paragraphs": [
      "大道如青天，我獨不得出。",
      "羞逐長安社中兒，赤雞白狗賭梨栗。",
      "彈劒作歌奏苦聲，曳裾王門不稱情。",
      "淮陰市井笑韓信，漢朝公卿忌賈生。",
      "君不見昔時燕家重郭隗，擁篲折節無嫌猜。",
      "劇辛樂毅感恩分，輸肝剖膽效英才。",
      "昭王白骨縈爛草，誰人更掃黃金臺。",
      "行路難，歸去來。"
    ],
    "tags": [
      "乐府",
      "失意",
      "叹息",
      "唐诗三百首"
    ],
    "title": "行路難三首 二",
    "id": "801c3192-8001-4238-8ecf-0111f490e84c"
  },
  {
    "author": "李白",
    "paragraphs": [
      "有耳莫洗潁川水，有口莫食首陽蕨。",
      "含光混世貴無名，何用孤高比雲月。",
      "吾觀自古賢達人，功成不退皆殞身。",
      "子胥既棄吳江上，屈原終投湘水濱。",
      "陸機雄才豈自保，李斯稅駕苦不早。",
      "華亭鶴唳詎可聞，上蔡蒼鷹何足道。",
      "君不見吳中張翰稱達生，秋風忽憶江東行。",
      "且樂生前一杯酒，何須身後千載名。"
    ],
    "tags": [
      "人生",
      "唐诗三百首",
      "乐府",
      "态度"
    ],
    "title": "行路難三首 三",
    "id": "a7b8e17f-ee93-4bdc-a144-b1ba5ab32bb5"
  },
  {
    "author": "李白",
    "paragraphs": [
      "長相思，在長安，絡緯秋啼金井闌。",
      "微霜淒淒簟色寒，孤燈不明思欲絕。",
      "卷帷望月空長歎，美人如花隔雲端。",
      "上有青冥之長天，下有淥水之波瀾。",
      "天長路遠魂飛苦，夢魂不到關山難。",
      "長相思，摧心肝。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "杂曲歌辞",
      "乐府",
      "伤怀"
    ],
    "title": "長相思",
    "id": "3c1693fc-f4e6-43b7-a66f-6379c3a26eef"
  },
  {
    "author": "李白",
    "paragraphs": [
      "玉階生白露，夜久侵羅襪。",
      "却下水晶簾，玲瓏望秋月。"
    ],
    "tags": [
      "孤独",
      "宫怨",
      "唐诗三百首",
      "乐府"
    ],
    "title": "玉階怨",
    "id": "a65e5646-14b1-4f75-924b-bbf262b242d7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "燕草如碧絲，秦桑低綠枝。",
      "當君懷歸日，是妾斷腸時。",
      "春風不相識，何事入羅幃。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "五言古诗",
      "春天",
      "坚贞",
      "妇女"
    ],
    "title": "春思",
    "id": "7277c420-9f3f-4093-a5b2-6331494721e8"
  },
  {
    "author": "李白",
    "paragraphs": [
      "吾愛孟夫子，風流天下聞。",
      "紅顏棄軒冕，白首臥松雲。",
      "醉月頻中聖，迷花不事君。",
      "高山安可仰，徒此揖清芬。"
    ],
    "tags": [
      "唐诗三百首",
      "赠别",
      "五言律诗",
      "敬爱"
    ],
    "title": "贈孟浩然",
    "id": "9d1b6a18-571c-4f25-bfdb-3fe260115c3f"
  },
  {
    "author": "李白",
    "paragraphs": [
      "我本楚狂人，鳳歌笑孔丘。",
      "手持綠玉杖，朝別黃鶴樓。",
      "五嶽尋仙不辭遠，一生好入名山遊。",
      "廬山秀出南斗傍，屏風九疊雲錦張，影落明湖青黛光。",
      "金闕前開二峰長，銀河倒挂三石梁。",
      "香爐瀑布遙相望，迴厓沓嶂凌蒼蒼。",
      "翠影紅霞映朝日，鳥飛不到吳天長。",
      "登高壯觀天地間，大江茫茫去不還。",
      "黃雲萬里動風色，白波九道流雪山。",
      "好爲廬山謠，興因廬山發。",
      "閑窺石鏡清我心，謝公行處蒼苔沒。",
      "早服還丹無世情，琴心三疊道初成。",
      "遙見仙人綵雲裏，手把芙蓉朝玉京。",
      "先期汗漫九垓上，願接盧敖遊太清。"
    ],
    "tags": [
      "唐诗三百首",
      "庐山",
      "黄鹤楼",
      "写景",
      "归隐",
      "七言古诗",
      "山水"
    ],
    "title": "廬山謠寄盧侍御虛舟",
    "id": "4e491c2f-c3c8-487f-8e76-63bd0a811b30"
  },
  {
    "author": "李白",
    "paragraphs": [
      "海客談瀛洲，煙濤微茫信難求。",
      "越人語天姥，雲霓明滅或可覩。",
      "天姥連天向天橫，勢拔五嶽掩赤城。",
      "天台四萬八千丈，對此欲倒東南傾。",
      "我欲因之夢吳越，一夜飛度鏡湖月。",
      "湖月照我影，送我至剡溪。",
      "謝公宿處今尚在，淥水蕩漾清猨啼。",
      "脚著謝公屐，身登青雲梯。",
      "半壁見海日，空中聞天雞。",
      "千巖萬轉路不定，迷花倚石忽已暝。",
      "熊咆龍吟殷巖泉，慄深林兮驚層巔。",
      "雲青青兮欲雨，水澹澹兮生煙。",
      "列缺霹靂，丘巒崩摧。",
      "洞天石扇，訇然中開。",
      "青冥浩蕩不見底，日月照耀金銀臺。",
      "霓爲衣兮風爲馬，雲之君兮紛紛而來下。",
      "虎鼓瑟兮鸞迴車，仙之人兮列如麻。",
      "忽魂悸以魄動，怳驚起而長嗟。",
      "惟覺時之枕席，失向來之煙霞。",
      "世間行樂亦如此，古來萬事東流水。",
      "別君去時何時還，且放白鹿青崖間，須行即騎訪名山。",
      "安能摧眉折腰事權貴？使我不得開心顏。"
    ],
    "tags": [
      "唐诗三百首",
      "一年级下册",
      "七言古诗",
      "高中古诗",
      "记梦",
      "古体"
    ],
    "title": "夢遊天姥吟留別",
    "id": "606d0bd8-31d2-4a7a-97ee-341956e7be60"
  },
  {
    "author": "李白",
    "paragraphs": [
      "風吹柳花滿店香，吳姬壓酒喚客嘗。",
      "金陵子弟來相送，欲行不行各盡觴。",
      "請君試問東流水，別意與之誰短長。"
    ],
    "tags": [
      "唐诗三百首",
      "七言古诗",
      "离别",
      "饮酒"
    ],
    "title": "金陵酒肆留別",
    "id": "809ad73b-9a8e-436e-9874-f9295b624af0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "渡遠荆門外，來從楚國遊。",
      "山隨平野盡，江入大荒流。",
      "月下飛天鏡，雲生結海樓。",
      "仍連故鄉水，萬里送行舟。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "送别",
      "五言律诗",
      "初中古诗",
      "八年级上册(课内)",
      "思乡"
    ],
    "title": "渡荆門送別",
    "id": "bf8918b8-a05a-4ccf-bb2e-3f9b81f6bbfc"
  },
  {
    "author": "李白",
    "paragraphs": [
      "青山橫北郭，白水遶東城。",
      "此地一爲別，孤蓬萬里征。",
      "浮雲遊子意，落日故人情。",
      "揮手自茲去，蕭蕭班馬鳴。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级上册(课外)",
      "友情",
      "写景",
      "送别",
      "五言律诗",
      "初中古诗",
      "惜别"
    ],
    "title": "送友人",
    "id": "1f83fccf-7476-464b-8cd4-8a2b4569c7a0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "棄我去者昨日之日不可留，亂我心者今日之日多煩憂。",
      "長風萬里送秋雁，對此可以酣高樓。",
      "蓬萊文章建安骨，中間小謝又清發。",
      "俱懷逸興壯思飛，欲上青天覽日月。",
      "抽刀斷水水更流，舉杯銷愁愁更愁。",
      "人生在世不稱意，明朝散髮弄扁舟。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级下册(课外)",
      "七言古诗",
      "初中古诗",
      "哲理",
      "离别",
      "抒怀",
      "水",
      "豪迈"
    ],
    "title": "宣州謝朓樓餞別校書叔雲",
    "id": "5593d522-b820-4c06-bab6-0ab5a0fc1d46"
  },
  {
    "author": "李白",
    "paragraphs": [
      "暮從碧山下，山月隨人歸。",
      "却顧所來徑，蒼蒼橫翠微。",
      "相攜及田家，童稚開荆扉。",
      "綠竹入幽徑，青蘿拂行衣。",
      "歡言得所憩，美酒聊共揮。",
      "長歌吟松風，曲盡河星稀。",
      "我醉君復樂，陶然共忘機。"
    ],
    "tags": [
      "唐诗三百首",
      "终南山",
      "五言古诗",
      "田园",
      "写景",
      "饮酒"
    ],
    "title": "下終南山過斛斯山人宿置酒",
    "id": "ca4cc6b3-a324-48c0-89c0-bb36c09c4930"
  },
  {
    "author": "李白",
    "paragraphs": [
      "鳳凰臺上鳳凰遊，鳳去臺空江自流。",
      "吳宮花草埋幽徑，晉代衣冠成古丘。",
      "三山半落青天外，二水中分白鷺洲。",
      "總爲浮雲能蔽日，長安不見使人愁。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "一年级下册",
      "高中古诗",
      "咏史怀古"
    ],
    "title": "登金陵鳳凰臺",
    "id": "4af86c76-18b3-4069-be90-6d8cef430bc7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "牛渚西江夜，青天無片雲。",
      "登舟望秋月，空憶謝將軍。",
      "余亦能高詠，斯人不可聞。",
      "明朝挂帆席，楓葉落紛紛。"
    ],
    "tags": [
      "唐诗三百首",
      "怀古",
      "五言律诗",
      "月亮"
    ],
    "title": "夜泊牛渚懷古",
    "id": "7e1be9c9-fa2f-44c2-a6bc-3edcece745fe"
  },
// ========================更新2=============================

  {
    "author": "李白",
    "paragraphs": [
      "蜀僧抱綠綺，西下峨眉峰。",
      "爲我一揮手，如聽萬壑松。",
      "客心洗流水，餘響入霜鐘。",
      "不覺碧山暮，秋雲暗幾重。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "五言律诗"
    ],
    "title": "聽蜀僧濬彈琴",
    "id": "71999aa1-55dd-4449-81b0-41f04686bf2e"
  },
  {
    "author": "李白",
    "paragraphs": [
      "美人捲珠簾，深坐顰蛾眉。",
      "但見淚痕濕，不知心恨誰。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "女子"
    ],
    "title": "怨情",
    "id": "22e72306-f41c-4621-a925-83bab7f9d76e"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "江漢曾爲客，相逢每醉還。",
      "浮雲一別後，流水十年間。",
      "歡笑情如舊，蕭疎鬢已斑。",
      "何因北歸去，淮上對秋山。"
    ],
    "tags": [
      "唐诗三百首",
      "友情",
      "五言律诗"
    ],
    "title": "淮上喜會梁川故人",
    "id": "a68013c8-4630-41c6-a5ee-a658b57f58fe"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "兵衛森畫戟，宴寢凝清香。",
      "海上風雨至，逍遙池閣涼。",
      "煩疴近消散，嘉賓復滿堂。",
      "自慙居處崇，未覩斯民康。",
      "理會是非遣，性達形迹忘。",
      "鮮肥屬時禁，蔬果幸見嘗。",
      "俯飲一杯酒，仰聆金玉章。",
      "神歡體自輕，意欲凌風翔。",
      "吳中盛文史，羣彥今汪洋。",
      "方知大藩地，豈曰財賦疆。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "宴会"
    ],
    "title": "郡齋雨中與諸文士燕集",
    "id": "9f5ded08-4f6f-4641-878e-897904483479"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "悽悽去親愛，泛泛入煙霧。",
      "歸棹洛陽人，殘鐘廣陵樹。",
      "今朝此爲別，何處還相遇。",
      "世事波上舟，沿洄安得住。"
    ],
    "tags": [
      "唐诗三百首",
      "离别",
      "五言古诗",
      "依恋"
    ],
    "title": "初發揚子寄元大校書",
    "id": "5b3a5651-2a80-4fb1-b1bf-c9fb5ec38905"
  },
  {
    "author": "劉眘虛",
    "paragraphs": [
      "道由白雲盡，春與青溪長。",
      "時有落花至，遠隨流水香。",
      "閑門向山路，深柳讀書堂。",
      "幽映每白日，清輝照衣裳。"
    ],
    "tags": [
      "唐诗三百首",
      "春天",
      "写景",
      "五言律诗"
    ],
    "title": "闕題",
    "id": "a2b4fe60-9809-422d-afa7-143a2088f045"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "更深月色半人家，北斗闌干南斗斜。",
      "今夜偏知春氣暖，蟲聲新透綠窗紗。"
    ],
    "tags": [
      "唐诗三百首",
      "月亮",
      "春天",
      "田园",
      "九年级上册(课外)",
      "中秋",
      "初中古诗",
      "七言绝句"
    ],
    "title": "夜月",
    "id": "79e7ec6e-0d6c-4f95-8181-4671c42e1faf"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "紗窗日落漸黃昏，金屋無人見淚痕。",
      "寂寞空庭春欲晚，梨花滿地不開門。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "七言绝句",
      "宫怨"
    ],
    "title": "春怨",
    "id": "fc1bc01d-c281-40fd-9e0d-4c484539e4ae"
  },
  {
    "author": "柳中庸",
    "paragraphs": [
      "歲歲金河復玉關，朝朝馬策與刀環。",
      "三春白雪歸青冢，萬里黃河遶黑山。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "边塞",
      "七言绝句"
    ],
    "title": "征怨",
    "id": "92dd65da-8301-4c83-b8f3-986b6095c481"
  },
  {
    "author": "顧況",
    "paragraphs": [
      "玉樓天半起笙歌，風送宮嬪笑語和。",
      "月殿影開聞夜漏，水精簾卷近銀河。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "宮詞五首 二",
    "id": "aa9f9e4d-aa34-496e-89cf-cfef61efa89d"
  },
// ========================更新3=============================
  {
    "author": "無名氏",
    "paragraphs": [
      "氓之蚩蚩，抱布貿絲。匪來貿絲，來即我謀。",
      "送子涉淇，至于頓丘。匪我愆期，子無良媒。",
      "將子無怒，秋以為期。"
    ],
    "tags": ["诗经", "国风", "叙事诗", "爱情"],
    "title": "氓",
    "id": "p001-001"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "昔我往矣，楊柳依依。",
      "今我來思，雨雪霏霏。",
      "行道遲遲，載渴載飢。",
      "我心傷悲，莫知我哀。"
    ],
    "tags": ["诗经", "小雅", "战争", "思乡"],
    "title": "采薇",
    "id": "p001-002"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "彼黍離離，彼稷之苗。",
      "行邁靡靡，中心搖搖。",
      "知我者謂我心憂，不知我者謂我何求。",
      "悠悠蒼天，此何人哉！"
    ],
    "tags": ["诗经", "王风", "忧国", "感伤"],
    "title": "黍離",
    "id": "p001-003"
  },
  {
    "author": "屈原",
    "paragraphs": [
      "帝子降兮北渚，目眇眇兮愁予。",
      "嫋嫋兮秋風，洞庭波兮木葉下。",
      "沅有芷兮澧有蘭，思公子兮未敢言。"
    ],
    "tags": ["楚辞", "九歌", "爱情", "写景"],
    "title": "湘夫人",
    "id": "p001-004"
  },
  {
    "author": "屈原",
    "paragraphs": [
      "余幼好此奇服兮，年既老而不衰。",
      "帶長鋏之陸離兮，冠切雲之崔嵬。",
      "世溷濁而莫余知兮，吾方高馳而不顧。"
    ],
    "tags": ["楚辞", "九章", "言志", "孤高"],
    "title": "涉江",
    "id": "p001-005"
  },
  {
    "author": "劉邦",
    "paragraphs": [
      "大風起兮雲飛揚，",
      "威加海內兮歸故鄉，",
      "安得猛士兮守四方！"
    ],
    "tags": ["汉", "乐府", "言志", "豪放"],
    "title": "大風歌",
    "id": "p001-006"
  },
  {
    "author": "項羽",
    "paragraphs": [
      "力拔山兮氣蓋世，時不利兮騅不逝。",
      "騅不逝兮可奈何，虞兮虞兮奈若何！"
    ],
    "tags": ["秦", "楚辞体", "悲歌", "英雄"],
    "title": "垓下歌",
    "id": "p001-007"
  },
  {
    "author": "劉徹",
    "paragraphs": [
      "秋風起兮白雲飛，草木黃落兮雁南歸。",
      "蘭有秀兮菊有芳，懷佳人兮不能忘。",
      "汎樓船兮濟汾河，橫中流兮揚素波。",
      "簫鼓鳴兮發棹歌，歡樂極兮哀情多。",
      "少壯幾時兮奈老何！"
    ],
    "tags": ["汉", "乐府", "秋思", "感怀"],
    "title": "秋風辭",
    "id": "p001-008"
  },
  {
    "author": "李延年",
    "paragraphs": [
      "北方有佳人，絕世而獨立。",
      "一顧傾人城，再顧傾人國。",
      "寧不知傾城與傾國，佳人難再得。"
    ],
    "tags": ["汉", "乐府", "美人", "赞颂"],
    "title": "李夫人歌",
    "id": "p001-009"
  },
  {
    "author": "班婕妤",
    "paragraphs": [
      "新裂齊紈素，皎潔如霜雪。",
      "裁為合歡扇，團團似明月。",
      "出入君懷袖，動搖微風發。",
      "常恐秋節至，涼飆奪炎熱。",
      "棄捐篋笥中，恩情中道絕。"
    ],
    "tags": ["汉", "乐府", "宫怨", "咏物"],
    "title": "怨歌行",
    "id": "p001-010"
  },
  {
    "author": "張衡",
    "paragraphs": [
      "我所思兮在太山，欲往從之梁父艱。",
      "側身東望涕沾翰。",
      "美人贈我金錯刀，何以報之英瓊瑤。",
      "路遠莫致倚逍遙，何為懷憂心煩勞。"
    ],
    "tags": ["汉", "乐府", "思念", "四言诗"],
    "title": "四愁詩",
    "id": "p001-011"
  },
  {
    "author": "秦嘉",
    "paragraphs": [
      "人生譬朝露，居世多屯蹇。",
      "憂艱常早至，歡會常苦晚。",
      "念當奉時役，去爾日遙遠。"
    ],
    "tags": ["汉", "五言古诗", "离别", "伤感"],
    "title": "贈婦詩",
    "id": "p001-012"
  },
  {
    "author": "趙壹",
    "paragraphs": [
      "河清不可俟，人命不可延。",
      "順風激靡草，富貴者稱賢。",
      "文籍雖滿腹，不如一囊錢。"
    ],
    "tags": ["汉", "五言古诗", "讽刺", "愤世"],
    "title": "疾邪詩",
    "id": "p001-013"
  },
  {
    "author": "蔡琰",
    "paragraphs": [
      "漢季失權柄，董卓亂天常。",
      "志欲圖篡弒，先害諸賢良。",
      "逼迫遷舊邦，擁主以自彊。"
    ],
    "tags": ["汉", "五言古诗", "叙事", "悲愤"],
    "title": "悲憤詩",
    "id": "p001-014"
  },
  {
    "author": "徐干",
    "paragraphs": [
      "慘慘時節盡，蘭葉復凋零。",
      "喟然長歎息，君期慰我情。",
      "輾轉不能寐，長夜何綿綿。"
    ],
    "tags": ["魏", "五言古诗", "思妇", "伤感"],
    "title": "室思",
    "id": "p001-015"
  },
  {
    "author": "劉楨",
    "paragraphs": [
      "亭亭山上松，瑟瑟谷中風。",
      "風聲一何盛，松枝一何勁。",
      "冰霜正慘淒，終歲常端正。",
      "豈不罹凝寒，松柏有本性。"
    ],
    "tags": ["魏", "五言古诗", "咏物", "坚贞"],
    "title": "贈從弟",
    "id": "p001-016"
  },
  {
    "author": "王粲",
    "paragraphs": [
      "西京亂無象，豺虎方遘患。",
      "復棄中國去，委身適荊蠻。",
      "親戚對我悲，朋友相追攀。"
    ],
    "tags": ["魏", "五言古诗", "乱世", "思乡"],
    "title": "七哀詩",
    "id": "p001-017"
  },
  {
    "author": "陳琳",
    "paragraphs": [
      "飲馬長城窟，水寒傷馬骨。",
      "往謂長城吏，慎莫稽留太原卒。",
      "官作自有程，舉築諧汝聲。"
    ],
    "tags": ["魏", "乐府", "征役", "悲苦"],
    "title": "飲馬長城窟行",
    "id": "p001-018"
  },
  {
    "author": "阮籍",
    "paragraphs": [
      "夜中不能寐，起坐彈鳴琴。",
      "薄帷鑒明月，清風吹我襟。",
      "孤鴻號外野，翔鳥鳴北林。",
      "徘徊將何見，憂思獨傷心。"
    ],
    "tags": ["魏", "五言古诗", "咏怀", "孤独"],
    "title": "詠懷·夜中不能寐",
    "id": "p001-019"
  },
  {
    "author": "嵇康",
    "paragraphs": [
      "良馬既閑，麗服有暉。",
      "左攬繁弱，右接忘歸。",
      "風馳電逝，躡景追飛。",
      "凌厲中原，顧盻生姿。"
    ],
    "tags": ["魏", "四言诗", "送别", "豪迈"],
    "title": "贈秀才入軍",
    "id": "p001-020"
  },
  {
    "author": "左思",
    "paragraphs": [
      "鬱鬱澗底松，離離山上苗。",
      "以彼徑寸莖，蔭此百尺條。",
      "世冑躡高位，英俊沉下僚。",
      "地勢使之然，由來非一朝。"
    ],
    "tags": ["晋", "五言古诗", "咏史", "讽刺"],
    "title": "詠史·鬱鬱澗底松",
    "id": "p001-021"
  },
  {
    "author": "陸機",
    "paragraphs": [
      "總轡登長路，嗚咽辭密親。",
      "借問子何之，世網嬰我身。",
      "永歎遵北渚，遺思結南津。"
    ],
    "tags": ["晋", "五言古诗", "羁旅", "感伤"],
    "title": "赴洛道中作",
    "id": "p001-022"
  },
  {
    "author": "潘岳",
    "paragraphs": [
      "荏苒冬春謝，寒暑忽流易。",
      "之子歸窮泉，重壤永幽隔。",
      "私懷誰克從，淹留亦何益。"
    ],
    "tags": ["晋", "五言古诗", "悼亡", "悲伤"],
    "title": "悼亡詩",
    "id": "p001-023"
  },
  {
    "author": "郭璞",
    "paragraphs": [
      "京華遊俠窟，山林隱遯棲。",
      "朱門何足榮，未若託蓬萊。",
      "臨源挹清波，陵岡掇丹荑。"
    ],
    "tags": ["晋", "五言古诗", "游仙", "隐居"],
    "title": "遊仙詩",
    "id": "p001-024"
  },
  {
    "author": "謝朓",
    "paragraphs": [
      "灞涘望長安，河陽視京縣。",
      "白日麗飛甍，參差皆可見。",
      "餘霞散成綺，澄江靜如練。",
      "喧鳥覆春洲，雜英滿芳甸。"
    ],
    "tags": ["南朝", "五言古诗", "山水", "写景"],
    "title": "晚登三山還望京邑",
    "id": "p001-025"
  },
  {
    "author": "謝朓",
    "paragraphs": [
      "大江流日夜，客心悲未央。",
      "徒念關山近，終知返路長。",
      "秋河曙耿耿，寒渚夜蒼蒼。",
      "引領見京室，宮雉正相望。"
    ],
    "tags": ["南朝", "五言古诗", "羁旅", "思乡"],
    "title": "之宣城郡出新林浦向板橋",
    "id": "p001-026"
  },
  {
    "author": "沈約",
    "paragraphs": [
      "生平少年日，分手易前期。",
      "及爾同衰暮，非復別離時。",
      "勿言一樽酒，明日難重持。",
      "夢中不識路，何以慰相思。"
    ],
    "tags": ["南朝", "五言古诗", "送别", "友情"],
    "title": "別范安成",
    "id": "p001-027"
  },
  {
    "author": "何遜",
    "paragraphs": [
      "客心已百念，孤遊重千里。",
      "江暗雨欲來，浪白風初起。"
    ],
    "tags": ["南朝", "五言绝句", "羁旅", "写景"],
    "title": "相送",
    "id": "p001-028"
  },
  {
    "author": "陰鏗",
    "paragraphs": [
      "依然臨江渚，長望倚河津。",
      "鼓聲隨聽絕，帆勢與雲鄰。",
      "泊處空餘鳥，離亭已散人。"
    ],
    "tags": ["南朝", "五言古诗", "送别", "写景"],
    "title": "江津送劉光祿不及",
    "id": "p001-029"
  },
  {
    "author": "王籍",
    "paragraphs": [
      "艅艎何泛泛，空水共悠悠。",
      "陰霞生遠岫，陽景逐迴流。",
      "蟬噪林逾靜，鳥鳴山更幽。",
      "此地動歸念，長年悲倦遊。"
    ],
    "tags": ["南朝", "五言律诗", "山水", "幽静"],
    "title": "入若耶溪",
    "id": "p001-030"
  },
  {
    "author": "蕭綱",
    "paragraphs": [
      "晚日照空磯，採蓮承晚暉。",
      "風起湖難渡，蓮多采未稀。",
      "棹動芙蓉落，船移白鷺飛。",
      "荷絲傍繞腕，菱角遠牽衣。"
    ],
    "tags": ["南朝", "宫体诗", "采莲", "写景"],
    "title": "採蓮曲",
    "id": "p001-031"
  },
  {
    "author": "吳均",
    "paragraphs": [
      "山際見來煙，竹中窺落日。",
      "鳥向簷上飛，雲從窗裡出。"
    ],
    "tags": ["南朝", "五言绝句", "山水", "闲适"],
    "title": "山中雜詩",
    "id": "p001-032"
  },
  {
    "author": "朱超",
    "paragraphs": [
      "客行逢日暮，結纜晚洲中。",
      "戍樓因嵁險，村路入江窮。",
      "水隨雲度黑，山帶日歸紅。"
    ],
    "tags": ["南朝", "五言古诗", "羁旅", "写景"],
    "title": "舟中望月",
    "id": "p001-033"
  },
  {
    "author": "楊炯",
    "paragraphs": [
      "烽火照西京，心中自不平。",
      "牙璋辭鳳闕，鐵騎繞龍城。",
      "雪暗凋旗畫，風多雜鼓聲。",
      "寧為百夫長，勝作一書生。"
    ],
    "tags": ["唐", "五言律诗", "边塞", "壮志"],
    "title": "從軍行",
    "id": "p001-034"
  },
  {
    "author": "駱賓王",
    "paragraphs": [
      "西陸蟬聲唱，南冠客思深。",
      "不堪玄鬢影，來對白頭吟。",
      "露重飛難進，風多響易沉。",
      "無人信高潔，誰為表予心。"
    ],
    "tags": ["唐", "五言律诗", "咏物", "牢骚"],
    "title": "在獄詠蟬",
    "id": "p001-035"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "鷲嶺鬱岧嶢，龍宮鎖寂寥。",
      "樓觀滄海日，門對浙江潮。",
      "桂子月中落，天香雲外飄。",
      "捫蘿登塔遠，刳木取泉遙。",
      "霜薄花更發，冰輕葉未凋。",
      "夙齡尚遐異，搜對滌煩囂。",
      "待入天台路，看余度石橋。"
    ],
    "tags": ["唐", "五言古诗", "寺庙", "写景"],
    "title": "靈隱寺",
    "id": "p001-036"
  },
  {
    "author": "張若虛",
    "paragraphs": [
      "春江潮水連海平，海上明月共潮生。",
      "灩灩隨波千萬里，何處春江無月明。",
      "江流宛轉繞芳甸，月照花林皆似霰。",
      "空裡流霜不覺飛，汀上白沙看不見。",
      "江天一色無纖塵，皎皎空中孤月輪。",
      "江畔何人初見月？江月何年初照人？",
      "人生代代無窮已，江月年年望相似。",
      "不知江月待何人，但見長江送流水。",
      "白雲一片去悠悠，青楓浦上不勝愁。",
      "誰家今夜扁舟子？何處相思明月樓？",
      "可憐樓上月裴回，應照離人妝鏡臺。",
      "玉戶簾中卷不去，擣衣砧上拂還來。",
      "此時相望不相聞，願逐月華流照君。",
      "鴻雁長飛光不度，魚龍潛躍水成文。",
      "昨夜閒潭夢落花，可憐春半不還家。",
      "江水流春去欲盡，江潭落月復西斜。",
      "斜月沉沉藏海霧，碣石瀟湘無限路。",
      "不知乘月幾人歸，落月搖情滿江樹。"
    ],
    "tags": ["唐", "七言古诗", "春江", "月亮", "哲理"],
    "title": "春江花月夜",
    "id": "p001-037"
  },
  {
    "author": "劉希夷",
    "paragraphs": [
      "洛陽城東桃李花，飛來飛去落誰家。",
      "洛陽女兒惜顏色，坐見落花長歎息。",
      "今年花落顏色改，明年花開復誰在。",
      "已見松柏摧為薪，更聞桑田變成海。",
      "古人無復洛城東，今人還對落花風。",
      "年年歲歲花相似，歲歲年年人不同。"
    ],
    "tags": ["唐", "七言古诗", "感怀", "时光"],
    "title": "代悲白頭翁",
    "id": "p001-038"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "青海長雲暗雪山，孤城遙望玉門關。",
      "黃沙百戰穿金甲，不破樓蘭終不還。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "壮志"],
    "title": "從軍行·青海長雲暗雪山",
    "id": "p001-039"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "大漠風塵日色昏，紅旗半卷出轅門。",
      "前軍夜戰洮河北，已報生擒吐谷渾。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "战争"],
    "title": "從軍行·大漠風塵日色昏",
    "id": "p001-040"
  },
  {
    "author": "李白",
    "paragraphs": [
      "雲陽上徵去，兩岸饒商賈。",
      "吳牛喘月時，拖船一何苦。",
      "水濁不可飲，壺漿半成土。",
      "一唱都護歌，心摧淚如雨。"
    ],
    "tags": ["唐", "五言古诗", "民生", "悲苦"],
    "title": "丁都護歌",
    "id": "p001-041"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "三月三日天氣新，長安水邊多麗人。",
      "態濃意遠淑且真，肌理細膩骨肉勻。",
      "繡羅衣裳照暮春，蹙金孔雀銀麒麟。",
      "頭上何所有？翠微㔩葉垂鬢脣。",
      "背後何所見？珠壓腰衱穩稱身。"
    ],
    "tags": ["唐", "七言古诗", "讽刺", "丽人"],
    "title": "麗人行",
    "id": "p001-042"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "善鼓雲和瑟，常聞帝子靈。",
      "馮夷空自舞，楚客不堪聽。",
      "苦調淒金石，清音入杳冥。",
      "蒼梧來怨慕，白芷動芳馨。",
      "流水傳湘浦，悲風過洞庭。",
      "曲終人不見，江上數峰青。"
    ],
    "tags": ["唐", "五言律诗", "音乐", "湘灵"],
    "title": "省試湘靈鼓瑟",
    "id": "p001-043"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "昔日齷齪不足誇，今朝放蕩思無涯。",
      "春風得意馬蹄疾，一日看盡長安花。"
    ],
    "tags": ["唐", "七言绝句", "登科", "喜悦"],
    "title": "登科後",
    "id": "p001-044"
  },
  {
    "author": "賈島",
    "paragraphs": [
      "閒居少鄰並，草徑入荒園。",
      "鳥宿池邊樹，僧敲月下門。",
      "過橋分野色，移石動雲根。",
      "暫去還來此，幽期不負言。"
    ],
    "tags": ["唐", "五言律诗", "隐逸", "幽静"],
    "title": "題李凝幽居",
    "id": "p001-045"
  },
  {
    "author": "張籍",
    "paragraphs": [
      "洛陽城裡見秋風，欲作家書意萬重。",
      "復恐匆匆說不盡，行人臨發又開封。"
    ],
    "tags": ["唐", "七言绝句", "思乡", "家书"],
    "title": "秋思",
    "id": "p001-046"
  },
  {
    "author": "王建",
    "paragraphs": [
      "中庭地白樹棲鴉，冷露無聲濕桂花。",
      "今夜月明人盡望，不知秋思落誰家。"
    ],
    "tags": ["唐", "七言绝句", "中秋", "望月"],
    "title": "十五夜望月",
    "id": "p001-047"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "巴山楚水淒涼地，二十三年棄置身。",
      "懷舊空吟聞笛賦，到鄉翻似爛柯人。",
      "沉舟側畔千帆過，病樹前頭萬木春。",
      "今日聽君歌一曲，暫憑杯酒長精神。"
    ],
    "tags": ["唐", "七言律诗", "感怀", "哲理"],
    "title": "酬樂天揚州初逢席上見贈",
    "id": "p001-048"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "孤山寺北賈亭西，水面初平雲腳低。",
      "幾處早鶯爭暖樹，誰家新燕啄春泥。",
      "亂花漸欲迷人眼，淺草才能沒馬蹄。",
      "最愛湖東行不足，綠楊陰裡白沙堤。"
    ],
    "tags": ["唐", "七言律诗", "春天", "西湖"],
    "title": "錢塘湖春行",
    "id": "p001-049"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "人間四月芳菲盡，山寺桃花始盛開。",
      "長恨春歸無覓處，不知轉入此中來。"
    ],
    "tags": ["唐", "七言绝句", "春天", "桃花"],
    "title": "大林寺桃花",
    "id": "p001-050"
  },
// ========================更新4=============================
  {
    "author": "元稹",
    "paragraphs": [
      "曾經滄海難為水，除卻巫山不是雲。",
      "取次花叢懶回顧，半緣修道半緣君。"
    ],
    "tags": ["唐", "七言绝句", "爱情", "悼亡"],
    "title": "離思五首·其四",
    "id": "p002-051"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "吳絲蜀桐張高秋，空白凝雲頹不流。",
      "江娥啼竹素女愁，李憑中國彈箜篌。",
      "崑山玉碎鳳凰叫，芙蓉泣露香蘭笑。",
      "十二門前融冷光，二十三絲動紫皇。",
      "女媧鍊石補天處，石破天驚逗秋雨。",
      "夢入神山教神嫗，老魚跳波瘦蛟舞。",
      "吳質不眠倚桂樹，露腳斜飛濕寒兔。"
    ],
    "tags": ["唐", "七言古诗", "音乐", "奇幻"],
    "title": "李憑箜篌引",
    "id": "p002-052"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "黑雲壓城城欲摧，甲光向日金鱗開。",
      "角聲滿天秋色裡，塞上燕脂凝夜紫。",
      "半卷紅旗臨易水，霜重鼓寒聲不起。",
      "報君黃金臺上意，提攜玉龍為君死。"
    ],
    "tags": ["唐", "七言古诗", "边塞", "战争"],
    "title": "雁門太守行",
    "id": "p002-053"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "老兔寒蟾泣天色，雲樓半開壁斜白。",
      "玉輪軋露濕團光，鸞珮相逢桂香陌。",
      "黃塵清水三山下，更變千年如走馬。",
      "遙望齊州九點煙，一泓海水杯中瀉。"
    ],
    "tags": ["唐", "七言绝句", "游仙", "奇幻"],
    "title": "夢天",
    "id": "p002-054"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "長安回望繡成堆，山頂千門次第開。",
      "一騎紅塵妃子笑，無人知是荔枝來。"
    ],
    "tags": ["唐", "七言绝句", "咏史", "讽刺"],
    "title": "過華清宮",
    "id": "p002-055"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "六朝文物草連空，天淡雲閒今古同。",
      "鳥去鳥來山色裡，人歌人哭水聲中。",
      "深秋簾幕千家雨，落日樓臺一笛風。",
      "惆悵無因見范蠡，參差煙樹五湖東。"
    ],
    "tags": ["唐", "七言律诗", "怀古", "感伤"],
    "title": "題宣州開元寺水閣",
    "id": "p002-056"
  },
  {
    "author": "溫庭筠",
    "paragraphs": [
      "曾於青史見遺文，今日飄蓬過此墳。",
      "詞客有靈應識我，霸才無主始憐君。",
      "石麟埋沒藏春草，銅雀荒涼對暮雲。",
      "莫怪臨風倍惆悵，欲將書劍學從軍。"
    ],
    "tags": ["唐", "七言律诗", "怀古", "感怀"],
    "title": "過陳琳墓",
    "id": "p002-057"
  },
  {
    "author": "羅隱",
    "paragraphs": [
      "不論平地與山尖，無限風光盡被占。",
      "採得百花成蜜後，為誰辛苦為誰甜。"
    ],
    "tags": ["唐", "七言绝句", "咏物", "讽刺"],
    "title": "蜂",
    "id": "p002-058"
  },
  {
    "author": "皮日休",
    "paragraphs": [
      "盡道隋亡為此河，至今千里賴通波。",
      "若無水殿龍舟事，共禹論功不較多。"
    ],
    "tags": ["唐", "七言绝句", "咏史", "运河"],
    "title": "汴河懷古",
    "id": "p002-059"
  },
  {
    "author": "陸龜蒙",
    "paragraphs": [
      "素蘤多蒙別豔欺，此花端合在瑤池。",
      "無情有恨何人覺，月曉風清欲墮時。"
    ],
    "tags": ["唐", "七言绝句", "咏物", "白莲"],
    "title": "白蓮",
    "id": "p002-060"
  },
  {
    "author": "聶夷中",
    "paragraphs": [
      "父耕原上田，子劚山下荒。",
      "六月禾未秀，官家已修倉。"
    ],
    "tags": ["唐", "五言古诗", "民生", "讽刺"],
    "title": "傷田家",
    "id": "p002-061"
  },
  {
    "author": "杜荀鶴",
    "paragraphs": [
      "去歲曾經此縣城，縣民無口不冤聲。",
      "今來縣宰加朱紱，便是生靈血染成。"
    ],
    "tags": ["唐", "七言绝句", "讽刺", "民生"],
    "title": "再經胡城縣",
    "id": "p002-062"
  },
  {
    "author": "柳永",
    "paragraphs": [
      "對瀟瀟暮雨灑江天，一番洗清秋。",
      "漸霜風淒緊，關河冷落，殘照當樓。",
      "是處紅衰翠減，苒苒物華休。",
      "惟有長江水，無語東流。"
    ],
    "tags": ["北宋", "宋词", "羁旅", "伤感"],
    "title": "八聲甘州·對瀟瀟暮雨灑江天",
    "id": "p002-063"
  },
  {
    "author": "晏殊",
    "paragraphs": [
      "檻菊愁煙蘭泣露，羅幕輕寒，燕子雙飛去。",
      "明月不諳離恨苦，斜光到曉穿朱戶。",
      "昨夜西風凋碧樹，獨上高樓，望盡天涯路。",
      "欲寄彩箋兼尺素，山長水闊知何處。"
    ],
    "tags": ["北宋", "宋词", "离别", "伤感"],
    "title": "蝶戀花·檻菊愁煙蘭泣露",
    "id": "p002-064"
  },
  {
    "author": "宋祁",
    "paragraphs": [
      "東城漸覺風光好，縠皺波紋迎客棹。",
      "綠楊煙外曉寒輕，紅杏枝頭春意鬧。",
      "浮生長恨歡娛少，肯愛千金輕一笑。",
      "為君持酒勸斜陽，且向花間留晚照。"
    ],
    "tags": ["北宋", "宋词", "春天", "写景"],
    "title": "玉樓春·東城漸覺風光好",
    "id": "p002-065"
  },
  {
    "author": "歐陽修",
    "paragraphs": [
      "去年元夜時，花市燈如晝。",
      "月上柳梢頭，人約黃昏後。",
      "今年元夜時，月與燈依舊。",
      "不見去年人，淚濕春衫袖。"
    ],
    "tags": ["北宋", "宋词", "元宵", "爱情"],
    "title": "生查子·元夕",
    "id": "p002-066"
  },
  {
    "author": "王安石",
    "paragraphs": [
      "茅簷長掃靜無苔，花木成畦手自栽。",
      "一水護田將綠繞，兩山排闥送青來。"
    ],
    "tags": ["北宋", "七言绝句", "田园", "写景"],
    "title": "書湖陰先生壁",
    "id": "p002-067"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "橫看成嶺側成峰，遠近高低各不同。",
      "不識廬山真面目，只緣身在此山中。"
    ],
    "tags": ["北宋", "七言绝句", "哲理", "庐山"],
    "title": "題西林壁",
    "id": "p002-068"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "水光瀲灩晴方好，山色空濛雨亦奇。",
      "欲把西湖比西子，淡妝濃抹總相宜。"
    ],
    "tags": ["北宋", "七言绝句", "西湖", "写景"],
    "title": "飲湖上初晴後雨",
    "id": "p002-069"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "竹外桃花三兩枝，春江水暖鴨先知。",
      "蔞蒿滿地蘆芽短，正是河豚欲上時。"
    ],
    "tags": ["北宋", "七言绝句", "春天", "写景"],
    "title": "惠崇春江晚景",
    "id": "p002-070"
  },
  {
    "author": "黃庭堅",
    "paragraphs": [
      "癡兒了卻公家事，快閣東西倚晚晴。",
      "落木千山天遠大，澄江一道月分明。",
      "朱弦已為佳人絕，青眼聊因美酒橫。",
      "萬里歸船弄長笛，此心吾與白鷗盟。"
    ],
    "tags": ["北宋", "七言律诗", "登高", "感怀"],
    "title": "登快閣",
    "id": "p002-071"
  },
  {
    "author": "秦觀",
    "paragraphs": [
      "漠漠輕寒上小樓，曉陰無賴似窮秋。",
      "淡煙流水畫屏幽。",
      "自在飛花輕似夢，無邊絲雨細如愁。",
      "寶簾閒掛小銀鉤。"
    ],
    "tags": ["北宋", "宋词", "伤春", "婉约"],
    "title": "浣溪沙·漠漠輕寒上小樓",
    "id": "p002-072"
  },
  {
    "author": "賀鑄",
    "paragraphs": [
      "凌波不過橫塘路，但目送、芳塵去。",
      "錦瑟華年誰與度？月橋花院，瑣窗朱戶，只有春知處。",
      "碧雲冉冉蘅皋暮，彩筆新題斷腸句。",
      "試問閒愁都幾許？一川煙草，滿城風絮，梅子黃時雨。"
    ],
    "tags": ["北宋", "宋词", "闲愁", "婉约"],
    "title": "青玉案·凌波不過橫塘路",
    "id": "p002-073"
  },
  {
    "author": "周邦彥",
    "paragraphs": [
      "燎沉香，消溽暑。鳥雀呼晴，侵曉窺簷語。",
      "葉上初陽乾宿雨，水面清圓，一一風荷舉。",
      "故鄉遙，何日去？家住吳門，久作長安旅。",
      "五月漁郎相憶否？小楫輕舟，夢入芙蓉浦。"
    ],
    "tags": ["北宋", "宋词", "思乡", "荷花"],
    "title": "蘇幕遮·燎沉香",
    "id": "p002-074"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "紅藕香殘玉簟秋，輕解羅裳，獨上蘭舟。",
      "雲中誰寄錦書來？雁字回時，月滿西樓。",
      "花自飄零水自流，一種相思，兩處閒愁。",
      "此情無計可消除，才下眉頭，卻上心頭。"
    ],
    "tags": ["南宋", "宋词", "相思", "婉约"],
    "title": "一剪梅·紅藕香殘玉簟秋",
    "id": "p002-075"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "薄霧濃雲愁永晝，瑞腦消金獸。",
      "佳節又重陽，玉枕紗櫥，半夜涼初透。",
      "東籬把酒黃昏後，有暗香盈袖。",
      "莫道不銷魂，簾卷西風，人比黃花瘦。"
    ],
    "tags": ["南宋", "宋词", "重陽", "思念"],
    "title": "醉花陰·薄霧濃雲愁永晝",
    "id": "p002-076"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "莫笑農家臘酒渾，豐年留客足雞豚。",
      "山重水複疑無路，柳暗花明又一村。",
      "簫鼓追隨春社近，衣冠簡樸古風存。",
      "從今若許閒乘月，拄杖無時夜叩門。"
    ],
    "tags": ["南宋", "七言律诗", "田园", "哲理"],
    "title": "遊山西村",
    "id": "p002-077"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "早歲那知世事艱，中原北望氣如山。",
      "樓船夜雪瓜洲渡，鐵馬秋風大散關。",
      "塞上長城空自許，鏡中衰鬢已先斑。",
      "出師一表真名世，千載誰堪伯仲間。"
    ],
    "tags": ["南宋", "七言律诗", "爱国", "壮志"],
    "title": "書憤",
    "id": "p002-078"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "三萬里河東入海，五千仞嶽上摩天。",
      "遺民淚盡胡塵裡，南望王師又一年。"
    ],
    "tags": ["南宋", "七言绝句", "爱国", "悲愤"],
    "title": "秋夜將曉出籬門迎涼有感",
    "id": "p002-079"
  },
  {
    "author": "范成大",
    "paragraphs": [
      "晝出耘田夜績麻，村莊兒女各當家。",
      "童孫未解供耕織，也傍桑陰學種瓜。"
    ],
    "tags": ["南宋", "七言绝句", "田园", "童趣"],
    "title": "四時田園雜興·其三十一",
    "id": "p002-080"
  },
  {
    "author": "楊萬里",
    "paragraphs": [
      "畢竟西湖六月中，風光不與四時同。",
      "接天蓮葉無窮碧，映日荷花別樣紅。"
    ],
    "tags": ["南宋", "七言绝句", "西湖", "荷花"],
    "title": "曉出淨慈寺送林子方",
    "id": "p002-081"
  },
  {
    "author": "楊萬里",
    "paragraphs": [
      "泉眼無聲惜細流，樹陰照水愛晴柔。",
      "小荷才露尖尖角，早有蜻蜓立上頭。"
    ],
    "tags": ["南宋", "七言绝句", "写景", "童趣"],
    "title": "小池",
    "id": "p002-082"
  },
  {
    "author": "朱熹",
    "paragraphs": [
      "勝日尋芳泗水濱，無邊光景一時新。",
      "等閒識得東風面，萬紫千紅總是春。"
    ],
    "tags": ["南宋", "七言绝句", "春天", "哲理"],
    "title": "春日",
    "id": "p002-083"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "明月別枝驚鵲，清風半夜鳴蟬。",
      "稻花香裡說豐年，聽取蛙聲一片。",
      "七八個星天外，兩三點雨山前。",
      "舊時茅店社林邊，路轉溪橋忽見。"
    ],
    "tags": ["南宋", "宋词", "田园", "夏夜"],
    "title": "西江月·夜行黃沙道中",
    "id": "p002-084"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "茅簷低小，溪上青青草。",
      "醉裡吳音相媚好，白髮誰家翁媼？",
      "大兒鋤豆溪東，中兒正織雞籠。",
      "最喜小兒亡賴，溪頭臥剝蓮蓬。"
    ],
    "tags": ["南宋", "宋词", "田园", "童趣"],
    "title": "清平樂·村居",
    "id": "p002-085"
  },
  {
    "author": "文天祥",
    "paragraphs": [
      "辛苦遭逢起一經，干戈寥落四周星。",
      "山河破碎風飄絮，身世浮沉雨打萍。",
      "惶恐灘頭說惶恐，零丁洋裡嘆零丁。",
      "人生自古誰無死，留取丹心照汗青。"
    ],
    "tags": ["南宋", "七言律诗", "爱国", "正气"],
    "title": "過零丁洋",
    "id": "p002-086"
  },
  {
    "author": "林升",
    "paragraphs": [
      "山外青山樓外樓，西湖歌舞幾時休？",
      "暖風熏得遊人醉，直把杭州作汴州。"
    ],
    "tags": ["南宋", "七言绝句", "讽刺", "爱国"],
    "title": "題臨安邸",
    "id": "p002-087"
  },
  {
    "author": "葉紹翁",
    "paragraphs": [
      "應憐屐齒印蒼苔，小扣柴扉久不開。",
      "春色滿園關不住，一枝紅杏出牆來。"
    ],
    "tags": ["南宋", "七言绝句", "春天", "写景"],
    "title": "遊園不值",
    "id": "p002-088"
  },
  {
    "author": "元好問",
    "paragraphs": [
      "問世間情是何物，直教生死相許？",
      "天南地北雙飛客，老翅幾回寒暑。",
      "歡樂趣，離別苦，就中更有癡兒女。",
      "君應有語，渺萬里層雲，千山暮雪，隻影向誰去？"
    ],
    "tags": ["金", "词", "爱情", "雁丘"],
    "title": "摸魚兒·雁丘詞",
    "id": "p002-089"
  },
  {
    "author": "王冕",
    "paragraphs": [
      "吾家洗硯池頭樹，朵朵花開淡墨痕。",
      "不要人誇好顏色，只留清氣滿乾坤。"
    ],
    "tags": ["元", "七言绝句", "咏物", "墨梅"],
    "title": "墨梅",
    "id": "p002-090"
  },
  {
    "author": "王冕",
    "paragraphs": [
      "冰雪林中著此身，不同桃李混芳塵。",
      "忽然一夜清香發，散作乾坤萬里春。"
    ],
    "tags": ["元", "七言绝句", "咏物", "白梅"],
    "title": "白梅",
    "id": "p002-091"
  },
  {
    "author": "虞集",
    "paragraphs": [
      "江山信美非吾土，漂泊棲遲百年身。",
      "山勢北來連紫塞，雁行南去帶青春。"
    ],
    "tags": ["元", "七言绝句", "羁旅", "思乡"],
    "title": "至正改元辛巳寒食日示弟及諸子侄",
    "id": "p002-092"
  },
  {
    "author": "薩都剌",
    "paragraphs": [
      "石頭城上，望天低吳楚，眼空無物。",
      "指點六朝形勝地，惟有青山如壁。",
      "蔽日旌旗，連雲檣櫓，白骨紛如雪。",
      "一江南北，消磨多少豪傑。"
    ],
    "tags": ["元", "词", "怀古", "豪放"],
    "title": "念奴嬌·登石頭城",
    "id": "p002-093"
  },
  {
    "author": "高啟",
    "paragraphs": [
      "大江來從萬山中，山勢盡與江流東。",
      "鍾山如龍獨西上，欲破巨浪乘長風。",
      "江山相雄不相讓，形勝爭誇天下壯。",
      "秦皇空此瘞黃金，佳氣蔥蔥至今王。"
    ],
    "tags": ["明", "七言古诗", "金陵", "怀古"],
    "title": "登金陵雨花台望大江",
    "id": "p002-094"
  },
  {
    "author": "李東陽",
    "paragraphs": [
      "莫將畫竹論難易，剛道繁難簡更難。",
      "君看蕭蕭只數葉，滿堂風雨不勝寒。"
    ],
    "tags": ["明", "七言绝句", "题画", "竹"],
    "title": "柯敬仲墨竹",
    "id": "p002-095"
  },
  {
    "author": "王守仁",
    "paragraphs": [
      "何處花香入夜清，石林茅屋隔溪聲。",
      "幽人月出每孤往，棲鳥山空時一鳴。",
      "草露不辭芒履濕，松風偏與葛衣輕。",
      "臨流欲寫猗蘭意，江北江南無限情。"
    ],
    "tags": ["明", "七言律诗", "隐逸", "写景"],
    "title": "龍潭夜坐",
    "id": "p002-096"
  },
  {
    "author": "徐渭",
    "paragraphs": [
      "半生落魄已成翁，獨立書齋嘯晚風。",
      "筆底明珠無處賣，閒拋閒擲野藤中。"
    ],
    "tags": ["明", "七言绝句", "题画", "葡萄"],
    "title": "題墨葡萄詩",
    "id": "p002-097"
  },
  {
    "author": "湯顯祖",
    "paragraphs": [
      "獨寫相思墨未乾，楚天無雁報平安。",
      "秋風吹盡千山影，一夢還家未忍看。"
    ],
    "tags": ["明", "七言绝句", "思乡", "梦境"],
    "title": "江宿",
    "id": "p002-098"
  },
  {
    "author": "袁宏道",
    "paragraphs": [
      "山色空濛雨亦奇，蘇堤煙柳望中迷。",
      "西湖六月如秋冷，一夜輕舟過虎溪。"
    ],
    "tags": ["明", "七言绝句", "西湖", "写景"],
    "title": "竹枝詞",
    "id": "p002-099"
  },
  {
    "author": "吳偉業",
    "paragraphs": [
      "鼎湖當日棄人間，破敵收京下玉關。",
      "慟哭六軍俱縞素，衝冠一怒為紅顏。",
      "紅顏流落非吾戀，逆賊天亡自荒宴。",
      "電掃黃巾定黑山，哭罷君親再相見。"
    ],
    "tags": ["清", "七言古诗", "叙事", "咏史"],
    "title": "圓圓曲",
    "id": "p002-100"
  },
// ========================更新5=============================
  {
    "author": "顧炎武",
    "paragraphs": [
      "萬事有不平，爾何空自苦。",
      "長將一寸身，銜木到終古。",
      "我願平東海，身沉心不改。",
      "大海無平期，我心無絕時。"
    ],
    "tags": ["清", "五言古诗", "言志", "不屈"],
    "title": "精衛",
    "id": "p003-101"
  },
  {
    "author": "王夫之",
    "paragraphs": [
      "悲風動中夜，邊馬嘶且驚。",
      "壯士匣中刀，猶作風雨聲。",
      "飛將不見期，蕭條陰北征。"
    ],
    "tags": ["清", "五言古诗", "感怀", "壮志"],
    "title": "雜詩",
    "id": "p003-102"
  },
  {
    "author": "朱彝尊",
    "paragraphs": [
      "思往事，渡江干，青蛾低映越山看。",
      "共眠一舸聽秋雨，小簟輕衾各自寒。"
    ],
    "tags": ["清", "词", "爱情", "婉约"],
    "title": "桂殿秋·思往事",
    "id": "p003-103"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "誰念西風獨自涼，蕭蕭黃葉閉疏窗。",
      "沉思往事立殘陽。",
      "被酒莫驚春睡重，賭書消得潑茶香。",
      "當時只道是尋常。"
    ],
    "tags": ["清", "词", "悼亡", "回忆"],
    "title": "浣溪沙·誰念西風獨自涼",
    "id": "p003-104"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "辛苦最憐天上月，一夕如環，夕夕都成玦。",
      "若似月輪終皎潔，不辭冰雪為卿熱。",
      "無那塵緣容易絕，燕子依然，軟踏簾鉤說。",
      "唱罷秋墳愁未歇，春叢認取雙棲蝶。"
    ],
    "tags": ["清", "词", "悼亡", "凄婉"],
    "title": "蝶戀花·辛苦最憐天上月",
    "id": "p003-105"
  },
  {
    "author": "鄭板橋",
    "paragraphs": [
      "衙齋臥聽蕭蕭竹，疑是民間疾苦聲。",
      "些小吾曹州縣吏，一枝一葉總關情。"
    ],
    "tags": ["清", "七言绝句", "忧民", "仁爱"],
    "title": "濰縣署中畫竹呈年伯包大中丞括",
    "id": "p003-106"
  },
  {
    "author": "袁枚",
    "paragraphs": [
      "牧童騎黃牛，歌聲振林樾。",
      "意欲捕鳴蟬，忽然閉口立。"
    ],
    "tags": ["清", "五言绝句", "童趣", "写景"],
    "title": "所見",
    "id": "p003-107"
  },
  {
    "author": "黃景仁",
    "paragraphs": [
      "仙佛茫茫兩未成，只知獨夜不平鳴。",
      "風塵荏苒音書絕，關塞蕭條行路難。",
      "已是懸崖百丈冰，猶愁風雪滿千山。",
      "十有九人堪白眼，百無一用是書生。"
    ],
    "tags": ["清", "七言律诗", "感怀", "失意"],
    "title": "雜感",
    "id": "p003-108"
  },
  {
    "author": "張維屏",
    "paragraphs": [
      "造物無言卻有情，每於寒盡覺春生。",
      "千紅萬紫安排著，只待新雷第一聲。"
    ],
    "tags": ["清", "七言绝句", "春天", "希望"],
    "title": "新雷",
    "id": "p003-109"
  },
  {
    "author": "龔自珍",
    "paragraphs": [
      "九州生氣恃風雷，萬馬齊喑究可哀。",
      "我勸天公重抖擻，不拘一格降人才。"
    ],
    "tags": ["清", "七言绝句", "爱国", "变革"],
    "title": "己亥雜詩·其一二五",
    "id": "p003-110"
  },
  {
    "author": "曹植",
    "paragraphs": [
      "驚風飄白日，光景馳西流。",
      "盛時不可再，百年忽我遒。",
      "生存華屋處，零落歸山丘。"
    ],
    "tags": ["魏", "五言古诗", "感怀", "人生"],
    "title": "箜篌引",
    "id": "p003-111"
  },
  {
    "author": "阮籍",
    "paragraphs": [
      "壯士何慷慨，志欲威八荒。",
      "驅車遠行役，受命念自忘。",
      "良弓挾烏號，明甲有精光。"
    ],
    "tags": ["魏", "五言古诗", "咏怀", "壮志"],
    "title": "詠懷·壯士何慷慨",
    "id": "p003-112"
  },
  {
    "author": "左思",
    "paragraphs": [
      "皓天舒白日，靈景耀神州。",
      "列宅紫宮裡，飛宇若雲浮。",
      "峨峨高門內，藹藹皆王侯。"
    ],
    "tags": ["晋", "五言古诗", "咏史", "讽刺"],
    "title": "詠史·皓天舒白日",
    "id": "p003-113"
  },
  {
    "author": "陶淵明",
    "paragraphs": [
      "種豆南山下，草盛豆苗稀。",
      "晨興理荒穢，帶月荷鋤歸。",
      "道狹草木長，夕露沾我衣。",
      "衣沾不足惜，但使願無違。"
    ],
    "tags": ["晋", "五言古诗", "田园", "劳作"],
    "title": "歸園田居·其三",
    "id": "p003-114"
  },
  {
    "author": "謝靈運",
    "paragraphs": [
      "昏旦變氣候，山水含清暉。",
      "清暉能娛人，遊子憺忘歸。",
      "出谷日尚早，入舟陽已微。"
    ],
    "tags": ["南朝", "五言古诗", "山水", "游历"],
    "title": "石壁精舍還湖中作",
    "id": "p003-115"
  },
  {
    "author": "鮑照",
    "paragraphs": [
      "對案不能食，拔劍擊柱長歎息。",
      "丈夫生世會幾時，安能蹀躞垂羽翼。",
      "棄置罷官去，還家自休息。"
    ],
    "tags": ["南朝", "七言古诗", "愤懑", "不屈"],
    "title": "擬行路難·其六",
    "id": "p003-116"
  },
  {
    "author": "謝朓",
    "paragraphs": [
      "綠草蔓如絲，雜樹紅英發。",
      "無論君不歸，君歸芳已歇。"
    ],
    "tags": ["南朝", "五言绝句", "思妇", "春天"],
    "title": "王孫遊",
    "id": "p003-117"
  },
  {
    "author": "庾信",
    "paragraphs": [
      "陽關萬里道，不見一人歸。",
      "惟有河邊雁，秋來南向飛。"
    ],
    "tags": ["北朝", "五言绝句", "思乡", "羁旅"],
    "title": "重別周尚書",
    "id": "p003-118"
  },
  {
    "author": "王績",
    "paragraphs": [
      "東皋薄暮望，徙倚欲何依。",
      "樹樹皆秋色，山山唯落暉。",
      "牧人驅犢返，獵馬帶禽歸。",
      "相顧無相識，長歌懷採薇。"
    ],
    "tags": ["唐", "五言律诗", "田园", "隐居"],
    "title": "野望",
    "id": "p003-119"
  },
  {
    "author": "駱賓王",
    "paragraphs": [
      "鵝，鵝，鵝，曲項向天歌。",
      "白毛浮綠水，紅掌撥清波。"
    ],
    "tags": ["唐", "五言绝句", "咏物", "童趣"],
    "title": "詠鵝",
    "id": "p003-120"
  },
  {
    "author": "李嶠",
    "paragraphs": [
      "解落三秋葉，能開二月花。",
      "過江千尺浪，入竹萬竿斜。"
    ],
    "tags": ["唐", "五言绝句", "咏物", "风"],
    "title": "風",
    "id": "p003-121"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "松葉堪為酒，春來釀幾多。",
      "不辭山路遠，踏雪也相過。"
    ],
    "tags": ["唐", "五言绝句", "友情", "山居"],
    "title": "答陸澧",
    "id": "p003-122"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "春眠不覺曉，處處聞啼鳥。",
      "夜來風雨聲，花落知多少。"
    ],
    "tags": ["唐", "五言绝句", "春天", "写景"],
    "title": "春曉",
    "id": "p003-123"
  },
  {
    "author": "王維",
    "paragraphs": [
      "人閑桂花落，夜靜春山空。",
      "月出驚山鳥，時鳴春澗中。"
    ],
    "tags": ["唐", "五言绝句", "写景", "静谧"],
    "title": "鳥鳴澗",
    "id": "p003-124"
  },
  {
    "author": "李白",
    "paragraphs": [
      "犬吠水聲中，桃花帶露濃。",
      "樹深時見鹿，溪午不聞鐘。",
      "野竹分青靄，飛泉掛碧峰。",
      "無人知所去，愁倚兩三松。"
    ],
    "tags": ["唐", "五言律诗", "寻访", "隐逸"],
    "title": "訪戴天山道士不遇",
    "id": "p003-125"
  },
  {
    "author": "李白",
    "paragraphs": [
      "誰家玉笛暗飛聲，散入春風滿洛城。",
      "此夜曲中聞折柳，何人不起故園情。"
    ],
    "tags": ["唐", "七言绝句", "思乡", "笛声"],
    "title": "春夜洛城聞笛",
    "id": "p003-126"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "黃四娘家花滿蹊，千朵萬朵壓枝低。",
      "留連戲蝶時時舞，自在嬌鶯恰恰啼。"
    ],
    "tags": ["唐", "七言绝句", "春天", "写景"],
    "title": "江畔獨步尋花·其六",
    "id": "p003-127"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "岐王宅裡尋常見，崔九堂前幾度聞。",
      "正是江南好風景，落花時節又逢君。"
    ],
    "tags": ["唐", "七言绝句", "感怀", "重逢"],
    "title": "江南逢李龜年",
    "id": "p003-128"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "強欲登高去，無人送酒來。",
      "遙憐故園菊，應傍戰場開。"
    ],
    "tags": ["唐", "五言绝句", "重阳", "思乡"],
    "title": "行軍九日思長安故園",
    "id": "p003-129"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "日暮蒼山遠，天寒白屋貧。",
      "柴門聞犬吠，風雪夜歸人。"
    ],
    "tags": ["唐", "五言绝句", "冬天", "羁旅"],
    "title": "逢雪宿芙蓉山主人",
    "id": "p003-130"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "懷君屬秋夜，散步詠涼天。",
      "空山松子落，幽人應未眠。"
    ],
    "tags": ["唐", "五言绝句", "秋夜", "怀人"],
    "title": "秋夜寄邱員外",
    "id": "p003-131"
  },
  {
    "author": "李益",
    "paragraphs": [
      "回樂峰前沙似雪，受降城外月如霜。",
      "不知何處吹蘆管，一夜征人盡望鄉。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "思乡"],
    "title": "夜上受降城聞笛",
    "id": "p003-132"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "慈母手中線，遊子身上衣。",
      "臨行密密縫，意恐遲遲歸。",
      "誰言寸草心，報得三春暉。"
    ],
    "tags": ["唐", "五言古诗", "母爱", "亲情"],
    "title": "遊子吟",
    "id": "p003-133"
  },
  {
    "author": "韓愈",
    "paragraphs": [
      "天街小雨潤如酥，草色遙看近卻無。",
      "最是一年春好處，絕勝煙柳滿皇都。"
    ],
    "tags": ["唐", "七言绝句", "春天", "写景"],
    "title": "早春呈水部張十八員外",
    "id": "p003-134"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "小娃撐小艇，偷採白蓮回。",
      "不解藏蹤跡，浮萍一道開。"
    ],
    "tags": ["唐", "五言绝句", "童趣", "夏天"],
    "title": "池上",
    "id": "p003-135"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "江南好，風景舊曾諳。",
      "日出江花紅勝火，春來江水綠如藍。",
      "能不憶江南？"
    ],
    "tags": ["唐", "词", "江南", "写景"],
    "title": "憶江南·江南好",
    "id": "p003-136"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "九曲黃河萬里沙，浪淘風簸自天涯。",
      "如今直上銀河去，同到牽牛織女家。"
    ],
    "tags": ["唐", "七言绝句", "黄河", "想象"],
    "title": "浪淘沙·九曲黃河萬里沙",
    "id": "p003-137"
  },
  {
    "author": "李紳",
    "paragraphs": [
      "鋤禾日當午，汗滴禾下土。",
      "誰知盤中餐，粒粒皆辛苦。"
    ],
    "tags": ["唐", "五言绝句", "悯农", "劳作"],
    "title": "憫農·其二",
    "id": "p003-138"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "銀燭秋光冷畫屏，輕羅小扇撲流螢。",
      "天階夜色涼如水，臥看牽牛織女星。"
    ],
    "tags": ["唐", "七言绝句", "秋夜", "宫怨"],
    "title": "秋夕",
    "id": "p003-139"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "定定住天涯，依依向物華。",
      "寒梅最堪恨，長作去年花。"
    ],
    "tags": ["唐", "五言绝句", "咏梅", "感怀"],
    "title": "憶梅",
    "id": "p003-140"
  },
  {
    "author": "羅隱",
    "paragraphs": [
      "得即高歌失即休，多愁多恨亦悠悠。",
      "今朝有酒今朝醉，明日愁來明日愁。"
    ],
    "tags": ["唐", "七言绝句", "旷达", "自嘲"],
    "title": "自遣",
    "id": "p003-141"
  },
  {
    "author": "范仲淹",
    "paragraphs": [
      "江上往來人，但愛鱸魚美。",
      "君看一葉舟，出沒風波裡。"
    ],
    "tags": ["北宋", "五言绝句", "民生", "渔民"],
    "title": "江上漁者",
    "id": "p003-142"
  },
  {
    "author": "王安石",
    "paragraphs": [
      "京口瓜洲一水間，鐘山只隔數重山。",
      "春風又綠江南岸，明月何時照我還。"
    ],
    "tags": ["北宋", "七言绝句", "思乡", "写景"],
    "title": "泊船瓜洲",
    "id": "p003-143"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "黑雲翻墨未遮山，白雨跳珠亂入船。",
      "卷地風來忽吹散，望湖樓下水如天。"
    ],
    "tags": ["北宋", "七言绝句", "西湖", "骤雨"],
    "title": "六月二十七日望湖樓醉書",
    "id": "p003-144"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "昨夜雨疏風驟，濃睡不消殘酒。",
      "試問卷簾人，卻道海棠依舊。",
      "知否，知否？應是綠肥紅瘦。"
    ],
    "tags": ["南宋", "宋词", "惜春", "婉约"],
    "title": "如夢令·昨夜雨疏風驟",
    "id": "p003-145"
  },
  {
    "author": "陸游",
    "paragraphs": [
