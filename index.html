      "鶯啼燕語報新年，馬邑龍堆路幾千。",
      "家住層城臨漢苑，[心]隨明月到胡天。",
      "機中錦字論長恨，樓上花枝笑獨眠。",
      "爲問元戎竇車騎，何時返斾勒燕然。"
    ],
    "tags": [
      "思念",
      "七言律诗",
      "春天",
      "妇女",
      "唐诗三百首",
      "闺怨"
    ],
    "title": "賦得",
    "id": "41d292d2-b752-4c30-8b6b-7b7380f2f9bd"
  },
  {
    "author": "崔曙",
    "paragraphs": [
      "漢文皇帝有高臺，此日登臨曙色開。",
      "三晉雲山皆北向，二陵風雨自東來。",
      "關門令尹誰能識，河上仙翁去不回。",
      "且欲近尋彭澤宰，陶然共醉菊花杯。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "写景",
      "登高",
      "重阳节"
    ],
    "title": "九日登望仙臺呈劉明府容",
    "id": "1c1d545e-07a1-46a9-bb76-b7473c1fde43"
  },
  {
    "author": "王翰",
    "paragraphs": [
      "葡萄美酒夜光杯，欲飲琵琶馬上催。",
      "醉臥沙場君莫笑，古來征戰幾人回。"
    ],
    "tags": [
      "唐诗三百首",
      "豪放",
      "战争",
      "边塞",
      "宴饮",
      "七言绝句"
    ],
    "title": "涼州詞二首 一",
    "id": "0445f296-5816-4ab9-a617-7d8ed29088ea"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "北山白雲裏，隱者自怡悅。",
      "相望試登高，心飛逐鳥滅。",
      "愁因薄暮起，興是清秋發。",
      "時見歸村人，沙行渡頭歇。",
      "天邊樹若薺，江畔舟如月。",
      "何當載酒來，共醉重陽節。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "秋天",
      "登高",
      "山",
      "怀人"
    ],
    "title": "秋登蘭山寄張五",
    "id": "56ca5b29-4bb9-4f12-9200-6bc7c72e4e47"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山光忽西落，池月漸東上。",
      "散髮乘夕涼，開軒臥閑敞。",
      "荷風送香氣，竹露滴清響。",
      "欲取鳴琴彈，恨無知音賞。",
      "感此懷故人，中宵勞夢想。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "友情",
      "夏天",
      "怀人"
    ],
    "title": "夏日南亭懷辛大",
    "id": "f8afed4e-e8cd-467f-afae-51dc149921f7"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "夕陽度西嶺，羣壑倏已暝。",
      "松月生夜涼，風泉滿清聽。",
      "樵人歸欲盡，煙鳥棲初定。",
      "之子期宿來，孤琴候蘿逕。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "写景"
    ],
    "title": "宿業師山房期丁大不至",
    "id": "3e504df9-b22d-480e-9e7c-9f8ab8591b91"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山寺鐘鳴晝已昏，漁梁渡頭爭渡喧。",
      "人隨沙路向江村，余亦乘舟歸鹿門。",
      "鹿門月照開煙樹，忽到龐公棲隱處。",
      "巖扉松徑長寂寥，惟有幽人夜來去。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "归隐",
      "七言古诗"
    ],
    "title": "夜歸鹿門山歌",
    "id": "cc0e7ac3-bde4-4491-8ae5-027106709e72"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "八月湖水平，涵虛混太清。",
      "氣蒸雲夢澤，波撼岳陽城。",
      "欲濟無舟楫，端居恥聖明。",
      "坐觀垂釣者，空有羨魚情。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "描写水",
      "山水",
      "八年级上册(课外)",
      "五言律诗",
      "初中古诗",
      "水",
      "带有地名",
      "写水",
      "地名"
    ],
    "title": "望洞庭湖贈張丞相",
    "id": "6975adab-25d0-40c6-af3a-3a05847e7717"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "一丘常欲臥，三徑苦無資。",
      "北土非吾願，東林懷我師。",
      "黃金然桂盡，壯志逐年衰。",
      "日夕涼風至，聞蟬但益悲。"
    ],
    "tags": [
      "唐诗三百首",
      "归隐",
      "抒情",
      "五言律诗"
    ],
    "title": "秦中感秋寄遠上人",
    "id": "0613f575-4f07-4326-8591-603fb3d1da45"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山暝聞猿愁，滄江急夜流。",
      "風鳴兩岸葉，月照一孤舟。",
      "建德非吾土，維揚憶舊遊。",
      "還將兩行淚，遙寄海西頭。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "五言律诗",
      "怀人",
      "写水"
    ],
    "title": "宿桐廬江寄廣陵舊遊",
    "id": "b1dad78c-4dd8-4b99-b37b-741ed761f26a"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "木落雁南度，北風江上寒。",
      "我家襄水上，遙隔楚雲端。",
      "鄉淚客中盡，孤帆天際看。",
      "迷津欲有問，平海夕漫漫。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级上册(课外)",
      "思归",
      "五言律诗",
      "初中古诗",
      "思乡"
    ],
    "title": "早寒江上有懷",
    "id": "8e18183e-5a58-4805-b672-1726969d6526"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "寂寂竟何待，朝朝空自歸。",
      "欲尋芳草去，惜與故人違。",
      "當路誰相假，知音世所稀。",
      "秪應守索寞，還掩故園扉。"
    ],
    "tags": [
      "唐诗三百首",
      "归隐",
      "友情",
      "离别",
      "哀怨",
      "五言律诗"
    ],
    "title": "留別王侍御維",
    "id": "7f4cacb5-cde8-40de-9b14-e223879cc2f4"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "林臥愁春盡，開軒覽物華。",
      "忽逢青鳥使，邀入赤松家。",
      "丹竈初開火，仙桃正落花。",
      "童顏若可駐，何惜醉流霞。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗"
    ],
    "title": "清明日宴梅道士房",
    "id": "d2b5090e-e6fe-4d4f-9dd6-fe94ff6d4b5c"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "人事有代謝，往來成古今。",
      "江山留勝跡，我輩復登臨。",
      "水落魚梁淺，天寒夢澤深。",
      "羊公碑字在，讀罷淚沾襟。"
    ],
    "tags": [
      "唐诗三百首",
      "吊古伤今",
      "隋・唐・五代",
      "五言律诗"
    ],
    "title": "與諸子登峴山",
    "id": "b71d7c9c-7e92-4797-b2c9-8715dd0c2881"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "故人具雞黍，邀我至田家。",
      "綠樹村邊合，青山郭外斜。",
      "開筵面場圃，把酒話桑麻。",
      "待到重陽日，還來就菊花。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "田园",
      "友情",
      "初中古诗",
      "五言律诗",
      "山",
      "七年级上册(课外)",
      "四年级上册"
    ],
    "title": "過故人莊",
    "id": "9309205e-1d08-4a7b-99ef-4a05a9ee4370"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "北闕休上書，南山歸敝廬。",
      "不才明主棄，多病故人疎。",
      "白髮催年老，青陽逼歲除。",
      "永懷愁不寐，松月夜窗虛。"
    ],
    "tags": [
      "唐诗三百首",
      "抒情",
      "失意"
    ],
    "title": "歲暮歸南山",
    "id": "542cb326-1037-4bd9-b0f6-6479d165dc4c"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "迢遞三巴路，羈危萬里身。",
      "亂山殘雪夜，孤燈異鄉人。",
      "漸與骨肉遠，轉於奴僕親。",
      "那堪正飄泊，來日歲華新。"
    ],
    "tags": [
      "唐诗三百首",
      "羁旅",
      "五言律诗",
      "春节",
      "思乡"
    ],
    "title": "歲除夜有懷",
    "id": "0f5af383-765a-4d56-b00b-79ee2ccd5111"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "春眠不覺曉，處處聞啼鳥。",
      "夜來風雨聲，花落知多少。"
    ],
    "tags": [
      "唐诗三百首",
      "春",
      "写景",
      "一年级下册",
      "惜春",
      "五言绝句",
      "小学古诗"
    ],
    "title": "春曉",
    "id": "cb168b3b-d104-4df7-9868-1e1225ddb941"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "移舟泊煙渚，日暮客愁新。",
      "野曠天低樹，江清月近人。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "写景",
      "思乡",
      "水",
      "月亮",
      "五言绝句",
      "写水"
    ],
    "title": "宿建德江",
    "id": "0bed9b02-991e-4e28-b631-86640147a712"
  },
  {
    "author": "李白",
    "paragraphs": [
      "噫吁戲！危乎高哉！蜀道之難難於上青天！蠶叢及魚鳧，開國何茫然。",
      "爾來四萬八千歲，不與秦塞通人煙。",
      "西當太白有鳥道，可以橫絕峨眉巔。",
      "地崩山摧壯士死，然後天梯石棧相鉤連。",
      "上有六龍回日之高標，下有衝波逆折之回川。",
      "黃鶴之飛尚不得過，猨猱欲度愁攀援。",
      "青泥何盤盤，百步九折縈巖巒。",
      "捫參歷井仰脅息，以手撫膺坐長歎。",
      "問君西遊何時還？畏途巉巖不可攀。",
      "但見悲鳥號古木，雄飛雌從繞林間。",
      "又聞子規啼夜月，愁空山，蜀道之難難於上青天，使人聽此凋朱顏。",
      "連峯去天不盈尺，枯松倒挂倚絕壁。",
      "飛湍瀑流爭喧豗，砅厓轉石萬壑雷。",
      "其險也如此，嗟爾遠道之人胡爲乎來哉！劒閣崢嶸而崔嵬，一夫當關，萬夫莫開。",
      "所守或匪親，化爲狼與豺。",
      "朝避猛虎，夕避長蛇。",
      "磨牙吮血，殺人如麻。",
      "錦城雖云樂，不如早還家。",
      "蜀道之難難於上青天，側身西望長咨嗟。"
    ],
    "tags": [
      "山水",
      "抒情",
      "唐诗三百首",
      "乐府",
      "相和歌辞"
    ],
    "title": "蜀道難",
    "id": "f15c4b50-ee89-4927-8cf3-15e3a6a6ab95"
  },
  {
    "author": "李白",
    "paragraphs": [
      "君不見黃河之水天上來，奔流到海不復迴。",
      "君不見高堂明鏡悲白髮，朝如青絲暮成雪。",
      "人生得意須盡歡，莫使金樽空對月。",
      "天生我材必有用，千金散盡還復來。",
      "烹羊宰牛且爲樂，會須一飲三百盃。",
      "岑夫子，丹丘生，將進酒，君莫停。",
      "與君歌一曲，請君爲我側耳聽。",
      "鐘鼓饌玉不足貴，但願長醉不願醒。",
      "古來聖賢皆寂寞，惟有飲者留其名。",
      "陳王昔時宴平樂，斗酒十千恣讙謔。",
      "主人何爲言少錢，徑須沽取對君酌。",
      "五花馬，千金裘，呼兒將出換美酒，與爾同銷萬古愁。"
    ],
    "tags": [
      "黄河",
      "咏物",
      "抒情",
      "鼓吹曲辞",
      "唐诗三百首",
      "乐府",
      "宴饮",
      "哲理",
      "水",
      "咏物诗"
    ],
    "title": "將進酒",
    "id": "e5e5f969-ddac-4491-9cfe-d77742e1416d"
  },
  {
    "author": "杜荀鶴",
    "paragraphs": [
      "早被嬋娟誤，欲妝臨鏡慵。",
      "承恩不在貌，教妾若爲容。",
      "風暖鳥聲碎，日高花影重。",
      "年年越溪女，相憶採芙蓉。"
    ],
    "tags": [
      "宫怨",
      "春天",
      "写景",
      "女子",
      "唐诗三百首",
      "五言律诗"
    ],
    "title": "春宮怨",
    "id": "d3357800-9021-4647-a0a0-98499a0ee3c5"
  },
  {
    "author": "戴叔倫",
    "paragraphs": [
      "天秋月又滿，城闕夜千重。",
      "還作江南會，翻疑夢裏逢。",
      "風枝驚暗鵲，露草覆寒蛩。",
      "羈旅長堪醉，相留畏曉鐘。"
    ],
    "tags": [
      "唐诗三百首",
      "友情",
      "写景",
      "秋天",
      "五言律诗",
      "相聚"
    ],
    "title": "客夜與故人偶集",
    "id": "94ae3e7e-eb5d-414c-bfd6-124f50687ce5"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "鷲翎金僕姑，燕尾繡蝥弧。",
      "獨立揚新令，千營共一呼。"
    ],
    "tags": [
      "唐诗三百首",
      "将军",
      "乐府",
      "高中古诗",
      "边塞",
      "赞美"
    ],
    "title": "和張僕射塞下曲 一",
    "id": "ce491725-b96b-46a7-b83c-463d2094ef3f"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "林暗草驚風，將軍夜引弓。",
      "平明尋白羽，沒在石稜中。"
    ],
    "tags": [
      "唐诗三百首",
      "将军",
      "乐府",
      "边塞",
      "赞美",
      "狩猎"
    ],
    "title": "和張僕射塞下曲 二",
    "id": "6d2e12c0-c1b8-4242-888c-9dba1a8f93ce"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "月黑鴈飛高，單于夜遁逃。",
      "欲將輕騎逐，大雪滿弓刀。"
    ],
    "tags": [
      "战争",
      "冬天",
      "将军",
      "唐诗三百首",
      "乐府",
      "边塞",
      "赞美"
    ],
    "title": "和張僕射塞下曲 三",
    "id": "ee2a3000-9127-43fa-8618-89a1937322cb"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "野幕敞瓊筵，羌戎賀勞旋。",
      "醉和金甲舞，雷鼓動山川。"
    ],
    "tags": [
      "唐诗三百首",
      "乐府",
      "宴饮",
      "边塞",
      "赞颂",
      "将士"
    ],
    "title": "和張僕射塞下曲 四",
    "id": "9a4d3eae-fe01-46c7-a28b-8b518614a508"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "雲開遠見漢陽城，猶是孤帆一日程。",
      "估客晝眠知浪靜，舟人夜語覺潮生。",
      "三湘衰鬢逢秋色，萬里歸心對月明。",
      "舊業已隨征戰盡，更堪江上鼓鼙聲。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "写景",
      "抒情",
      "七言律诗",
      "思乡"
    ],
    "title": "晚次鄂州",
    "id": "fae577a5-da28-4672-83ff-94c97ae2a4a4"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "故關衰草遍，離別自堪悲。",
      "路出寒雲外，人歸暮雪時。",
      "少孤爲客早，多難識君遲。",
      "掩淚空相向，風塵何處期。"
    ],
    "tags": [
      "冬天",
      "友情",
      "送别",
      "唐诗三百首",
      "五言律诗",
      "伤怀"
    ],
    "title": "李端公",
    "id": "f4301f96-e872-4eae-aa51-0d12328059d1"
  },
  {
    "author": "王維",
    "paragraphs": [
      "不知香積寺，數里入雲峰。",
      "古木無人逕，深山何處鐘。",
      "泉聲咽危石，日色冷青松。",
      "薄暮空潭曲，安禪制毒龍。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "五言律诗"
    ],
    "title": "過香積寺",
    "id": "e4354c00-c83e-43da-9341-7007889dd625"
  },
  {
    "author": "王維",
    "paragraphs": [
      "空山新雨後，天氣晚來秋。",
      "明月松間照，清泉石上流。",
      "竹喧歸浣女，蓮動下漁舟。",
      "隨意春芳歇，王孫自可留。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "写景",
      "秋雨",
      "五言律诗",
      "写人"
    ],
    "title": "山居秋暝",
    "id": "00f12a19-bb96-4980-a4f5-11a1b9d604dd"
  },
  {
    "author": "王維",
    "paragraphs": [
      "中歲頗好道，晚家南山陲。",
      "興來每獨往，勝事空自知。",
      "行到水窮處，坐看雲起時。",
      "偶然值林叟，談笑無還期。"
    ],
    "tags": [
      "唐诗三百首",
      "田园",
      "抒情",
      "五言律诗",
      "山",
      "写人"
    ],
    "title": "終南別業",
    "id": "6d098c75-038d-45f4-8f86-73976c355e44"
  },
  {
    "author": "王維",
    "paragraphs": [
      "清川帶長薄，車馬去閑閑。",
      "流水如有意，暮禽相與還。",
      "荒城臨古渡，落日滿秋山。",
      "迢遞嵩高下，歸來且閉關。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "写景",
      "抒情",
      "五言律诗"
    ],
    "title": "歸嵩山作",
    "id": "40cd6eec-c6ce-4659-a225-61063cd210e9"
  },
  {
    "author": "王維",
    "paragraphs": [
      "太乙近天都，連山接海隅。",
      "白雲迴望合，青靄入看無。",
      "分野中峰變，陰晴衆壑殊。",
      "欲投人處宿，隔水問樵夫。"
    ],
    "tags": [
      "唐诗三百首",
      "终南山",
      "一年级下册",
      "五言律诗",
      "高中古诗",
      "描写山",
      "写山"
    ],
    "title": "終南山",
    "id": "a5b1f5c9-1ba7-4533-b497-55b1d4af1bbb"
  },
  {
    "author": "王維",
    "paragraphs": [
      "楚塞三湘接，荆門九派通。",
      "江流天地外，山色有無中。",
      "郡邑浮前浦，波瀾動遠空。",
      "襄陽好風日，留醉與山翁。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "抒情",
      "五言律诗"
    ],
    "title": "漢江臨汎",
    "id": "9080a103-2750-4b9b-a4fa-1167cd670a0c"
  },
  {
    "author": "王維",
    "paragraphs": [
      "渭水自縈秦塞曲，黃山舊遶漢宮斜。",
      "鑾輿迥出千門柳，閣道廻看上苑花。",
      "雲裏帝城雙鳳闕，雨中春樹萬人家。",
      "爲乘陽氣行時令，不是宸遊玩物華。"
    ],
    "tags": [
      "唐诗三百首",
      "黄山",
      "应制",
      "七言律诗"
    ],
    "title": "奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制",
    "id": "ce71032a-c075-492c-9554-51eb080348a5"
  },
  {
    "author": "王維",
    "paragraphs": [
      "絳幘雞人送曉籌，尚衣方進翠雲裘。",
      "九天閶闔開宮殿，萬國衣冠拜冕旒。",
      "日色纔臨仙掌動，香煙欲傍衮龍浮。",
      "朝罷須裁五色詔，佩聲歸向鳳池頭。"
    ],
    "tags": [
      "唐诗三百首",
      "宫廷",
      "七言律诗",
      "早朝"
    ],
    "title": "和賈舍人早朝大明宮之作",
    "id": "a364504e-3cfc-44c6-9203-173856452cdd"
  },
  {
    "author": "王維",
    "paragraphs": [
      "洞門高閣靄餘輝，桃李陰陰柳絮飛。",
      "禁裏疎鐘官舍晚，省中啼鳥吏人稀。",
      "晨搖玉佩趨金殿，夕奉天書拜瑣闈。",
      "強欲從君無那老，將因臥病解朝衣。"
    ],
    "tags": [
      "唐诗三百首",
      "酬和",
      "七言律诗"
    ],
    "title": "酬郭給事",
    "id": "7950a49f-f51d-4926-9d1e-e5f76b153829"
  },
  {
    "author": "王維",
    "paragraphs": [
      "積雨空林煙火遲，蒸藜炊黍餉東菑。",
      "漠漠水田飛白鷺，陰陰夏木囀黃鸝。",
      "山中習靜觀朝槿，松下清齋折露葵。",
      "野老與人爭席罷，海鷗何事更相疑。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "田园"
    ],
    "title": "積雨輞川莊作",
    "id": "0949fe2a-aadf-4cd4-b1c3-25fcdaecdb96"
  },
  {
    "author": "王維",
    "paragraphs": [
      "空山不見人，但聞人語響。",
      "返景入深林，復照青苔上。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "山",
      "描写山",
      "写山",
      "五言绝句"
    ],
    "title": "輞川集 鹿柴",
    "id": "2e8999a9-9df8-4483-ab1e-0231c3e46320"
  },
  {
    "author": "王維",
    "paragraphs": [
      "獨坐幽篁裏，彈琴復長嘯。",
      "深林人不知，明月來相照。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "生活",
      "初中古诗",
      "月亮",
      "归隐",
      "五言绝句",
      "七年级下册(课外)"
    ],
    "title": "輞川集 竹里館",
    "id": "36e09cb4-4fb7-48be-b6c6-c9bd906d9331"
  },
  {
    "author": "王維",
    "paragraphs": [
      "山中相送罷，日暮掩柴扉。",
      "春草明年綠，王孫歸不歸。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "送别",
      "友情"
    ],
    "title": "送別",
    "id": "c8a4faa6-8666-44f9-b4c9-df78d7af844d"
  },
  {
    "author": "王維",
    "paragraphs": [
      "君自故鄉來，應知故鄉事。",
      "來日綺窗前，寒梅着花未。"
    ],
    "tags": [
      "唐诗三百首",
      "景中情",
      "写景",
      "思亲",
      "梅花",
      "思乡",
      "五言绝句"
    ],
    "title": "雜詩三首 二",
    "id": "4c7205af-d1e8-48ed-8220-fe095418b95a"
  },
  {
    "author": "王維",
    "paragraphs": [
      "紅豆生南國，秋來發故枝。",
      "願君多采擷，此物最相思。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "咏物",
      "抒情",
      "咏物诗",
      "五言绝句"
    ],
    "title": "相思",
    "id": "8baa7c35-9afb-40bf-b5e4-41d9895e2710"
  },
  {
    "author": "王維",
    "paragraphs": [
      "獨在異鄉爲異客，每逢佳節倍思親。",
      "遙知兄弟登高處，遍插茱萸少一人。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "思乡",
      "三年级上册",
      "重阳节",
      "小学古诗"
    ],
    "title": "九月九日憶山東兄弟",
    "id": "6bbd1c2c-8c43-4ffb-b7b3-506d74266cee"
  },
  {
    "author": "王維",
    "paragraphs": [
      "渭城朝雨浥輕塵，客舍青青楊柳春。",
      "勸君更盡一杯酒，西出陽關無故人。"
    ],
    "tags": [
      "八年级下册(课外)",
      "友情",
      "小学古诗",
      "送别",
      "初中古诗",
      "乐府",
      "唐诗三百首",
      "近代曲辞",
      "四年级上册"
    ],
    "title": "渭城曲",
    "id": "1575c835-1241-4d7b-99dc-6d700549ac65"
  },
  {
    "author": "裴迪",
    "paragraphs": [
      "歸山深淺去，須盡丘壑美。",
      "莫學武陵人，暫游桃源裏。"
    ],
    "tags": [
      "唐诗三百首",
      "离别",
      "五言绝句",
      "规劝"
    ],
    "title": "崔九欲往南山馬上口號與別",
    "id": "80fe70cd-6e63-48eb-9c1e-ab26330d45d9"
  },
  {
    "author": "丘爲",
    "paragraphs": [
      "絕頂一茅茨，直[上]三十里。",
      "扣關無僮僕，窺室唯案几。",
      "若非巾柴車，應是釣秋水。",
      "差池不相見，黽勉空仰止。",
      "草色新雨中，松聲晚牕裏。",
      "及茲契幽絕，自足蕩心耳。",
      "雖無賓主意，頗得清淨理。",
      "興盡方下山，何必待之子。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "友情"
    ],
    "title": "尋西山隱者不遇",
    "id": "10a0aedc-4b39-494b-a36c-28c6df28a668"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "昔人已乘白雲去，此地空餘黃鶴樓。",
      "黃鶴一去不復返，白雲千載空悠悠。",
      "晴川歷歷漢陽樹，春草萋萋鸚鵡洲。",
      "日暮鄉關何處是，煙波江上使人愁。"
    ],
    "tags": [
      "唐诗三百首",
      "黄鹤楼",
      "隋・唐・五代",
      "七言律诗",
      "八年级上册(课外)",
      "写景",
      "初中古诗",
      "思乡",
      "名楼、庙宇",
      "怀古",
      "带有地名",
      "地名"
    ],
    "title": "黃鶴樓",
    "id": "2188f98e-d5f0-4740-b94b-e1497a3619ee"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "岧嶤太華俯咸京，天外三峰削不成。",
      "武帝祠前雲欲散，仙人掌上雨初晴。",
      "河山北枕秦關險，驛樹西連漢畤平。",
      "借問路傍名利客，無如此處學長生。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "怀古",
      "山水"
    ],
    "title": "行經華陰",
    "id": "39b2954c-04df-4561-ad6e-f4ddbae0db1e"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "君家何處住？妾住在橫塘。",
      "停船暫借問，或恐是同鄉。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "女子",
      "思乡",
      "乐府"
    ],
    "title": "長干曲四首 一",
    "id": "c39225f9-16b2-4713-a11c-d7030ec3b1c9"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "家臨九江水，來去九江側。",
      "同是長干人，自小不相識。"
    ],
    "tags": [
      "唐诗三百首",
      "家乡",
      "女子",
      "热爱",
      "乐府"
    ],
    "title": "長干曲四首 二",
    "id": "4a732464-35a5-4ffc-94d0-37d653eef2a1"
  },
  {
    "author": "祖詠",
    "paragraphs": [
      "燕臺一望客心驚，簫鼓喧喧漢將營。",
      "萬里寒光生積雪，三邊曙色動危旌。",
      "沙場烽火連胡月，海畔雲山擁薊城。",
      "少小雖非投筆吏，論功還欲請長纓。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "冬天",
      "边塞"
    ],
    "title": "望薊門",
    "id": "6beb5cc2-ae49-4e23-952a-1cb92fa11512"
  },
  {
    "author": "祖詠",
    "paragraphs": [
      "終南陰嶺秀，積雪浮雲端。",
      "林表明霽色，城中增暮寒。"
    ],
    "tags": [
      "唐诗三百首",
      "写雪",
      "冬天",
      "写景",
      "雪",
      "冬",
      "五言绝句"
    ],
    "title": "終南望餘雪",
    "id": "b4780bd1-1703-4bce-a801-d5ed566826b5"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "白日登山望烽火，黃昏飲馬傍交河。",
      "行人刁斗風沙暗，公主琵琶幽怨多。",
      "野雲萬里無城郭，雨雪紛紛連大漠。",
      "胡鴈哀鳴夜夜飛，胡兒眼淚雙雙落。",
      "聞道玉門猶被遮，應將性命逐輕車。",
      "年年戰骨埋荒外，空見蒲桃入漢家。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "冬天",
      "乐府",
      "边塞",
      "相和歌辞"
    ],
    "title": "古從軍行",
    "id": "bea6f283-8f90-49b5-8842-1cb906816548"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "主人有酒歡今夕，請奏鳴琴廣陵客。",
      "月照城頭烏半飛，霜淒萬樹風入衣。",
      "銅鑪華燭燭增輝，初彈淥水後楚妃。",
      "一聲已動物皆靜，四座無言星欲稀。",
      "清淮奉使千餘里，敢告雲山從此始。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "宴会",
      "七言古诗"
    ],
    "title": "琴歌",
    "id": "7d906794-b4d1-4922-9c59-eee5b19602ad"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "四月南風大麥黃，棗花未落桐陰長。",
      "青山朝別暮還見，嘶馬出門思舊鄉。",
      "陳侯立身何坦蕩，虬鬚虎眉仍大顙。",
      "腹中貯書一萬卷，不肯低頭在草莽。",
      "東門酤酒飲我曹，心輕萬事皆鴻毛。",
      "醉臥不知白日暮，有時空望孤雲高。",
      "長河浪頭連天黑，津口停舟渡不得。",
      "鄭國遊人未及家，洛陽行子空歎息。",
      "聞道故林相識多，罷官昨日今如何。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "七言古诗"
    ],
    "title": "送陳章甫",
    "id": "9e6cbc1b-95ed-406b-8c9d-d05876a1342c"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "南山截竹爲觱篥，此樂本自龜茲出。",
      "流傳漢地曲轉奇，涼州胡人爲我吹。",
      "傍鄰聞者多歎息，遠客思鄉皆淚垂。",
      "世人解聽不解賞，長飆風中自來往。",
      "枯桑老柏寒颼飀，九雛鳴鳳亂啾啾。",
      "龍吟虎嘯一時發，萬籟百泉相與秋。",
      "忽然更作漁陽摻，黃雲蕭條白日暗。",
      "變調如聞楊柳春，上林繁花照眼新。",
      "歲夜高堂列明燭，美酒一杯聲一曲。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "七言古诗"
    ],
    "title": "聽安萬善吹觱篥歌",
    "id": "2d66a9e4-7b4d-4be4-91fd-6a4b2cd8817b"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "男兒事長征，少小幽燕客。",
      "賭勝馬蹄下，由來輕七尺。",
      "殺人莫敢前，鬚如蝟毛磔。",
      "黃雲隴底白雪飛，未得報恩不能歸。",
      "遼東小婦年十五，慣彈琵琶解歌舞。",
      "今爲羗笛出塞聲，使我三軍淚如雨。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "豪侠",
      "拟古",
      "戍边",
      "七言古诗"
    ],
    "title": "古意",
    "id": "f1496cf4-4f85-4f9e-9e0e-dd05370641d3"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "蔡女昔造胡笳聲，一彈一十有八拍。",
      "胡人落淚沾邊草，漢使斷腸對歸客。",
      "古戍蒼蒼烽火寒，大荒沈沈飛雪白。",
      "先拂商弦後角羽，四郊秋葉驚摵摵。",
      "董夫子，通神明，深山竊聽來妖精。",
      "言遲更速皆應手，將往復旋如有情。",
      "空山百鳥散還合，萬里浮雲陰且晴。",
      "嘶酸雛鴈失羣夜，斷絕胡兒戀母聲。",
      "川爲淨其波，鳥亦罷其鳴。",
      "烏孫部落家鄉遠，邏娑沙塵哀怨生。",
      "幽音變調忽飄灑，長風吹林雨墮瓦。",
      "迸泉颯颯飛木末，野鹿呦呦走堂下。",
      "長安城連東掖垣，鳳凰池對青瑣門。",
      "高才脫略名與利，日夕望君抱琴至。"
    ],
    "tags": [
      "唐诗三百首",
      "长诗",
      "七言古诗",
      "抒情",
      "古体"
    ],
    "title": "聽董大彈胡笳聲兼寄語弄房給事",
    "id": "361a3e5e-ef71-4749-b39a-aa2f5d9180e4"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "朝聞遊子唱離歌，昨夜微霜初渡河。",
      "鴻鴈不堪愁裏聽，雲山況是客中過。",
      "關城樹色催寒近，御苑砧聲向晚多。",
      "莫見長安行樂處，空令歲月易蹉跎。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "七言律诗",
      "写景",
      "友情",
      "抒情",
      "送别"
    ],
    "title": "送魏萬之京",
    "id": "6340ef19-35e2-4194-96a9-3ee0a667905b"
  },
  {
    "author": "綦毋潛",
    "paragraphs": [
      "幽意無斷絕，此去隨所偶。",
      "晚風吹行舟，花路入溪口。",
      "際夜轉西壑，隔山望南斗。",
      "潭煙飛溶溶，林月低向後。",
      "生事且彌漫，願爲持竿叟。"
    ],
    "tags": [
      "唐诗三百首",
      "抒情",
      "五言古诗"
    ],
    "title": "春泛若耶溪",
    "id": "6290b8f0-48de-407f-be2c-629140d91f83"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "蟬鳴空桑林，八月蕭關道。",
      "出塞入塞寒，處處黃蘆草。",
      "從來幽幷客，皆共塵沙老。",
      "莫學遊俠兒，矜夸紫騮好。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "游侠",
      "乐府",
      "讽刺",
      "边塞",
      "新乐府辞"
    ],
    "title": "塞下曲四首 一",
    "id": "8d58a158-1a9b-4085-8ef7-b7b4e6adb66d"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "飲馬渡秋水，水寒風似刀。",
      "平沙日未沒，黯黯見臨洮。",
      "昔日長城戰，咸言意氣高。",
      "黃塵足今古，白骨亂蓬蒿。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "新乐府辞",
      "乐府"
    ],
    "title": "塞下曲四首 二",
    "id": "59fb3f01-65b2-416a-aefb-c13e502bfba1"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "高臥南齋時，開帷月初吐。",
      "清輝淡水木，演漾在窗戶。",
      "苒苒幾盈虛，澄澄變今古。",
      "美人清江畔，是夜越吟苦。",
      "千里其如何，微風吹蘭杜。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "月亮",
      "怀人"
    ],
    "title": "同從弟銷南齋玩月憶山陰崔少府",
    "id": "e2fec465-cea1-4829-b12d-3ba37a267562"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "秦時明月漢時關，萬里長征人未還。",
      "但使龍城飛將在，不教胡馬度陰山。"
    ],
    "tags": [
      "战争",
      "写景",
      "忧国忧民",
      "爱国",
      "唐诗三百首",
      "乐府",
      "山",
      "边塞"
    ],
    "title": "出塞二首 一",
    "id": "de6b7e3d-03cd-4daa-bdc2-7fb820fda441"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "昨夜風開露井桃，未央前殿月輪高。",
      "平陽歌舞新承寵，簾外春寒賜錦袍。"
    ],

  {
    "author": "白居易",
    "paragraphs": [
      "漢皇重色思傾國，御宇多年求不得。",
      "楊家有女初長成，養在深閨人未識。",
      "天生麗質難自棄，一朝選在君王側。",
      "回眸一笑百媚生，六宮粉黛無顏色。",
      "春寒賜浴華清池，溫泉水滑洗凝脂。",
      "侍兒扶起嬌無力，始是新承恩澤時。",
      "雲鬢花顏金步搖，芙蓉帳暖度春宵。",
      "春宵苦短日高起，從此君王不早朝。",
      "承歡侍宴無閑暇，春從春遊夜專夜。",
      "後宮佳麗三千人，三千寵愛在一身。",
      "金屋妝成嬌侍夜，玉樓宴罷醉和春。",
      "姊妹弟兄皆列土，可憐光彩生門戶。",
      "遂令天下父母心，不重生男重生女。",
      "驪宮高處入青雲，仙樂風飄處處聞。",
      "緩歌慢舞凝絲竹，盡日君王看不足。",
      "漁陽鞞鼓動地來，驚破霓裳羽衣曲。",
      "九重城闕煙塵生，千乘萬騎西南行。",
      "翠華搖搖行復止，西出都門百餘里。",
      "六軍不發無奈何，宛轉蛾眉馬前死。",
      "花鈿委地無人收，翠翹金雀玉搔頭。",
      "君王掩面救不得，回看血淚相和流。",
      "黃埃散漫風蕭索，雲棧縈紆登劒閣。",
      "峨嵋山下少人行，旌旗無光日色薄。",
      "蜀江水碧蜀山青，聖主朝朝暮暮情。",
      "行宮見月傷心色，夜雨聞鈴腸斷聲。",
      "天旋日轉迴龍馭，到此躊躇不能去。",
      "馬嵬坡下泥土中，不見玉顏空死處。",
      "君臣相顧盡霑衣，東望都門信馬歸。",
      "歸來池苑皆依舊，太液芙蓉未央柳。",
      "芙蓉如面柳如眉，對此如何不淚垂？",
      "春風桃李花開夜，秋雨梧桐葉落時。",
      "西宮南苑多秋草，宮葉滿階紅不埽。",
      "棃園弟子白髮新，椒房阿監青娥老。",
      "夕殿螢飛思悄然，孤燈挑盡未成眠。",
      "遲遲鐘鼓初長夜，耿耿星河欲曙天。",
      "鴛鴦瓦冷霜華重，翡翠衾寒誰與共。",
      "悠悠生死別經年，魂魄不曾來入夢。",
      "臨邛道士鴻都客，能以精誠致魂魄。",
      "爲感君王展轉思，遂教方士殷勤覓。",
      "排空馭氣奔如電，升天入地求之徧。",
      "上窮碧落下黃泉，兩處茫茫皆不見。",
      "忽聞海上有仙山，山在虛無縹緲間。",
      "樓閣玲瓏五雲起，其中綽約多仙子。",
      "中有一人字太真，雪膚花貌參差是。",
      "金闕西廂叩玉扃，轉教小玉報雙成。",
      "聞道漢家天子使，九華帳裏夢魂驚。",
      "攬衣推枕起裴回，珠箔銀屏邐迤開。",
      "雲鬢半偏新睡覺，花冠不整下堂來。",
      "風吹仙袂飄颻舉，猶似霓裳羽衣舞。",
      "玉容寂莫淚闌干，棃花一枝春帶雨。",
      "含情凝睇謝君王，一別音容兩渺茫。",
      "昭陽殿裏恩愛絕，蓬萊宮中日月長。",
      "回頭下望人寰處，不見長安見塵霧。",
      "唯將舊物表深情，鈿合金釵寄將去。",
      "釵留一股合一扇，釵擘黃金合分鈿。",
      "但教心似金鈿堅，天上人間會相見。",
      "臨別殷勤重寄詞，詞中有誓兩心知。",
      "七月七日長生殿，夜半無人私語時。",
      "在天願作比翼鳥，在地願爲連理枝。",
      "天長地久有時盡，此恨緜緜無絕期。"
    ],

  {
    "author": "白居易",
    "paragraphs": [
      "潯陽江頭夜送客，楓葉荻花秋索索。",
      "主人下馬客在船，舉酒欲飲無管弦。",
      "醉不成歡慘將別，別時茫茫江浸月。",
      "忽聞水上琵琶聲，主人忘歸客不發。",
      "尋聲暗問彈者誰，琵琶聲停欲語遲。",
      "移船相近邀相見，添酒迴燈重開宴。",
      "千呼萬喚始出來，猶抱琵琶半遮面。",
      "轉軸撥弦三兩聲，未成曲調先有情。",
      "弦弦掩抑聲聲思，似訴平生不得意。",
      "低眉信手續續彈，說盡心中無限事。",
      "輕攏慢撚抹復挑，初爲霓裳後六幺。",
      "大弦嘈嘈如急雨，小弦切切如私語。",
      "嘈嘈切切錯雜彈，大珠小珠落玉盤。",
      "間關鶯語花底滑，幽咽泉流水下灘。",
      "水泉冷澀弦疑絕，疑絕不通聲暫歇。",
      "別有幽愁暗恨生，此時無聲勝有聲。",
      "銀缾乍破水漿迸，鐵騎突出刀槍鳴。",
      "曲終收撥當心畫，四弦一聲如裂帛。",
      "東舟西舫悄無言，唯見江心秋月白。",
      "沈吟放撥插弦中，整頓衣裳起斂容。",
      "自言本是京城女，家在蝦蟇陵下住。",
      "十三學得琵琶成，名蜀教坊第一部。",
      "曲罷曾教善才伏，妝成每被秋娘妬。",
      "五陵年少爭纏頭，一曲紅綃不知數。",
      "鈿頭雲箆擊節碎，血色羅帬飜酒汙。",
      "今年歡笑復明年，秋月春風等閑度。",
      "弟走從軍阿姨死，暮去朝來顏色故。",
      "門前冷落鞍馬稀，老大嫁作商人婦。",
      "商人重利輕別離，前月浮梁買茶去。",
      "去來江口守空船，繞船月明江水寒。",
      "夜深忽夢少年事，夢啼妝淚紅闌干。",
      "我聞琵琶已歎息，又聞此語重唧唧。",
      "同是天涯淪落人，相逢何必曾相識。",
      "我從去年辭帝京，謫居臥病潯陽城。",
      "潯陽小處無音樂，終歲不聞絲竹聲。",
      "住近湓江地低濕，黃蘆苦竹繞宅生。",
      "其間旦暮聞何物，杜鵑啼血猨哀鳴。",
      "春江花朝秋月夜，往往取酒還獨傾。",
      "豈無山歌與村笛，嘔啞嘲哳難爲聽。",
      "今夜聞君琵琶語，如聽仙樂耳暫明。",
      "莫辭更坐彈一曲，爲君飜作琵琶行。",
      "感我此言良久立，却坐促弦弦轉急。",
      "淒淒不似向前聲，滿座重聞皆掩泣。",
      "座中泣下誰最多，江州司馬青衫濕。"
    ],

      "離離原上草，一歲一枯榮。",
      "野火燒不盡，春風吹又生。",
      "遠芳侵古道，晴翠接荒城。",
      "又送王孫去，萋萋滿別情。"

      "時難年饑世業空，弟兄羇旅各西東。",
      "田園寥落干戈後，骨肉流離道路中。",
      "弔影分爲千里鴈，辭根散作九秋蓬。",

      "晚來天欲雪，能飲一杯無。"

  {
    "author": "賈島",
    "paragraphs": [
      "松下問童子，言師採藥去。",
      "只在此山中，雲深不知處。"

  {
    "author": "溫庭筠",
    "paragraphs": [
      "澹然空水對斜暉，曲島蒼茫接翠微。",
      "波上馬嘶看櫂去，柳邊人歇待船歸。",
      "數叢沙草羣鷗散，萬頃江田一鷺飛。",
      "誰解乘舟尋范蠡，五湖煙水獨忘機。"

  {

    "paragraphs": [
      "冰簟銀牀夢不成，碧天如水夜雲輕。",
      "雁聲遠過瀟湘去，十二樓中月自明。"

    "title": "瑤瑟怨",

  {
    "author": "溫庭筠",
    "paragraphs": [
      "荒戍落黃葉，浩然離故關。",
      "高風漢陽渡，初日郢門山。",
      "江上幾人在，天涯孤櫂還。",
      "何當重相見，尊酒慰離顏。"
    ],

  {

    "paragraphs": [
      "蘇武魂銷漢使前，古祠高樹兩茫然。",
      "雲邊雁斷胡天月，隴上羊歸塞草煙。",
      "廻日樓臺非甲帳，去時冠劒是丁年。",
      "茂陵不見封侯印，空向秋波哭逝川。"

  {
    "author": "秦韜玉",
    "paragraphs": [
      "蓬門未識綺羅香，擬託良媒益自傷。",
      "誰愛風流高格調，共憐時世儉梳妝。",
      "敢將十指誇偏巧，不把雙眉鬬畫長。",
      "苦恨年年壓金線，爲他人作嫁衣裳。"

  {

    "paragraphs": [
      "幾行歸去盡，片影獨何之。",
      "暮雨相呼失，寒塘獨下遲。",
      "渚雲低暗度，關月冷遙隨。",
      "未必逢矰繳，孤飛自可疑。"

  {

    "paragraphs": [
      "迢遰三巴路，羇危萬里身。",
      "亂山殘雪夜，孤燭異鄉春。",
      "漸與骨肉遠，轉於僮僕親。",
      "那堪正漂泊，明日歲華新。"
    ],
    "tags": [
      "羁旅",
      "唐诗三百首",
      "五言律诗",
      "春节",
      "思乡"
    ],
    "title": "巴山道中除夜書懷",
    "id": "9d33c118-cde9-49af-b572-c43427a10b48"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "故國三千里，深宮二十年。",
      "一聲河滿子，雙淚落君前。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "宫怨"
    ],
    "title": "宮詞二首 一",
    "id": "d850db6a-e07b-4fee-b642-57a70bdbbed2"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "禁門宮樹月痕過，媚眼唯看宿燕窠。",
      "斜拔玉釵燈影畔，剔開紅焰救飛蛾。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "宫怨",
      "女子"
    ],
    "title": "贈內人",
    "id": "84bd91bd-11f7-4218-b9e2-b05b06ce8b99"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "日光斜照集靈臺，紅樹花迎曉露開。",
      "昨夜上皇新授籙，太真含笑入簾來。"
    ],
    "tags": [
      "唐诗三百首",
      "写人",
      "七言绝句",
      "讽刺"
    ],
    "title": "集靈臺二首 一",
    "id": "19867a30-1b67-4123-b367-44565bab6516"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "虢國夫人承主恩，平明騎馬入宮門。",
      "却嫌脂粉汚顏色，淡掃蛾眉朝至尊。"
    ],
    "tags": [
      "唐诗三百首",
      "写人",
      "七言绝句",
      "讽刺"
    ],
    "title": "集靈臺二首 二",
    "id": "51262a8c-de53-41ee-958a-de08d5f5a446"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "金陵津渡小山樓，一宿行人自可愁。",
      "潮落夜江斜月裏，兩三星火是瓜州。"
    ],
    "tags": [
      "唐诗三百首",
      "抒情",
      "七言绝句",
      "旅途"
    ],
    "title": "題金陵渡",
    "id": "bce40ff4-816c-490c-be30-04de15f7c25e"
  },
  {
    "author": "朱慶餘",
    "paragraphs": [
      "寂寂花時閉院門，美人相並立瓊軒。",
      "含情欲說宮中事，鸚鵡前頭不敢言。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "宫怨",
      "写景"
    ],
    "title": "宮詞",
    "id": "ab4b1a7f-4fbe-438b-817f-9e1ed2d39f4f"
  },
  {
    "author": "韓愈",
    "paragraphs": [
      "張生手持石鼓文，勸我試作石鼓歌。",
      "少陵無人謫仙死，才薄將奈石鼓何。",
      "周綱陵遲四海沸，宣王憤起揮天戈。",
      "大開明堂受朝賀，諸侯劒佩鳴相磨。",
      "蒐于岐陽騁雄俊，萬里禽獸皆遮羅。",
      "鐫功勒成告萬世，鑿石作鼓隳嵯峨。",
      "從臣才藝咸第一，揀選撰刻留山阿。",
      "雨淋日炙野火燎，鬼物守護煩撝呵。",
      "公從何處得紙本，毫髮盡備無差訛。",
      "辭嚴義密讀難曉，字體不類隸與科。",
      "年深豈免有缺畫，快劒斫斷生蛟鼉。",
      "鸞翔鳳翥衆僊下，珊瑚碧樹交枝柯。",
      "金繩鐵索鎖紐壯，古鼎躍水龍騰梭。",
      "陋儒編詩不收入，二雅褊迫無委蛇。",
      "孔子西行不到秦，掎摭星宿遺羲娥。",
      "嗟予好古生苦晚，對此涕淚雙滂沱。",
      "憶昔初蒙博士徴，其年始改稱元和。",
      "故人從軍在右輔，爲我度量掘臼科。",
      "濯冠沐浴告祭酒，如此至寶存豈多。",
      "氊包席裹可立致，十鼓祗載數駱駝。",
      "薦諸太廟比郜鼎，光價豈止百倍過。",
      "聖恩若許留太學，諸生講解得切磋。",
      "觀經鴻都尚填咽，坐見舉國來奔波。",
      "剜苔剔蘚露節角，安置妥帖平不頗。",
      "大廈深簷與蓋覆，經歷久遠期無佗。",
      "中朝大官老於事，詎肯感激徒媕婀。",
      "牧童敲火牛礪角，誰復著手爲摩挲。",
      "日銷月鑠就埋沒，六年西顧空吟哦。",
      "羲之俗書趁姿媚，數紙尚可博白鵝。",
      "繼周八代爭戰罷，無人收拾理則那。",
      "方今太平日無事，柄任儒術崇丘軻。",
      "安能以此上論列，願借辨口如懸河。",
      "石鼓之歌止於此，嗚呼吾意其蹉跎。"
    ],
    "tags": [
      "唐诗三百首",
      "七言古诗",
      "题咏"
    ],
    "title": "石鼓歌",
    "id": "1b9b8047-2410-47ae-a24c-aad7342b338f"
  },
  {
    "author": "王涯",
    "paragraphs": [
      "桂魄初生秋露微，輕羅已薄未更衣。",
      "銀箏夜久殷勤弄，心怯空房不忍歸。"
    ],
    "tags": [
      "思念",
      "秋天",
      "女子",
      "唐诗三百首",
      "乐府"
    ],
    "title": "秋夜曲",
    "id": "0055db4e-e8d3-41a0-b201-0e3b970e27b6"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "汲井漱寒齒，清心拂塵服。",
      "閒持貝葉書，步出東齋讀。",
      "真源了無取，妄跡世所逐。",
      "遺言冀可冥，繕性何由熟。",
      "道人庭宇靜，苔色連深竹。",
      "日出霧露餘，青松如膏沐。",
      "澹然離言說，悟悅心自足。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "抒情",
      "贬谪"
    ],
    "title": "晨詣超師院讀禪經",
    "id": "2954ddd2-f1c7-41b1-8c9e-42058398cde0"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "城上高樓接大荒，海天愁思正茫茫。",
      "驚風亂颭芙蓉水，密雨斜侵薜荔牆。",
      "嶺樹重遮千里目，江流曲似九廻腸。",
      "共來百越文身地，猶自音書滯一鄉。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "抒情",
      "怀人"
    ],
    "title": "登柳州城樓寄漳汀封連四州",
    "id": "3d26433c-a673-4094-8c83-cadb1b08412a"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "久爲簪組累，幸此南夷謫。",
      "閑依農圃鄰，偶似山林客。",
      "曉耕翻露草，夜榜響溪石。",
      "來往不逢人，長歌楚天碧。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "五言古诗",
      "生活"
    ],
    "title": "溪居",
    "id": "469dec8b-ba5e-4faf-b52f-2ad203e38d81"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "千山鳥飛絕，萬逕人蹤滅。",
      "孤舟蓑笠翁，獨釣寒江雪。"
    ],
    "tags": [
      "唐诗三百首",
      "写雪",
      "山水",
      "冬天",
      "雪",
      "冬",
      "写景",
      "写鸟",
      "五言绝句",
      "鸟"
    ],
    "title": "江雪",
    "id": "1f92134b-bca9-46eb-b2fe-87b30413041a"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "漁翁夜傍西巖宿，曉汲清湘燃楚竹。",
      "煙銷日出不見人，[欸]乃一聲山水綠。",
      "迴看天際下中流，巖上無心雲相逐。"
    ],
    "tags": [
      "唐诗三百首",
      "写人",
      "七言古诗",
      "山水"
    ],
    "title": "漁翁",
    "id": "51b1aeeb-9a66-412d-b15c-4afaa6c6b1d7"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "天地英雄氣，千秋尚凜然。",
      "勢分三足鼎，業復五銖錢。",
      "得相能開國，生兒不象賢。",
      "淒涼蜀故妓，來舞魏宮前。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "咏史怀古",
      "五言律诗"
    ],
    "title": "蜀先主廟",
    "id": "2f37297b-77d5-412b-bc73-105bfa4d011d"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "今夜鄜州月，閨中只獨看。",
      "遙憐小兒女，未解憶長安。",
      "香霧雲鬟濕，清輝玉臂寒。",
      "何時倚虛幌，雙照淚痕乾。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "女子",
      "五言律诗",
      "高中古诗",
      "月亮",
      "三年级上册"
    ],
    "title": "月夜",
    "id": "59c7eaa9-3c05-4857-8cff-10376706ccb9"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "國破山河在，城春草木深。",
      "感時花濺淚，恨別鳥驚心。",
      "烽火連三月，家書抵萬金。",
      "白頭搔更短，渾欲不勝簪。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "忧国忧民",
      "爱国",
      "五言律诗",
      "初中古诗",
      "八年级上册(课内)",
      "思乡",
      "写鸟",
      "鸟"
    ],
    "title": "春望",
    "id": "e9e6425c-6c14-4f69-8694-87a8b96a43de"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "花隱掖垣暮，啾啾棲鳥過。",
      "星臨萬戶動，月傍九霄多。",
      "不寢聽金鑰，因風想玉珂。",
      "明朝有封事，數問夜如何。"
    ],
    "tags": [
      "唐诗三百首",
      "爱国",
      "写景",
      "五言律诗"
    ],
    "title": "春宿左省",
    "id": "2769113d-0cac-4e67-83cb-0c10685f8381"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "此道昔歸順，西郊胡正繁。",
      "至今殘破膽，應有未招魂。",
      "近得歸京邑，移官豈至尊。",
      "無才日衰老，駐馬望千門。"
    ],
    "tags": [
      "唐诗三百首",
      "岁月",
      "五言律诗",
      "怀念"
    ],
    "title": "至德二載甫自京金光門出問道歸鳳翔乾元初從左拾遺移華州掾與親故別因出此門有悲往事",
    "id": "f88a6dbd-bf83-458c-b5e2-85fdd1ed98b2"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "戍鼓斷人行，秋邊一雁聲。",
      "露從今夜白，月是故鄉明。",
      "有弟皆分散，無家問死生。",
      "寄書長不避，況乃未休兵。"
    ],
    "tags": [
      "唐诗三百首",
      "月夜",
      "秋天",
      "边塞",
      "思乡",
      "五言律诗",
      "怀人",
      "中秋"
    ],
    "title": "月夜憶舍弟",
    "id": "c1280e87-ac81-4f9b-9de5-377d6af38ae8"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "涼風起天末，君子意如何。",
      "鴻雁幾時到，江湖秋水多。",
      "文章憎命達，魑魅喜人過。",
      "應共冤魂語，投詩贈汩羅。"
    ],
    "tags": [
      "唐诗三百首",
      "写风",
      "五言律诗",
      "风",
      "怀人"
    ],
    "title": "天末憶李白",
    "id": "2c036362-9f1d-434c-854f-b97a2a4bb19b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "丞相祠堂何處尋，錦官城外柏森森。",
      "映堦碧草自春色，隔葉黃鸝空好音。",
      "三顧頻煩天下計，兩朝開濟老臣心。",
      "出師未捷身先死，長使英雄淚滿襟。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "忧国忧民",
      "写人",
      "咏史怀古",
      "赞颂"
    ],
    "title": "蜀相",
    "id": "a353dcb1-12cc-4ca8-af1e-55d1d62445f8"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "舍南舍北皆春水，但見羣鷗日日來。",
      "花徑不曾緣客掃，蓬門今始爲君開。",
      "盤餐市遠無兼味，樽酒家貧只舊醅。",
      "肯與鄰翁相對飲，隔籬呼取盡餘桮。"
    ],
    "tags": [
      "唐诗三百首",
      "喜悦",
      "写景",
      "友情",
      "待客"
    ],
    "title": "客至",
    "id": "9da0cbe5-52d4-4efc-8be2-2f78f1a8f097"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "西山白雪三奇戍，南浦清江萬里橋。",
      "海內風塵諸弟隔，天涯涕淚一身遙。",
      "唯將遲暮供多病，未有涓埃荅聖朝。",
      "跨馬出郊時極目，不堪人事日蕭條。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "写景",
      "抒情"
    ],
    "title": "野望",
    "id": "d77f340f-1a04-4c5b-9704-2536e4249c6b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "遠送從此別，青山空復情。",
      "幾時桮重把，昨夜月同行。",
      "列郡謳歌惜，三朝出入榮。",
      "江村獨歸處，寂寞養殘生。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言律诗",
      "惜别"
    ],
    "title": "奉濟驛重送嚴公四韻",
    "id": "c2c83ee2-940f-4ae3-9ab3-4f509d2991f3"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "劒外忽傳收薊北，初聞涕淚滿衣裳。",
      "却看妻子愁何在，漫卷詩書喜欲狂。",
      "白日放歌須縱酒，青春作伴好還鄉。",
      "即從巴峽穿巫峽，便下襄陽向洛陽。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "思归",
      "六年级下册",
      "小学古诗"
    ],
    "title": "聞官軍收河南河北",
    "id": "22e90c0d-2b59-4500-8e5d-80d38ec4692c"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "風急天高猨嘯哀，渚清沙白鳥飛迴。",
      "無邊落木蕭蕭下，不盡長江衮衮來。",
      "萬里悲秋常作客，百年多病獨登臺。",
      "艱難苦恨繁霜鬢，潦倒新停濁酒桮。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "七言律诗",
      "写景",
      "忧国忧民",
      "秋天",
      "登高",
      "抒情"
    ],
    "title": "登高",
    "id": "a4d718ee-c020-42b4-97df-499cd0076f7b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "他鄉復行役，駐馬別孤墳。",
      "近淚無乾土，低空有斷雲。",
      "對碁陪謝傅，把劒覓徐君。",
      "唯見林花落，鸎啼送客聞。"
    ],
    "tags": [
      "唐诗三百首",
      "忧国忧民",
      "感伤",
      "五言律诗",
      "悼亡"
    ],
    "title": "別房太尉墓",
    "id": "c19e64b1-604b-40b7-9e41-6ef57b9c6f7b"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "花近高樓傷客心，萬方多難此登臨。",
      "錦江春色來天地，玉壘浮雲變古今。",
      "北極朝廷終不改，西山寇盜莫相侵。",
      "可憐後主還祠廟，日暮聊爲梁甫吟。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "写景",

    "title": "登樓",
    "id": "12919986-2d09-4d2e-b5ad-f2485e40ada5"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "清秋幕府井梧寒，獨宿江城蠟炬殘。",
      "永夜角聲悲自語，中天月色好誰看。",
      "風塵荏苒音書絕，關塞蕭條行路難。",
      "已忍伶俜十年事，強移栖息一枝安。"
    ],
    "tags": [
      "唐诗三百首",
      "感时",
      "孤独",
      "七言律诗"
    ],
    "title": "宿府",
    "id": "f540f519-e3c4-41c2-b299-f1d255977705"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "細草微風岸，危檣獨夜舟。",
      "星垂平野闊，月湧大江流。",
      "名豈文章著，官因老病休。",
      "飄飄何所似，天地一沙鷗。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "孤独",
      "抒怀",
      "五言律诗"
    ],
    "title": "旅夜書懷",
    "id": "f96506ea-e8ac-47e0-a0a6-ccd306e56645"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "歲暮陰陽催短景，天涯霜雪霽寒宵。",
      "五更鼓角聲悲壯，三峽星河影動搖。",
      "野哭幾家聞戰伐，夷歌數處起漁樵。",
      "臥龍躍馬終黃土，人事依依漫寂寥。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "閣夜",
    "id": "0f5874bf-3748-44c9-bc3a-be4a8c3eb2f6"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "功蓋三分國，名高八陣圖。",
      "江流石不轉，遺恨失吞吳。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "怀古",
      "哲理",
      "写人",
      "五言绝句"
    ],
    "title": "八陣圖",
    "id": "927908c0-999f-4d3f-8192-d67d28f93576"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "支離東北風塵際，漂泊西南天地間。",
      "三峽樓臺淹日月，五溪衣服共雲山。",
      "羯胡事主終無賴，詞客衰時且未還。",
      "庾信平生最蕭瑟，暮年詩賦動江關。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "感叹",
      "怀古"
    ],
    "title": "詠懷古跡五首 一",
    "id": "03eb4001-023a-4920-bbc7-a0fc52b2836d"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "搖落深知宋玉悲，風流儒雅亦吾師。",
      "悵望千秋一灑淚，蕭條異代不同時。",
      "江山故宅空文藻，雲雨荒臺豈夢思。",
      "最是楚宮俱泯滅，舟人指點到今疑。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "抒怀"
    ],
    "title": "詠懷古跡五首 二",
    "id": "acbe1729-cefd-4678-9719-09c5c9c27db0"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "羣山萬壑赴荆門，生長明妃尚有村。",
      "一去紫臺連朔漠，獨留青塚向黃昏。",
      "畫圖省識春風面，環佩空歸月夜魂。",
      "千載琵琶作胡語，分明怨恨曲中論。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "思乡"
    ],
    "title": "詠懷古跡五首 三",
    "id": "3b5db620-1964-4674-a01d-ad70ba3ebd2a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "蜀主窺吳幸三峽，崩年亦在永安宮。",
      "翠華想像空山裏，玉殿虛無野寺中。",
      "古廟杉松巢水鶴，歲時伏臘走村翁。",
      "武侯祠屋常鄰近，一體君臣祭祀同。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "抒怀"
    ],
    "title": "詠懷古跡五首 四",
    "id": "733afc7b-e370-4724-b755-e9342c574d22"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "諸葛大名垂宇宙，宗臣遺像肅清高。",
      "三分割據紆籌策，萬古雲霄一羽毛。",
      "伯仲之間見伊呂，指揮若定失蕭曹。",
      "福移漢祚難恢復，志決身殲軍務勞。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "怀古",
      "议论"
    ],
    "title": "詠懷古跡五首 五",
    "id": "87f5949b-bdad-4b5e-b488-7015bd45cc4f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "歧王宅裏尋常見，崔九堂前幾度聞。",
      "正是江南好風景，落花時節又逢君。"
    ],
    "tags": [
      "唐诗三百首",
      "初中古诗",
      "七言绝句",
      "怀念",
      "感伤",
      "七年级下册(课外)"
    ],
    "title": "江南逢李龜年",
    "id": "ae5b1a15-0b5c-4578-8f31-1b60030633a4"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "昔聞洞庭水，今上岳陽樓。",
      "吳楚東南坼，乾坤日夜浮。",
      "親朋無一字，老病有孤舟。",
      "戎馬關山北，憑軒涕泗流。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "岳阳楼",
      "抱负",
      "五言律诗",
      "山水"
    ],
    "title": "登岳陽樓",
    "id": "5d05fef6-e4aa-48e5-917d-c29d0e6d6b33"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "虢國夫人承主恩，平明上馬入宮門。",
      "却嫌脂粉涴顏色，澹埽蛾眉朝至尊。"
    ],
    "tags": [
      "写人",
      "七言绝句",
      "唐诗三百首",
      "讽刺"
    ],
    "title": "虢國夫人",
    "id": "15180235-db35-499b-8fd5-b8d9fa92f5f2"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "海上生明月，天涯共此時。",
      "情人怨遙夜，竟夕起相思。",
      "滅燭憐光滿，披衣覺露滋。",
      "不堪盈手贈，還寢夢佳期。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "中秋节",
      "中秋",
      "思乡",
      "五言律诗",
      "月亮"
    ],
    "title": "望月懷遠",
    "id": "2c152693-c25f-45ce-8ef2-cbedce1a62bc"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "陽月南飛雁，傳聞至此回。",
      "我行殊未已，何日復歸來？江靜潮初落，林昏瘴不開。",
      "明朝望鄉處，應見隴頭梅。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗",
      "思乡",
      "带有地名",
      "地名"
    ],
    "title": "題大庾嶺北驛",
    "id": "058db0d1-0656-4e8f-ac49-87622e16b19b"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "嶺外音書斷，經冬復歷春。",
      "近鄉情更怯，不敢問來人。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "思乡",
      "渡江"
    ],
    "title": "渡漢江",
    "id": "eb9530d2-e4c7-4c34-9214-06c28ca586bf"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "鄉心新歲切，天畔獨澘然。",
      "老至居人下，春歸在客先。",
      "嶺猨同旦暮，江柳共風煙。",
      "已似長沙傅，從今又幾年。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗",
      "春节",
      "思乡"
    ],
    "title": "新年作",
    "id": "368fc6bb-1636-419e-8ddb-cdc1dd07a1ca"
  },
  {
    "author": "王勃",
    "paragraphs": [
      "城闕輔三秦，風煙望五津。",
      "與君離別意，同是宦遊人。",
      "海內存知己，天涯若比隣。",
      "無爲在岐路，兒女共霑巾。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级下册(课外)",
      "友情",
      "送别",
      "初中古诗",
      "五言律诗",
      "哲理"
    ],
    "title": "杜少府之任蜀州",
    "id": "fe6f4b72-855c-43b9-8883-8b3fe3cd8bd4"
  },
  {
    "author": "杜審言",
    "paragraphs": [
      "獨有宦遊人，偏驚物候新。",
      "雲霞出海曙，梅柳渡江春。",
      "淑氣催黃鳥，晴光轉綠蘋。",
      "忽聞歌古調，歸思欲霑巾。"
    ],
    "tags": [
      "春天",
      "唐诗三百首",
      "伤怀",
      "和诗",
      "思乡",
      "五言律诗"
    ],
    "title": "和晉陵陸丞早春遊望",
    "id": "b881b056-6d92-45e8-9620-4710a375776f"
  },
  {
    "author": "朱斌",
    "paragraphs": [
      "白日依山盡，黃河入海流。",
      "欲窮千里目，更上一層樓。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "山水",
      "励志",
      "登楼",
      "写景",
      "哲理",
      "名楼、庙宇",
      "五言绝句"
    ],
    "title": "登樓",
    "id": "19340af6-e25d-41c8-90fc-b465d9be1134"
  },
  {
    "author": "高適",
    "paragraphs": [
      "嗟君此別意何如，駐馬銜桮問謫居。",
      "巫峽啼猿數行淚，衡陽歸雁幾封書。",
      "青楓江上秋天遠，白帝城邊古木疎。",
      "聖代即今多雨露，暫時分手莫躊躇。"
    ],
    "tags": [
      "唐诗三百首",
      "同情",
      "送别",
      "贬谪",
      "边塞",
      "七言律诗"
    ],
    "title": "送李少府貶峽中王少府貶長沙",
    "id": "2c24cec1-4105-4511-bf8b-bc6d5d8d48c7"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "岱宗夫如何，齊魯青未了。",
      "造化鍾神秀，陰陽割昏曉。",
      "盪胷生曾雲，決眥入歸鳥。",
      "會當凌絕頂，一覽衆山小。"
    ],
    "tags": [
      "唐诗三百首",
      "泰山",
      "五言古诗",
      "励志",
      "写景",
      "初中古诗",
      "山",
      "哲理",
      "八年级上册(课内)",
      "写鸟",
      "写山",
      "描写山",
      "鸟"
    ],
    "title": "望嶽",
    "id": "12fdaad8-b197-4526-b56d-c7c713267248"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "車轔轔，馬蕭蕭，行人弓箭各在腰。",
      "耶孃妻子走相送，塵埃不見咸陽橋。",
      "牽衣頓足闌道哭，哭聲直上干雲霄。",
      "道傍過者問行人，行人但云點行頻。",
      "或從十五北防河，便至四十西營田。",
      "去時里正與裹頭，歸來頭白還戍邊。",
      "邊亭流血成海水，武皇開邊意未已。",
      "君不聞漢家山東二百州，千村萬落生荆杞。",
      "縱有健婦把鋤犂，禾生隴畝無東西。",
      "況復秦兵耐苦戰，被驅不異犬與雞。",
      "長者雖有問，役夫敢申恨。",
      "且如今年冬，未休關西卒。",
      "縣官急索租，租稅從何出？信知生男惡，反是生女好。",
      "生女猶是嫁比鄰，生男埋沒隨百草。",
      "君不見青海頭，古來白骨無人收。",
      "新鬼煩冤舊鬼哭，天陰雨濕聲啾啾。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "战争",
      "忧国忧民",
      "乐府",
      "新乐府辞"
    ],
    "title": "兵車行",
    "id": "bd57a0b0-28a1-4d53-bc09-51899d2dac38"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "人生不相見，動如參與商。",
      "今夕復何夕，共此燈燭光。",
      "少壯能幾時，鬢髮各已蒼。",
      "訪舊半爲鬼，驚呼熱中腸。",
      "焉知二十載，重上君子堂。",
      "昔別君未婚，兒女忽成行。",
      "怡然敬父執，問我來何方。",
      "問荅乃未已，兒女羅酒漿。",
      "夜雨剪春韭，新炊間黃粱。",
      "主稱會面難，一舉累十觴。",
      "十觴亦不醉，感子故意長。",
      "明日隔山岳，世事兩茫茫。"
    ],
    "tags": [
      "唐诗三百首",
      "时光",
      "五言古诗",
      "人生",
      "友情"
    ],
    "title": "贈衛八處士",
    "id": "6c7c45a6-c944-4ff3-aa99-f5cb0440436f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "三月三日天氣新，長安水邊多麗人。",
      "態濃意遠淑且真，肌理細膩骨肉勻。",
      "繡羅衣裳照暮春，蹙金孔雀銀麒麟。",
      "頭上何所有，翠微㔩葉垂鬢脣。",
      "背後何所見，珠壓腰衱穩稱身。",
      "就中雲幕椒房親，賜名大國虢與秦。",
      "紫駝之峰出翠釜，水精之盤行素鱗。",
      "犀箸厭飫久未下，鑾刀縷切空紛綸。",
      "黃門飛鞚不動塵，御廚絡繹送八珍。",
      "簫鼓哀吟感鬼神，賓從雜遝實要津。",
      "後來鞍馬何逡巡，當軒下馬入錦茵。",
      "楊花雪落覆白蘋，青鳥飛去銜紅巾。",
      "炙手可熱勢絕倫，慎莫近前丞相嗔。"
    ],
    "tags": [
      "杂曲歌辞",
      "唐诗三百首",
      "乐府",
      "讽刺",
      "咏叹"
    ],
    "title": "麗人行",
    "id": "370b53ae-949e-45cf-92b0-3aca072c1b86"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "少陵野老吞聲哭，春日潛行曲江曲。",
      "江頭宮殿鎖千門，細柳新蒲爲誰綠。",
      "憶昔霓旌下南苑，苑中萬物生顏色。",
      "昭陽殿裏第一人，同輦隨君侍君側。",
      "輦前才人帶弓箭，白馬嚼齧黃金勒。",
      "翻身向天仰射雲，一箭正墜雙飛翼。",
      "明眸皓齒今何在，血污遊魂歸不得。",
      "清渭東流劒閣深，去住彼此無消息。",
      "人生有情淚霑臆，江水江花豈終極。",
      "黃昏胡騎塵滿城，欲往城南忘南北。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "爱国",
      "伤怀",
      "乐府",
      "新乐府辞",
      "写水"
    ],
    "title": "哀江頭",
    "id": "8474f5c4-d18e-4b42-9702-19ad909b9ea2"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "長安城頭頭白烏，夜飛延秋門上呼。",
      "又向人家啄大屋，屋底達官走避胡。",
      "金鞭斷折九馬死，骨肉不待同馳驅。",
      "腰下實玦青珊瑚，可憐王孫泣路隅。",
      "問之不肯道姓名，但道困苦乞爲奴。",
      "已經百日竄荆棘，身上無有完肌膚。",
      "高帝子孫盡隆準，龍種自與常人殊。",
      "豺狼在邑龍在野，王孫善保千金軀。",
      "不敢長語臨交衢，且爲王孫立斯須。",
      "昨夜東風吹血腥，東來橐駝滿舊都。",
      "朔方健兒好身手，昔何勇銳今何愚。",
      "竊聞天子已傳位，賢德北服南單于。",
      "花門剺面請雪恥，慎勿出口他人狙。",
      "哀哉王孫慎勿疎，五陵佳氣無時無。"
    ],
    "tags": [

    "title": "哀王孫",
    "id": "bd7949f8-c961-4bfd-a307-1fe9e621028c"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "絕代有佳人，幽居在空谷。",
      "自云良家子，零落依草木。",
      "關中昔喪敗，兄弟遭殺戮。",
      "官高何足論，不得收骨肉。",
      "世情惡衰歇，萬事隨轉燭。",
      "夫壻輕薄兒，新人已如玉。",
      "合昏尚知時，鴛鴦不獨宿。",
      "但見新人笑，那聞舊人哭。",
      "在山泉水清，出山泉水濁。",
      "侍婢賣珠回，牽蘿補茅屋。",
      "摘花不插髮，采柏動盈匊。",
      "天寒翠袖薄，日暮倚修竹。"
    ],
    "tags": [
      "唐诗三百首",
      "赞美",
      "五言古诗",
      "闺怨",
      "女子"
    ],
    "title": "佳人",
    "id": "f2db30a1-f125-44b9-a8d8-287ccb69238a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "死別已吞聲，生別常惻惻。",
      "江南瘴癘地，逐客無消息。",
      "故人入我夢，明我長相憶。",
      "恐非平生魂，路遠不可測。",
      "魂來楓葉青，魂返關塞黑。",
      "君今在羅網，何以有羽翼。",
      "落月滿屋梁，猶疑照顏色。",
      "水深波浪闊，無使蛟龍得。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "夢李白二首 一",
    "id": "c9362aba-fb50-481b-a4cd-08ddd65cdd2a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "浮雲終日行，遊子久不至。",
      "三夜頻夢君，情親見君意。",
      "告歸常局促，苦道來不易。",
      "江湖多風波，舟楫恐失墜。",
      "出門搔白首，若負平生志。",
      "冠蓋滿京華，斯人獨顦顇。",
      "孰云網恢恢，將老身反累。",
      "千秋萬歲名，寂莫身後事。"
    ],
    "tags": [
      "唐诗三百首",
      "友人",
      "同情",
      "记梦",
      "五言古诗"
    ],
    "title": "夢李白二首 二",
    "id": "0710a746-8660-4bc1-b073-8ce51ac9f4d9"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "國初已來畫鞍馬，神妙獨數江都王。",
      "將軍得名三十載，人間又見真乘黃。",
      "曾貌先帝照夜白，龍池十日飛霹靂。",
      "內府殷紅馬腦盌，倢伃傳詔才人索。",
      "盌賜將軍拜舞歸，輕紈細綺相追飛。",
      "貴戚權門得筆跡，始覺屏障生光輝。",
      "昔日太宗拳毛騧，近時郭家師子花。",
      "今之新圖有二馬，復令識者久歎嗟。",
      "此皆騎戰一敵萬，縞素漠漠開風沙。",
      "其餘七匹亦殊絕，迥若寒空動煙雪。",
      "霜蹄蹴踏長楸間，馬官廝養森成列。",
      "可憐九馬爭神駿，顧視清高氣深穩。",
      "借問苦心愛者誰，後有韋諷前支遁。",
      "憶昔巡幸新豐宮，翠華拂天來向東。",
      "騰驤磊落三萬匹，皆與此圖筋骨同。",
      "自從獻寶朝河宗，無復射蛟江水中。",
      "君不見金粟堆前松柏裏，龍媒去盡鳥呼風。"
    ],
    "tags": [
      "唐诗三百首",
      "写马",
      "七言古诗",
      "题画",
      "马"
    ],
    "title": "韋諷錄事宅觀曹將軍畫馬圖",
    "id": "827e44b1-7064-4ff7-9a9c-192eece94e2d"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "將軍魏武之子孫，於今爲庶爲清門。",
      "英雄割據雖已矣，文彩風流猶尚存。",
      "學書初學衛夫人，但恨無過王右軍。",
      "丹青不知老將至，富貴於我如浮雲。",
      "開元之中常引見，承恩數上南熏殿。",
      "凌煙功臣少顏色，將軍下筆開生面。",
      "良相頭上進賢冠，猛將腰間大羽箭。",
      "褒公鄂公毛髮動英姿颯爽來酣戰。",
      "先帝天馬玉花驄，畫工如山貌不同。",
      "是日牽來赤墀下，迥立閶闔生長風。",
      "詔謂將軍拂絹素，意匠慘澹經營中。",
      "斯須九重真龍出，一洗萬古凡馬空。",
      "玉花却在御榻上，榻上庭前屹相向。",
      "至尊含笑催賜金，圉人太僕皆惆悵。",
      "弟子韓幹早入室，亦能畫馬窮殊相。",
      "幹惟畫肉不畫骨，忍使驊騮氣凋喪。",
      "將軍畫善蓋有神，必逢佳士亦寫真。",
      "即今飄泊干戈際，屢貌尋常行路人。",
      "途窮反遭俗眼白，世上未有如公貧。",
      "但看古來盛名下，終日坎壈纏其身。"
    ],
    "tags": [
      "写人",
      "同情",
      "唐诗三百首",
      "七言古诗",
      "怅惘"
    ],
    "title": "丹青引贈曹將軍霸",
    "id": "13b12259-3750-4c6d-87ee-35283ad63dab"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "今我不樂思岳陽，身欲奮飛病在牀。",
      "美人娟娟隔秋水，濯足洞庭望八荒。",
      "鴻飛冥冥日月白，青楓葉赤天雨霜。",
      "玉京羣帝集北斗，或騎騏驎翳鳳皇。",
      "芙蓉旌旗煙霧樂，影動倒景搖瀟湘。",
      "星宮之君醉瓊漿，羽人稀少不在旁。",
      "似聞昨者赤松子，恐是漢代韓張良。",
      "昔隨劉氏定長安，帷幄未改神慘傷。",
      "國家成敗吾豈敢，色難腥腐餐風香。",
      "周南留滯古所惜，南極老人應壽昌。",
      "美人胡爲隔秋水，焉得置之貢玉堂。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "游仙",
      "七言古诗"
    ],
    "title": "寄韓諫議",
    "id": "6d303931-f900-4f29-a8b9-caea611a521f"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "孔明廟前有老柏，柯如青銅根如石。",
      "霜皮溜雨四十圍，黛色參天二千尺。",
      "君臣已與時際會，樹木猶爲人愛惜。",
      "雲來氣接巫峽長，月出寒通雪山白。",
      "憶昨路繞錦亭東，先主武侯同閟宮。",
      "崔嵬枝幹郊原古，窈窕丹青戶牖空。",
      "落落盤踞雖得地，冥冥孤高多烈風。",
      "扶持自是神明力，正直原因造化功。",
      "大廈如傾要梁棟，萬牛回首丘山重。",
      "不露文章世已驚，未辭剪伐誰能送。",
      "苦心豈免容螻蟻，香葉終經宿鸞鳳。",
      "志士幽人莫怨嗟，古來材大難爲用。"
    ],
    "tags": [
      "隋・唐・五代",
      "咏物",
      "唐诗三百首",
      "七言古诗",
      "咏物诗",
      "怀才不遇"
    ],
    "title": "古柏行",
    "id": "383d41a8-5155-4fff-b91f-87d5585ff03e"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "昔有佳人公孫氏，一舞劒氣動四方。",
      "觀者如山色沮喪，天地爲之久低昂。",
      "㸌如羿射九日落，矯如羣帝驂龍翔。",
      "來如雷霆收震怒，罷如江海凝清光。",
      "絳脣珠袖兩寂莫，況有弟子傳芬芳。",
      "臨潁美人在白帝，妙舞此曲神揚揚。",
      "與余問答既有以，感時撫事增惋傷。",
      "先帝侍女八千人，公孫劒器初第一。",
      "五十年間似反掌，風塵傾動昏王室。",
      "棃園子弟散如煙，女樂餘姿映寒日。",
      "金粟堆南木已拱，瞿唐石城草蕭瑟。",
      "玳筵急管曲復終，樂極哀來月東出。",
      "老夫不知其所往，足繭荒山轉愁疾。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "觀公孫大娘弟子舞劒器行",
    "id": "61304178-6b16-4f98-87b2-4ad6bc98da98"
  },
  {
    "author": "張佖",
    "paragraphs": [
      "別夢依依到謝家，小廊迴合曲闌斜。",
      "多情只有春庭月，猶爲離人照落花。"
    ],
    "tags": [

      "爱情"
    ],
    "title": "寄人二首  其一",
    "id": "4ddb6dda-68be-4bb2-8874-8508c6c6e3ad"
  },
  {
    "author": "不詳",
    "paragraphs": [
      "秦時明月漢時關，萬里征人尚未還。",
      "但願龍庭神將在，不教胡馬渡陰山。"
    ],

    "title": "雜曲歌辭 蓋羅縫 一",
    "id": "7066e611-faa5-427c-8fce-e0bf10c55416"
  },
  {
    "author": "楊敬述進",
    "paragraphs": [
      "迴樂峰前沙似雪，受降城外月如霜。",
      "不知何處吹蘆管？一夜征人盡望鄉。"
    ],
    "tags": [

    "title": "雜曲歌辭 婆羅門",
    "id": "f1320c1f-949a-4cbe-ad23-4806878632c5"
  },
  {
    "author": "李白",
    "paragraphs": [
      "雲想衣裳花想容，春風拂檻露華濃。",
      "若非羣玉山頭見，會向瑤臺月下逢。"
    ],

    "id": "b5f1094b-b9be-43cf-8e04-9b984642a630"
  },
  {
    "author": "李白",
    "paragraphs": [
      "一枝紅豔露凝香，雲雨巫山枉斷腸。",
      "借問漢宮誰得似，可憐飛燕倚新妝。"
    ],
    "tags": [

    "title": "雜曲歌辭 清平調 二",
    "id": "73dadc56-88ff-4f11-9ff5-da0e0adf533c"
  },
  {
    "author": "李白",
    "paragraphs": [
      "名花傾國兩相歡，長得君王帶笑看。",
      "解釋春風無限恨，沈香亭北倚闌干。"
    ],

    "title": "雜曲歌辭 清平調 三",

  },
  {
    "author": "王維",
    "paragraphs": [
      "謂城朝雨浥輕塵，客舍青青柳色春。",
      "勸君更盡一杯酒，西出陽關無故人。"
    ],

  },
  {
    "author": "不詳",
    "paragraphs": [
      "勸君莫惜金縷衣，勸君惜取少年時。",
      "花開堪折直須折，莫待無花空折枝。"
    ],
    "tags": [

    ],
    "title": "雜曲歌辭 金縷衣",

  },
  {
    "author": "張九齡",
    "paragraphs": [
      "蘭葉春葳蕤，桂華秋皎潔。",
      "欣欣此生意，自爾爲佳節。",
      "誰知林棲者，聞風坐相悅。",
      "草木有本心，何求美人折。"
    ],
    "tags": [

    "title": "感遇十二首 一",
    "id": "9b4f2d56-6df4-4999-a82c-11283529dd51"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "幽林歸獨臥，滯慮洗孤清。",
      "持此謝高鳥，因之傳遠情。",
      "日夕懷空意，人誰感至精。",
      "飛沈理自隔，何所慰吾誠。"
    ],
    "tags": [
      "唐诗三百首",
      "寓人",
      "五言古诗",
      "哲理",
      "写鸟",
      "寓言",

    ],
    "title": "感遇十二首 二",
    "id": "6df38a77-6e5d-43ae-a115-7de36475f53e"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "孤鴻海上來，池潢不敢顧。",
      "側見雙翠鳥，巢在三珠樹。",
      "矯矯珍木巔，得無金丸懼。",
      "美服患人指，高明逼神惡。",
      "今我遊冥冥，弋者何所慕。"
    ],
    "tags": [
      "唐诗三百首",
      "寓人",
      "五言古诗",
      "生活",
      "哲理",
      "抒怀",
      "写鸟",
      "鸟"
    ],
    "title": "感遇十二首 四",
    "id": "f9798830-48c1-45e3-be90-4028d93954dc"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "江南有丹橘，經冬猶綠林。",
      "豈伊地氣暖，自有歲寒心。",
      "可以薦嘉客，奈何阻重深。",
      "運命唯所遇，循環不可尋。",
      "徒言樹桃李，此木豈無陰。"
    ],
    "tags": [
      "唐诗三百首",
      "寓人",
      "五言古诗",
      "咏物",
      "人格",
      "咏物诗",

    ],
    "title": "感遇十二首 七",
    "id": "11b013f9-aa6a-4e55-8e68-195dc62f161f"
  },
  {
    "author": "皎然",
    "paragraphs": [
      "移家雖帶郭，野徑入桑麻。",
      "近種籬邊菊，秋來未著花。",
      "扣門無犬吠，欲去問西家。",
      "報道山中去，歸時每日斜。"
    ],
    "tags": [

      "隐士",
      "访友",
      "生活",
      "五言律诗"
    ],
    "title": "尋陸鴻漸不遇",
    "id": "565d931a-ff49-4f37-b633-524b48c2f4f0"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "西晉樓船下益州，金陵王氣黯然收。",
      "千尋鐵鎖沈江底，一片降旛出石頭。",
      "人世幾回傷往事，山形依舊枕江流。",
      "今逢四海爲家日，故壘蕭蕭蘆荻秋。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "咏史怀古"
    ],
    "title": "西塞山懷古",
    "id": "80beb8cc-8338-44d4-8b96-7f9d32133c97"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "朱雀橋邊野草花，烏衣巷口夕陽斜。",
      "舊時王謝堂前燕，飛入尋常百姓家。"
    ],
    "tags": [
      "唐诗三百首",
      "怀古",
      "七言绝句",
      "带有地名",
      "地名"
    ],
    "title": "金陵五題 烏衣巷",
    "id": "4fa92777-9bd6-45ca-9272-bac30459cf5e"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "新妝面面下朱樓，深鎖春光一院愁。",
      "行到中庭數花朵，蜻蜓飛上玉搔頭。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "春天",
      "女子",
      "七言绝句"
    ],
    "title": "和樂天春詞",
    "id": "297dd100-6aab-4685-a52d-983fb0999c7a"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "梧桐相待老，鴛鴦會雙死。",
      "貞女貴狥夫，捨生亦如此。",
      "波瀾誓不起，妾心井中水。"
    ],
    "tags": [
      "赞颂",
      "妇女",
      "唐诗三百首",
      "乐府"
    ],
    "title": "列女操",
    "id": "a9d3bfca-8402-4946-ad02-53db1964a3b2"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "慈母手中線，遊子身上衣。",
      "臨行密密縫，意恐遲遲歸。",
      "誰言寸草心，報得三春暉。"
    ],
    "tags": [
      "杂曲歌辞",
      "唐诗三百首",
      "乐府",
      "母爱",
      "三年级下册",
      "赞颂"
    ],
    "title": "遊子吟",
    "id": "4cf19354-4c0a-4e55-980b-69fa7f81ed0f"
  },
  {
    "author": "蔡襄",
    "paragraphs": [
      "隠隠飛橋隔野煙，石磯西畔問漁船。",
      "桃花盡日隨流水，洞在清溪何處邊。"
    ],
    "tags": [
      "描写水",
      "写景",
      "抒情",
      "唐诗三百首",
      "七言绝句",
      "写水"
    ],
    "title": "度南澗",
    "id": "e72db286-3b6a-425b-ad02-75248ea5a790"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "泉壑帶茅茨，雲霞生薜帷。",
      "竹憐新雨後，山愛夕陽時。",
      "閑鷺棲常早，秋花落更遲。",
      "家童掃蘿逕，昨與故人期。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "五言律诗",
      "邀请"
    ],
    "title": "谷口書齋寄楊補闕",
    "id": "b700208d-d859-4e36-96bf-883c81d4df0f"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "上國隨緣住，來途若夢行。",
      "浮天滄海遠，去世法舟輕。",
      "水月通禪觀，魚龍聽梵聲。",
      "惟憐一燈影，萬里眼中明。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言律诗",
      "惜别"
    ],
    "title": "送僧歸日本",
    "id": "15274300-bd45-4898-ab14-9a3dead4b620"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "二月黃鶯飛上林，春城紫禁曉陰陰。",
      "長樂鐘聲花外盡，龍池柳色雨中深。",
      "陽和不散窮途恨，霄漢長懷捧日新。",
      "獻賦十年猶未遇，羞將白髮對華簪。"
    ],
    "tags": [
      "唐诗三百首",
      "援引",
      "七言律诗"
    ],
    "title": "贈闕下裴舍人",
    "id": "42f17f00-bbc1-4b5b-82c1-3e9e012725ba"
  },
  {
    "author": "錢起",
    "paragraphs": [
      "月黑雁飛高，單于夜遁逃。",
      "欲將輕騎逐，大雪滿弓刀。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "冬天",
      "将军",
      "乐府",
      "边塞",
      "赞美"
    ],
    "title": "和張僕射塞下曲",
    "id": "c8210485-a1f4-4c76-a1f6-2f5e57d39d29"
  },
  {
    "author": "元結",
    "paragraphs": [
      "昔歲逢太平，山林二十年。",
      "泉源在庭戶，洞壑當門前。",
      "井稅有常期，日[晏]猶得眠。",
      "忽然遭世變，數歲親戎旃。",
      "今來典斯郡，山夷又紛然。",
      "城小賊不屠，人貧傷可憐。",
      "是以陷隣境，此州獨見全。",
      "使臣將王命，豈不如賊焉。",
      "今彼徴斂者，迫之如火煎。",
      "誰能絕人命，以作時世賢。",
      "思欲委符節，引竿自刺船。",
      "將家就魚麥，歸老江湖邊。"
    ],
    "tags": [
      "唐诗三百首",
      "同情",
      "五言古诗"
    ],
    "title": "賊退示官吏",
    "id": "1ce94bde-41ec-42b8-abef-e1e1be55be7c"
  },
  {
    "author": "元結",
    "paragraphs": [
      "石魚湖，似洞庭，夏水欲滿君山青。",
      "山爲樽，水爲沼，酒徒歷歷坐洲島。",
      "長風連日作大浪，不能廢人運酒舫。",
      "我持長瓢坐巴丘，酌飲四坐以散愁。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖"
    ],
    "title": "石魚湖上醉歌",
    "id": "8af643c9-a8b0-49b7-b8e9-88920ab0bbd8"
  },
  {
    "author": "張繼",
    "paragraphs": [
      "月落烏啼霜滿天，江楓漁父對愁眠。",
      "姑蘇城外寒山寺，夜半鐘聲到客船。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "秋天",
      "七言绝句",
      "思乡",
      "秋"
    ],
    "title": "楓橋夜泊",
    "id": "3cda5a92-ffa2-4af0-9217-97ce36113705"
  },
  {
    "author": "韓翃",
    "paragraphs": [
      "長簟迎風早，空城澹月華。",
      "星河秋一雁，砧杵夜千家。",
      "節候看應晚，心期臥亦賒。",
      "向來吟秀句，不覺已鳴鴉。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "酬答",
      "五言律诗"
    ],
    "title": "酬程延秋夜即事見贈",
    "id": "ce493923-7c4b-41a9-94e9-cf95741c018c"
  },
  {
    "author": "韓翃",
    "paragraphs": [
      "仙臺下見五城樓，風物淒淒宿雨收。",
      "山色遙連秦樹晚，砧聲近報漢宮秋。",
      "疎松影落空壇靜，細草香閑小洞幽。",
      "何用別尋方外去，人間亦自有丹丘。"
    ],
    "tags": [
      "唐诗三百首",
      "向往",
      "七言律诗",
      "游历"
    ],
    "title": "同題仙游觀",
    "id": "b411ce1e-ac09-4427-ab32-f8dc7a57e566"
  },
  {
    "author": "韓翃",
    "paragraphs": [
      "春城無處不飛花，寒食東風御柳斜。",
      "日暮漢宮傳蠟燭，輕煙散入五侯家。"
    ],
    "tags": [
      "唐诗三百首",
      "清明",
      "寒食节",
      "典故",
      "七言绝句",
      "讽刺"
    ],
    "title": "寒食",
    "id": "77ac62ee-6396-4ac0-a3ab-cb84ba2e5cd0"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "去年花裏逢君別，今日花開已一年。",
      "世事茫茫難自料，春愁黯黯獨成眠。",
      "身多疾病思田里，邑有流亡愧俸錢。",
      "聞道欲來相問訊，西樓望月幾廻圓。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "友人",
      "忧国忧民",
      "七言律诗"
    ],
    "title": "寄李儋元錫",
    "id": "8435b46d-bbf1-49e5-af66-6f2d5681f1bf"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "今朝郡齋冷，忽念山中客。",
      "澗底束荆薪，歸來煮白石。",
      "欲持一瓢酒，遠慰風雨夕。",
      "落葉滿空山，何處尋行跡。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "怀念"
    ],
    "title": "寄全椒山中道士",
    "id": "46503396-3bb3-449c-9c84-f2ff232f7949"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "懷君屬秋夜，散步詠涼天。",
      "山空松子落，幽人應未眠。"
    ],
    "tags": [
      "唐诗三百首",
      "秋天",
      "怀人",
      "五言绝句"
    ],
    "title": "秋夜寄丘二十二員外",
    "id": "96455db1-a0c6-402c-8892-05c6b9a3d029"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "楚江微雨裏，建業暮鐘時。",
      "漠漠帆來重，冥冥鳥去遲。",
      "海門深不見，浦樹遠含滋。",
      "相送情無限，沾襟比散絲。"
    ],
    "tags": [
      "唐诗三百首",
      "写雨",
      "友情",
      "送别",
      "五言律诗",
      "雨"
    ],
    "title": "賦得暮雨送李胄",
    "id": "83dcb67c-ccbc-4592-b232-368a6b5275ce"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "永日方慼慼，出門復悠悠。",
      "女子今有行，大江泝輕舟。",
      "爾輩況無恃，撫念益慈柔。",
      "幼爲長所育，兩別泣不休。",
      "對此結中腸，義往難復留。",
      "自小闕內訓，事姑貽我憂。",
      "賴茲託令門，仁恤庶無尤。",
      "貧儉誠所尚，資從豈待周。",
      "孝恭遵婦道，容止順其猷。",
      "別離在今晨，見爾當何秋。",
      "居閑始自遣，臨感忽難收。",
      "歸來視幼女，零淚緣纓流。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "感伤",
      "五言古诗"
    ],
    "title": "送楊氏女",
    "id": "f800050a-d7a0-4f12-a614-17fe23df8f41"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "客從東方來，衣上灞陵雨。",
      "問客何爲來，采山因買斧。",
      "冥冥花正開，颺颺燕新乳。",
      "昨別今已春，鬢絲生幾縷。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "同情",
      "抒情",
      "五言古诗"
    ],
    "title": "長安遇馮著",
    "id": "b8ae44b3-ba8d-42d3-85a7-a70aa8608379"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "落帆逗淮鎮，停舫臨孤驛。",
      "浩浩風起波，冥冥日沈夕。",
      "人歸山郭暗，雁下蘆洲白。",
      "獨夜憶秦關，聽鐘未眠客。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "写景",
      "抒情",
      "思乡"
    ],
    "title": "夕次盱眙縣",
    "id": "11424603-9a22-4564-89a4-95e1766f9685"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "吏舍跼終年，出郊曠清曙。",
      "楊柳散和風，青山澹吾慮。",
      "依叢適自憩，緣澗還復去。",
      "微雨靄芳原，春鳩鳴何處？樂幽心屢止，遵事跡猶遽。",
      "終罷斯結廬，慕陶真可庶。"
    ],
    "tags": [
      "唐诗三百首",
      "春天",
      "生活"
    ],
    "title": "東郊",
    "id": "3e0e1d96-c249-47c4-b16d-4d91dd6e7cce"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "獨憐幽草澗邊生，上有黃鸝深樹鳴。",
      "春潮帶雨晚來急，野渡無人舟自橫。"
    ],
    "tags": [
      "唐诗三百首",
      "春",
      "山水",
      "写景",
      "抒情",
      "初中古诗",
      "七言绝句",
      "水",
      "七年级下册(课外)"
    ],
    "title": "滁州西澗",
    "id": "0ae0e3bd-a32e-481f-9719-b283da2da964"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "獨有宦遊人，偏驚物候新。",
      "雲霞出海曙，梅柳渡江春。",
      "淑氣催黃鳥，晴光照綠蘋。",
      "忽聞歌苦調，歸思欲霑巾。"
    ],
    "tags": [
      "春天",
      "唐诗三百首",
      "伤怀",
      "和诗",
      "思乡",
      "五言律诗"
    ],
    "title": "和晉陵陸丞早春遊望",
    "id": "b67ddf05-43fb-4859-a1a9-34f95d45aabf"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "塔勢如湧出，孤高聳天宮。",
      "登臨出世界，磴道盤虛空。",
      "突兀壓神州，崢嶸如鬼工。",
      "四角礙白日，七層摩蒼穹。",
      "下窺指高鳥，俯聽聞驚風。",
      "連山若波濤，奔湊似朝東。",
      "青槐夾馳道，宮館何玲瓏。",
      "秋色從西來，蒼然滿關中。",
      "五陵北原上，萬古青濛濛。",
      "淨理了可悟，勝因夙所宗。",
      "誓將挂冠去，覺道資無窮。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "景点",
      "写景",
      "忧思",
      "写塔"
    ],
    "title": "與高適薛據慈恩寺浮圖",
    "id": "93d82a12-5e4d-45c2-b837-d0c54447fba3"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "北風捲地白草折，胡天八月即飛雪。",
      "忽然一夜春風來，千樹萬樹梨花開。",
      "散入珠簾濕羅幕，狐裘不煖錦衾薄。",
      "將軍角弓不得控，都護鐵衣冷難着。",
      "瀚海闌干百丈冰，愁雲黲淡萬里凝。",
      "中軍置酒飲歸客，胡琴琵琶與羌笛。",
      "紛紛暮雪下轅門，風掣紅旗凍不翻。",
      "輪臺東門送君去，去時雪滿天山路。",
      "山迴路轉不見君，雪上空留馬行處。"
    ],
    "tags": [
      "唐诗三百首",
      "写雪",
      "友情",
      "咏物",
      "八年级下册(课内)",
      "送别",
      "雪",
      "初中古诗",
      "冬天",
      "山",
      "七言古诗",
      "咏物诗"
    ],
    "title": "白雪歌送武判官歸京",
    "id": "294bc7b2-b4f8-4a53-be17-a40ded4afd1a"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "輪臺城頭夜吹角，輪臺城北旄頭落。",
      "羽書昨夜過渠黎，單于已在金山西。",
      "戍樓西望煙塵黑，漢兵屯在輪臺北。",
      "上將擁旄西出征，平明吹笛大軍行。",
      "四邊伐鼓雪海湧，三軍大呼陰山動。",
      "虜塞兵氣連雲屯，戰場白骨纏草根。",
      "劒河風急雪片闊，沙口石凍馬蹄脫。",
      "亞相勤王甘苦辛，誓將報主靜邊塵。",
      "古來青史誰不見，今見功名勝古人。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "生活",
      "七言古诗",
      "赞扬",
      "边塞",
      "将士"
    ],
    "title": "輪臺歌奉送封大夫出師西征",
    "id": "d129dc0f-cec9-4073-bb89-cb9312564d9d"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "君不見走馬川行雪海邊，平沙莽莽黃入天。",
      "輪臺九月風夜吼，一川碎石大如斗，隨風滿地石亂走。",
      "匈奴草黃馬正肥，金山西見煙塵飛。",
      "漢家大將西出師，將軍金甲夜不脫。",
      "半夜軍行戈相撥，風頭如刀面如割。",
      "馬毛帶雪汗氣蒸，五花連錢旋作冰。",
      "幕中草檄硯水凝，虜騎聞之應膽懾。",
      "料知短兵不敢接，車師西門佇獻捷。"
    ],
    "tags": [
      "唐诗三百首",
      "写马",
      "写风",
      "送别",
      "初中古诗",
      "七言古诗",
      "九年级下册(课外)",
      "风",
      "边塞",
      "赞美",
      "马",
      "将士"
    ],
    "title": "走馬川行奉送出師西征",
    "id": "f5e021d7-ea56-4341-947c-8fd024018e1c"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "聯步趨丹陛，分曹限紫微。",
      "曉隨天仗入，暮惹御香歸。",
      "白髮悲花落，青雲羨鳥飛。",
      "聖朝無闕事，自覺諫書稀。"
    ],
    "tags": [
      "唐诗三百首",
      "仕途",
      "五言律诗",
      "感慨"
    ],
    "title": "寄左省杜拾遺",
    "id": "2779f710-4ab4-46cb-a2b6-1889752f26c2"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "雞鳴紫陌曙光寒，鶯囀皇州春色闌。",
      "金闕曉鐘開萬戶，玉階仙仗擁千官。",
      "花迎劒珮星初落，柳拂旌旗露未乾。",
      "獨有鳳皇池上客，陽春一曲和皆難。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "唱和"
    ],
    "title": "奉和中書舍人賈至早朝大明宮",
    "id": "8df8e94b-ffe4-4930-af4c-491d7cb04651"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "故園東望路漫漫，雙袖龍鍾淚不乾。",
      "馬上相逢無紙筆，憑君傳語報平安。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "边塞",
      "初中古诗",
      "七言绝句",
      "思乡",
      "七年级下册(课外)"
    ],
    "title": "逢入京使",
    "id": "07238ad9-c348-43d4-b1d7-25d89369286d"
  },
  {
    "author": "孫革",
    "paragraphs": [
      "松下問童子，言師採藥去。",
      "只在此山中，雲深不知處。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "写人",
      "寻访"
    ],
    "title": "訪羊尊師",
    "id": "162eb552-a496-4979-87e2-e441847d4e6f"
  },
  {
    "author": "張喬",
    "paragraphs": [
      "調角斷清秋，征人倚戍樓。",
      "春風對青塚，白日落梁州。",
      "大漢無兵阻，窮邊有客遊。",
      "蕃情似此水，長願向南流。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "五言律诗",
      "边塞"
    ],
    "title": "書邊事",
    "id": "8324db66-b75a-40ff-9469-cba276d2f88f"
  },
  {
    "author": "李白",
    "paragraphs": [
      "金樽清酒斗十千，玉盤珍羞直萬錢。",
      "停杯投筯不能食，拔劒四顧心茫然。",
      "欲渡黃河冰塞川，將登太行雪滿山。",
      "閑來垂釣碧溪上，忽復乘舟夢日邊。",
      "行路難，行路難，多岐路，今安在。",
      "長風破浪會有時，直挂雲帆濟滄海。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "励志",
      "友情",
      "八年级下册(课内)",
      "初中古诗",
      "乐府",
      "宴饮",
      "哲理",
      "怀才不遇"
    ],
    "title": "行路難三首 一",
    "id": "c348bc2e-f50d-436b-88b7-c198d63dacfc"
  },
  {
    "author": "李白",
    "paragraphs": [
      "大道如青天，我獨不得出。",
      "羞逐長安社中兒，赤雞白狗賭梨栗。",
      "彈劒作歌奏苦聲，曳裾王門不稱情。",
      "淮陰市井笑韓信，漢朝公卿忌賈生。",
      "君不見昔時燕家重郭隗，擁篲折節無嫌猜。",
      "劇辛樂毅感恩分，輸肝剖膽效英才。",
      "昭王白骨縈爛草，誰人更掃黃金臺。",
      "行路難，歸去來。"
    ],
    "tags": [
      "乐府",
      "失意",
      "叹息",
      "唐诗三百首"
    ],
    "title": "行路難三首 二",
    "id": "801c3192-8001-4238-8ecf-0111f490e84c"
  },
  {
    "author": "李白",
    "paragraphs": [
      "有耳莫洗潁川水，有口莫食首陽蕨。",
      "含光混世貴無名，何用孤高比雲月。",
      "吾觀自古賢達人，功成不退皆殞身。",
      "子胥既棄吳江上，屈原終投湘水濱。",
      "陸機雄才豈自保，李斯稅駕苦不早。",
      "華亭鶴唳詎可聞，上蔡蒼鷹何足道。",
      "君不見吳中張翰稱達生，秋風忽憶江東行。",
      "且樂生前一杯酒，何須身後千載名。"
    ],
    "tags": [
      "人生",
      "唐诗三百首",
      "乐府",
      "态度"
    ],
    "title": "行路難三首 三",
    "id": "a7b8e17f-ee93-4bdc-a144-b1ba5ab32bb5"
  },
  {
    "author": "李白",
    "paragraphs": [
      "長相思，在長安，絡緯秋啼金井闌。",
      "微霜淒淒簟色寒，孤燈不明思欲絕。",
      "卷帷望月空長歎，美人如花隔雲端。",
      "上有青冥之長天，下有淥水之波瀾。",
      "天長路遠魂飛苦，夢魂不到關山難。",
      "長相思，摧心肝。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "杂曲歌辞",
      "乐府",
      "伤怀"
    ],
    "title": "長相思",
    "id": "3c1693fc-f4e6-43b7-a66f-6379c3a26eef"
  },
  {
    "author": "李白",
    "paragraphs": [
      "明月出天山，蒼茫雲海間。",
      "長風幾萬里，吹度玉門關。",
      "漢下白登道，胡窺青海灣。",
      "由來征戰地，不見有人還。",
      "[戍]客望邊色，思歸多苦顏。",
      "高樓當此夜，歎息未應閑。"
    ],
    "tags": [
      "中秋",
      "唐诗三百首",
      "边塞",
      "山",
      "思乡",
      "乐府",
      "描写山",
      "写山",
      "征人"
    ],
    "title": "關山月",
    "id": "4be77185-992e-4614-9746-de2e73c8a3c3"
  },
  {
    "author": "李白",
    "paragraphs": [
      "玉階生白露，夜久侵羅襪。",
      "却下水晶簾，玲瓏望秋月。"
    ],
    "tags": [
      "孤独",
      "宫怨",
      "唐诗三百首",
      "乐府"
    ],
    "title": "玉階怨",
    "id": "a65e5646-14b1-4f75-924b-bbf262b242d7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "雲想衣裳花想容，春風拂檻露華濃。",
      "若非羣玉山頭見，會向瑤臺月下逢。"
    ],
    "tags": [
      "女子",
      "唐诗三百首",
      "乐府",
      "赞美",
      "近代曲辞"
    ],
    "title": "清平調詞三首 一",
    "id": "948fa40a-492e-4fa1-99f4-b002ae87cd24"
  },
  {
    "author": "李白",
    "paragraphs": [
      "一枝穠豔露凝香，雲雨巫山枉斷腸。",
      "借問漢宮誰得似，可憐飛燕倚新妝。"
    ],
    "tags": [
      "女子",
      "近代曲辞",
      "唐诗三百首",
      "乐府"
    ],
    "title": "清平調詞三首 二",
    "id": "99167d13-8e2c-4b75-bf93-62b0682dfdd0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "牀前看月光，疑是地上霜。",
      "舉頭望山月，低頭思故鄉。"
    ],
    "tags": [
      "唐诗三百首",
      "新乐府辞",
      "思乡",
      "中秋",
      "一年级上册",
      "月亮",
      "五言绝句",
      "小学古诗"
    ],
    "title": "靜夜思",
    "id": "ca2c489a-e433-4c0f-8248-77d354f0665e"
  },
  {
    "author": "李白",
    "paragraphs": [
      "燕草如碧絲，秦桑低綠枝。",
      "當君懷歸日，是妾斷腸時。",
      "春風不相識，何事入羅幃。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "五言古诗",
      "春天",
      "坚贞",
      "妇女"
    ],
    "title": "春思",
    "id": "7277c420-9f3f-4093-a5b2-6331494721e8"
  },
  {
    "author": "李白",
    "paragraphs": [
      "秦地羅敷女，採桑綠水邊。",
      "素手青條上，紅妝白日鮮。",
      "蠶飢妾欲去，五馬莫留連。"
    ],
    "tags": [
      "唐诗三百首",
      "清商曲辞",
      "春天",
      "女子",
      "乐府",
      "赞美"
    ],
    "title": "子夜吳歌 春歌",
    "id": "57203d7f-380c-4052-b21b-d1ea79fbe231"
  },
  {
    "author": "李白",
    "paragraphs": [
      "鏡湖三百里，菡萏發荷花。",
      "五月西施採，人看隘若耶。",
      "回舟不待月，歸去越王家。"
    ],
    "tags": [
      "清商曲辞",
      "夏天",
      "唐诗三百首",
      "乐府",
      "哲理",
      "写人",
      "荷花"
    ],
    "title": "子夜吳歌 夏歌",
    "id": "abb3e465-f10e-43dd-b564-a5de08010478"
  },
  {
    "author": "李白",
    "paragraphs": [
      "長安一片月，萬戶擣衣聲。",
      "秋風吹不盡，總是玉關情。",
      "何日平胡虜，良人罷遠征。"
    ],
    "tags": [
      "思念",
      "清商曲辞",
      "妇女",
      "秋天",
      "唐诗三百首",
      "乐府",
      "月亮",
      "闺怨"
    ],
    "title": "子夜吳歌 秋歌",
    "id": "baccf46a-41c4-4a0f-b90f-37cc35b04a64"
  },
  {
    "author": "李白",
    "paragraphs": [
      "明朝驛使發，一夜絮征袍。",
      "素手抽針冷，那堪把剪刀。",
      "裁縫寄遠道，幾日到臨洮。"
    ],
    "tags": [
      "思念",
      "清商曲辞",
      "妇女",
      "冬天",
      "唐诗三百首",
      "乐府"
    ],
    "title": "子夜吳歌 冬歌",
    "id": "f990af2e-d929-48da-a9b3-fdbc706ca4a3"
  },
  {
    "author": "李白",
    "paragraphs": [
      "吾愛孟夫子，風流天下聞。",
      "紅顏棄軒冕，白首臥松雲。",
      "醉月頻中聖，迷花不事君。",
      "高山安可仰，徒此揖清芬。"
    ],
    "tags": [
      "唐诗三百首",
      "赠别",
      "五言律诗",
      "敬爱"
    ],
    "title": "贈孟浩然",
    "id": "9d1b6a18-571c-4f25-bfdb-3fe260115c3f"
  },
  {
    "author": "李白",
    "paragraphs": [
      "我本楚狂人，鳳歌笑孔丘。",
      "手持綠玉杖，朝別黃鶴樓。",
      "五嶽尋仙不辭遠，一生好入名山遊。",
      "廬山秀出南斗傍，屏風九疊雲錦張，影落明湖青黛光。",
      "金闕前開二峰長，銀河倒挂三石梁。",
      "香爐瀑布遙相望，迴厓沓嶂凌蒼蒼。",
      "翠影紅霞映朝日，鳥飛不到吳天長。",
      "登高壯觀天地間，大江茫茫去不還。",
      "黃雲萬里動風色，白波九道流雪山。",
      "好爲廬山謠，興因廬山發。",
      "閑窺石鏡清我心，謝公行處蒼苔沒。",
      "早服還丹無世情，琴心三疊道初成。",
      "遙見仙人綵雲裏，手把芙蓉朝玉京。",
      "先期汗漫九垓上，願接盧敖遊太清。"
    ],
    "tags": [
      "唐诗三百首",
      "庐山",
      "黄鹤楼",
      "写景",
      "归隐",
      "七言古诗",
      "山水"
    ],
    "title": "廬山謠寄盧侍御虛舟",
    "id": "4e491c2f-c3c8-487f-8e76-63bd0a811b30"
  },
  {
    "author": "李白",
    "paragraphs": [
      "海客談瀛洲，煙濤微茫信難求。",
      "越人語天姥，雲霓明滅或可覩。",
      "天姥連天向天橫，勢拔五嶽掩赤城。",
      "天台四萬八千丈，對此欲倒東南傾。",
      "我欲因之夢吳越，一夜飛度鏡湖月。",
      "湖月照我影，送我至剡溪。",
      "謝公宿處今尚在，淥水蕩漾清猨啼。",
      "脚著謝公屐，身登青雲梯。",
      "半壁見海日，空中聞天雞。",
      "千巖萬轉路不定，迷花倚石忽已暝。",
      "熊咆龍吟殷巖泉，慄深林兮驚層巔。",
      "雲青青兮欲雨，水澹澹兮生煙。",
      "列缺霹靂，丘巒崩摧。",
      "洞天石扇，訇然中開。",
      "青冥浩蕩不見底，日月照耀金銀臺。",
      "霓爲衣兮風爲馬，雲之君兮紛紛而來下。",
      "虎鼓瑟兮鸞迴車，仙之人兮列如麻。",
      "忽魂悸以魄動，怳驚起而長嗟。",
      "惟覺時之枕席，失向來之煙霞。",
      "世間行樂亦如此，古來萬事東流水。",
      "別君去時何時還，且放白鹿青崖間，須行即騎訪名山。",
      "安能摧眉折腰事權貴？使我不得開心顏。"
    ],
    "tags": [
      "唐诗三百首",
      "一年级下册",
      "七言古诗",
      "高中古诗",
      "记梦",
      "古体"
    ],
    "title": "夢遊天姥吟留別",
    "id": "606d0bd8-31d2-4a7a-97ee-341956e7be60"
  },
  {
    "author": "李白",
    "paragraphs": [
      "風吹柳花滿店香，吳姬壓酒喚客嘗。",
      "金陵子弟來相送，欲行不行各盡觴。",
      "請君試問東流水，別意與之誰短長。"
    ],
    "tags": [
      "唐诗三百首",
      "七言古诗",
      "离别",
      "饮酒"
    ],
    "title": "金陵酒肆留別",
    "id": "809ad73b-9a8e-436e-9874-f9295b624af0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "故人西辭黃鶴樓，煙花三月下揚州。",
      "孤帆遠影碧山盡，唯見長江天際流。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "黄鹤楼",
      "离别",
      "带有地名",
      "小学古诗",
      "地名",
      "描写水",
      "友情",
      "写景",
      "送别",
      "七言绝句",
      "水",
      "名楼、庙宇",
      "写水",
      "四年级上册"
    ],
    "title": "黃鶴樓送孟浩然之廣陵",
    "id": "d43a4767-2240-44b7-8d5b-c2acdc689839"
  },
  {
    "author": "李白",
    "paragraphs": [
      "渡遠荆門外，來從楚國遊。",
      "山隨平野盡，江入大荒流。",
      "月下飛天鏡，雲生結海樓。",
      "仍連故鄉水，萬里送行舟。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "送别",
      "五言律诗",
      "初中古诗",
      "八年级上册(课内)",
      "思乡"
    ],
    "title": "渡荆門送別",
    "id": "bf8918b8-a05a-4ccf-bb2e-3f9b81f6bbfc"
  },
  {
    "author": "李白",
    "paragraphs": [
      "青山橫北郭，白水遶東城。",
      "此地一爲別，孤蓬萬里征。",
      "浮雲遊子意，落日故人情。",
      "揮手自茲去，蕭蕭班馬鳴。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级上册(课外)",
      "友情",
      "写景",
      "送别",
      "五言律诗",
      "初中古诗",
      "惜别"
    ],
    "title": "送友人",
    "id": "1f83fccf-7476-464b-8cd4-8a2b4569c7a0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "棄我去者昨日之日不可留，亂我心者今日之日多煩憂。",
      "長風萬里送秋雁，對此可以酣高樓。",
      "蓬萊文章建安骨，中間小謝又清發。",
      "俱懷逸興壯思飛，欲上青天覽日月。",
      "抽刀斷水水更流，舉杯銷愁愁更愁。",
      "人生在世不稱意，明朝散髮弄扁舟。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级下册(课外)",
      "七言古诗",
      "初中古诗",
      "哲理",
      "离别",
      "抒怀",
      "水",
      "豪迈"
    ],
    "title": "宣州謝朓樓餞別校書叔雲",
    "id": "5593d522-b820-4c06-bab6-0ab5a0fc1d46"
  },
  {
    "author": "李白",
    "paragraphs": [
      "暮從碧山下，山月隨人歸。",
      "却顧所來徑，蒼蒼橫翠微。",
      "相攜及田家，童稚開荆扉。",
      "綠竹入幽徑，青蘿拂行衣。",
      "歡言得所憩，美酒聊共揮。",
      "長歌吟松風，曲盡河星稀。",
      "我醉君復樂，陶然共忘機。"
    ],
    "tags": [
      "唐诗三百首",

    ],
    "title": "下終南山過斛斯山人宿置酒",
    "id": "ca4cc6b3-a324-48c0-89c0-bb36c09c4930"
  },
  {
    "author": "李白",
    "paragraphs": [
      "鳳凰臺上鳳凰遊，鳳去臺空江自流。",
      "吳宮花草埋幽徑，晉代衣冠成古丘。",
      "三山半落青天外，二水中分白鷺洲。",
      "總爲浮雲能蔽日，長安不見使人愁。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "一年级下册",
      "高中古诗",
      "咏史怀古"
    ],
    "title": "登金陵鳳凰臺",
    "id": "4af86c76-18b3-4069-be90-6d8cef430bc7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "朝辭白帝彩雲間，千里江陵一日還。",
      "兩岸猨聲啼不盡，輕舟已過萬重山。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
