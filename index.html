      "喜悦",
      "七言绝句",
      "描写山",
      "写山",
      "带有地名",
      "地名"
    ],
    "title": "早發白帝城",
    "id": "9525f99d-39cb-4d04-8650-263493d223e0"
  },
  {
    "author": "李白",
    "paragraphs": [
      "牛渚西江夜，青天無片雲。",
      "登舟望秋月，空憶謝將軍。",
      "余亦能高詠，斯人不可聞。",
      "明朝挂帆席，楓葉落紛紛。"
    ],
    "tags": [
      "唐诗三百首",
      "怀古",
      "五言律诗",
      "月亮"
    ],
    "title": "夜泊牛渚懷古",
    "id": "7e1be9c9-fa2f-44c2-a6bc-3edcece745fe"
  },
  {
    "author": "李白",
    "paragraphs": [
      "花間一壺酒，獨酌無相親。",
      "舉杯邀明月，對影成三人。",
      "月既不解飲，影徒隨我身。",
      "暫伴月將影，行樂須及春。",
      "我歌月裴回，我舞影零亂。",
      "醒時同交歡，醉後各分散。",
      "永結無情遊，相期邈雲漢。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "五言古诗",
      "景中情",
      "抒情",
      "中秋",
      "初中古诗",
      "月下",
      "饮酒",
      "九年级下册(课外)"
    ],
    "title": "月下獨酌四首 一",
    "id": "83e70b6e-ff59-4a3b-8e81-249ab0cda0c3"
  },
  {
    "author": "李白",
    "paragraphs": [
      "蜀僧抱綠綺，西下峨眉峰。",
      "爲我一揮手，如聽萬壑松。",
      "客心洗流水，餘響入霜鐘。",
      "不覺碧山暮，秋雲暗幾重。"
    ],
    "tags": [
      "唐诗三百首",
      "音乐",
      "五言律诗"
    ],
    "title": "聽蜀僧濬彈琴",
    "id": "71999aa1-55dd-4449-81b0-41f04686bf2e"
  },
  {
    "author": "李白",
    "paragraphs": [
      "美人捲珠簾，深坐顰蛾眉。",
      "但見淚痕濕，不知心恨誰。"
    ],
    "tags": [
      "唐诗三百首",
      "五言绝句",
      "女子"
    ],
    "title": "怨情",
    "id": "22e72306-f41c-4621-a925-83bab7f9d76e"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "江漢曾爲客，相逢每醉還。",
      "浮雲一別後，流水十年間。",
      "歡笑情如舊，蕭疎鬢已斑。",
      "何因北歸去，淮上對秋山。"
    ],
    "tags": [
      "唐诗三百首",
      "友情",
      "五言律诗"
    ],
    "title": "淮上喜會梁川故人",
    "id": "a68013c8-4630-41c6-a5ee-a658b57f58fe"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "兵衛森畫戟，宴寢凝清香。",
      "海上風雨至，逍遙池閣涼。",
      "煩疴近消散，嘉賓復滿堂。",
      "自慙居處崇，未覩斯民康。",
      "理會是非遣，性達形迹忘。",
      "鮮肥屬時禁，蔬果幸見嘗。",
      "俯飲一杯酒，仰聆金玉章。",
      "神歡體自輕，意欲凌風翔。",
      "吳中盛文史，羣彥今汪洋。",
      "方知大藩地，豈曰財賦疆。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "宴会"
    ],
    "title": "郡齋雨中與諸文士燕集",
    "id": "9f5ded08-4f6f-4641-878e-897904483479"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "悽悽去親愛，泛泛入煙霧。",
      "歸棹洛陽人，殘鐘廣陵樹。",
      "今朝此爲別，何處還相遇。",
      "世事波上舟，沿洄安得住。"
    ],
    "tags": [
      "唐诗三百首",
      "离别",
      "五言古诗",
      "依恋"
    ],
    "title": "初發揚子寄元大校書",
    "id": "5b3a5651-2a80-4fb1-b1bf-c9fb5ec38905"
  },
  {
    "author": "李益",
    "paragraphs": [
      "嫁得瞿塘賈，朝朝誤妾期。",
      "早知潮有信，嫁與弄潮兒。"
    ],
    "tags": [
      "唐诗三百首",
      "闺怨",
      "乐府"
    ],
    "title": "相和歌辭 江南曲",
    "id": "bb111748-d8f1-4a5e-b618-b70272a7a642"
  },
  {
    "author": "高適",
    "paragraphs": [
      "漢家煙塵在東北，漢將辭家破殘賊。",
      "男兒本自重橫行，天子非常賜顏色。",
      "摐金伐鼓下榆關，旌旗逶迤碣石間。",
      "校尉羽書飛瀚海，單于獵火照狼山。",
      "山川蕭條極邊土，胡騎憑凌雜風雨。",
      "戰士軍前半死生，美人帳下猶歌舞。",
      "大漠窮秋塞草衰，孤城落日鬬兵稀。",
      "身當恩遇常輕敵，力盡關山未解圍。",
      "鐵衣遠戍辛勤久，玉箸應啼別離後。",
      "少婦城南欲斷腸，征人薊北空回首。",
      "邊風飄飄那可度，絕域蒼茫更何有。",
      "殺氣三日作陣雲，寒聲一夜傳刁斗。",
      "相看白刃血紛紛，死節從來豈顧勳。",
      "君不見沙場征戰苦，至今猶憶李將軍。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "相和歌辭 燕歌行",
    "id": "09788f19-1e11-4394-a543-0edf2cfdcae9"
  },
  {
    "author": "李頎",
    "paragraphs": [
      "白日登山望烽火，昏黃飲馬傍交河。",
      "行人刁斗風砂暗，公主琵琶幽怨多。",
      "野營萬里無城郭，雨雪紛紛連大漠。",
      "胡雁哀鳴夜夜飛，胡兒眼淚雙雙落。",
      "聞道玉門猶被遮，應將性命逐輕車。",
      "年年戰骨埋荒外，空見蒲萄入漢家。"
    ],
    "tags": [
      "生活",
      "冬天",
      "唐诗三百首",
      "乐府",
      "边塞",
      "相和歌辞"
    ],
    "title": "相和歌辭 從軍行",
    "id": "0ed53ef4-30ca-41ac-a629-d778e5cc2bfa"
  },
  {
    "author": "李白",
    "paragraphs": [
      "噫吁嚱！危乎高哉！蜀道之難難於上青天！蠶叢及魚鳧，開國何茫然。",
      "爾來四萬八千歲，乃與秦塞通人煙。",
      "西當太白有鳥道，可以橫絕峨眉巔。",
      "地崩山摧壯士死，然後天梯石棧方鉤連。",
      "上有六龍迴日之高標，下有衝波逆折之迴川。",
      "黃鶴之飛尚不得，猨猱欲度愁攀緣。",
      "青泥何盤盤，百步九折縈巖巒。",
      "捫參歷井仰脅息，以手撫膺坐長歎。",
      "問君西遊何時還？畏途巉巖不可攀。",
      "但見悲鳥號枯木，雄飛呼雌繞林間。",
      "又聞子規啼夜月，愁空山，蜀道之難難於上青天！使人聽此彫朱顏。",
      "連峰去天不盈尺，枯松倒挂倚絕壁。",
      "飛湍瀑流相喧豗，砅崖轉石萬壑雷。",
      "其嶮也若此，嗟爾遠道之人胡爲乎來哉？劒閣崢嶸而崔嵬，一夫當關，萬夫莫開。",
      "所守或匪親，化爲狼與豺。",
      "朝避猛虎，夕避長蛇。",
      "磨牙吮血，殺人如麻。",
      "錦城雖云樂，不如早還家。",
      "蜀道之難難於上青天，側身西望長咨嗟。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "抒情",
      "乐府",
      "相和歌辞"
    ],
    "title": "相和歌辭 蜀道難",
    "id": "e117d224-39ca-4eba-a047-0d36ce8b8c26"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "奉帚平明金殿開，暫將團扇共裴回。",
      "玉顏不及寒鵶色，猶帶昭陽日影來。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "相和歌辭 長信怨 二",
    "id": "1b6f2389-2d09-4d51-982a-e7efb35113c5"
  },
  {
    "author": "李白",
    "paragraphs": [
      "玉階生白露，夜久侵羅襪。",
      "却下水精簾，玲瓏望秋月。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "宫怨",
      "乐府"
    ],
    "title": "相和歌辭 玉階怨",
    "id": "f93545e7-747e-4d12-a6c8-e484c46b2860"
  },
  {
    "author": "李白",
    "paragraphs": [
      "秦地羅敷女，采桑綠水邊。",
      "素手青條上，紅妝白日鮮。",
      "蠶飢妾欲去，五馬莫留連。"
    ],
    "tags": [
      "清商曲辞",
      "春天",
      "女子",
      "唐诗三百首",
      "乐府",
      "赞美"
    ],
    "title": "相和歌辭 子夜四時歌四首 春歌",
    "id": "4e92a96d-aa74-4153-8314-b6df22d1e18a"
  },
  {
    "author": "李白",
    "paragraphs": [
      "鏡湖三百里，菡萏發荷花。",
      "五月西施采，人看隘若邪。",
      "迴舟不待月，歸去越王家。"
    ],
    "tags": [
      "唐诗三百首",
      "清商曲辞",
      "夏天",
      "乐府",
      "哲理",
      "写人",
      "荷花"
    ],
    "title": "相和歌辭 子夜四時歌四首 夏歌",
    "id": "4bd5be2b-5788-42c0-a300-9d106a73d46e"
  },
  {
    "author": "李白",
    "paragraphs": [
      "長安一片月，萬戶擣衣聲。",
      "秋風吹不盡，總是玉關情。",
      "何日平胡虜？良人罷遠征。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "清商曲辞",
      "妇女",
      "秋天",
      "乐府",
      "月亮",
      "闺怨"
    ],
    "title": "相和歌辭 子夜四時歌四首 秋歌",
    "id": "49194c4b-b775-4d21-a506-fc0a2ff308f1"
  },
  {
    "author": "李白",
    "paragraphs": [
      "明朝驛使發，一夜絮征袍。",
      "素手抽針冷，那堪把剪刀。",
      "裁縫寄遠道，幾日到臨洮。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "清商曲辞",
      "妇女",
      "冬天",
      "乐府"
    ],
    "title": "相和歌辭 子夜四時歌四首 冬歌",
    "id": "35319d7e-9cf6-43b0-bfa3-991cf82a49f9"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "梧桐相待老，鴛鴦會雙死。",
      "貞婦貴徇夫，舍生亦如此。",
      "波瀾誓不起，妾心井中水。"
    ],
    "tags": [
      "唐诗三百首",
      "赞颂",
      "妇女",
      "乐府"
    ],
    "title": "琴曲歌辭 列女操",
    "id": "7ccd9915-51a1-4748-9989-af243036455b"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "慈母手中線，遊子身上衣。",
      "臨行密密縫，意恐遲遲歸。",
      "誰言寸草心，報得三春暉。"
    ],
    "tags": [
      "唐诗三百首",
      "杂曲歌辞",
      "乐府",
      "母爱",
      "三年级下册",
      "赞颂"
    ],
    "title": "雜曲歌辭 遊子吟",
    "id": "22923091-18da-429d-9ef1-6b367fd74b1a"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "三月三日天氣新，長安水邊多麗人。",
      "態濃意遠淑且真，肌理細膩骨肉勻。",
      "繡羅衣裳照暮春，蹙金孔雀銀麒麟。",
      "頭上何所有？翠微㔩葉垂鬢脣。",
      "背後何所見？珠壓腰衱穩稱身。",
      "就中雲幕椒房親，賜名大國虢與秦。",
      "紫駞之峯出翠釜，水晶之盤行素鱗。",
      "犀筯厭飫久未下，鸞刀縷切空紛綸。",
      "黃門飛鞚不動塵，御廚絲絡送八珍。",
      "簫鼓哀吟感鬼神，賓從雜遝實要津。",
      "後來鞍馬何逡巡，當軒下馬入錦茵。",
      "楊花雪落覆白蘋，青鳥飛去銜紅巾。",
      "炙手可熱勢絕倫，慎莫近前丞相嗔。"
    ],
    "tags": [
      "唐诗三百首",
      "杂曲歌辞",
      "乐府",
      "讽刺",
      "咏叹"
    ],
    "title": "雜曲歌辭 麗人行",
    "id": "aaae5882-9b74-4b45-9bb5-9f773a721119"
  },
  {
    "author": "李白",
    "paragraphs": [
      "長相思，在長安，絡緯秋啼金井欄。",
      "微霜淒淒簟色寒，孤燈不明思欲絕。",
      "卷帷望月空長歎，美人如花隔雲端。",
      "上有青冥之長天，下有綠水之波瀾。",
      "天長路遠魂飛苦，夢魂不到關山難。",
      "長相思，摧心肝。"
    ],
    "tags": [
      "思念",
      "杂曲歌辞",
      "唐诗三百首",
      "乐府",
      "伤怀"
    ],
    "title": "雜曲歌辭 長相思三首 一",
    "id": "d4baf2d1-ea61-4fb3-a284-e889275bdca2"
  },
  {
    "author": "李白",
    "paragraphs": [
      "日色已盡花含煙，月明欲素愁不眠。",
      "趙瑟初停鳳凰柱，蜀琴欲奏鴛鴦弦。",
      "此曲有意無人傳，願隨春風寄燕然，憶君迢迢隔青天。",
      "昔日橫波目，今成流淚泉。",
      "不信妾腸斷，歸來看取明鏡前。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "乐府"
    ],
    "title": "雜曲歌辭 長相思三首 二",
    "id": "caa023cf-9f55-450c-9638-1cf5c0223cc1"
  },
  {
    "author": "李白",
    "paragraphs": [
      "金尊清酒斗十千，玉盤珍羞直萬錢。",
      "停杯投筯不能食，拔劒四顧心茫然。",
      "欲渡黃河冰塞川，將登太行雪暗天。",
      "閑來垂釣坐溪上，忽復乘舟夢日邊。",
      "行路難，行路難，多岐路，今安在？長風破浪會有時，直挂雲帆濟滄海。"
    ],
    "tags": [
      "黄河",
      "励志",
      "友情",
      "八年级下册(课内)",
      "初中古诗",
      "乐府",
      "唐诗三百首",
      "宴饮",
      "哲理",
      "怀才不遇"
    ],
    "title": "雜曲歌辭 行路難三首 一",
    "id": "527eba4b-b35c-4d29-99e7-8f40c6f3d5b7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "大道如青天，我獨不得出。",
      "羞逐長安社中兒，赤雞白狗賭梨栗。",
      "彈劒作歌奏苦聲，曳裾王門不稱情。",
      "淮陰市井笑韓信，漢朝公卿忌賈生。",
      "君不見昔時燕家重郭隗，擁篲折腰無嫌猜。",
      "劇辛樂毅感恩分，輸肝剖膽效英才。",
      "昭王白骨縈蔓草，誰人更掃黃金臺。",
      "行路難，歸去來。"
    ],
    "tags": [
      "唐诗三百首",
      "乐府",
      "失意",
      "叹息"
    ],
    "title": "雜曲歌辭 行路難三首 二",
    "id": "e12edd83-36cd-4e8a-a630-91874631c51f"
  },
  {
    "author": "李白",
    "paragraphs": [
      "有耳莫洗潁川水，有口莫食首陽蕨。",
      "含光混世貴無名，何用孤高比雲月。",
      "吾觀自古賢達人，功成不退皆殞身。",
      "子胥既棄吳江上，屈原終投湘水濱。",
      "陸機才多豈自保，李斯稅駕苦不早。",
      "華亭鶴唳詎可聞，上蔡蒼鷹何足道？君不見吳中張翰稱達士，秋風忽憶江東行。",
      "且樂生前一杯酒，何須身後千載名。"
    ],
    "tags": [
      "唐诗三百首",
      "人生",
      "乐府",
      "态度"
    ],
    "title": "雜曲歌辭 行路難三首 三",
    "id": "b4f9c5b3-0108-4127-bf3e-73fd207176f3"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "君家定何處？妾住在橫塘。",
      "停舟暫借問，或恐是同鄉。"
    ],
    "tags": [
      "孤独",
      "女子",
      "思乡",
      "唐诗三百首",
      "乐府"
    ],
    "title": "雜曲歌辭 長干曲四首 一",
    "id": "4bef9a5e-f4a1-44bd-a78c-cb0fe38ccdff"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "家臨九江水，去來九江側。",
      "同是長干人，生小不相識。"
    ],
    "tags": [
      "家乡",
      "女子",
      "热爱",
      "唐诗三百首",
      "乐府"
    ],
    "title": "雜曲歌辭 長干曲四首 二",
    "id": "8d480633-1876-4082-aaca-a7b3a26c04d7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "妾髮初覆額，折花門前劇。",
      "郎騎竹馬來，遶牀弄青梅。",
      "同居長干里，兩小無嫌猜。",
      "十四爲君婦，羞顏尚不開。",
      "低頭向暗壁，千喚不一迴。",
      "十五始展眉，願同塵與灰。",
      "常存抱柱信，豈上望夫臺。",
      "十六君遠行，瞿塘灩預堆。",
      "五月不可觸，猨鳴天上哀。",
      "門前遲行跡，一一生綠苔。",
      "苔深不能掃，落葉秋風早。",
      "八月蝴蝶來，雙飛西園草。",
      "感此傷妾心，坐愁紅顏老。",
      "早晚下三巴，預將書報家。",
      "相迎不道遠，直至長風沙。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "雜曲歌辭 長干行二首 一",
    "id": "1352fbf1-2c3d-459c-b4ac-061e0c6befb8"
  },
  {
    "author": "沈佺期",
    "paragraphs": [
      "盧家小婦鬱金堂，海燕雙栖玳瑁梁。",
      "九月寒砧催下葉，十年征戍憶遼陽。",
      "白狼河北音書斷，丹鳳城南秋夜長。",
      "誰知含愁獨不見，使妾明月照流黃。"
    ],
    "tags": [
      "思念",
      "闺怨",
      "唐诗三百首",
      "乐府"
    ],
    "title": "雜曲歌辭 獨不見",
    "id": "15079155-e95e-4abc-b36e-f6b605848f37"
  },
  {
    "author": "王涯",
    "paragraphs": [
      "桂魄初生秋露微，輕羅已薄未更衣。",
      "銀箏夜久殷勤弄，心怯空房不忍歸。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "秋天",
      "女子",
      "乐府"
    ],
    "title": "雜曲歌辭 秋夜曲",
    "id": "1f66d2ec-8418-485e-a434-e21a0d439dda"
  },
  {
    "author": "皇甫冉",
    "paragraphs": [
      "鶯啼燕語報新年，馬邑龍堆路幾千。",
      "家住秦城鄰漢苑，心隨明月到胡天。",
      "機中錦字論長恨，樓上花枝笑獨眠。",
      "爲問元戎竇車騎，何時反斾勒燕然。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "七言律诗",
      "春天",
      "妇女",
      "闺怨"
    ],
    "title": "春思",
    "id": "d35f583a-c20c-453c-a886-e13f98b2e4b4"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "更深月色半人家，北斗闌干南斗斜。",
      "今夜偏知春氣暖，蟲聲新透綠窗紗。"
    ],
    "tags": [
      "唐诗三百首",
      "月亮",
      "春天",
      "田园",
      "九年级上册(课外)",
      "中秋",
      "初中古诗",
      "七言绝句"
    ],
    "title": "夜月",
    "id": "79e7ec6e-0d6c-4f95-8181-4671c42e1faf"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "紗窗日落漸黃昏，金屋無人見淚痕。",
      "寂寞空庭春欲晚，梨花滿地不開門。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "七言绝句",
      "宫怨"
    ],
    "title": "春怨",
    "id": "fc1bc01d-c281-40fd-9e0d-4c484539e4ae"
  },
  {
    "author": "王之渙",
    "paragraphs": [
      "白日依山盡，黃河入海流。",
      "欲窮千里目，更上一層樓。"
    ],
    "tags": [
      "黄河",
      "山水",
      "励志",
      "唐诗三百首",
      "登楼",
      "写景",
      "哲理",
      "名楼、庙宇",
      "五言绝句"
    ],
    "title": "登鸛雀樓",
    "id": "63950163-6a10-4e74-af8a-09886e4ef2a8"
  },
  {
    "author": "王之渙",
    "paragraphs": [
      "黃河遠上白雲間，一片孤城萬仞山。",
      "羌笛何須怨楊柳，春光不度玉門關。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "山水",
      "写景",
      "乐府",
      "思乡",
      "边塞",
      "将士"
    ],
    "title": "涼州詞二首 一",
    "id": "526d4ecc-e123-4b9d-a213-958bb947593d"
  },
  {
    "author": "劉眘虛",
    "paragraphs": [
      "道由白雲盡，春與青溪長。",
      "時有落花至，遠隨流水香。",
      "閑門向山路，深柳讀書堂。",
      "幽映每白日，清輝照衣裳。"
    ],
    "tags": [
      "唐诗三百首",
      "春天",
      "写景",
      "五言律诗"
    ],
    "title": "闕題",
    "id": "a2b4fe60-9809-422d-afa7-143a2088f045"
  },
  {
    "author": "柳中庸",
    "paragraphs": [
      "歲歲金河復玉關，朝朝馬策與刀環。",
      "三春白雪歸青冢，萬里黃河遶黑山。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "边塞",
      "七言绝句"
    ],
    "title": "征怨",
    "id": "92dd65da-8301-4c83-b8f3-986b6095c481"
  },
  {
    "author": "嚴維",
    "paragraphs": [
      "故關衰草遍，離別正堪悲。",
      "路出寒雲外，人歸暮雪時。",
      "少孤爲客早，多難識君遲。",
      "揜泣空相向，風塵何所期。"
    ],
    "tags": [
      "唐诗三百首",
      "冬天",
      "友情",
      "送别",
      "五言律诗",
      "伤怀"
    ],
    "title": "送李端",
    "id": "67c18ea1-db49-44b5-8b21-6176e4a86416"
  },
  {
    "author": "顧況",
    "paragraphs": [
      "玉樓天半起笙歌，風送宮嬪笑語和。",
      "月殿影開聞夜漏，水精簾卷近銀河。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "宮詞五首 二",
    "id": "aa9f9e4d-aa34-496e-89cf-cfef61efa89d"
    },
