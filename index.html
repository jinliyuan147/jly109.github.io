  {
    "author": "陳子昂",
    "paragraphs": [
      "前不見古人，後不見來者。",
      "念天地之悠悠，獨愴然而涕下。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "八年级下册(课外)",
      "伤怀",
      "初中古诗",
      "七言古诗"
    ],
    "title": "登幽州臺歌",
    "id": "c244a5b4-0ed0-48fe-8694-95309acac184"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "青青河邊草，鬱鬱園中柳。",
      "盈盈樓上女，皎皎當窗牖。",
      "娥娥紅粉妝，纖纖出素手。",
      "昔為倡家女，今為蕩子婦。",
      "蕩子行不歸，空床難獨守。"
    ],
    "tags": [
      "汉乐府",
      "五言古诗",
      "闺怨",
      "思念"
    ],
    "title": "青青河邊草",
    "id": "f8d7b2c1-9e4f-5a7d-8c0e-1b3d5f7a9c0b"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "上邪！我欲與君相知，長命無絕衰。",
      "山無陵，江水為竭，冬雷震震，夏雨雪，天地合，乃敢與君絕！"
    ],
    "tags": [
      "汉乐府",
      "爱情",
      "抒情",
      "乐府"
    ],
    "title": "上邪",
    "id": "a7e5d9c2-3b1f-4d0e-8c7a-5f2b9d0e1c3a"
  },
  {
    "author": "曹操",
    "paragraphs": [
      "東臨碣石，以觀滄海。",
      "水何澹澹，山島竦峙。",
      "樹木叢生，百草豐茂。",
      "秋風蕭瑟，洪波湧起。",
      "日月之行，若出其中；",
      "星漢燦爛，若出其裡。",
      "幸甚至哉，歌以詠志。"
    ],
    "tags": [
      "三国",
      "乐府",
      "写景",
      "壮志",
      "四言诗"
    ],
    "title": "觀滄海",
    "id": "b9c3d1e5-7f2a-4c0d-9e8b-5a1d7f0c2e4a"
  },
  {
    "author": "曹操",
    "paragraphs": [
      "對酒當歌，人生幾何！",
      "譬如朝露，去日苦多。",
      "慨當以慷，憂思難忘。",
      "何以解憂？唯有杜康。",
      "青青子衿，悠悠我心。",
      "但為君故，沉吟至今。",
      "呦呦鹿鳴，食野之苹。",
      "我有嘉賓，鼓瑟吹笙。"
    ],
    "tags": [
      "三国",
      "乐府",
      "求贤",
      "抒情",
      "四言诗"
    ],
    "title": "短歌行",
    "id": "c1e5d7f9-2a4b-4c6d-8e0f-1b3d5f7a9c0b"
  },
  {
    "author": "曹植",
    "paragraphs": [
      "煮豆燃豆萁，豆在釜中泣。",
      "本是同根生，相煎何太急？"
    ],
    "tags": [
      "三国",
      "五言绝句",
      "劝谏",
      "亲情"
    ],
    "title": "七步詩",
    "id": "d3f7b9c1-4e5a-6c7d-8e9f-0a1b2c3d4e5f"
  },
  {
    "author": "陶淵明",
    "paragraphs": [
      "結廬在人境，而無車馬喧。",
      "問君何能爾？心遠地自偏。",
      "採菊東籬下，悠然見南山。",
      "山氣日夕佳，飛鳥相與還。",
      "此中有真意，欲辨已忘言。"
    ],
    "tags": [
      "晋",
      "田园",
      "五言古诗",
      "写景",
      "隐居"
    ],
    "title": "飲酒·其五",
    "id": "e5a7c9d1-2f3b-4c5d-6e7f-8a9b0c1d2e3f"
  },
  {
    "author": "陶淵明",
    "paragraphs": [
      "少無適俗韻，性本愛丘山。",
      "誤落塵網中，一去三十年。",
      "羈鳥戀舊林，池魚思故淵。",
      "開荒南野際，守拙歸園田。"
    ],
    "tags": [
      "晋",
      "田园",
      "五言古诗",
      "归隐",
      "抒情"
    ],
    "title": "歸園田居·其一",
    "id": "f7b9d1e3-4a5c-6d7e-8f90-1a2b3c4d5e6f"
  },
  {
    "author": "謝靈運",
    "paragraphs": [
      "潛竄媚幽姿，飛響響雲表。",
      "薄霄愧雲浮，棲川怍淵沉。",
      "進德智所拙，退耕力不任。",
      "徇祿反窮海，臥痾對空林。"
    ],
    "tags": [
      "南北朝",
      "山水",
      "五言古诗",
      "抒情"
    ],
    "title": "登池上樓",
    "id": "a9c1e3f5-6b7d-8e9f-0a1b-2c3d4e5f6a7b"
  },
  {
    "author": "鮑照",
    "paragraphs": [
      "瀝瀝夕風起，蕭瑟夜蟬鳴。",
      "愁思忽而至，跨馬出國城。",
      "林澤無人跡，荒阪無人行。",
      "仰視雲間鶴，千里一歸聲。"
    ],
    "tags": [
      "南北朝",
      "五言古诗",
      "伤感",
      "抒情"
    ],
    "title": "門有車馬客行",
    "id": "b1d3f5a7-8c9e-0f1a-2b3c-4d5e6f7a8b9"
  },
  {
    "author": "庾信",
    "paragraphs": [
      "玉關道路遙，金陵音信斷。",
      "獨千里，長相思。",
      "樹似新豐柳，樓如婦好姬。",
      "聞琴解佩神仙侶，挽羅拖繡風流兒。"
    ],
    "tags": [
      "南北朝",
      "宫体诗",
      "思念",
      "七言诗"
    ],
    "title": "烏夜啼",
    "id": "c3f5a7b9-0d1e-2f3a-4b5c-6d7e8f90a1b"
  },
  {
    "author": "李煜",
    "paragraphs": [
      "春花秋月何時了？往事知多少。",
      "小樓昨夜又東風，故國不堪回首月明中。",
      "雕欄玉砌應猶在，只是朱顏改。",
      "問君能有幾多愁？恰似一江春水向東流。"
    ],
    "tags": [
      "南唐",
      "宋词",
      "亡国",
      "抒情",
      "忧愁"
    ],
    "title": "虞美人·春花秋月何時了",
    "id": "d5a7b9c1-2e3f-4a5b-6c7d-8e9f0a1b2c3"
  },
  {
    "author": "李煜",
    "paragraphs": [
      "簾外雨潺潺，春意闌珊。",
      "羅衾不耐五更寒。",
      "夢裡不知身是客，一晌貪歡。",
      "獨自莫憑欄，無限江山。",
      "別時容易見時難。",
      "流水落花春去也，天上人間。"
    ],
    "tags": [
      "南唐",
      "宋词",
      "亡国",
      "伤感",
      "抒情"
    ],
    "title": "浪淘沙令·簾外雨潺潺",
    "id": "e7b9c1d3-4f5a-6b7c-8d9e-0f1a2b3c4d5"
  },
  {
    "author": "柳永",
    "paragraphs": [
      "寒蟬淒切，對長亭晚，驟雨初歇。",
      "都門帳飲無緒，留戀處，蘭舟催發。",
      "執手相看淚眼，竟無語凝噎。",
      "念去去，千里煙波，暮靄沉沉楚天闊。",
      "多情自古傷離別，更那堪，冷落清秋節！",
      "今宵酒醒何處？楊柳岸，曉風殘月。",
      "此去經年，應是良辰好景虛設。",
      "便縱有千種風情，更與何人說？"
    ],
    "tags": [
      "北宋",
      "宋词",
      "离别",
      "抒情",
      "婉约"
    ],
    "title": "雨霖鈴·寒蟬淒切",
    "id": "f9c1d3e5-6a7b-8c9d-0e1f-2a3b4c5d6e7"
  },
  {
    "author": "范仲淹",
    "paragraphs": [
      "塞下秋來風景異，衡陽雁去無留意。",
      "四面邊聲連角起，千嶂裡，長煙落日孤城閉。",
      "濁酒一杯家萬里，燕然未勒歸無計。",
      "羌管悠悠霜滿地，人不寐，將軍白髮征夫淚。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "边塞",
      "爱国",
      "豪放"
    ],
    "title": "漁家傲·秋思",
    "id": "a1d3e5f7-8b9c-0d1e-2f3a-4b5c6d7e8f9"
  },
  {
    "author": "晏殊",
    "paragraphs": [
      "一曲新詞酒一杯，去年天氣舊亭台。",
      "夕陽西下幾時回？",
      "無可奈何花落去，似曾相識燕歸來。",
      "小園香徑獨徘徊。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "伤春",
      "抒情",
      "婉约"
    ],
    "title": "浣溪沙·一曲新詞酒一杯",
    "id": "b3e5f7a9-0c1d-2e3f-4a5b-6c7d8e9f0a1b"
  },
  {
    "author": "歐陽修",
    "paragraphs": [
      "庭院深深深幾許？楊柳堆煙，簾幕無重數。",
      "玉勒雕鞍遊冶處，樓高不見章台路。",
      "雨橫風狂三月暮，門掩黃昏，無計留春住。",
      "淚眼問花花不語，亂紅飛過秋千去。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "闺怨",
      "伤春",
      "婉约"
    ],
    "title": "蝶戀花·庭院深深深幾許",
    "id": "c5f7a9b1-2d3e-4f5a-6b7c-8d9e0f1a2b3"
  },
  {
    "author": "王安石",
    "paragraphs": [
      "登樓送目，正故國遙望，歸天難寄。",
      "千古憑高對此，歎年光逝。",
      "六朝舊事隨流水，但寒煙芳草凝碧。",
      "至今商女，時時猶唱，後庭遺曲。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "怀古",
      "抒情",
      "豪放"
    ],
    "title": "桂枝香·金陵懷古",
    "id": "d7a9b1c3-4e5f-6a7b-8c9d-0e1f2a3b4c5"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "大江东去，浪淘尽，千古風流人物。",
      "故壘西邊，人道是，三國周郎赤壁。",
      "亂石穿空，驚濤拍岸，捲起千堆雪。",
      "江山如畫，一時多少豪傑。",
      "遙想公瑾當年，小喬初嫁了，雄姿英發。",
      "羽扇綸巾，談笑間，檣櫓灰飛煙滅。",
      "故國神遊，多情應笑我，早生華髮。",
      "人生如夢，一尊還酹江月。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "怀古",
      "豪放",
      "写景"
    ],
    "title": "念奴嬌·赤壁懷古",
    "id": "e9b1c3d5-6f7a-8b9c-0d1e-2f3a4b5c6d7"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "明月幾時有？把酒問青天。",
      "不知天上宮闕，今夕是何年。",
      "我欲乘風歸去，又恐瓊樓玉宇，高處不勝寒。",
      "起舞弄清影，何似在人間。",
      "轉朱閣，低綺戶，照無眠。",
      "不應有恨，何事長向別時圓？",
      "人有悲歡離合，月有陰晴圓缺，此事古難全。",
      "但願人長久，千里共嬋娟。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "中秋",
      "思念",
      "哲理"
    ],
    "title": "水調歌頭·明月幾時有",
    "id": "f1c3d5e7-8a9b-0c1d-2e3f-4a5b6c7d8e9"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "莫聽穿林打葉聲，何妨吟嘯且徐行。",
      "竹杖芒鞋輕勝馬，誰怕？一蓑煙雨任平生。",
      "料峭春風吹酒醒，微冷，山頭斜照卻相迎。",
      "回首向來蕭瑟處，歸去，也無風雨也無晴。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "励志",
      "旷达",
      "抒情"
    ],
    "title": "定風波·莫聽穿林打葉聲",
    "id": "a3d5e7f9-0b1c-2d3e-4f5a-6b7c8d9e0f1"
  },
  {
    "author": "秦觀",
    "paragraphs": [
      "纖雲弄巧，飛星傳恨，銀漢迢迢暗度。",
      "金風玉露一相逢，便勝卻人間無數。",
      "柔情似水，佳期如夢，忍顧鵲橋歸路。",
      "兩情若是久長時，又豈在朝朝暮暮。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "爱情",
      "七夕",
      "婉约"
    ],
    "title": "鵲橋仙·纖雲弄巧",
    "id": "b5e7f9a1-2c3d-4e5f-6a7b-8c9d0e1f2a3"
  },
  {
    "author": "李之儀",
    "paragraphs": [
      "我住長江頭，君住長江尾。",
      "日日思君不見君，共飲長江水。",
      "此水幾時休，此恨何時已。",
      "只願君心似我心，定不負相思意。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "爱情",
      "思念",
      "婉约"
    ],
    "title": "卜算子·我住長江頭",
    "id": "c7f9a1b3-4d5e-6f7a-8b9c-0d1e2f3a4b5"
  },
  {
    "author": "賀鑄",
    "paragraphs": [
      "重過閶門，萬事皆非，空餘舊遊。",
      "歎十年一梦，揚州路遠；",
      "百年多病，獨倚危樓。",
      "鶯燕不來，風光依舊，只有淚空流。",
      "傷心處，高城望斷，燈火已黄昏。"
    ],
    "tags": [
      "北宋",
      "宋词",
      "伤感",
      "怀旧",
      "婉约"
    ],
    "title": "鷓鴣天·重過閶門",
    "id": "d9a1b3c5-6e7f-8a9b-0c1d-2e3f4a5b6c7"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "尋尋覓覓，冷冷清清，淒淒慘慘戚戚。",
      "乍暖還寒時候，最難將息。",
      "三杯兩盞淡酒，怎敵他、晚來風急？",
      "雁過也，正傷心，卻是舊時相識。",
      "滿地黃花堆積，憔悴損，如今有誰堪摘？",
      "守著窗兒，獨自怎生得黑？",
      "梧桐更兼細雨，到黃昏、點點滴滴。",
      "這次第，怎一個愁字了得！"
    ],
    "tags": [
      "南宋",
      "宋词",
      "忧愁",
      "亡国",
      "婉约"
    ],
    "title": "聲聲慢·尋尋覓覓",
    "id": "e1b3c5d7-8f9a-0b1c-2d3e-4f5a6b7c8d9"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "常記溪亭日暮，沉醉不知歸路。",
      "興盡晚回舟，誤入藕花深處。",
      "爭渡，爭渡，驚起一灘鷗鷺。"
    ],
    "tags": [
      "南宋",
      "宋词",
      "写景",
      "闲适",
      "婉约"
    ],
    "title": "如夢令·常記溪亭日暮",
    "id": "f3c5d7e9-0a1b-2c3d-4e5f-6a7b8c9d0e1"
  },
  {
    "author": "岳飛",
    "paragraphs": [
      "怒發衝冠，憑欄處、瀟瀟雨歇。",
      "抬望眼、仰天長嘯，壯懷激烈。",
      "三十功名塵與土，八千里路雲和月。",
      "莫等閒、白了少年頭，空悲切。",
      "靖康恥，猶未雪；臣子恨，何時滅！",
      "駕長車、踏破賀蘭山缺。",
      "壯志飢餐胡虜肉，笑談渴飲匈奴血。",
      "待從頭、收拾舊山河，朝天闕。"
    ],
    "tags": [
      "南宋",
      "宋词",
      "爱国",
      "豪放",
      "壮志"
    ],
    "title": "滿江紅·寫懷",
    "id": "a5d7e9f1-2b3c-4d5e-6f7a-8b9c0d1e2f3"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "驛外斷橋邊，寂寞開無主。",
      "已是黃昏獨自愁，更著風和雨。",
      "無意苦爭春，一任群芳妒。",
      "零落成泥碾作塵，只有香如故。"
    ],
    "tags": [
      "南宋",
      "宋词",
      "咏物",
      "梅花",
      "坚贞"
    ],
    "title": "卜算子·詠梅",
    "id": "b7e9f1a3-4c5d-6e7f-8a9b-0c1d2e3f4a5"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "紅酥手，黃縢酒，滿城春色宮牆柳。",
      "東風惡，歡情薄，一懷愁緒，幾年離索。",
      "錯，錯，錯！",
      "春如舊，人空瘦，淚痕紅浥鮫綃透。",
      "桃花落，閒池閣，山盟雖在，錦書難托。",
      "莫，莫，莫！"
    ],
    "tags": [
      "南宋",
      "宋词",
      "爱情",
      "伤感",
      "婉约"
    ],
    "title": "釵頭鳳·紅酥手",
    "id": "c9f1a3b5-6d7e-8f9a-0b1c-2d3e4f5a6b7"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "醉裡挑燈看劍，夢迴吹角連營。",
      "八百裡分麾下炙，五十弦翻塞外聲，沙場秋點兵。",
      "馬作的盧飛快，弓如霹靂弦驚。",
      "了卻君王天下事，贏得生前身後名。可憐白髮生！"
    ],
    "tags": [
      "南宋",
      "宋词",
      "爱国",
      "豪放",
      "战争"
    ],
    "title": "破陣子·為陳同甫賦壯詞以寄之",
    "id": "d1a3b5c7-8e9f-0a1b-2c3d-4e5f6a7b8c9"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "眾裡尋他千百度，驀然回首，那人卻在，燈火闌珊處。"
    ],
    "tags": [
      "南宋",
      "宋词",
      "抒情",
      "婉约",
      "寻觅"
    ],
    "title": "青玉案·元夕",
    "id": "e3b5c7d9-0f1a-2b3c-4d5e-6f7a8b9c0d1"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "千古江山，英雄無覓，孫仲謀處。",
      "舞榭歌台，風流總被，雨打風吹去。",
      "斜陽草樹，尋常巷陌，人道寄奴曾住。",
      "想當年，金戈鐵馬，氣吞萬里如虎。",
      "元嘉草草，封狼居胥，贏得倉皇北顧。",
      "四十三年，望中猶記，烽火揚州路。",
      "可堪回首，佛狸祠下，一片神鴉社鼓！",
      "憑誰問：廉頗老矣，尚能飯否？"
    ],
    "tags": [
      "南宋",
      "宋词",
      "怀古",
      "爱国",
      "豪放"
    ],
    "title": "永遇樂·京口北固亭懷古",
    "id": "f5c7d9e1-2a3b-4c5d-6e7f-8a9b0c1d2e3"
  },
  {
    "author": "姜夔",
    "paragraphs": [
      "淮左名都，竹西佳處，解鞍少駐初程。",
      "過春風十里，盡薺麥青青。",
      "自胡馬窺江去後，廢池喬木，猶厭言兵。",
      "漸黃昏，清角吹寒，都在空城。",
      "杜郎俊賞，算而今、重到須驚。",
      "縱豆蔻詞工，青樓夢好，難賦深情。",
      "二十四橋仍在，波心蕩、冷月無聲。",
      "念橋邊紅藥，年年知為誰生？"
    ],
    "tags": [
      "南宋",
      "宋词",
      "怀古",
      "伤感",
      "婉约"
    ],
    "title": "揚州慢·淮左名都",
    "id": "a7d9e1f3-4b5c-6d7e-8f9a-0b1c2d3e4f5"
  },
  {
    "author": "馬致遠",
    "paragraphs": [
      "枯藤老樹昏鴉，小橋流水人家，",
      "古道西風瘦馬。",
      "夕陽西下，斷腸人在天涯。"
    ],
    "tags": [
      "元曲",
      "秋思",
      "羁旅",
      "抒情",
      "小令"
    ],
    "title": "天淨沙·秋思",
    "id": "b9e1f3a5-6c7d-8e9f-0a1b-2c3d4e5f6a7"
  },
  {
    "author": "關漢卿",
    "paragraphs": [
      "花垂淚，月低眉，一聲聲杜宇啼。",
      "舊愁新恨兩依依，夢魂飛不到行雲際。",
      "悶懨懨，愁戚戚，蝶雙飛，燕雙棲。"
    ],
    "tags": [
      "元曲",
      "思念",
      "抒情",
      "小令"
    ],
    "title": "沉醉東風·別情",
    "id": "c1f3a5b7-8d9e-0f1a-2b3c-4d5e6f7a8b9"
  },
  {
    "author": "張養浩",
    "paragraphs": [
      "峰巒如聚，波濤如怒，山河表裡潼關路。",
      "望西都，意躊躇。",
      "傷心秦漢經行處，宮闕萬間都做了土。",
      "興，百姓苦；亡，百姓苦。"
    ],
    "tags": [
      "元曲",
      "怀古",
      "忧国",
      "哲理",
      "小令"
    ],
    "title": "山坡羊·潼關懷古",
    "id": "d3a5b7c9-0e1f-2a3b-4c5d-6e7f8a9b0c1"
  },
  {
    "author": "白樸",
    "paragraphs": [
      "孤村落日殘霞，輕煙老樹寒鴉，",
      "一點飛鴻影下。",
      "青山綠水，白草紅葉黃花。"
    ],
    "tags": [
      "元曲",
      "写景",
      "秋天",
      "小令"
    ],
    "title": "天淨沙·秋",
    "id": "e5b7c9d1-2f3a-4b5c-6d7e-8f9a0b1c2d3"
  },
  {
    "author": "楊慎",
    "paragraphs": [
      "滾滾長江東逝水，浪花淘盡英雄。",
      "是非成敗轉頭空。",
      "青山依舊在，幾度夕陽紅。",
      "白髮漁樵江渚上，慣看秋月春風。",
      "一壺濁酒喜相逢。",
      "古今多少事，都付笑談中。"
    ],
    "tags": [
      "明",
      "词",
      "怀古",
      "旷达",
      "哲理"
    ],
    "title": "臨江仙·滾滾長江東逝水",
    "id": "f7c9d1e3-4a5b-6c7d-8e9f-0a1b2c3d4e5"
  },
  {
    "author": "于謙",
    "paragraphs": [
      "千錘萬鑿出深山，烈火焚燒若等閒。",
      "粉骨碎身渾不怕，要留清白在人間。"
    ],
    "tags": [
      "明",
      "七言绝句",
      "咏物",
      "石灰",
      "坚贞"
    ],
    "title": "石灰吟",
    "id": "a9d1e3f5-6b7c-8d9e-0f1a-2b3c4d5e6f7"
  },
  {
    "author": "唐寅",
    "paragraphs": [
      "桃花塢裡桃花庵，桃花庵裡桃花仙。",
      "桃花仙人種桃樹，又摘桃花換酒錢。",
      "酒醒只在花前坐，酒醉還來花下眠。",
      "半醉半醒日復日，花落花開年復年。"
    ],
    "tags": [
      "明",
      "七言诗",
      "隐居",
      "闲适",
      "抒情"
    ],
    "title": "桃花庵歌",
    "id": "b1e3f5a7-8c9d-0e1f-2a3b-4c5d6e7f8a9"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "人生若只如初見，何事秋風悲畫扇。",
      "等閒變卻故人心，卻道故人心易變。",
      "驪山語罷清宵半，淚雨霖鈴終不怨。",
      "何如薄幸錦衣郎，比翼連枝當日願。"
    ],
    "tags": [
      "清",
      "词",
      "爱情",
      "伤感",
      "婉约"
    ],
    "title": "木蘭花·擬古決絕詞柬友",
    "id": "c3f5a7b9-0d1e-2f3a-4b5c-6d7e8f90a1b"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "山一程，水一程，身向榆關那畔行，夜深千帳燈。",
      "風一更，雪一更，聒碎鄉心夢不成，故園無此聲。"
    ],
    "tags": [
      "清",
      "词",
      "边塞",
      "思乡",
      "抒情"
    ],
    "title": "長相思·山一程",
    "id": "d5a7b9c1-2e3f-4a5b-6c7d-8e9f0a1b2c3"
  },
  {
    "author": "鄭燮",
    "paragraphs": [
      "咬定青山不放鬆，立根原在破巖中。",
      "千磨萬擊還堅勁，任爾東西南北風。"
    ],
    "tags": [
      "清",
      "七言绝句",
      "咏物",
      "竹",
      "坚强"
    ],
    "title": "竹石",
    "id": "e7b9c1d3-4f5a-6b7c-8d9e-0f1a2b3c4d5"
  },
  {
    "author": "龔自珍",
    "paragraphs": [
      "浩蕩離愁白日斜，吟鞭東指即天涯。",
      "落紅不是無情物，化作春泥更護花。"
    ],
    "tags": [
      "清",
      "七言绝句",
      "爱国",
      "奉献",
      "抒情"
    ],
    "title": "己亥雜詩·其五",
    "id": "f9c1d3e5-6a7b-8c9d-0e1f-2a3b4c5d6e7"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "關關雎鳩，在河之洲。",
      "窈窕淑女，君子好逑。"
    ],
    "tags": [
      "诗经",
      "爱情",
      "四言诗",
      "国风"
    ],
    "title": "關雎",
    "id": "a1d3e5f7-8b9c-0d1e-2f3a-4b5c6d7e8f9"
  },
  {
    "author": "屈原",
    "paragraphs": [
      "路漫漫其修遠兮，吾將上下而求索。"
    ],
    "tags": [
      "楚辞",
      "励志",
      "爱国",
      "抒情"
    ],
    "title": "離騷·節選",
    "id": "b3e5f7a9-0c1d-2e3f-4a5b-6c7d8e9f0a1b"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "蒹葭蒼蒼，白露為霜。",
      "所謂伊人，在水一方。"
    ],
    "tags": [
      "诗经",
      "思念",
      "四言诗",
      "国风"
    ],
    "title": "蒹葭",
    "id": "c5f7a9b1-2d3e-4f5a-6b7c-8d9e0f1a2b3"
  },
  {
    "author": "劉基",
    "paragraphs": [
      "可憐天上月，一夕成環，夕夕都成玦。",
      "若似月輪終皎潔，不辭冰雪常相見。",
      "霜風滿天際，萬里清光，獨照人間離別。",
      "嘆人世，幾番圓缺，只有清輝，依舊無消歇。"
    ],
    "tags": [
      "明",
      "词",
      "月亮",
      "离别",
      "抒情"
    ],
    "title": "玉樓春·驚起樓頭殘夢",
    "id": "d7a9b1c3-4e5f-6a7b-8c9d-0e1f2a3b4c5"
  },
  {
    "author": "陳子龍",
    "paragraphs": [
      "春無蹤，問誰遣芳蹤？",
      "只有桃花依舊笑春風。",
      "花自飄零水自流，一種相思，兩處閒愁。"
    ],
    "tags": [
      "明",
      "词",
      "思念",
      "伤春",
      "婉约"
    ],
    "title": "點絳唇·春日風雨",
    "id": "e9b1c3d5-6f7a-8b9c-0d1e-2f3a4b5c6d7"
  },
  {
    "author": "王士禎",
    "paragraphs": [
      "一年好景君須記，最是橙黃橘綠時。",
      "秋陰不散霜飛晚，留得枯荷聽雨聲。"
    ],
    "tags": [
      "清",
      "七言绝句",
      "写景",
      "秋天",
      "抒情"
    ],
    "title": "秋柳",
    "id": "f1c3d5e7-8a9b-0c1d-2e3f-4a5b6c7d8e9"
  },
  {
    "author": "袁枚",
    "paragraphs": [
      "白日不到處，青春恰自來。",
      "苔花如米小，也學牡丹開。"
    ],
    "tags": [
      "清",
      "五言绝句",
      "咏物",
      "励志",
      "苔"
    ],
    "title": "苔",
    "id": "a3d5e7f9-0b1c-2d3e-4f5a-6b7c8d9e0f1"
  },
  {
    "author": "趙翼",
    "paragraphs": [
      "李杜詩篇萬口傳，至今已覺不新鮮。",
      "江山代有才人出，各領風騷數百年。"
    ],
    "tags": [
      "清",
      "七言绝句",
      "哲理",
      "创新",
      "诗论"
    ],
    "title": "論詩·其二",
    "id": "b5e7f9a1-2c3d-4e5f-6a7b-8c9d0e1f2a3"
  },
  {
    "author": "鄭燮",
    "paragraphs": [
      "衙齋臥聽蕭蕭竹，疑是民間疾苦聲。",
      "些小吾曹州縣吏，一枝一葉總關情。"
    ],
    "tags": [
      "清",
      "七言绝句",
      "忧民",
      "爱国",
      "抒情"
    ],
    "title": "墨竹圖題詩",
    "id": "c7f9a1b3-4d5e-6f7a-8b9c-0d1e2f3a4b5"
  },
  {
    "author": "王維",
    "paragraphs": [
      "獨坐幽篁裡，彈琴復長嘯。",
      "深林人不知，明月來相照。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "隐居",
      "写景",
      "抒情"
    ],
    "title": "竹里館",
    "id": "d9a1b3c5-6e7f-8a9b-0c1d-2e3f4a5b6c7"
  },
  {
    "author": "王維",
    "paragraphs": [
      "空山不見人，但聞人語響。",
      "返景入深林，復照青苔上。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "山林",
      "静谧"
    ],
    "title": "鹿柴",
    "id": "e1b3c5d7-8f9a-0b1c-2d3e-4f5a6b7c8d9"
  },
  {
    "author": "王維",
    "paragraphs": [
      "君自故鄉來，應知故鄉事。",
      "來日綺窗前，寒梅著花未。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "思乡",
      "问候",
      "抒情"
    ],
    "title": "雜詩三首·其二",
    "id": "f3c5d7e9-0a1b-2c3d-4e5f-6a7b8c9d0e1"
  },
  {
    "author": "王維",
    "paragraphs": [
      "紅豆生南國，秋來發幾枝。",
      "願君多采擷，此物最相思。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "相思",
      "咏物",
      "爱情"
    ],
    "title": "相思",
    "id": "a5d7e9f1-2b3c-4d5e-6f7a-8b9c0d1e2f3"
  },
  {
    "author": "王維",
    "paragraphs": [
      "山中相送罷，日暮掩柴扉。",
      "春草明年綠，王孫歸不歸。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "送别",
      "思念",
      "抒情"
    ],
    "title": "山中送別",
    "id": "b7e9f1a3-4c5d-6e7f-8a9b-0c1d2e3f4a5"
  },
  {
    "author": "王維",
    "paragraphs": [
      "渭城朝雨浥輕塵，客舍青青柳色新。",
      "勸君更盡一杯酒，西出陽關無故人。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "送别",
      "友情",
      "抒情"
    ],
    "title": "送元二使安西",
    "id": "c9f1a3b5-6d7e-8f9a-0b1c-2d3e4f5a6b7"
  },
  {
    "author": "李白",
    "paragraphs": [
      "床前明月光，疑是地上霜。",
      "舉頭望明月，低頭思故鄉。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "思乡",
      "月亮",
      "抒情"
    ],
    "title": "靜夜思",
    "id": "d1a3b5c7-8e9f-0a1b-2c3d-4e5f6a7b8c9"
  },
  {
    "author": "李白",
    "paragraphs": [
      "眾鳥高飛盡，孤雲獨去閒。",
      "相看兩不厭，只有敬亭山。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "孤独",
      "抒情"
    ],
    "title": "獨坐敬亭山",
    "id": "e3b5c7d9-0f1a-2b3c-4d5e-6f7a8b9c0d1"
  },
  {
    "author": "李白",
    "paragraphs": [
      "故人西辭黃鶴樓，煙花三月下揚州。",
      "孤帆遠影碧空盡，唯見長江天際流。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "送别",
      "友情",
      "写景"
    ],
    "title": "黃鶴樓送孟浩然之廣陵",
    "id": "f5c7d9e1-2a3b-4c5d-6e7f-8a9b0c1d2e3"
  },
  {
    "author": "李白",
    "paragraphs": [
      "朝辭白帝彩雲間，千里江陵一日還。",
      "兩岸猿聲啼不住，輕舟已過萬重山。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "喜悦",
      "行旅"
    ],
    "title": "早發白帝城",
    "id": "a7d9e1f3-4b5c-6d7e-8f9a-0b1c2d3e4f5"
  },
  {
    "author": "李白",
    "paragraphs": [
      "天門中斷楚江開，碧水東流至此回。",
      "兩岸青山相對出，孤帆一片日邊來。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "山水",
      "壮丽"
    ],
    "title": "望天門山",
    "id": "b9e1f3a5-6c7d-8e9f-0a1b-2c3d4e5f6a7"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "兩個黃鸝鳴翠柳，一行白鷺上青天。",
      "窗含西嶺千秋雪，門泊東吳萬里船。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "春天",
      "闲适"
    ],
    "title": "絕句·兩個黃鸝鳴翠柳",
    "id": "c1f3a5b7-8d9e-0f1a-2b3c-4d5e6f7a8b9"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "遲日江山麗，春風花草香。",
      "泥融飛燕子，沙暖睡鴛鴦。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "春天",
      "抒情"
    ],
    "title": "絕句·遲日江山麗",
    "id": "d3a5b7c9-0e1f-2a3b-4c5d-6e7f8a9b0c1"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "好雨知時節，當春乃發生。",
      "隨風潛入夜，潤物細無聲。",
      "野徑雲俱黑，江船火獨明。",
      "曉看紅濕處，花重錦官城。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "咏雨",
      "春天",
      "写景"
    ],
    "title": "春夜喜雨",
    "id": "e5b7c9d1-2f3a-4b5c-6d7e-8f9a0b1c2d3"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "國破山河在，城春草木深。",
      "感時花濺淚，恨別鳥驚心。",
      "烽火連三月，家書抵萬金。",
      "白頭搔更短，渾欲不勝簪。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "战争",
      "爱国",
      "伤感"
    ],
    "title": "春望",
    "id": "f7c9d1e3-4a5b-6c7d-8e9f-0a1b2c3d4e5"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "岱宗夫如何？齊魯青未了。",
      "造化鍾神秀，陰陽割昏曉。",
      "蕩胸生曾雲，決眥入歸鳥。",
      "會當凌絕頂，一覽眾山小。"
    ],
    "tags": [
      "唐",
      "五言古诗",
      "泰山",
      "励志",
      "写景"
    ],
    "title": "望嶽",
    "id": "a9d1e3f5-6b7c-8d9e-0f1a-2b3c4d5e6f7"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "離離原上草，一歲一枯榮。",
      "野火燒不盡，春風吹又生。",
      "遠芳侵古道，晴翠接荒城。",
      "又送王孫去，萋萋滿別情。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "咏草",
      "生命力",
      "送别"
    ],
    "title": "賦得古原草送別",
    "id": "b1e3f5a7-8c9d-0e1f-2a3b-4c5d6e7f8a9"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "一道殘陽鋪水中，半江瑟瑟半江紅。",
      "可憐九月初三夜，露似真珠月似弓。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "秋天",
      "夕阳"
    ],
    "title": "暮江吟",
    "id": "c3f5a7b9-0d1e-2f3a-4b5c-6d7e8f90a1b"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "綠蟻新醅酒，紅泥小火爐。",
      "晚來天欲雪，能飲一杯無？"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "友情",
      "饮酒",
      "冬天"
    ],
    "title": "問劉十九",
    "id": "d5a7b9c1-2e3f-4a5b-6c7d-8e9f0a1b2c3"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "君問歸期未有期，巴山夜雨漲秋池。",
      "何當共剪西窗燭，卻話巴山夜雨時。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "思念",
      "爱情",
      "雨夜"
    ],
    "title": "夜雨寄北",
    "id": "e7b9c1d3-4f5a-6b7c-8d9e-0f1a2b3c4d5"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "相見時難別亦難，東風無力百花殘。",
      "春蠶到死絲方盡，蠟炬成灰淚始乾。",
      "曉鏡但愁雲鬢改，夜吟應覺月光寒。",
      "蓬山此去無多路，青鳥殷勤為探看。"
    ],
    "tags": [
      "唐",
      "七言律诗",
      "爱情",
      "思念",
      "婉约"
    ],
    "title": "無題·相見時難別亦難",
    "id": "f9c1d3e5-6a7b-8c9d-0e1f-2a3b4c5d6e7"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "雲想衣裳花想容，春風拂檻露華濃。",
      "若非群玉山頭見，會向瑤台月下逢。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "赞美",
      "美人",
      "写景"
    ],
    "title": "清平調·其一",
    "id": "a1d3e5f7-8b9c-0d1e-2f3a-4b5c6d7e8f9"
  },
  {
    "author": "賈島",
    "paragraphs": [
      "松下問童子，言師採藥去。",
      "只在此山中，雲深不知處。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "寻访",
      "隐士",
      "写景"
    ],
    "title": "尋隱者不遇",
    "id": "b3e5f7a9-0c1d-2e3f-4a5b-6c7d8e9f0a1b"
  },
  {
    "author": "賀知章",
    "paragraphs": [
      "碧玉妝成一樹高，萬條垂下綠絲絛。",
      "不知細葉誰裁出，二月春風似剪刀。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "咏柳",
      "春天",
      "写景"
    ],
    "title": "詠柳",
    "id": "c5f7a9b1-2d3e-4f5a-6b7c-8d9e0f1a2b3"
  },
  {
    "author": "賀知章",
    "paragraphs": [
      "少小離家老大回，鄉音無改鬢毛衰。",
      "兒童相見不相識，笑問客從何處來。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "思乡",
      "归家",
      "抒情"
    ],
    "title": "回鄉偶書·其一",
    "id": "d7a9b1c3-4e5f-6a7b-8c9d-0e1f2a3b4c5"
  },
  {
    "author": "張繼",
    "paragraphs": [
      "月落烏啼霜滿天，江楓漁火對愁眠。",
      "姑蘇城外寒山寺，夜半鐘聲到客船。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "羁旅",
      "思乡",
      "秋天"
    ],
    "title": "楓橋夜泊",
    "id": "e9b1c3d5-6f7a-8b9c-0d1e-2f3a4b5c6d7"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "獨憐幽草澗邊生，上有黃鸝深樹鳴。",
      "春潮帶雨晚來急，野渡無人舟自橫。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "春天",
      "静谧"
    ],
    "title": "滁州西澗",
    "id": "f1c3d5e7-8a9b-0c1d-2e3f-4a5b6c7d8e9"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "慈母手中線，遊子身上衣。",
      "臨行密密縫，意恐遲遲歸。",
      "誰言寸草心，報得三春暉。"
    ],
    "tags": [
      "唐",
      "五言古诗",
      "母爱",
      "亲情",
      "抒情"
    ],
    "title": "遊子吟",
    "id": "a3d5e7f9-0b1c-2d3e-4f5a-6b7c8d9e0f1"
  },
  {
    "author": "崔顥",
    "paragraphs": [
      "昔人已乘黃鶴去，此地空餘黃鶴樓。",
      "黃鶴一去不復返，白雲千載空悠悠。",
      "晴川歷歷漢陽樹，芳草萋萋鸚鵡洲。",
      "日暮鄉關何處是？煙波江上使人愁。"
    ],
    "tags": [
      "唐",
      "七言律诗",
      "怀古",
      "思乡",
      "写景"
    ],
    "title": "黃鶴樓",
    "id": "b5e7f9a1-2c3d-4e5f-6a7b-8c9d0e1f2a3"
  },
  {
    "author": "王之渙",
    "paragraphs": [
      "白日依山盡，黃河入海流。",
      "欲窮千里目，更上一層樓。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "励志",
      "写景",
      "登楼"
    ],
    "title": "登鸛雀樓",
    "id": "c7f9a1b3-4d5e-6f7a-8b9c-0d1e2f3a4b5"
  },
  {
    "author": "王之渙",
    "paragraphs": [
      "黃河遠上白雲間，一片孤城萬仞山。",
      "羌笛何須怨楊柳，春風不度玉門關。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "思乡",
      "写景"
    ],
    "title": "涼州詞·黃河遠上白雲間",
    "id": "d9a1b3c5-6e7f-8a9b-0c1d-2e3f4a5b6c7"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "秦時明月漢時關，萬里長征人未還。",
      "但使龍城飛將在，不教胡馬度陰山。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "爱国",
      "战争"
    ],
    "title": "出塞·其一",
    "id": "e1b3c5d7-8f9a-0b1c-2d3e-4f5a6b7c8d9"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "寒雨連江夜入吳，平明送客楚山孤。",
      "洛陽親友如相問，一片冰心在玉壺。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "送别",
      "友情",
      "品格"
    ],
    "title": "芙蓉樓送辛漸",
    "id": "f3c5d7e9-0a1b-2c3d-4e5f-6a7b8c9d0e1"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "閨中少婦不曾愁，春日凝妝上翠樓。",
      "忽見陌頭楊柳色，悔教夫婿覓封侯。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "闺怨",
      "思念",
      "春天"
    ],
    "title": "閨怨",
    "id": "a5d7e9f1-2b3c-4d5e-6f7a-8b9c0d1e2f3"
  },
  {
    "author": "高適",
    "paragraphs": [
      "千里黃雲白日曛，北風吹雁雪紛紛。",
      "莫愁前路無知己，天下誰人不識君。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "送别",
      "劝慰",
      "友情"
    ],
    "title": "別董大·其一",
    "id": "b7e9f1a3-4c5d-6e7f-8a9b-0c1d2e3f4a5"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "故園東望路漫漫，雙袖龍鍾淚不乾。",
      "馬上相逢無紙筆，憑君傳語報平安。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "思乡",
      "行旅"
    ],
    "title": "逢入京使",
    "id": "c9f1a3b5-6d7e-8f9a-0b1c-2d3e4f5a6b7"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "日暮蒼山遠，天寒白屋貧。",
      "柴門聞犬吠，風雪夜歸人。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "冬天",
      "行旅"
    ],
    "title": "逢雪宿芙蓉山主人",
    "id": "d1a3b5c7-8e9f-0a1b-2c3d-4e5f6a7b8c9"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "泠泠七弦上，靜聽松風寒。",
      "古調雖自愛，今人多不彈。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "音乐",
      "抒情",
      "怀才不遇"
    ],
    "title": "聽彈琴",
    "id": "e3b5c7d9-0f1a-2b3c-4d5e-6f7a8b9c0d1"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "千山鳥飛絕，萬徑人蹤滅。",
      "孤舟蓑笠翁，獨釣寒江雪。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "冬天",
      "孤独"
    ],
    "title": "江雪",
    "id": "f5c7d9e1-2a3b-4c5d-6e7f-8a9b0c1d2e3"
  },
  {
    "author": "王翰",
    "paragraphs": [
      "葡萄美酒夜光杯，欲飲琵琶馬上催。",
      "醉臥沙場君莫笑，古來征戰幾人回？"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "战争",
      "豪放"
    ],
    "title": "涼州詞·葡萄美酒夜光杯",
    "id": "a7d9e1f3-4b5c-6d7e-8f9a-0b1c2d3e4f5"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "林暗草驚風，將軍夜引弓。",
      "平明尋白羽，沒在石棱中。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "边塞",
      "将军",
      "勇武"
    ],
    "title": "塞下曲·其二",
    "id": "b9e1f3a5-6c7d-8e9f-0a1b-2c3d4e5f6a7"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "月黑雁飛高，單于夜遁逃。",
      "欲將輕騎逐，大雪滿弓刀。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "边塞",
      "战争",
      "冬天"
    ],
    "title": "塞下曲·其三",
    "id": "c1f3a5b7-8d9e-0f1a-2b3c-4d5e6f7a8b9"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "遠上寒山石徑斜，白雲深處有人家。",
      "停車坐愛楓林晚，霜葉紅於二月花。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "写景",
      "秋天",
      "枫叶"
    ],
    "title": "山行",
    "id": "e5b7c9d1-2f3a-4b5c-6d7e-8f9a0b1c2d3"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "清明時節雨紛紛，路上行人欲斷魂。",
      "借問酒家何處有？牧童遙指杏花村。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "清明",
      "思乡",
      "行旅"
    ],
    "title": "清明",
    "id": "f7c9d1e3-4a5b-6c7d-8e9f-0a1b2c3d4e5"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "折戟沉沙鐵未銷，自將磨洗認前朝。",
      "東風不與周郎便，銅雀春深鎖二喬。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "怀古",
      "战争",
      "历史"
    ],
    "title": "赤壁",
    "id": "a9d1e3f5-6b7c-8d9e-0f1a-2b3c4d5e6f7"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "煙籠寒水月籠沙，夜泊秦淮近酒家。",
      "商女不知亡國恨，隔江猶唱後庭花。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "怀古",
      "忧国",
      "抒情"
    ],
    "title": "泊秦淮",
    "id": "b1e3f5a7-8c9d-0e1f-2a3b-4c5d6e7f8a9"
  },
  {
    "author": "溫庭筠",
    "paragraphs": [
      "晨起动征铎，客行悲故鄉。",
      "雞聲茅店月，人跡板橋霜。",
      "槲葉落山路，枳花明驛牆。",
      "因思杜陵夢，鳧雁滿回塘。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "羁旅",
      "思乡",
      "写景"
    ],
    "title": "商山早行",
    "id": "c3f5a7b9-0d1e-2f3a-4b5c-6d7e8f90a1b"
  },
  {
    "author": "陳陶",
    "paragraphs": [
      "誓掃匈奴不顧身，五千貂錦喪胡塵。",
      "可憐無定河邊骨，猶是春閨夢裡人。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "战争",
      "思念"
    ],
    "title": "隴西行",
    "id": "d5a7b9c1-2e3f-4a5b-6c7d-8e9f0a1b2c3"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "向晚意不適，驅車登古原。",
      "夕陽無限好，只是近黃昏。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写景",
      "感慨",
      "夕阳"
    ],
    "title": "登樂游原",
    "id": "e7b9c1d3-4f5a-6b7c-8d9e-0f1a2b3c4d5"
  },
  {
    "author": "杜荀鶴",
    "paragraphs": [
      "早被嬋娟誤，欲妝臨鏡慵。",
      "承恩不在貌，教妾若為容。",
      "風暖鳥聲碎，日高花影重。",
      "年年越溪女，相憶採芙蓉。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "宫怨",
      "女子",
      "抒情"
    ],
    "title": "春宮怨",
    "id": "f9c1d3e5-6a7b-8c9d-0e1f-2a3b4c5d6e7"
  },
  {
    "author": "秦韜玉",
    "paragraphs": [
      "蓬門未識綺羅香，擬託良媒益自傷。",
      "誰愛風流高格調，共憐時世儉梳妝。",
      "敢將十指誇偏巧，不把雙眉鬥畫長。",
      "苦恨年年壓金線，為他人作嫁衣裳。"
    ],
    "tags": [
      "唐",
      "七言律诗",
      "贫女",
      "怀才不遇",
      "抒情"
    ],
    "title": "貧女",
    "id": "a1d3e5f7-8b9c-0d1e-2f3a-4b5c6d7e8f9"
  },
  {
    "author": "韓栩",
    "paragraphs": [
      "春城無處不飛花，寒食東風禦柳斜。",
      "日暮漢宮傳蠟燭，輕煙散入五侯家。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "寒食",
      "讽刺",
      "写景"
    ],
    "title": "寒食",
    "id": "b3e5f7a9-0c1d-2e3f-4a5b-6c7d8e9f0a1b"
  },
  {
    "author": "張祜",
    "paragraphs": [
      "故國三千里，深宮二十年。",
      "一聲河滿子，雙淚落君前。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "宫怨",
      "女子",
      "伤感"
    ],
    "title": "宮詞",
    "id": "c5f7a9b1-2d3e-4f5a-6b7c-8d9e0f1a2b3"
  },
  {
    "author": "安邑坊女",
    "paragraphs": [
      "打起黃鶯兒，莫教枝上啼。",
      "啼時驚妾夢，不得到遼西。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "闺怨",
      "思念",
      "抒情"
    ],
    "title": "春怨",
    "id": "d7a9b1c3-4e5f-6a7b-8c9d-0e1f2a3b4c5"
  },
  {
    "author": "權德輿",
    "paragraphs": [
      "昨夜裙帶解，今朝蟢子飛。",
      "鉛華不可棄，莫是藁砧歸。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "思念",
      "女子",
      "抒情"
    ],
    "title": "玉台體",
    "id": "e9b1c3d5-6f7a-8b9c-0d1e-2f3a4b5c6d7"
  },
  {
    "author": "李端",
    "paragraphs": [
      "鳴箏金粟柱，素手玉房前。",
      "欲得周郎顧，時時誤拂弦。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "音乐",
      "女子",
      "抒情"
    ],
    "title": "聽箏",
    "id": "f1c3d5e7-8a9b-0c1d-2e3f-4a5b6c7d8e9"
  },
  {
    "author": "朱慶餘",
    "paragraphs": [
      "洞房昨夜停紅燭，待曉堂前拜舅姑。",
      "妝罷低聲問夫婿，畫眉深淺入時無。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "新婚",
      "询问",
      "抒情"
    ],
    "title": "近試上張水部",
    "id": "a3d5e7f9-0b1c-2d3e-4f5a-6b7c8d9e0f1"
  },
  {
    "author": "李益",
    "paragraphs": [
      "嫁得瞿塘賈，朝朝誤妾期。",
      "早知潮有信，嫁與弄潮兒。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "闺怨",
      "思念",
      "抒情"
    ],
    "title": "江南曲",
    "id": "b5e7f9a1-2c3d-4e5f-6a7b-8c9d0e1f2a3"
  },
  {
    "author": "李益",
    "paragraphs": [
      "回樂峰前沙似雪，受降城外月如霜。",
      "不知何處吹蘆管，一夜征人盡望鄉。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "思乡",
      "月亮"
    ],
    "title": "夜上受降城聞笛",
    "id": "c7f9a1b3-4d5e-6f7a-8b9c-0d1e2f3a4b5"
  },
  {
    "author": "司空曙",
    "paragraphs": [
      "靜夜四無鄰，荒居舊業貧。",
      "雨中黃葉樹，燈下白頭人。",
      "以我獨沈久，愧君相見頻。",
      "平生自有分，況是蔡家親。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "友情",
      "贫困",
      "抒情"
    ],
    "title": "喜外弟盧綸見宿",
    "id": "d9a1b3c5-6e7f-8a9b-0c1d-2e3f4a5b6c7"
  },
  {
    "author": "司空曙",
    "paragraphs": [
      "故人江海別，幾度隔山川。",
      "乍見翻疑夢，相悲各問年。",
      "孤燈寒照雨，濕竹暗浮煙。",
      "更有明朝恨，離杯惜共傳。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "友情",
      "重逢",
      "抒情"
    ],
    "title": "雲陽館與韓紳宿別",
    "id": "e1b3c5d7-8f9a-0b1c-2d3e-4f5a6b7c8d9"
  },
  {
    "author": "崔塗",
    "paragraphs": [
      "幾行歸去盡，片影獨何之。",
      "暮雨相呼失，寒塘獨下遲。",
      "渚雲低暗度，關月冷遙隨。",
      "未必逢矰繳，孤飛自可疑。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "孤雁",
      "孤独",
      "抒情"
    ],
    "title": "孤雁",
    "id": "f3c5d7e9-0a1b-2c3d-4e5f-6a7b8c9d0e1"
  },
  {
    "author": "崔塗",
    "paragraphs": [
      "迢遞三巴路，羈危萬里身。",
      "亂山殘雪夜，孤燭異鄉春。",
      "漸與骨肉遠，轉於僮僕親。",
      "那堪正漂泊，明日歲華新。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "羁旅",
      "思乡",
      "春节"
    ],
    "title": "巴山道中除夜書懷",
    "id": "a5d7e9f1-2b3c-4d5e-6f7a-8b9c0d1e2f3"
  },
  {
    "author": "張泌",
    "paragraphs": [
      "別夢依依到謝家，小廊回合曲闌斜。",
      "多情只有春庭月，猶為離人照落花。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "思念",
      "爱情",
      "月亮"
    ],
    "title": "寄人",
    "id": "d1a3b5c7-8e9f-0a1b-2c3d-4e5f6a7b8c9"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "勸君莫惜金縷衣，勸君惜取少年時。",
      "花開堪折直須折，莫待無花空折枝。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "惜时",
      "励志",
      "抒情"
    ],
    "title": "金縷衣",
    "id": "e3b5c7d9-0f1a-2b3c-4d5e-6f7a8b9c0d1"
  },
  {
    "author": "王涯",
    "paragraphs": [
      "桂魄初生秋露微，輕羅已薄未更衣。",
      "銀箏夜久殷勤弄，心怯空房不忍歸。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "秋夜",
      "思念",
      "女子"
    ],
    "title": "秋夜曲",
    "id": "f5c7d9e1-2a3b-4c5d-6e7f-8a9b0c1d2e3"
  },
  {
    "author": "沈佺期",
    "paragraphs": [
      "盧家少婦鬱金堂，海燕雙棲玳瑁梁。",
      "九月寒砧催木葉，十年征戍憶遼陽。",
      "白狼河北音書斷，丹鳳城南秋夜長。",
      "誰謂含愁獨不見，更教明月照流黃。"
    ],
    "tags": [
      "唐",
      "七言律诗",
      "闺怨",
      "思念",
      "抒情"
    ],
    "title": "獨不見",
    "id": "a7d9e1f3-4b5c-6d7e-8f9a-0b1c2d3e4f5"
  },
  {
    "author": "皇甫冉",
    "paragraphs": [
      "鶯啼燕語報新年，馬邑龍堆路幾千。",
      "家住層城臨漢苑，心隨明月到胡天。",
      "機中錦字論長恨，樓上花枝笑獨眠。",
      "為問元戎竇車騎，何時返旆勒燕然。"
    ],
    "tags": [
      "唐",
      "七言律诗",
      "闺怨",
      "思念",
      "春天"
    ],
    "title": "春思",
    "id": "b9e1f3a5-6c7d-8e9f-0a1b-2c3d4e5f6a7"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "更深月色半人家，北斗闌干南斗斜。",
      "今夜偏知春氣暖，蟲聲新透綠窗紗。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "春天",
      "写景",
      "月夜"
    ],
    "title": "月夜",
    "id": "c1f3a5b7-8d9e-0f1a-2b3c-4d5e6f7a8b9"
  },
  {
    "author": "劉方平",
    "paragraphs": [
      "紗窗日落漸黃昏，金屋無人見淚痕。",
      "寂寞空庭春欲晚，梨花滿地不開門。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "宫怨",
      "伤春",
      "抒情"
    ],
    "title": "春怨",
    "id": "d3a5b7c9-0e1f-2a3b-4c5d-6e7f8a9b0c1"
  },
  {
    "author": "柳中庸",
    "paragraphs": [
      "歲歲金河復玉關，朝朝馬策與刀環。",
      "三春白雪歸青冢，萬里黃河繞黑山。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "边塞",
      "战争",
      "抒情"
    ],
    "title": "征怨",
    "id": "e5b7c9d1-2f3a-4b5c-6d7e-8f9a0b1c2d3"
  },
  {
    "author": "嚴維",
    "paragraphs": [
      "故關衰草遍，離別正堪悲。",
      "路出寒雲外，人歸暮雪時。",
      "少孤為客早，多難識君遲。",
      "掩淚空相向，風塵何所期。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "送别",
      "友情",
      "冬天"
    ],
    "title": "送李端",
    "id": "f7c9d1e3-4a5b-6c7d-8e9f-0a1b2c3d4e5"
  },
  {
    "author": "顧況",
    "paragraphs": [
      "玉樓天半起笙歌，風送宮嬪笑語和。",
      "月殿影開聞夜漏，水精簾卷近銀河。"
    ],
    "tags": [
      "唐",
      "七言绝句",
      "宫廷",
      "写景",
      "抒情"
    ],
    "title": "宮詞",
    "id": "a9d1e3f5-6b7c-8d9e-0f1a-2b3c4d5e6f7"
  },
  {
    "author": "裴迪",
    "paragraphs": [
      "歸山深淺去，須盡丘壑美。",
      "莫學武陵人，暫游桃源裡。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "送别",
      "隐居",
      "劝诫"
    ],
    "title": "送崔九",
    "id": "b1e3f5a7-8c9d-0e1f-2a3b-4c5d6e7f8a9"
  },
  {
    "author": "丘為",
    "paragraphs": [
      "東風何時至？已吹湘水綠。",
      "日日望鄉國，行人在空谷。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "思乡",
      "春天",
      "抒情"
    ],
    "title": "思鄉",
    "id": "c3f5a7b9-0d1e-2f3a-4b5c-6d7e8f90a1b"
  },
  {
    "author": "祖詠",
    "paragraphs": [
      "終南陰嶺秀，積雪浮雲端。",
      "林表明霽色，城中增暮寒。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "写雪",
      "冬天",
      "写景"
    ],
    "title": "終南望餘雪",
    "id": "d5a7b9c1-2e3f-4a5b-6c7d-8e9f0a1b2c3"
  },
  {
    "author": "綦毋潛",
    "paragraphs": [
      "幽意無斷絕，此去隨所偶。",
      "晚風吹行舟，花路入溪口。",
      "際夜轉西壑，隔山望南斗。",
      "潭煙飛溶溶，林月低向後。",
      "生事且彌漫，願為持竿叟。"
    ],
    "tags": [
      "唐",
      "五言古诗",
      "山水",
      "隐居",
      "抒情"
    ],
    "title": "春泛若耶溪",
    "id": "e7b9c1d3-4f5a-6b7c-8d9e-0f1a2b3c4d5"
  },
  {
    "author": "常建",
    "paragraphs": [
      "清晨入古寺，初日照高林。",
      "曲徑通幽處，禪房花木深。",
      "山光悅鳥性，潭影空人心。",
      "萬籟此俱寂，但餘鐘磬音。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "寺庙",
      "写景",
      "静谧"
    ],
    "title": "題破山寺後禪院",
    "id": "f9c1d3e5-6a7b-8c9d-0e1f-2a3b4c5d6e7"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "海上生明月，天涯共此時。",
      "情人怨遙夜，竟夕起相思。",
      "滅燭憐光滿，披衣覺露滋。",
      "不堪盈手贈，還寢夢佳期。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "中秋",
      "思念",
      "月亮"
    ],
    "title": "望月懷遠",
    "id": "a1d3e5f7-8b9c-0d1e-2f3a-4b5c6d7e8f9"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "蘭葉春葳蕤，桂華秋皎潔。",
      "欣欣此生意，自爾為佳節。",
      "誰知林棲者，聞風坐相悅。",
      "草木有本心，何求美人折。"
    ],
    "tags": [
      "唐",
      "五言古诗",
      "咏物",
      "品格",
      "抒情"
    ],
    "title": "感遇·其一",
    "id": "b3e5f7a9-0c1d-2e3f-4a5b-6c7d8e9f0a1b"
  },
  {
    "author": "宋之問",
    "paragraphs": [
      "嶺外音書斷，經冬復歷春。",
      "近鄉情更怯，不敢問來人。"
    ],
    "tags": [
      "唐",
      "五言绝句",
      "思乡",
      "羁旅",
      "抒情"
    ],
    "title": "渡漢江",
    "id": "c5f7a9b1-2d3e-4f5a-6b7c-8d9e0f1a2b3"
  },
  {
    "author": "王勃",
    "paragraphs": [
      "城闕輔三秦，風煙望五津。",
      "與君離別意，同是宦遊人。",
      "海內存知己，天涯若比鄰。",
      "無為在歧路，兒女共沾巾。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "送别",
      "友情",
      "劝慰"
    ],
    "title": "送杜少府之任蜀州",
    "id": "d7a9b1c3-4e5f-6a7b-8c9d-0e1f2a3b4c5"
  },
  {
    "author": "杜審言",
    "paragraphs": [
      "独有宦游人，偏惊物候新。",
      "云霞出海曙，梅柳渡江春。",
      "淑气催黄鸟，晴光转绿苹。",
      "忽闻歌古调，归思欲沾巾。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "春天",
      "思乡",
      "抒情"
    ],
    "title": "和晋陵陆丞早春游望",
    "id": "e9b1c3d5-6f7a-8b9c-0d1e-2f3a4b5c6d7"
  },
  {
    "author": "王灣",
    "paragraphs": [
      "客路青山外，行舟绿水前。",
      "潮平两岸阔，风正一帆悬。",
      "海日生残夜，江春入旧年。",
      "乡书何处达？归雁洛阳边。"
    ],
    "tags": [
      "唐",
      "五言律诗",
      "行旅",
      "思乡",
      "写景"
    ],
    "title": "次北固山下",
    "id": "f1c3d5e7-8a9b-0c1d-2e3f-4a5b6c7d8e9"
  },
  {
    "author": "明皇帝",
    "paragraphs": [
      "夫子何爲者？栖栖一代中。",
      "地猶鄹氏邑，宅即魯王宮。",
      "歎鳳嗟身否，傷麟怨道窮。",
      "今看兩楹奠，當與夢時同。"
    ],
    "tags": [
      "唐诗三百首",
      "伤怀",
      "写人",
      "五言律诗"
    ],
    "title": "經鄒魯祭孔子而歎之",
    "id": "a1824eb8-4e2e-4d53-9a33-e1dcfe7d1c73"
  },
  {
    "author": "李白",
    "paragraphs": [
      "君不見黃河之水天上來，奔流到海不復回。",
      "君不見高堂明鏡悲白髮，朝如青絲暮成雪。",
      "人生得意須盡歡，莫使金尊空對月。",
      "天生我材必有用，千金散盡還復來。",
      "烹羊宰牛且爲樂，會須一飲三百杯。",
      "岑夫子，丹丘生，將進酒，杯莫停。",
      "與君歌一曲，請君爲我側耳聽。",
      "鐘鼓饌玉不足貴，但願長醉不復醒。",
      "古來聖賢皆寂寞，惟有飲者留其名。",
      "陳王昔時宴平樂，斗酒十千恣歡謔。",
      "主人何爲言少錢，徑須酤取對君酌。",
      "五花馬，千金裘，呼兒將出換美酒，與爾同銷萬古愁。"
    ],
    "tags": [
      "唐诗三百首",
      "黄河",
      "咏物",
      "抒情",
      "鼓吹曲辞",
      "乐府",
      "宴饮",
      "哲理",
      "水",
      "咏物诗"
    ],
    "title": "將進酒",
    "id": "0f7504df-cda2-4fe2-bc63-867ec2e418e7"
  },
  {
    "author": "王建",
    "paragraphs": [
      "三日入廚下，洗手作羹湯。",
      "未諳姑食性，先遣小姑嘗。"
    ],
    "tags": [
      "唐诗三百首",
      "新婚",
      "五言绝句",
      "女子",
      "生活"
    ],
    "title": "新嫁娘詞三首 三",
    "id": "efaaa86e-5628-40d3-a137-1ae8fcbe41b8"
  },
  {
    "author": "王建",
    "paragraphs": [
      "寥落古行宮，宮花寂寞紅。",
      "白頭宮女在，閑坐說玄宗。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "怀古",
      "宫怨",
      "五言绝句"
    ],
    "title": "故行宮",
    "id": "a6c85d29-ad02-4f54-a347-63800213a7b4"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "錦瑟無端五十絃，一絃一柱思華年。",
      "莊生曉夢迷蝴蝶，望帝春心託杜鵑。",
      "滄海月明珠有淚，藍田日暖玉生煙。",
      "此情可待成追憶，只是當時已惘然。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "七言律诗",
      "抒情",
      "爱情"
    ],
    "title": "錦瑟",
    "id": "e0eb3016-9288-4dc0-9257-3de36e5ad73c"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "本以高難飽，徒勞恨費聲。",
      "五更疎欲斷，一樹碧無情。",
      "薄宦梗猶汎，故園蕪已平。",
      "煩君最相警，我亦舉家清。"
    ],
    "tags": [
      "唐诗三百首",
      "咏物",
      "咏物诗",
      "五言律诗"
    ],
    "title": "蟬",
    "id": "b3de619f-cc8b-457d-942b-49f06651aba4"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "向晚意不適，驅車登古原。",
      "夕陽無限好，只是近黃昏。"
    ],
    "tags": [
      "唐诗三百首",
      "惜时",
      "哲理"
    ],
    "title": "樂遊原",
    "id": "d7c6d072-6e84-482e-856a-5a4c21226a3c"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "元和天子神武姿，彼何人哉軒與羲。",
      "誓將上雪列聖恥，坐法宮中朝四夷。",
      "淮西有賊五十載，封狼生貙貙生羆。",
      "不據山河據平地，長戈利矛日可麾。",
      "帝得聖相相曰度，賊斫不死神扶持。",
      "腰懸相印作都統，陰風慘澹天王旗。",
      "愬武古通作牙爪，儀曹外郎載筆隨。",
      "行軍司馬智且勇，十四萬衆猶虎貔。",
      "入蔡縛賊獻太廟，功無與讓恩不訾。",
      "帝曰汝度功第一，汝從事愈宜爲辭。",
      "愈拜稽首蹈且舞，金石刻畫臣能爲。",
      "古者世稱大手筆，此事不繫于職司。",
      "當仁自古有不讓，言訖屢頷天子頤。",
      "公退齋戒坐小閣，濡染大筆何淋漓。",
      "點竄堯典舜典字，塗改清廟生民詩。",
      "文成破體書在紙，清晨再拜鋪丹墀。",
      "表曰臣愈昧死上，詠神聖功書之碑。",
      "碑高三丈字如斗，負以靈鼇蟠以螭。",
      "句奇語重喻者少，讒之天子言其私。",
      "長繩百尺拽碑倒，麤砂大石相磨治。",
      "公之斯文若元氣，先時已入人肝脾。",
      "湯盤孔鼎有述作，今無其器存其辭。",
      "嗚呼聖皇及聖相，相與烜赫流淳熙。",
      "公之斯文不示後，曷與三五相攀追。",
      "願書萬本誦萬過，口角流沫右手胝。",
      "傳之七十有二代，以爲封禪玉檢明堂基。"
    ],
    "tags": [
      "唐诗三百首",
      "叙事",
      "七言古诗",
      "咏史"
    ],
    "title": "韓碑",
    "id": "0d2c5fba-d350-4c3f-b55e-72a491a84df6"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "淒涼寶劍篇，羈泊欲窮年。",
      "黃葉仍風雨，青樓自管絃。",
      "新知遭薄俗，舊好隔良緣。",
      "心斷新豐酒，銷愁斗幾千。"
    ],
    "tags": [
      "唐诗三百首",
      "风雨",
      "五言律诗",
      "怀才不遇"
    ],
    "title": "風雨",
    "id": "d32a2610-09d7-49ad-8cdf-dd9c649144c7"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "嵩雲秦樹久離居，雙鯉迢迢一紙書。",
      "休問梁園舊賓客，茂陵秋雨病相如。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "写景",
      "七言绝句",
      "友情"
    ],
    "title": "寄令狐郎中",
    "id": "fb376b71-91c6-44ee-b2e4-40f5b3f71b8f"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "紫泉宮殿鎖煙霞，欲取蕪城作帝家。",
      "玉璽不緣歸日角，錦帆應是到天涯。",
      "于今腐草無螢火，終古垂楊有暮鴉。",
      "地下若逢陳後主，豈宜重問後庭花。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "讽刺",
      "咏史"
    ],
    "title": "隋宮",
    "id": "670009c2-a701-4140-aa31-b4973f76d632"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "猿鳥猶疑畏簡書，風雲常爲護儲胥。",
      "徒令上將揮神筆，終見降王走傳車。",
      "管樂有才終不忝，關張無命欲何如。",
      "他年錦里經祠廟，梁父吟成恨有餘。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "七言律诗",
      "典故",
      "写人",
      "咏史怀古"
    ],
    "title": "籌筆驛",
    "id": "131c9f87-273f-4684-9b67-bd7b58ad4008"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "昨夜星辰昨夜風，畫樓西畔桂堂東。",
      "身無綵鳳雙飛翼，心有靈犀一點通。",
      "隔座送鉤春酒暖，分曹射覆蠟燈紅。",
      "嗟余聽鼓應官去，走馬蘭臺類斷蓬。"
    ],
    "tags": [
      "唐诗三百首",
      "宴饮",
      "七言律诗",
      "爱情",
      "相思",
      "感慨",
      "组诗"
    ],
    "title": "無題二首 一",
    "id": "3410e7ce-df3a-4ab8-bea3-7f681661b240"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "來是空言去絕踪，月斜樓上五更鐘。",
      "夢爲遠別啼難喚，書被催成墨未濃。",
      "蠟照半籠金翡翠，麝熏微度繡芙蓉。",
      "劉郎已恨蓬山遠，更隔蓬山一萬重。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "记梦",
      "七言律诗",
      "爱情"
    ],
    "title": "無題四首 一",
    "id": "7377e34a-1aab-47e3-a6dd-376c98a5d6b7"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "颯颯東風細雨來，芙蓉塘外有輕雷。",
      "金蟾齧鏁燒香入，玉虎牽絲汲井迴。",
      "賈氏窺簾韓掾少，宓妃留枕魏王才。",
      "春心莫共花爭發，一寸相思一寸灰。"
    ],
    "tags": [
      "唐诗三百首",
      "相思",
      "女子",
      "爱情",
      "七言律诗"
    ],
    "title": "無題四首 二",
    "id": "811a5f9e-0df5-46f1-a587-0d4df7bca5a0"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "乘興南遊不戒嚴，九重誰省諫書函。",
      "春風舉國裁宮錦，半作障泥半作帆。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "咏史怀古",
      "讽刺"
    ],
    "title": "隋宮",
    "id": "91f95b30-c42f-470a-9df8-dd6284fca474"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "高閣客竟去，小園花亂飛。",
      "參差連曲陌，迢遰送斜暉。",
      "腸斷未忍掃，眼穿仍欲歸。",
      "芳心向春盡，所得是沾衣。"
    ],
    "tags": [
      "唐诗三百首",
      "咏物",
      "五言律诗",
      "写花",
      "抒怀",
      "花",
      "咏物诗"
    ],
    "title": "落花",
    "id": "da157c27-d317-4205-9cdc-a254445659fc"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "爲有雲屏無限嬌，鳳城寒盡怕春宵。",
      "無端嫁得金龜壻，辜負香衾事早朝。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "怨情"
    ],
    "title": "爲有",
    "id": "974914ee-1fc0-4952-a863-820bad2e4065"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "瑤池阿母綺窗開，黃竹歌聲動地哀。",
      "八駿日行三萬里，穆王何事不重來。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "神话",
      "讽刺"
    ],
    "title": "瑤池",
    "id": "2161a569-6250-4886-9500-2168821b62be"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "悵臥新春白袷衣，白門寥落意多違。",
      "紅樓隔雨相望冷，珠箔飄燈獨自歸。",
      "遠路應悲春晼晚，殘宵猶得夢依稀。",
      "玉璫緘札何由達，萬里雲羅一雁飛。"
    ],
    "tags": [
      "唐诗三百首",
      "写雨",
      "七言律诗",
      "爱情",
      "雨"
    ],
    "title": "春雨",
    "id": "8331c76b-a250-4d07-9c28-b8a456e0974c"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "雲母屏風燭影深，長河漸落曉星沈。",
      "常娥應悔偷靈藥，碧海青天夜夜心。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "中秋",
      "写人",
      "三年级下册",
      "七言绝句",
      "小学古诗"
    ],
    "title": "常娥",
    "id": "f7c9c409-9571-4eb8-abd9-91ec6c1ff564"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "鳳尾香羅薄幾重，碧文圓頂夜深縫。",
      "扇裁月魄羞難掩，車走雷聲語未通。",
      "曾是寂寥金燼暗，斷無消息石榴紅。"
    ],
    "tags": [
      "思念",
      "七言律诗",
      "唐诗三百首"
    ],
    "title": "無題二首 一",
    "id": "e006dfd3-40be-40ef-ba3b-552428931ae3"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "重帷深下莫愁堂，臥後清宵細細長。",
      "神女生涯原是夢，小姑居處本無郎。",
      "風波不信菱枝弱，月露誰教桂葉香。",
      "直道相思了無益，未妨惆悵是清狂。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "七言律诗",
      "抒情",
      "爱情"
    ],
    "title": "無題二首 二",
    "id": "b6475dea-1d69-4f0d-b98a-39393f47741e"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "宣室求賢訪逐臣，賈生才調更無倫。",
      "可憐夜半虛前席，不問蒼生問鬼神。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "托古讽今",
      "七言绝句",
      "怀才不遇"
    ],
    "title": "賈生",
    "id": "02456f60-6ab5-4de8-b9ed-f7519818f0ca"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "客去波平檻，蟬休露滿枝。",
      "永懷當此節，倚立自移時。",
      "北斗兼春遠，南陵寓使遲。",
      "天涯占夢數，疑誤有新知。"
    ],
    "tags": [
      "唐诗三百首",
      "愁思",
      "五言律诗"
    ],
    "title": "涼思",
    "id": "15c6cbc9-753a-4f09-86bf-4fe2d8bb1fee"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "殘陽西入崦，茅屋訪孤僧。",
      "落葉人何在，寒雲路幾層。",
      "獨敲初夜磬，閑倚一枝藤。",
      "世界微塵裏，吾寧愛與憎。"
    ],
    "tags": [
      "唐诗三百首",
      "寻访",
      "五言律诗"
    ],
    "title": "北青蘿",
    "id": "9380d4f6-e19d-4ff1-8309-07f4ede69f7c"
  },
  {
    "author": "韋莊",
    "paragraphs": [
      "清瑟怨遙夜，遶弦風雨哀。",
      "孤燈聞楚角，殘月下章臺。",
      "芳草已云暮，故人殊未來。",
      "鄉書不可寄，秋雁又南迴。"
    ],
    "tags": [
      "唐诗三百首",
      "怀人",
      "思乡",
      "五言律诗"
    ],
    "title": "章臺夜思",
    "id": "19796737-ec7b-4c33-8df4-a81a7ca2cc10"
  },
  {
    "author": "韋莊",
    "paragraphs": [
      "誰謂傷心畫不成，畫人心逐世人情。",
      "君看六幅南朝事，老木寒雲滿故城。"
    ],
    "tags": [
      "隋・唐・五代",
      "唐诗三百首",
      "题画",
      "七言绝句",
      "咏史怀古",
      "带有地名",
      "地名"
    ],
    "title": "金陵圖",
    "id": "4c5b328d-2ab8-4f4d-a0c2-627b6cb0c92b"
  },
  {
    "author": "韋莊",
    "paragraphs": [
      "江雨霏霏江草齊，六朝如夢鳥空啼。",
      "無情最是臺城柳，依舊煙籠十里堤。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "写景",
      "抒情",
      "咏史怀古"
    ],
    "title": "臺城",
    "id": "9154fc22-5e19-45b7-a506-435298bb26fc"
  },
  {
    "author": "薛逢",
    "paragraphs": [
      "十二樓中盡曉妝，望仙樓上望君王。",
      "鎖銜金獸連環冷，水滴銅龍晝漏長。",
      "雲髻罷梳還對鏡，羅衣欲換更添香。",
      "遙窺正殿簾開處，袍袴宮人掃御牀。"
    ],
    "tags": [
      "唐诗三百首",
      "宫怨",
      "七言律诗"
    ],
    "title": "宮詞",
    "id": "f8d102c4-b25b-412f-afce-35db35c339d9"
  },
  {
    "author": "馬戴",
    "paragraphs": [
      "露氣寒光集，微陽下楚丘。",
      "猨啼洞庭樹，人在木蘭舟。",
      "廣澤生明月，蒼山夾亂流。",
      "雲中君不降，竟夕自悲秋。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "写景",
      "五言律诗",
      "怀古"
    ],
    "title": "楚江懷古三首 一",
    "id": "7456691c-636e-46d7-9093-edc778b0a7ea"
  },
  {
    "author": "馬戴",
    "paragraphs": [
      "灞原風雨定，晚見鴈行頻。",
      "落葉他鄉樹，寒燈獨夜人。",
      "空園白露滴，孤壁野僧隣。",
      "寄臥郊扉久，何門致此身。"
    ],
    "tags": [
      "唐诗三百首",
      "孤独",
      "秋天",
      "五言律诗",
      "怀才不遇"
    ],
    "title": "灞上秋居",
    "id": "f2f04c30-149d-4b2b-bce1-1334adf84739"
  },
  {
    "author": "鄭畋",
    "paragraphs": [
      "[玄]宗回馬楊妃死，雲雨雖亡日月新。",
      "終是聖明天子事，景陽宮井又何人。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "带有地名",
      "咏史",
      "地名"
    ],
    "title": "馬嵬坡",
    "id": "7e75853a-bf7a-4d8d-b3e9-0537f4ed913a"
  },
  {
    "author": "張籍",
    "paragraphs": [
      "前年伐月支，城上沒全師。",
      "蕃漢斷消息，死生長別離。",
      "無人收廢帳，歸馬識殘旗。",
      "欲祭疑君在，天涯哭此時。"
    ],
    "tags": [
      "唐诗三百首",
      "怀人",
      "五言律诗"
    ],
    "title": "沒蕃故人",
    "id": "5ccd5188-0e5d-450e-8ec5-d6e661fac4f7"
  },
  {
    "author": "元稹",
    "paragraphs": [
      "謝公最小偏憐女，嫁與黔婁百事乖。",
      "顧我無衣搜畫篋，泥他沽酒拔金釵。",
      "野蔬充膳甘長藿，落葉添薪仰古槐。",
      "今日俸錢過十萬，與君營奠復營齋。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "悼亡"
    ],
    "title": "遣悲懷三首 一",
    "id": "8b57e03d-6d1f-4a4a-ba34-1f58e2551ca1"
  },
  {
    "author": "元稹",
    "paragraphs": [
      "昔日戲言身後意，今朝皆到眼前來。",
      "衣裳已施行看盡，針線猶存未忍開。",
      "尚想舊情憐婢僕，也曾因夢送錢財。",
      "誠知此恨人人有，貧賤夫妻百事哀。"
    ],
    "tags": [
      "唐诗三百首",
      "思念",
      "追忆",
      "悼亡",
      "七言律诗"
    ],
    "title": "遣悲懷三首 二",
    "id": "ea3f91f0-487e-4df7-826a-3692ef82e64d"
  },
  {
    "author": "元稹",
    "paragraphs": [
      "閑坐悲君亦自悲，百年都是幾多時。",
      "鄧攸無子尋知命，潘岳悼亡猶費詞。",
      "同穴窅冥何所望，他生緣會更難期。",
      "唯將終夜長開眼，報荅平生未展眉。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "悼亡"
    ],
    "title": "遣悲懷三首 三",
    "id": "82f57261-b608-4ee9-8d88-7fde20c49a7a"
  },
  {
    "author": "西鄙人",
    "paragraphs": [
      "北斗七星高，哥舒夜帶刀。",
      "至今窺牧馬，不敢過臨洮。"
    ],
    "tags": [
      "唐诗三百首",
      "赞颂",
      "五言绝句",
      "民歌"
    ],
    "title": "哥舒歌",
    "id": "ac2ec0ba-10b1-4ae3-8859-1e7752625331"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "近寒食雨草萋萋，著麥苗風柳映堤。",
      "早是有家歸未得，杜鵑休向耳邊啼。"
    ],
    "tags": [
      "唐诗三百首",
      "寒食节",
      "七言绝句",
      "思乡",
      "感伤"
    ],
    "title": "雜詩 十三",
    "id": "31e9a6b0-5035-4b1b-a9d3-ff1c279f53b6"
  },
  {
    "author": "沈佺期",
    "paragraphs": [
      "聞道黃龍戍，頻年不解兵。",
      "可憐閨裏月，長在漢家營。",
      "少婦今春意，良人昨夜情。",
      "誰能將旗鼓，一爲取龍城。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "妇女",
      "五言律诗",
      "相思"
    ],
    "title": "雜詩三首 三",
    "id": "1fb10ea4-f46c-4c08-bd06-f039f1907be6"
  },
  {
    "author": "張旭",
    "paragraphs": [
      "隱隱飛橋隔野煙，石磯西畔問漁船。",
      "桃花盡日隨流水，洞在清谿何處邊。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "写景",
      "抒情",
      "七言绝句",
      "写水"
    ],
    "title": "桃花谿",
    "id": "1f28ab03-8388-4a2f-8c4f-3ce47789e221"
  },
  {
    "author": "王維",
    "paragraphs": [
      "下馬飲君酒，問君何所之。",
      "君言不得意，歸臥南山陲。",
      "但去莫復問，白雲無盡時。"
    ],
    "tags": [
      "唐诗三百首",
      "抒情",
      "写景",
      "友情",
      "送别"
    ],
    "title": "送別",
    "id": "31cc87f3-da0f-421d-8674-8753530077e2"
  },
  {
    "author": "王維",
    "paragraphs": [
      "聖代無隱者，英靈盡來歸。",
      "遂令東山客，不得顧采薇。",
      "既至君門遠，孰云吾道非。",
      "江淮度寒食，京洛縫春衣。",
      "置酒臨長道，同心與我違。",
      "行當浮桂櫂，未幾拂荆扉。",
      "遠樹帶行客，孤村當落暉。",
      "吾謀適不用，勿謂知音稀。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言古诗",
      "慰勉",
      "友情"
    ],
    "title": "送綦毋潛落第還鄉",
    "id": "56bec3c2-9c0c-4d40-9750-2e28bdc9a20e"
  },
  {
    "author": "王維",
    "paragraphs": [
      "言入黃花川，每逐青谿水。",
      "隨山將萬轉，趣途無百里。",
      "聲喧亂石中，色靜深松裏。",
      "漾漾汎菱荇，澄澄映葭葦。",
      "我心素已閑，清川澹如此。",
      "請留盤石上，垂釣將已矣。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "托物寄情",
      "山水"
    ],
    "title": "青谿",
    "id": "a0576d39-c4ac-4608-a4e2-249b6c31fd1d"
  },
  {
    "author": "王維",
    "paragraphs": [
      "斜陽照墟落，窮巷牛羊歸。",
      "野老念牧童，倚杖候荆扉。",
      "雉雊麥苗秀，蠶眠桑葉稀。",
      "田夫荷鋤至，相見語依依。",
      "即此羨閑逸，悵然吟式微。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "归隐",
      "田园"
    ],
    "title": "渭川田家",
    "id": "204e287b-8194-4c2d-808b-11cc260412ae"
  },
  {
    "author": "王維",
    "paragraphs": [
      "豔色天下重，西施寧久微。",
      "朝仍越溪女，暮作吳宮妃。",
      "賤日豈殊衆，貴來方悟稀。",
      "邀人傅香粉，不自著羅衣。",
      "君寵益嬌態，君憐無是非。",
      "當時浣紗伴，莫得同車歸。",
      "持謝鄰家子，效顰安可希。"
    ],
    "tags": [
      "唐诗三百首",
      "隋・唐・五代",
      "五言古诗",
      "怀古",
      "写人",
      "怀才不遇"
    ],
    "title": "西施詠",
    "id": "4d6f83e9-8232-4db1-903e-f9e619df5ecb"
  },
  {
    "author": "王維",
    "paragraphs": [
      "少年十五二十時，步行奪得胡馬射。",
      "射殺中山白額虎，肯數鄴下黃鬚兒。",
      "一身轉戰三千里，一劒曾當百萬師。",
      "漢兵奮迅如霹靂，虜騎崩騰畏蒺藜。",
      "衞青不敗由天幸，李廣無功緣數奇。",
      "自從棄置便衰朽，世事磋跎成白首。",
      "昔時飛箭無全目，今日垂楊生左肘。",
      "路傍時賣故侯瓜，門前學種先生柳。",
      "蒼茫古木連窮巷，寥落寒山對虛牖。",
      "誓令疏勒出飛泉，不似潁川空使酒。",
      "賀蘭山下陣如雲，羽檄交馳日夕聞。",
      "節使三河募年少，詔書五道出將軍。",
      "試拂鐵衣如雪色，聊持寶劒動星文。",
      "願得燕弓射天將，恥令越甲鳴吳軍。",
      "莫嫌舊日雲中守，猶堪一戰取功勳。"
    ],
    "tags": [
      "唐诗三百首",
      "乐府",
      "写人",
      "新乐府辞",
      "赞颂"
    ],
    "title": "老將行",
    "id": "d5d66aff-b6ae-48cc-9160-16b096d4ea49"
  },
  {
    "author": "王維",
    "paragraphs": [
      "漁舟逐水愛山春，兩岸桃花夾去津。",
      "坐看紅樹不知遠，行盡青溪不見人。",
      "山口潛行始隈隩，山開曠望旋平陸。",
      "遙看一處攢雲樹，近入千家散花竹。",
      "樵客初傳漢姓名，居人未改秦衣服。",
      "居人共住武陵源，還從物外起田園。",
      "月明松下房櫳靜，日出雲中雞犬喧。",
      "驚聞俗客爭來集，競引還家問都邑。",
      "平明閭巷埽花開，薄暮漁樵乘水入。",
      "初因避地去人間，及至成仙遂不還。",
      "峽裏誰知有人事，世中遙望空雲山。",
      "不疑靈境難聞見，塵心未盡思鄉縣。",
      "出洞無論隔山水，辭家終擬長游衍。",
      "自謂經過舊不迷，安知峰壑今來變。",
      "當時只記入山深，青溪幾曲到雲林。",
      "春來遍是桃花水，不辨仙源何處尋。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "乐府",
      "新乐府辞",
      "水"
    ],
    "title": "桃源行",
    "id": "3b847cf5-16b1-449d-a436-e5995c6433c4"
  },
  {
    "author": "王維",
    "paragraphs": [
      "洛陽女兒對門居，纔可容顏十五餘。",
      "良人玉勒乘驄馬，侍女金盤鱠鯉魚。",
      "畫閣朱樓盡相望，紅桃綠柳垂簷向。",
      "羅幃送上七香車，寶扇迎歸九華帳。",
      "狂夫富貴在青春，意氣驕奢劇季倫。",
      "自憐碧玉親教舞，不惜珊瑚持與人。",
      "春窗曙滅九微火，九微片片飛花璅。",
      "戲罷曾無理曲時，妝成秪是薰香坐。",
      "城中相識盡繁華，日夜經過趙李家。",
      "誰憐越女顏如玉，貧賤江頭自浣紗。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "女子",
      "乐府",
      "新乐府辞"
    ],
    "title": "洛陽女兒行",
    "id": "4925c861-b0f8-4b2f-923e-9cba2df1323e"
  },
  {
    "author": "王維",
    "paragraphs": [
      "寒山轉蒼翠，秋水日潺湲。",
      "倚杖柴門外，臨風聽暮蟬。",
      "渡頭餘落日，墟里上孤煙。",
      "復值接輿醉，狂歌五柳前。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "抒情",
      "秋天",
      "五言律诗"
    ],
    "title": "輞川閑居贈裴秀才迪",
    "id": "a2b4e8ca-92e3-4101-8a54-739b8f1d8184"
  },
  {
    "author": "王維",
    "paragraphs": [
      "晚年唯好靜，萬事不關心。",
      "自顧無長策，空知返舊林。",
      "松風吹解帶，山月照彈琴。",
      "君問窮通理，漁歌入浦深。"
    ],
    "tags": [
      "唐诗三百首",
      "赠别",
      "友情",
      "规劝",
      "五言律诗"
    ],
    "title": "酬張少府",
    "id": "65e9c24b-bdbd-4ef9-9e14-012c8fde79b8"
  },
  {
    "author": "王維",
    "paragraphs": [
      "萬壑樹參天，千山響杜鵑。",
      "山中一夜雨，樹杪百重泉。",
      "漢女輸橦布，巴人訟芋田。",
      "文翁翻教授，不敢倚先賢。"
    ],
    "tags": [
      "唐诗三百首",
      "友情",
      "送别",
      "五言律诗"
    ],
    "title": "送梓州李使君",
    "id": "263b4a33-fd51-47e1-b49a-d84dd99a2e0f"
  },
  {
    "author": "韓愈",
    "paragraphs": [
      "山石犖確行徑微，黃昏到寺蝙蝠飛。",
      "升堂坐階新雨足，芭蕉葉大支子肥。",
      "僧言古壁佛畫好，以火來照所見稀。",
      "鋪牀拂席置羹飯，疎糲亦足飽我飢。",
      "夜深靜臥百蟲絕，清月出嶺光入扉。",
      "天明獨去無道路，出入高下窮煙霏。",
      "山紅澗碧紛爛漫，時見松櫪皆十圍。",
      "當流赤足蹋澗石，水聲激激風吹衣。",
      "人生如此自可樂，豈必局束爲人鞿。",
      "嗟哉吾黨二三子，安得至老不更歸。"
    ],
    "tags": [
      "唐诗三百首",
      "纪游",
      "写景",
      "抒情",
      "七言古诗"
    ],
    "title": "山石",
    "id": "e73e2743-3752-4ba3-938a-fb59cd3965ee"
  },
  {
    "author": "韓愈",
    "paragraphs": [
      "纖雲四卷天無河，清風吹空月舒波。",
      "沙平水息聲影絕，一桮相屬君當歌。",
      "君歌聲酸辭且苦，不能聽終淚如雨。",
      "洞庭連天九疑高，蛟龍出沒猩鼯號。",
      "十生九死到官所，幽居默默如藏逃。",
      "下牀畏蛇食畏藥，海氣濕蟄熏腥臊。",
      "昨者州前搥大鼓，嗣皇繼聖登夔臯。",
      "赦書一日行萬里，罪從大辟皆除死。",
      "遷者追廻流者還，滌瑕蕩垢清朝班。",
      "州家申名使家抑，坎軻祗得移荆蠻。",
      "判司卑官不堪說，未免捶楚塵埃間。",
      "同時輩流多上道，天路幽險難追攀。",
      "君歌且休聽我歌，我歌今與君殊科。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "中秋节",
      "七言古诗",
      "抒怀",
      "饮酒"
    ],
    "title": "八月十五夜贈張功曹",
    "id": "88e98bed-27fa-4dbe-8d6e-e7cb8c3e4d97"
  },
  {
    "author": "韓愈",
    "paragraphs": [
      "五嶽祭秩皆三公，四方環鎮嵩當中。",
      "火維地荒足妖怪，天假神柄專其雄。",
      "噴雲泄霧藏半腹，雖有絕頂誰能窮。",
      "我來正逢秋雨節，陰氣晦昧無清風。",
      "潛心默禱若有應，豈非正直能感通。",
      "須臾靜掃衆峰出，仰見突兀撐青空。",
      "紫蓋連延接天柱，石廩騰擲堆祝融。",
      "森然魄動下馬拜，松柏一逕趨靈宮。",
      "粉牆丹柱動光彩，鬼物圖畫填青紅。",
      "升階傴僂薦脯酒，欲以菲薄明其衷。",
      "廟令老人識神意，睢盱偵伺能鞠躬。",
      "手持桮珓導我擲，云此最吉餘難同。",
      "竄逐蠻荒幸不死，衣食纔足甘長終。",
      "侯王將相望久絕，神縱欲福難爲功。",
      "夜投佛寺上高閣，星月掩暎雲朣朧。",
      "猿鳴鐘動不知曙，杲杲寒日生於東。"
    ],
    "tags": [
      "唐诗三百首",
      "登高",
      "七言古诗",
      "寺庙"
    ],
    "title": "謁衡嶽廟遂宿嶽寺題門樓",
    "id": "14ae27a0-2641-41e6-8c0a-60a9185f8b6d"
  },
  {
    "author": "韓偓",
    "paragraphs": [
      "碧闌干外繡簾垂，猩血屏風畫折枝。",
      "八尺龍鬚方錦褥，已涼天氣未寒時。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "爱情",
      "写景",
      "婉约"
    ],
    "title": "已涼",
    "id": "1deac6d5-6da0-4d9f-a182-2f0697cbb932"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "清時有味是無能，閑愛孤雲靜愛僧。",
      "欲把一麾江海去，樂遊原上望昭陵。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "爱国"
    ],
    "title": "將赴吳興登樂遊原一絕",
    "id": "24ca9268-9cbd-423b-b423-12e1a9aa9041"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "娉娉褭褭十三餘，豆蔻梢頭二月初。",
      "春風十里揚州路，卷上珠簾總不如。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "贈別二首 一",
    "id": "54008cd0-f9bf-424f-bc55-f15c1e9025f3"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "多情却似總無情，唯覺尊前笑不成。",
      "蠟燭有心還惜別，替人垂淚到天明。"
    ],
    "tags": [
      "唐诗三百首",
      "离别",
      "七言绝句",
      "惜别"
    ],
    "title": "贈別二首 二",
    "id": "a7f425de-143b-493d-bb51-13e27c68e871"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "落魄江南載酒行，楚腰腸斷掌中輕。",
      "十年一覺揚州夢，贏得青樓薄倖名。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "抒怀"
    ],
    "title": "遣懷",
    "id": "92ae04dc-89af-45d6-9e31-204a01df801d"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "紅燭秋光冷畫屏，輕羅小扇撲流螢。",
      "天階夜色涼如水，坐看牽牛織女星。"
    ],
    "tags": [
      "唐诗三百首"
    ],
    "title": "秋夕",
    "id": "d12edd29-d467-4b19-b3f5-533fa5c8d56a"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "繁華事散逐香塵，流水無情草自春。",
      "日暮東風怨啼鳥，落花猶似墮樓人。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "怀古"
    ],
    "title": "金谷園",
    "id": "80159919-0b66-4956-a563-ef9bcf6a05c0"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "旅館無良伴，凝情自悄然。",
      "寒燈思舊事，斷鴈警愁眠。",
      "遠夢歸侵曉，家書到隔年。",
      "湘江好煙月，門繫釣魚船。"
    ],
    "tags": [
      "唐诗三百首",
      "羁旅",
      "思乡",
      "五言律诗"
    ],
    "title": "旅宿",
    "id": "200fe9fa-0221-4123-86de-4d63ce9d3daf"
  },
  {
    "author": "許渾",
    "paragraphs": [
      "遙夜泛清瑟，西風生翠蘿。",
      "殘螢委玉露，早鴈拂銀河。",
      "高樹曉還密，遠山晴更多。",
      "淮南一葉下，自覺老煙波。"
    ],
    "tags": [
      "写景",
      "秋天",
      "唐诗三百首",
      "五言律诗"
    ],
    "title": "早秋三首 一",
    "id": "fedb06cc-37da-4aaf-8f39-85ebcb08b947"
  },
  {
    "author": "許渾",
    "paragraphs": [
      "紅葉晚蕭蕭，長亭酒一瓢。",
      "殘雲歸太華，疎雨過中條。",
      "樹色隨山迥，河聲入海遙。",
      "帝鄉明日到，猶自夢漁樵。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "送别",
      "五言律诗"
    ],
    "title": "秋日赴闕題潼關驛樓",
    "id": "292c14cd-151f-4321-a94c-46fc86693eb3"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "淚濕羅巾夢不成，夜深前殿按歌聲。",
      "紅顏未老恩先斷，斜倚薰籠坐到明。"
    ],
    "tags": [
      "唐诗三百首",
      "七言绝句",
      "宫怨"
    ],
    "title": "後宮詞",
    "id": "549a5a94-a8f5-436e-bc9c-1253d01c1940"
  },
  {
    "author": "李益",
    "paragraphs": [
      "十年離亂後，長大一相逢。",
      "問姓驚初見，稱名憶舊容。",
      "別來滄海事，語罷暮天鐘。",
      "明日巴陵道，秋山又幾重。"
    ],
    "tags": [
      "唐诗三百首",
      "离别",
      "五言律诗"
    ],
    "title": "喜見外弟又言別",
    "id": "d755f74b-18fd-44d1-a6e1-43e77490bb09"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "孤雲將野鶴，豈向人間住。",
      "莫買沃洲山，時人已知處。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "五言绝句"
    ],
    "title": "送方外上人",
    "id": "c26445b5-a433-4cd7-9020-435866b845f9"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "蒼蒼竹林寺，杳杳鐘聲晚。",
      "荷笠帶夕陽，青山獨歸遠。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "抒情",
      "送别",
      "初中古诗",
      "即景抒情",
      "五言绝句",
      "七年级下册(课外)"
    ],
    "title": "送靈澈上人",
    "id": "a746d1f0-a72c-44d2-8b1c-c5c990749257"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "鄉心新歲切，天畔獨潸然。",
      "老至居人下，春歸在客先。",
      "嶺猨同旦暮，江柳共風煙。",
      "已是長沙傅，從今又幾年。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗",
      "春节",
      "思乡"
    ],
    "title": "新年作",
    "id": "6556f501-f5b9-4353-bde2-75ec0e1bb616"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "古臺搖落後，秋日望鄉心。",
      "野寺人來少，雲峰水隔深。",
      "夕陽依舊壘，寒磬滿空林。",
      "惆悵南朝事，長江獨至今。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "怀古",
      "秋天",
      "五言律诗"
    ],
    "title": "秋日登吳公臺上寺遠眺寺即陳將吳明徹戰場",
    "id": "fdc07d9f-95b8-45f7-b1b3-9d272b3416a4"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "一路經行處，莓苔見履痕。",
      "白雲依靜渚，春草閉閑門。",
      "過雨看松色，隨山到水源。",
      "溪花與禪意，相對亦忘言。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "五言律诗"
    ],
    "title": "尋南溪常山道人隱居",
    "id": "04af557e-bac8-4fbf-92e7-d8a87fa11038"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "望君煙水闊，揮手淚霑巾。",
      "飛鳥沒何處，青山空向人。",
      "長江一帆遠，落日五湖春。",
      "誰見汀洲上，相思愁白蘋。"
    ],
    "tags": [
      "唐诗三百首",
      "长江",
      "友情",
      "送别",
      "五言律诗"
    ],
    "title": "餞別王十一南遊",
    "id": "1487452b-5f49-4f4f-9913-1f3ec1cddf95"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "生涯豈料承優詔，世事空知學醉歌。",
      "江上月明胡鴈過，淮南木落楚山多。",
      "寄身且喜滄洲近，顧影無如白髮何。",
      "今日龍鍾人共棄，媿君猶遣慎風波。"
    ],
    "tags": [
      "唐诗三百首",
      "送别",
      "七言律诗"
    ],
    "title": "江州重別薛六柳八二員外",
    "id": "d9dd3520-9aab-4b1b-bd57-810f29391667"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "三年謫宦此棲遲，萬古惟留楚客悲。",
      "秋草獨尋人去後，寒林空見日斜時。",
      "漢文有道恩猶薄，湘水無情弔豈知。",
      "寂寂江山搖落處，憐君何事到天涯。"
    ],
    "tags": [
      "唐诗三百首",
      "迁谪",
      "生活",
      "怀古",
      "七言律诗"
    ],
    "title": "長沙過賈誼宅",
    "id": "8cefa67f-2b9a-4e13-8158-4d38cbfb331b"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "[汀]洲無浪復無煙，楚客相思益渺然。",
      "漢口夕陽斜渡鳥，洞庭秋水遠連天。",
      "孤城背嶺寒吹角，獨戍臨江夜泊船。",
      "賈誼上書憂漢室，長沙謫去古今憐。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "贬谪",
      "七言律诗",
      "触景感怀"
    ],
    "title": "自夏口至鸚鵡洲夕望岳陽寄源中丞",
    "id": "3f049d66-1513-407f-bb4e-cf25a7b5069a"
  },
  {
    "author": "崔曙",
    "paragraphs": [
      "漢文皇帝有高臺，此日登臨曙色開。",
      "三晉雲山皆北向，二陵風雨自東來。",
      "關門令尹誰能識，河上仙翁去不回。",
      "且欲近尋彭澤宰，陶然共醉菊花杯。"
    ],
    "tags": [
      "唐诗三百首",
      "七言律诗",
      "写景",
      "登高",
      "重阳节"
    ],
    "title": "九日登望仙臺呈劉明府容",
    "id": "1c1d545e-07a1-46a9-bb76-b7473c1fde43"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "北山白雲裏，隱者自怡悅。",
      "相望試登高，心飛逐鳥滅。",
      "愁因薄暮起，興是清秋發。",
      "時見歸村人，沙行渡頭歇。",
      "天邊樹若薺，江畔舟如月。",
      "何當載酒來，共醉重陽節。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "秋天",
      "登高",
      "山",
      "怀人"
    ],
    "title": "秋登蘭山寄張五",
    "id": "56ca5b29-4bb9-4f12-9200-6bc7c72e4e47"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山光忽西落，池月漸東上。",
      "散髮乘夕涼，開軒臥閑敞。",
      "荷風送香氣，竹露滴清響。",
      "欲取鳴琴彈，恨無知音賞。",
      "感此懷故人，中宵勞夢想。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "友情",
      "夏天",
      "怀人"
    ],
    "title": "夏日南亭懷辛大",
    "id": "f8afed4e-e8cd-467f-afae-51dc149921f7"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "夕陽度西嶺，羣壑倏已暝。",
      "松月生夜涼，風泉滿清聽。",
      "樵人歸欲盡，煙鳥棲初定。",
      "之子期宿來，孤琴候蘿逕。"
    ],
    "tags": [
      "唐诗三百首",
      "五言古诗",
      "写景"
    ],
    "title": "宿業師山房期丁大不至",
    "id": "3e504df9-b22d-480e-9e7c-9f8ab8591b91"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山寺鐘鳴晝已昏，漁梁渡頭爭渡喧。",
      "人隨沙路向江村，余亦乘舟歸鹿門。",
      "鹿門月照開煙樹，忽到龐公棲隱處。",
      "巖扉松徑長寂寥，惟有幽人夜來去。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "归隐",
      "七言古诗"
    ],
    "title": "夜歸鹿門山歌",
    "id": "cc0e7ac3-bde4-4491-8ae5-027106709e72"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "八月湖水平，涵虛混太清。",
      "氣蒸雲夢澤，波撼岳陽城。",
      "欲濟無舟楫，端居恥聖明。",
      "坐觀垂釣者，空有羨魚情。"
    ],
    "tags": [
      "唐诗三百首",
      "洞庭湖",
      "描写水",
      "山水",
      "八年级上册(课外)",
      "五言律诗",
      "初中古诗",
      "水",
      "带有地名",
      "写水",
      "地名"
    ],
    "title": "望洞庭湖贈張丞相",
    "id": "6975adab-25d0-40c6-af3a-3a05847e7717"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "一丘常欲臥，三徑苦無資。",
      "北土非吾願，東林懷我師。",
      "黃金然桂盡，壯志逐年衰。",
      "日夕涼風至，聞蟬但益悲。"
    ],
    "tags": [
      "唐诗三百首",
      "归隐",
      "抒情",
      "五言律诗"
    ],
    "title": "秦中感秋寄遠上人",
    "id": "0613f575-4f07-4326-8591-603fb3d1da45"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "山暝聞猿愁，滄江急夜流。",
      "風鳴兩岸葉，月照一孤舟。",
      "建德非吾土，維揚憶舊遊。",
      "還將兩行淚，遙寄海西頭。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "五言律诗",
      "怀人",
      "写水"
    ],
    "title": "宿桐廬江寄廣陵舊遊",
    "id": "b1dad78c-4dd8-4b99-b37b-741ed761f26a"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "木落雁南度，北風江上寒。",
      "我家襄水上，遙隔楚雲端。",
      "鄉淚客中盡，孤帆天際看。",
      "迷津欲有問，平海夕漫漫。"
    ],
    "tags": [
      "唐诗三百首",
      "八年级上册(课外)",
      "思归",
      "五言律诗",
      "初中古诗",
      "思乡"
    ],
    "title": "早寒江上有懷",
    "id": "8e18183e-5a58-4805-b672-1726969d6526"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "寂寂竟何待，朝朝空自歸。",
      "欲尋芳草去，惜與故人違。",
      "當路誰相假，知音世所稀。",
      "秪應守索寞，還掩故園扉。"
    ],
    "tags": [
      "唐诗三百首",
      "归隐",
      "友情",
      "离别",
      "哀怨",
      "五言律诗"
    ],
    "title": "留別王侍御維",
    "id": "7f4cacb5-cde8-40de-9b14-e223879cc2f4"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "林臥愁春盡，開軒覽物華。",
      "忽逢青鳥使，邀入赤松家。",
      "丹竈初開火，仙桃正落花。",
      "童顏若可駐，何惜醉流霞。"
    ],
    "tags": [
      "唐诗三百首",
      "五言律诗"
    ],
    "title": "清明日宴梅道士房",
    "id": "d2b5090e-e6fe-4d4f-9dd6-fe94ff6d4b5c"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "人事有代謝，往來成古今。",
      "江山留勝跡，我輩復登臨。",
      "水落魚梁淺，天寒夢澤深。",
      "羊公碑字在，讀罷淚沾襟。"
    ],
    "tags": [
      "唐诗三百首",
      "吊古伤今",
      "隋・唐・五代",
      "五言律诗"
    ],
    "title": "與諸子登峴山",
    "id": "b71d7c9c-7e92-4797-b2c9-8715dd0c2881"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "故人具雞黍，邀我至田家。",
      "綠樹村邊合，青山郭外斜。",
      "開筵面場圃，把酒話桑麻。",
      "待到重陽日，還來就菊花。"
    ],
    "tags": [
      "唐诗三百首",
      "生活",
      "田园",
      "友情",
      "初中古诗",
      "五言律诗",
      "山",
      "七年级上册(课外)",
      "四年级上册"
    ],
    "title": "過故人莊",
    "id": "9309205e-1d08-4a7b-99ef-4a05a9ee4370"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "北闕休上書，南山歸敝廬。",
      "不才明主棄，多病故人疎。",
      "白髮催年老，青陽逼歲除。",
      "永懷愁不寐，松月夜窗虛。"
    ],
    "tags": [
      "唐诗三百首",
      "抒情",
      "失意"
    ],
    "title": "歲暮歸南山",
    "id": "542cb326-1037-4bd9-b0f6-6479d165dc4c"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "迢遞三巴路，羈危萬里身。",
      "亂山殘雪夜，孤燈異鄉人。",
      "漸與骨肉遠，轉於奴僕親。",
      "那堪正飄泊，來日歲華新。"
    ],
    "tags": [
      "唐诗三百首",
      "羁旅",
      "五言律诗",
      "春节",
      "思乡"
    ],
    "title": "歲除夜有懷",
    "id": "0f5af383-765a-4d56-b00b-79ee2ccd5111"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "春眠不覺曉，處處聞啼鳥。",
      "夜來風雨聲，花落知多少。"
    ],
    "tags": [
      "唐诗三百首",
      "春",
      "写景",
      "一年级下册",
      "惜春",
      "五言绝句",
      "小学古诗"
    ],
    "title": "春曉",
    "id": "cb168b3b-d104-4df7-9868-1e1225ddb941"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "移舟泊煙渚，日暮客愁新。",
      "野曠天低樹，江清月近人。"
    ],
    "tags": [
      "唐诗三百首",
      "描写水",
      "写景",
      "思乡",
      "水",
      "月亮",
      "五言绝句",
      "写水"
    ],
    "title": "宿建德江",
    "id": "0bed9b02-991e-4e28-b631-86640147a712"
  },
  {
    "author": "戴叔倫",
    "paragraphs": [
      "天秋月又滿，城闕夜千重。",
      "還作江南會，翻疑夢裏逢。",
      "風枝驚暗鵲，露草覆寒蛩。",
      "羈旅長堪醉，相留畏曉鐘。"
    ],
    "tags": [
      "唐诗三百首",
      "友情",
      "写景",
      "秋天",
      "五言律诗",
      "相聚"
    ],
    "title": "客夜與故人偶集",
    "id": "94ae3e7e-eb5d-414c-bfd6-124f50687ce5"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "鷲翎金僕姑，燕尾繡蝥弧。",
      "獨立揚新令，千營共一呼。"
    ],
    "tags": [
      "唐诗三百首",
      "将军",
      "乐府",
      "高中古诗",
      "边塞",
      "赞美"
    ],
    "title": "和張僕射塞下曲 一",
    "id": "ce491725-b96b-46a7-b83c-463d2094ef3f"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "野幕敞瓊筵，羌戎賀勞旋。",
      "醉和金甲舞，雷鼓動山川。"
    ],
    "tags": [
      "唐诗三百首",
      "乐府",
      "宴饮",
      "边塞",
      "赞颂",
      "将士"
    ],
    "title": "和張僕射塞下曲 四",
    "id": "9a4d3eae-fe01-46c7-a28b-8b518614a508"
  },
  {
    "author": "盧綸",
    "paragraphs": [
      "雲開遠見漢陽城，猶是孤帆一日程。",
      "估客晝眠知浪靜，舟人夜語覺潮生。",
      "三湘衰鬢逢秋色，萬里歸心對月明。",
      "舊業已隨征戰盡，更堪江上鼓鼙聲。"
    ],
    "tags": [
      "唐诗三百首",
      "战争",
      "写景",
      "抒情",
      "七言律诗",
      "思乡"
    ],
    "title": "晚次鄂州",
    "id": "fae577a5-da28-4672-83ff-94c97ae2a4a4"
  },
  {
    "author": "王維",
    "paragraphs": [
      "不知香積寺，數里入雲峰。",
      "古木無人逕，深山何處鐘。",
      "泉聲咽危石，日色冷青松。",
      "薄暮空潭曲，安禪制毒龍。"
    ],
    "tags": [
      "唐诗三百首",
      "写景",
      "五言律诗"
    ],
    "title": "過香積寺",
    "id": "e4354c00-c83e-43da-9341-7007889dd625"
  },
  {
    "author": "王維",
    "paragraphs": [
      "空山新雨後，天氣晚來秋。",
      "明月松間照，清泉石上流。",
      "竹喧歸浣女，蓮動下漁舟。",
      "隨意春芳歇，王孫自可留。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "写景",
      "秋雨",
      "五言律诗",
      "写人"
    ],
    "title": "山居秋暝",
    "id": "00f12a19-bb96-4980-a4f5-11a1b9d604dd"
  },
  {
    "author": "王維",
    "paragraphs": [
      "中歲頗好道，晚家南山陲。",
      "興來每獨往，勝事空自知。",
      "行到水窮處，坐看雲起時。",
      "偶然值林叟，談笑無還期。"
    ],
    "tags": [
      "唐诗三百首",
      "田园",
      "抒情",
      "五言律诗",
      "山",
      "写人"
    ],
    "title": "終南別業",
    "id": "6d098c75-038d-45f4-8f86-73976c355e44"
  },
  {
    "author": "王維",
    "paragraphs": [
      "清川帶長薄，車馬去閑閑。",
      "流水如有意，暮禽相與還。",
      "荒城臨古渡，落日滿秋山。",
      "迢遞嵩高下，歸來且閉關。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "写景",
      "抒情",
      "五言律诗"
    ],
    "title": "歸嵩山作",
    "id": "40cd6eec-c6ce-4659-a225-61063cd210e9"
  },
  {
    "author": "王維",
    "paragraphs": [
      "太乙近天都，連山接海隅。",
      "白雲迴望合，青靄入看無。",
      "分野中峰變，陰晴衆壑殊。",
      "欲投人處宿，隔水問樵夫。"
    ],
    "tags": [
      "唐诗三百首",
      "终南山",
      "一年级下册",
      "五言律诗",
      "高中古诗",
      "描写山",
      "写山"
    ],
    "title": "終南山",
    "id": "a5b1f5c9-1ba7-4533-b497-55b1d4af1bbb"
  },
  {
    "author": "王維",
    "paragraphs": [
      "楚塞三湘接，荆門九派通。",
      "江流天地外，山色有無中。",
      "郡邑浮前浦，波瀾動遠空。",
      "襄陽好風日，留醉與山翁。"
    ],
    "tags": [
      "唐诗三百首",
      "山水",
      "抒情",
      "五言律诗"
    ],
    "title": "漢江臨汎",
    "id": "9080a103-2750-4b9b-a4fa-1167cd670a0c"
  },
  {
    "author": "王維",
    "paragraphs": [
      "渭水自縈秦塞曲，黃山舊遶漢宮斜。",
      "鑾輿迥出千門柳，閣道廻看上苑花。",
      "雲裏帝城雙鳳闕，雨中春樹萬人家。",
      "爲乘陽氣行時令，不是宸遊玩物華。"
    ],
    "tags": [
      "唐诗三百首",
      "黄山",
      "应制",
