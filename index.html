      "死去元知萬事空，但悲不見九州同。",
      "王師北定中原日，家祭無忘告乃翁。"
    ],
    "tags": ["南宋", "七言绝句", "爱国", "遗愿"],
    "title": "示兒",
    "id": "p003-146"
  },
  {
    "author": "楊萬里",
    "paragraphs": [
      "籬落疏疏一徑深，樹頭花落未成陰。",
      "兒童急走追黃蝶，飛入菜花無處尋。"
    ],
    "tags": ["南宋", "七言绝句", "童趣", "春天"],
    "title": "宿新市徐公店",
    "id": "p003-147"
  },
  {
    "author": "朱熹",
    "paragraphs": [
      "半畝方塘一鑑開，天光雲影共徘徊。",
      "問渠那得清如許？為有源頭活水來。"
    ],
    "tags": ["南宋", "七言绝句", "哲理", "读书"],
    "title": "觀書有感·其一",
    "id": "p003-148"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "醉裡挑燈看劍，夢回吹角連營。",
      "八百里分麾下炙，五十弦翻塞外聲。",
      "馬作的盧飛快，弓如霹靂弦驚。",
      "了卻君王天下事，贏得生前身後名。可憐白髮生！"
    ],
    "tags": ["南宋", "宋词", "爱国", "壮志"],
    "title": "破陣子·為陳同甫賦壯詞以寄之",
    "id": "p003-149"
  },
  {
    "author": "文天祥",
    "paragraphs": [
      "五月五日午，贈我一枝艾。",
      "故人不可見，新知萬里外。"
    ],
    "tags": ["南宋", "五言古诗", "端午", "感怀"],
    "title": "端午即事",
    "id": "p003-150"
  },
// ========================更新6=============================
  // ==================== 第四批 151-200 ====================
  {
    "author": "王維",
    "paragraphs": [
      "風勁角弓鳴，將軍獵渭城。",
      "草枯鷹眼疾，雪盡馬蹄輕。",
      "忽過新豐市，還歸細柳營。",
      "回看射雕處，千里暮雲平。"
    ],
    "tags": ["唐", "五言律诗", "狩猎", "豪迈"],
    "title": "觀獵",
    "id": "p004-151"
  },
  {
    "author": "王維",
    "paragraphs": [
      "空山新雨後，天氣晚來秋。",
      "明月松間照，清泉石上流。",
      "竹喧歸浣女，蓮動下漁舟。",
      "隨意春芳歇，王孫自可留。"
    ],
    "tags": ["唐", "五言律诗", "山水", "秋意"],
    "title": "山居秋暝",
    "id": "p004-152"
  },
  {
    "author": "李白",
    "paragraphs": [
      "白玉誰家郎，回車渡天津。",
      "看花東陌上，驚動洛陽人。"
    ],
    "tags": ["唐", "五言绝句", "写人", "豪放"],
    "title": "洛陽陌",
    "id": "p004-153"
  },
  {
    "author": "李白",
    "paragraphs": [
      "美人捲珠簾，深坐顰蛾眉。",
      "但見淚痕濕，不知心恨誰。"
    ],
    "tags": ["唐", "五言绝句", "闺怨", "含蓄"],
    "title": "怨情",
    "id": "p004-154"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "功蓋三分國，名成八陣圖。",
      "江流石不轉，遺恨失吞吳。"
    ],
    "tags": ["唐", "五言绝句", "怀古", "诸葛亮"],
    "title": "八陣圖",
    "id": "p004-155"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "江碧鳥逾白，山青花欲燃。",
      "今春看又過，何日是歸年。"
    ],
    "tags": ["唐", "五言绝句", "春天", "思乡"],
    "title": "絕句·江碧鳥逾白",
    "id": "p004-156"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "洛陽訪才子，江嶺作流人。",
      "聞說梅花早，何如北地春。"
    ],
    "tags": ["唐", "五言绝句", "送别", "安慰"],
    "title": "洛中訪袁拾遺不遇",
    "id": "p004-157"
  },
  {
    "author": "孟浩然",
    "paragraphs": [
      "夕陽度西嶺，群壑倏已暝。",
      "松月生夜涼，風泉滿清聽。"
    ],
    "tags": ["唐", "五言古诗", "山居", "夜景"],
    "title": "宿業師山房待丁大不至",
    "id": "p004-158"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "烽火城西百尺樓，黃昏獨坐海風秋。",
      "更吹羌笛關山月，無那金閨萬里愁。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "闺怨"],
    "title": "從軍行·烽火城西百尺樓",
    "id": "p004-159"
  },
  {
    "author": "王昌齡",
    "paragraphs": [
      "琵琶起舞換新聲，總是關山舊別情。",
      "撩亂邊愁聽不盡，高高秋月照長城。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "愁思"],
    "title": "從軍行·琵琶起舞換新聲",
    "id": "p004-160"
  },
  {
    "author": "高適",
    "paragraphs": [
      "漢家煙塵在東北，漢將辭家破殘賊。",
      "男兒本自重橫行，天子非常賜顏色。"
    ],
    "tags": ["唐", "七言古诗", "边塞", "战争"],
    "title": "燕歌行",
    "id": "p004-161"
  },
  {
    "author": "岑參",
    "paragraphs": [
      "走馬西來欲到天，辭家見月兩回圓。",
      "今夜不知何處宿，平沙萬里絕人煙。"
    ],
    "tags": ["唐", "七言绝句", "边塞", "羁旅"],
    "title": "磧中作",
    "id": "p004-162"
  },
  {
    "author": "韋應物",
    "paragraphs": [
      "獨憐幽草澗邊生，上有黃鸝深樹鳴。",
      "春潮帶雨晚來急，野渡無人舟自橫。"
    ],
    "tags": ["唐", "七言绝句", "写景", "闲适"],
    "title": "滁州西澗",
    "id": "p004-163"
  },
  {
    "author": "劉長卿",
    "paragraphs": [
      "孤雲將野鶴，豈向人間住。",
      "莫買沃洲山，時人已知處。"
    ],
    "tags": ["唐", "五言绝句", "送别", "隐逸"],
    "title": "送上人",
    "id": "p004-164"
  },
  {
    "author": "柳宗元",
    "paragraphs": [
      "千山鳥飛絕，萬徑人蹤滅。",
      "孤舟蓑笠翁，獨釣寒江雪。"
    ],
    "tags": ["唐", "五言绝句", "冬天", "孤傲"],
    "title": "江雪",
    "id": "p004-165"
  },
  {
    "author": "元稹",
    "paragraphs": [
      "殘燈無焰影幢幢，此夕聞君謫九江。",
      "垂死病中驚坐起，暗風吹雨入寒窗。"
    ],
    "tags": ["唐", "七言绝句", "友情", "感伤"],
    "title": "聞樂天授江州司馬",
    "id": "p004-166"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "花非花，霧非霧，夜半來，天明去。",
      "來如春夢幾多時，去似朝雲無覓處。"
    ],
    "tags": ["唐", "词", "朦胧", "感怀"],
    "title": "花非花",
    "id": "p004-167"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "大漠沙如雪，燕山月似鉤。",
      "何當金絡腦，快走踏清秋。"
    ],
    "tags": ["唐", "五言绝句", "咏马", "壮志"],
    "title": "馬詩·其五",
    "id": "p004-168"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "勝敗兵家事不期，包羞忍恥是男兒。",
      "江東子弟多才俊，捲土重來未可知。"
    ],
    "tags": ["唐", "七言绝句", "咏史", "项羽"],
    "title": "題烏江亭",
    "id": "p004-169"
  },
  {
    "author": "李商隱",
    "paragraphs": [
      "海外徒聞更九州，他生未卜此生休。",
      "空聞虎旅傳宵柝，無復雞人報曉籌。"
    ],
    "tags": ["唐", "七言律诗", "咏史", "杨贵妃"],
    "title": "馬嵬·其二",
    "id": "p004-170"
  },
  {
    "author": "溫庭筠",
    "paragraphs": [
      "梳洗罷，獨倚望江樓。",
      "過盡千帆皆不是，斜暉脈脈水悠悠。",
      "腸斷白蘋洲。"
    ],
    "tags": ["唐", "词", "思妇", "婉约"],
    "title": "望江南·梳洗罷",
    "id": "p004-171"
  },
  {
    "author": "韋莊",
    "paragraphs": [
      "人人盡說江南好，遊人只合江南老。",
      "春水碧於天，畫船聽雨眠。",
      "壚邊人似月，皓腕凝霜雪。",
      "未老莫還鄉，還鄉須斷腸。"
    ],
    "tags": ["唐", "词", "江南", "思乡"],
    "title": "菩薩蠻·人人盡說江南好",
    "id": "p004-172"
  },
  {
    "author": "馮延巳",
    "paragraphs": [
      "誰道閒情拋棄久？每到春來，惆悵還依舊。",
      "日日花前常病酒，不辭鏡裡朱顏瘦。"
    ],
    "tags": ["五代", "词", "伤春", "婉约"],
    "title": "鵲踏枝·誰道閒情拋棄久",
    "id": "p004-173"
  },
  {
    "author": "李璟",
    "paragraphs": [
      "菡萏香銷翠葉殘，西風愁起綠波間。",
      "還與韶光共憔悴，不堪看。"
    ],
    "tags": ["南唐", "词", "秋思", "伤感"],
    "title": "攤破浣溪沙·菡萏香銷翠葉殘",
    "id": "p004-174"
  },
  {
    "author": "林逋",
    "paragraphs": [
      "眾芳搖落獨暄妍，占盡風情向小園。",
      "疏影橫斜水清淺，暗香浮動月黃昏。"
    ],
    "tags": ["北宋", "七言律诗", "咏梅", "隐逸"],
    "title": "山園小梅",
    "id": "p004-175"
  },
  {
    "author": "柳永",
    "paragraphs": [
      "佇倚危樓風細細，望極春愁，黯黯生天際。",
      "草色煙光殘照裡，無言誰會憑闌意。"
    ],
    "tags": ["北宋", "词", "春愁", "相思"],
    "title": "蝶戀花·佇倚危樓風細細",
    "id": "p004-176"
  },
  {
    "author": "晏幾道",
    "paragraphs": [
      "夢後樓臺高鎖，酒醒簾幕低垂。",
      "去年春恨卻來時，落花人獨立，微雨燕雙飛。"
    ],
    "tags": ["北宋", "词", "感旧", "婉约"],
    "title": "臨江仙·夢後樓臺高鎖",
    "id": "p004-177"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "春宵一刻值千金，花有清香月有陰。",
      "歌管樓臺聲細細，鞦韆院落夜沉沉。"
    ],
    "tags": ["北宋", "七言绝句", "春夜", "闲适"],
    "title": "春宵",
    "id": "p004-178"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "重重疊疊上瑤臺，幾度呼童掃不開。",
      "剛被太陽收拾去，卻教明月送將來。"
    ],
    "tags": ["北宋", "七言绝句", "咏物", "花影"],
    "title": "花影",
    "id": "p004-179"
  },
  {
    "author": "黃庭堅",
    "paragraphs": [
      "春歸何處？寂寞無行路。",
      "若有人知春去處，喚取歸來同住。"
    ],
    "tags": ["北宋", "词", "惜春", "清婉"],
    "title": "清平樂·春歸何處",
    "id": "p004-180"
  },
  {
    "author": "秦觀",
    "paragraphs": [
      "霧失樓臺，月迷津渡，桃源望斷無尋處。",
      "可堪孤館閉春寒，杜鵑聲裡斜陽暮。"
    ],
    "tags": ["北宋", "词", "羁旅", "感伤"],
    "title": "踏莎行·郴州旅舍",
    "id": "p004-181"
  },
  {
    "author": "周邦彥",
    "paragraphs": [
      "并刀如水，吳鹽勝雪，纖手破新橙。",
      "錦幄初溫，獸煙不斷，相對坐調笙。"
    ],
    "tags": ["北宋", "词", "爱情", "婉约"],
    "title": "少年遊·并刀如水",
    "id": "p004-182"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "生當作人傑，死亦為鬼雄。",
      "至今思項羽，不肯過江東。"
    ],
    "tags": ["南宋", "五言绝句", "爱国", "怀古"],
    "title": "夏日絕句",
    "id": "p004-183"
  },
  {
    "author": "岳飛",
    "paragraphs": [
      "昨夜寒蛩不住鳴，驚回千里夢，已三更。",
      "起來獨自繞階行，人悄悄，簾外月朧明。"
    ],
    "tags": ["南宋", "词", "感怀", "壮志"],
    "title": "小重山·昨夜寒蛩不住鳴",
    "id": "p004-184"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "世味年來薄似紗，誰令騎馬客京華。",
      "小樓一夜聽春雨，深巷明朝賣杏花。"
    ],
    "tags": ["南宋", "七言律诗", "春雨", "感怀"],
    "title": "臨安春雨初霽",
    "id": "p004-185"
  },
  {
    "author": "楊萬里",
    "paragraphs": [
      "梅子留酸軟齒牙，芭蕉分綠與窗紗。",
      "日長睡起無情思，閒看兒童捉柳花。"
    ],
    "tags": ["南宋", "七言绝句", "夏天", "闲适"],
    "title": "閒居初夏午睡起",
    "id": "p004-186"
  },
  {
    "author": "范成大",
    "paragraphs": [
      "窗間梅熟落蒂，牆下筍成出林。",
      "連雨不知春去，一晴方覺夏深。"
    ],
    "tags": ["南宋", "六言绝句", "季节", "写景"],
    "title": "喜晴",
    "id": "p004-187"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "少年不識愁滋味，愛上層樓。愛上層樓，為賦新詞強說愁。",
      "而今識盡愁滋味，欲說還休。欲說還休，卻道天涼好個秋。"
    ],
    "tags": ["南宋", "词", "感怀", "人生"],
    "title": "醜奴兒·書博山道中壁",
    "id": "p004-188"
  },
  {
    "author": "姜夔",
    "paragraphs": [
      "舊時月色，算幾番照我，梅邊吹笛。",
      "喚起玉人，不管清寒與攀摘。"
    ],
    "tags": ["南宋", "词", "咏梅", "怀旧"],
    "title": "暗香·舊時月色",
    "id": "p004-189"
  },
  {
    "author": "蔣捷",
    "paragraphs": [
      "一片春愁待酒澆。江上舟搖，樓上簾招。",
      "秋娘渡與泰娘橋，風又飄飄，雨又蕭蕭。"
    ],
    "tags": ["南宋", "词", "春愁", "羁旅"],
    "title": "一剪梅·舟過吳江",
    "id": "p004-190"
  },
  {
    "author": "元好問",
    "paragraphs": [
      "枝間新綠一重重，小蕾深藏數點紅。",
      "愛惜芳心莫輕吐，且教桃李鬧春風。"
    ],
    "tags": ["金", "七言绝句", "咏物", "海棠"],
    "title": "同兒輩賦未開海棠",
    "id": "p004-191"
  },
  {
    "author": "馬致遠",
    "paragraphs": [
      "夕陽下，酒旆閒，兩三航未曾著岸。",
      "落花水香茅舍晚，斷橋頭賣魚人散。"
    ],
    "tags": ["元", "散曲", "渔村", "闲适"],
    "title": "壽陽曲·遠浦帆歸",
    "id": "p004-192"
  },
  {
    "author": "張養浩",
    "paragraphs": [
      "雲來山更佳，雲去山如畫。",
      "山因雲晦明，雲共山高下。"
    ],
    "tags": ["元", "散曲", "山水", "隐逸"],
    "title": "雁兒落帶得勝令·雲來山更佳",
    "id": "p004-193"
  },
  {
    "author": "王冕",
    "paragraphs": [
      "我家洗硯池頭樹，朵朵花開淡墨痕。",
      "不要人誇好顏色，只留清氣滿乾坤。"
    ],
    "tags": ["元", "七言绝句", "咏梅", "品格"],
    "title": "墨梅",
    "id": "p004-194"
  },
  {
    "author": "于謙",
    "paragraphs": [
      "千錘萬鑿出深山，烈火焚燒若等閒。",
      "粉骨碎身渾不怕，要留清白在人間。"
    ],
    "tags": ["明", "七言绝句", "咏物", "石灰"],
    "title": "石灰吟",
    "id": "p004-195"
  },
  {
    "author": "唐寅",
    "paragraphs": [
      "不鍊金丹不坐禪，不為商賈不耕田。",
      "閒來寫就青山賣，不使人間造孽錢。"
    ],
    "tags": ["明", "七言绝句", "自况", "清高"],
    "title": "言志",
    "id": "p004-196"
  },
  {
    "author": "李贄",
    "paragraphs": [
      "當時年少春衫薄，騎馬倚斜橋。",
      "滿樓紅袖招，翠屏金屈曲。"
    ],
    "tags": ["明", "词", "回忆", "风流"],
    "title": "菩薩蠻·當時年少",
    "id": "p004-197"
  },
  {
    "author": "袁宏道",
    "paragraphs": [
      "虎丘去城可七八里，其山無高巖邃壑，獨以近城故，簫鼓樓船，無日無之。"
    ],
    "tags": ["明", "散文", "游记", "虎丘"],
    "title": "虎丘記（節選）",
    "id": "p004-198"
  },
  {
    "author": "張岱",
    "paragraphs": [
      "大雪三日，湖中人鳥聲俱絕。",
      "是日更定矣，余拏一小舟，擁毳衣爐火，獨往湖心亭看雪。"
    ],
    "tags": ["明", "散文", "西湖", "雪景"],
    "title": "湖心亭看雪（節選）",
    "id": "p004-199"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "人生若只如初見，何事秋風悲畫扇。",
      "等閒變卻故人心，卻道故人心易變。"
    ],
    "tags": ["清", "词", "爱情", "感伤"],
    "title": "木蘭花·擬古決絕詞",
    "id": "p004-200"
  },
// ========================更新7=============================
  {
    "author": "屈原",
    "paragraphs": [
      "日月忽其不淹兮，春與秋其代序。",
      "惟草木之零落兮，恐美人之遲暮。"
    ],
    "tags": ["楚辞", "离骚", "感怀", "哲理"],
    "title": "離騷（節選）",
    "id": "p005-201"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "悲歌可以當泣，遠望可以當歸。",
      "思念故鄉，鬱鬱累累。"
    ],
    "tags": ["汉", "乐府", "思乡", "悲凉"],
    "title": "悲歌",
    "id": "p005-202"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "客從遠方來，遺我雙鯉魚。",
      "呼兒烹鯉魚，中有尺素書。",
      "長跪讀素書，書中竟何如？",
      "上言加餐食，下言長相思。"
    ],
    "tags": ["汉", "乐府", "爱情", "书信"],
    "title": "飲馬長城窟行",
    "id": "p005-203"
  },
  {
    "author": "曹操",
    "paragraphs": [
      "神龜雖壽，猶有竟時。",
      "騰蛇乘霧，終為土灰。",
      "老驥伏櫪，志在千里。",
      "烈士暮年，壯心不已。"
    ],
    "tags": ["魏", "乐府", "言志", "哲理"],
    "title": "龜雖壽",
    "id": "p005-204"
  },
  {
    "author": "曹丕",
    "paragraphs": [
      "秋風蕭瑟天氣涼，草木搖落露為霜。",
      "群燕辭歸鵠南翔，念君客遊思斷腸。"
    ],
    "tags": ["魏", "七言诗", "思妇", "秋意"],
    "title": "燕歌行",
    "id": "p005-205"
  },
  {
    "author": "曹植",
    "paragraphs": [
      "八方各異氣，千里殊風雨。",
      "劇哉邊海民，寄身於草墅。",
      "妻子象禽獸，行止依林阻。"
    ],
    "tags": ["魏", "五言古诗", "民生", "悲悯"],
    "title": "泰山梁甫行",
    "id": "p005-206"
  },
  {
    "author": "阮籍",
    "paragraphs": [
      "林中有奇鳥，自言是鳳凰。",
      "清朝飲醴泉，日夕棲山岡。",
      "高鳴徹九州，延頸望八荒。"
    ],
    "tags": ["魏", "五言古诗", "咏怀", "孤高"],
    "title": "詠懷·林中有奇鳥",
    "id": "p005-207"
  },
  {
    "author": "嵇康",
    "paragraphs": [
      "息徒蘭圃，秣馬華山。",
      "流磻平皋，垂綸長川。",
      "目送歸鴻，手揮五弦。",
      "俯仰自得，遊心太玄。"
    ],
    "tags": ["魏", "四言诗", "隐逸", "闲适"],
    "title": "贈秀才入軍（節選）",
    "id": "p005-208"
  },
  {
    "author": "潘岳",
    "paragraphs": [
      "春秋代序，冬夏迭興。",
      "荏苒冬春謝，寒暑忽流易。"
    ],
    "tags": ["晋", "五言古诗", "悼亡", "悲伤"],
    "title": "悼亡詩（其一節選）",
    "id": "p005-209"
  },
  {
    "author": "陸機",
    "paragraphs": [
      "逝矣經天日，悲哉帶地川。",
      "寸陰無停晷，尺波豈徒旋。"
    ],
    "tags": ["晋", "五言古诗", "惜时", "感慨"],
    "title": "長歌行",
    "id": "p005-210"
  },
  {
    "author": "陶淵明",
    "paragraphs": [
      "野外罕人事，窮巷寡輪鞅。",
      "晝夜掩荊扉，對酒絕塵想。"
    ],
    "tags": ["晋", "五言古诗", "田园", "隐逸"],
    "title": "歸園田居·其二",
    "id": "p005-211"
  },
  {
    "author": "謝靈運",
    "paragraphs": [
      "潛虯媚幽姿，飛鴻響遠音。",
      "薄霄愧雲浮，棲川怍淵沉。"
    ],
    "tags": ["南朝", "五言古诗", "山水", "感怀"],
    "title": "登池上樓",
    "id": "p005-212"
  },
  {
    "author": "鮑照",
    "paragraphs": [
      "瀉水置平地，各自東西南北流。",
      "人生亦有命，安能行歎復坐愁。"
    ],
    "tags": ["南朝", "七言古诗", "感怀", "命运"],
    "title": "擬行路難·其四",
    "id": "p005-213"
  },
  {
    "author": "謝朓",
    "paragraphs": [
      "江路西南永，歸流東北騖。",
      "天際識歸舟，雲中辨江樹。"
    ],
    "tags": ["南朝", "五言古诗", "羁旅", "思乡"],
    "title": "之宣城郡出新林浦向板橋",
    "id": "p005-214"
  },
  {
    "author": "庾信",
    "paragraphs": [
      "陽關萬里道，不見一人歸。",
      "惟有河邊雁，秋來南向飛。"
    ],
    "tags": ["北朝", "五言绝句", "思乡", "羁旅"],
    "title": "重別周尚書",
    "id": "p005-215"
  },
  {
    "author": "王勃",
    "paragraphs": [
      "長江悲已滯，萬里念將歸。",
      "況屬高風晚，山山黃葉飛。"
    ],
    "tags": ["唐", "五言绝句", "羁旅", "思乡"],
    "title": "山中",
    "id": "p005-216"
  },
  {
    "author": "楊炯",
    "paragraphs": [
      "塞北途遼遠，城南戰苦辛。",
      "幡旗如鳥翼，甲胄似魚鱗。"
    ],
    "tags": ["唐", "五言律诗", "边塞", "战争"],
    "title": "戰城南",
    "id": "p005-217"
  },
  {
    "author": "盧照鄰",
    "paragraphs": [
      "長安大道連狹斜，青牛白馬七香車。",
      "玉輦縱橫過主第，金鞭絡繹向侯家。"
    ],
    "tags": ["唐", "七言古诗", "都城", "繁华"],
    "title": "長安古意",
    "id": "p005-218"
  },
  {
    "author": "駱賓王",
    "paragraphs": [
      "此地別燕丹，壯士髮衝冠。",
      "昔時人已沒，今日水猶寒。"
    ],
    "tags": ["唐", "五言绝句", "怀古", "荆轲"],
    "title": "於易水送人",
    "id": "p005-219"
  },
  {
    "author": "陳子昂",
    "paragraphs": [
      "自古皆有死，徇義良獨稀。",
      "奈何燕太子，尚使田生疑。"
    ],
    "tags": ["唐", "五言古诗", "怀古", "感慨"],
    "title": "田光先生",
    "id": "p005-220"
  },
  {
    "author": "張九齡",
    "paragraphs": [
      "江南有丹橘，經冬猶綠林。",
      "豈伊地氣暖，自有歲寒心。"
    ],
    "tags": ["唐", "五言古诗", "咏物", "品格"],
    "title": "感遇·江南有丹橘",
    "id": "p005-221"
  },
  {
    "author": "王維",
    "paragraphs": [
      "山中一夜雨，樹杪百重泉。",
      "漢女輸橦布，巴人訟芋田。"
    ],
    "tags": ["唐", "五言律诗", "山水", "送别"],
    "title": "送梓州李使君",
    "id": "p005-222"
  },
  {
    "author": "李白",
    "paragraphs": [
      "青山橫北郭，白水繞東城。",
      "此地一為別，孤蓬萬里征。"
    ],
    "tags": ["唐", "五言律诗", "送别", "友情"],
    "title": "送友人",
    "id": "p005-223"
  },
  {
    "author": "杜甫",
    "paragraphs": [
      "挽弓當挽強，用箭當用長。",
      "射人先射馬，擒賊先擒王。"
    ],
    "tags": ["唐", "五言古诗", "哲理", "战争"],
    "title": "前出塞·其六",
    "id": "p005-224"
  },
  {
    "author": "孟郊",
    "paragraphs": [
      "梧桐相待老，鴛鴦會雙死。",
      "貞女貴殉夫，捨生亦如此。"
    ],
    "tags": ["唐", "五言古诗", "贞烈", "赞颂"],
    "title": "烈女操",
    "id": "p005-225"
  },
  {
    "author": "賈島",
    "paragraphs": [
      "兩句三年得，一吟雙淚流。",
      "知音如不賞，歸臥故山秋。"
    ],
    "tags": ["唐", "五言绝句", "苦吟", "自述"],
    "title": "題詩後",
    "id": "p005-226"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "男兒何不帶吳鉤，收取關山五十州。",
      "請君暫上凌煙閣，若個書生萬戶侯。"
    ],
    "tags": ["唐", "七言绝句", "壮志", "尚武"],
    "title": "南園·其五",
    "id": "p005-227"
  },
  {
    "author": "杜牧",
    "paragraphs": [
      "多情卻似總無情，唯覺樽前笑不成。",
      "蠟燭有心還惜別，替人垂淚到天明。"
    ],
    "tags": ["唐", "七言绝句", "送别", "多情"],
    "title": "贈別·其二",
    "id": "p005-228"
  },
  {
    "author": "溫庭筠",
    "paragraphs": [
      "千萬恨，恨極在天涯。",
      "山月不知心裡事，水風空落眼前花。"
    ],
    "tags": ["唐", "词", "闺怨", "思念"],
    "title": "夢江南·千萬恨",
    "id": "p005-229"
  },
  {
    "author": "李煜",
    "paragraphs": [
      "林花謝了春紅，太匆匆。",
      "無奈朝來寒雨晚來風。"
    ],
    "tags": ["南唐", "词", "感怀", "亡国"],
    "title": "相見歡·林花謝了春紅",
    "id": "p005-230"
  },
  {
    "author": "晏殊",
    "paragraphs": [
      "一向年光有限身，等閒離別易銷魂。",
      "酒筵歌席莫辭頻。"
    ],
    "tags": ["北宋", "词", "感怀", "离别"],
    "title": "浣溪沙·一向年光有限身",
    "id": "p005-231"
  },
  {
    "author": "歐陽修",
    "paragraphs": [
      "樽前擬把歸期說，欲語春容先慘咽。",
      "人生自是有情癡，此恨不關風與月。"
    ],
    "tags": ["北宋", "词", "离别", "哲理"],
    "title": "玉樓春·樽前擬把歸期說",
    "id": "p005-232"
  },
  {
    "author": "王安石",
    "paragraphs": [
      "牆角數枝梅，凌寒獨自開。",
      "遙知不是雪，為有暗香來。"
    ],
    "tags": ["北宋", "五言绝句", "咏梅", "品格"],
    "title": "梅花",
    "id": "p005-233"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "荷盡已無擎雨蓋，菊殘猶有傲霜枝。",
      "一年好景君須記，最是橙黃橘綠時。"
    ],
    "tags": ["北宋", "七言绝句", "秋天", "勉励"],
    "title": "贈劉景文",
    "id": "p005-234"
  },
  {
    "author": "蘇軾",
    "paragraphs": [
      "東風裊裊泛崇光，香霧空濛月轉廊。",
      "只恐夜深花睡去，故燒高燭照紅妝。"
    ],
    "tags": ["北宋", "七言绝句", "海棠", "爱花"],
    "title": "海棠",
    "id": "p005-235"
  },
  {
    "author": "黃庭堅",
    "paragraphs": [
      "四顧山光接水光，憑欄十里芰荷香。",
      "清風明月無人管，並作南樓一味涼。"
    ],
    "tags": ["北宋", "七言绝句", "夏夜", "闲适"],
    "title": "鄂州南樓書事",
    "id": "p005-236"
  },
  {
    "author": "秦觀",
    "paragraphs": [
      "天涯舊恨，獨自淒涼人不問。",
      "欲見迴腸，斷盡金爐小篆香。"
    ],
    "tags": ["北宋", "词", "闺怨", "思念"],
    "title": "減字木蘭花·天涯舊恨",
    "id": "p005-237"
  },
  {
    "author": "賀鑄",
    "paragraphs": [
      "楊花終日空飛舞，奈久長難駐。",
      "海潮雖是暫時來，卻有箇、堪憑處。"
    ],
    "tags": ["北宋", "词", "感怀", "离别"],
    "title": "花心動·春欲來",
    "id": "p005-238"
  },
  {
    "author": "周邦彥",
    "paragraphs": [
      "夜色催更，清塵收露，小曲幽坊月暗。",
      "竹檻燈窗，識秋娘庭院。"
    ],
    "tags": ["北宋", "词", "爱情", "婉约"],
    "title": "拜星月慢·夜色催更",
    "id": "p005-239"
  },
  {
    "author": "李清照",
    "paragraphs": [
      "蹴罷鞦韆，起來慵整纖縴手。",
      "露濃花瘦，薄汗輕衣透。"
    ],
    "tags": ["南宋", "词", "少女", "生活"],
    "title": "點絳唇·蹴罷鞦韆",
    "id": "p005-240"
  },
  {
    "author": "岳飛",
    "paragraphs": [
      "經年塵土滿征衣，特特尋芳上翠微。",
      "好水好山看不足，馬蹄催趁月明歸。"
    ],
    "tags": ["南宋", "七言绝句", "山水", "军旅"],
    "title": "池州翠微亭",
    "id": "p005-241"
  },
  {
    "author": "陸游",
    "paragraphs": [
      "衣上征塵雜酒痕，遠遊無處不消魂。",
      "此身合是詩人未？細雨騎驢入劍門。"
    ],
    "tags": ["南宋", "七言绝句", "羁旅", "自嘲"],
    "title": "劍門道中遇微雨",
    "id": "p005-242"
  },
  {
    "author": "范成大",
    "paragraphs": [
      "采菱辛苦廢犁鋤，血指流丹鬼質枯。",
      "無力買田聊種水，近來湖面亦收租。"
    ],
    "tags": ["南宋", "七言绝句", "民生", "讽刺"],
    "title": "四時田園雜興·其三十",
    "id": "p005-243"
  },
  {
    "author": "楊萬里",
    "paragraphs": [
      "一葉漁船兩小童，收篙停棹坐船中。",
      "怪生無雨都張傘，不是遮頭是使風。"
    ],
    "tags": ["南宋", "七言绝句", "童趣", "观察"],
    "title": "舟過安仁",
    "id": "p005-244"
  },
  {
    "author": "朱熹",
    "paragraphs": [
      "昨夜江邊春水生，艨艟巨艦一毛輕。",
      "向來枉費推移力，此日中流自在行。"
    ],
    "tags": ["南宋", "七言绝句", "哲理", "读书"],
    "title": "觀書有感·其二",
    "id": "p005-245"
  },
  {
    "author": "辛棄疾",
    "paragraphs": [
      "醉裡且貪歡笑，要愁那得工夫。",
      "近來始覺古人書，信著全無是處。"
    ],
    "tags": ["南宋", "词", "感怀", "旷达"],
    "title": "西江月·遣興",
    "id": "p005-246"
  },
  {
    "author": "姜夔",
    "paragraphs": [
      "燕雁無心，太湖西畔隨雲去。",
      "數峰清苦，商略黃昏雨。"
    ],
    "tags": ["南宋", "词", "感怀", "山水"],
    "title": "點絳唇·丁未冬過吳松作",
    "id": "p005-247"
  },
  {
    "author": "吳文英",
    "paragraphs": [
      "何處合成愁？離人心上秋。",
      "縱芭蕉、不雨也颼颼。"
    ],
    "tags": ["南宋", "词", "羁旅", "秋思"],
    "title": "唐多令·何處合成愁",
    "id": "p005-248"
  },
  {
    "author": "蔣捷",
    "paragraphs": [
      "少年聽雨歌樓上，紅燭昏羅帳。",
      "壯年聽雨客舟中，江闊雲低、斷雁叫西風。"
    ],
    "tags": ["南宋", "词", "人生", "听雨"],
    "title": "虞美人·聽雨",
    "id": "p005-249"
  },
  {
    "author": "王冕",
    "paragraphs": [
      "三月東風吹雪消，湖南山色翠如澆。",
      "一聲羌管無人見，無數梅花落野橋。"
    ],
    "tags": ["元", "七言绝句", "春天", "梅花"],
    "title": "梅花",
    "id": "p005-250"
  },
// ========================更新8=============================
  {
    "author": "張養浩",
    "paragraphs": [
      "驪山四顧，阿房一炬，當時奢侈今何處？",
      "只見草蕭疏，水縈紆，至今遺恨迷煙樹。"
    ],
    "tags": ["元", "散曲", "怀古", "讽刺"],
    "title": "山坡羊·驪山懷古",
    "id": "p006-251"
  },
  {
    "author": "喬吉",
    "paragraphs": [
      "鶯鶯燕燕春春，花花柳柳真真。",
      "事事風風韻韻，嬌嬌嫩嫩，停停當當人人。"
    ],
    "tags": ["元", "散曲", "叠字", "春景"],
    "title": "天淨沙·即事",
    "id": "p006-252"
  },
  {
    "author": "王磐",
    "paragraphs": [
      "喇叭，嗩吶，曲兒小腔兒大。",
      "官船來往亂如麻，全仗你抬身價。"
    ],
    "tags": ["明", "散曲", "讽刺", "官场"],
    "title": "朝天子·詠喇叭",
    "id": "p006-253"
  },
  {
    "author": "楊慎",
    "paragraphs": [
      "滾滾長江東逝水，浪花淘盡英雄。",
      "是非成敗轉頭空，青山依舊在，幾度夕陽紅。"
    ],
    "tags": ["明", "词", "怀古", "旷达"],
    "title": "臨江仙·滾滾長江東逝水",
    "id": "p006-254"
  },
  {
    "author": "歸有光",
    "paragraphs": [
      "庭有枇杷樹，吾妻死之年所手植也，今已亭亭如蓋矣。"
    ],
    "tags": ["明", "散文", "悼亡", "回憶"],
    "title": "項脊軒志（節選）",
    "id": "p006-255"
  },
  {
    "author": "李贄",
    "paragraphs": [
      "無情何必生斯世，有好終須累此身。"
    ],
    "tags": ["明", "七言诗句", "哲理", "性情"],
    "title": "獨坐",
    "id": "p006-256"
  },
  {
    "author": "袁中道",
    "paragraphs": [
      "山色如娥，花光如頰，溫風如酒，波紋如綾。"
    ],
    "tags": ["明", "散文", "西湖", "寫景"],
    "title": "西湖雜記（節選）",
    "id": "p006-257"
  },
  {
    "author": "鍾惺",
    "paragraphs": [
      "偶爾相逢，居然似舊。",
      "同心之言，其臭如蘭。"
    ],
    "tags": ["明", "四言詩", "友情", "知音"],
    "title": "贈友",
    "id": "p006-258"
  },
  {
    "author": "譚元春",
    "paragraphs": [
      "夜行山盡處，開門逢月來。",
      "寒澀不成語，影照莓苔開。"
    ],
    "tags": ["明", "五言绝句", "夜景", "幽寂"],
    "title": "夜歸",
    "id": "p006-259"
  },
  {
    "author": "陳子龍",
    "paragraphs": [
      "不信有天常似醉，最憐無地可埋憂。"
    ],
    "tags": ["明", "七言诗句", "感怀", "憂國"],
    "title": "秋日雜感",
    "id": "p006-260"
  },
  {
    "author": "夏完淳",
    "paragraphs": [
      "三年羈旅客，今日又南冠。",
      "無限河山淚，誰言天地寬。"
    ],
    "tags": ["明", "五言律诗", "爱国", "悲壮"],
    "title": "別雲間",
    "id": "p006-261"
  },
  {
    "author": "錢謙益",
    "paragraphs": [
      "海角崖山一線斜，從今也不屬中華。"
    ],
    "tags": ["清", "七言诗句", "亡國", "哀嘆"],
    "title": "後秋興",
    "id": "p006-262"
  },
  {
    "author": "吳偉業",
    "paragraphs": [
      "舊巢共是銜泥燕，飛上枝頭變鳳凰。"
    ],
    "tags": ["清", "七言诗句", "諷刺", "變遷"],
    "title": "圓圓曲（節選）",
    "id": "p006-263"
  },
  {
    "author": "黃宗羲",
    "paragraphs": [
      "死猶未肯輸心去，貧亦其能奈我何。"
    ],
    "tags": ["清", "七言诗句", "氣節", "堅貞"],
    "title": "山居雜詠",
    "id": "p006-264"
  },
  {
    "author": "顧炎武",
    "paragraphs": [
      "天下興亡，匹夫有責。"
    ],
    "tags": ["清", "散文", "愛國", "名言"],
    "title": "日知錄（節選）",
    "id": "p006-265"
  },
  {
    "author": "王夫之",
    "paragraphs": [
      "新竹高於舊竹枝，全憑老幹為扶持。"
    ],
    "tags": ["清", "七言绝句", "哲理", "感恩"],
    "title": "新竹",
    "id": "p006-266"
  },
  {
    "author": "屈大均",
    "paragraphs": [
      "落葉何心定聚散，啼螿無淚可沾襟。"
    ],
    "tags": ["清", "七言诗句", "感懷", "漂泊"],
    "title": "壬戌清明作",
    "id": "p006-267"
  },
  {
    "author": "朱彝尊",
    "paragraphs": [
      "居庸關上子規啼，飲馬流泉落日低。"
    ],
    "tags": ["清", "七言绝句", "邊塞", "寫景"],
    "title": "出居庸關",
    "id": "p006-268"
  },
  {
    "author": "陳維崧",
    "paragraphs": [
      "寒山幾堵，風低削碎，中原路遠。"
    ],
    "tags": ["清", "词", "咏鷹", "豪放"],
    "title": "醉落魄·詠鷹",
    "id": "p006-269"
  },
  {
    "author": "納蘭性德",
    "paragraphs": [
      "一生一代一雙人，爭教兩處銷魂。",
      "相思相望不相親，天為誰春。"
    ],
    "tags": ["清", "词", "愛情", "相思"],
    "title": "畫堂春·一生一代一雙人",
    "id": "p006-270"
  },
  {
    "author": "曹雪芹",
    "paragraphs": [
      "滿紙荒唐言，一把辛酸淚。",
      "都云作者痴，誰解其中味。"
    ],
    "tags": ["清", "五言绝句", "自述", "紅樓"],
    "title": "題石頭記",
    "id": "p006-271"
  },
  {
    "author": "曹雪芹",
    "paragraphs": [
      "白楊村蕭蕭風聲，不見當時舊蹤。"
    ],
    "tags": ["清", "詩句", "感懷", "紅樓"],
    "title": "葬花吟（節選）",
    "id": "p006-272"
  },
  {
    "author": "袁枚",
    "paragraphs": [
      "秋夜訪秋士，先聞水上音。",
      "半天涼月色，一笛酒人心。"
    ],
    "tags": ["清", "五言律诗", "秋夜", "訪友"],
    "title": "夜過借園見主人坐月下吹笛",
    "id": "p006-273"
  },
  {
    "author": "趙翼",
    "paragraphs": [
      "少時學語苦難圓，只道工夫半未全。",
      "到老始知非力取，三分人事七分天。"
    ],
    "tags": ["清", "七言绝句", "詩論", "天分"],
    "title": "論詩·其四",
    "id": "p006-274"
  },
  {
    "author": "姚鼐",
    "paragraphs": [
      "布穀飛飛勸早耕，舂鋤撲撲趁春晴。",
      "千層石樹遙行路，一帶山田放水聲。"
    ],
    "tags": ["清", "七言绝句", "田園", "春天"],
    "title": "山行",
    "id": "p006-275"
  },
  {
    "author": "張問陶",
    "paragraphs": [
      "躍馬常山雲，旌旗凍不翻。",
      "天寒萬里行，歲暮一身還。"
    ],
    "tags": ["清", "五言古诗", "邊塞", "羈旅"],
    "title": "歲暮",
    "id": "p006-276"
  },
  {
    "author": "龔自珍",
    "paragraphs": [
      "浩蕩離愁白日斜，吟鞭東指即天涯。",
      "落紅不是無情物，化作春泥更護花。"
    ],
    "tags": ["清", "七言绝句", "辭官", "奉獻"],
    "title": "己亥雜詩·其五",
    "id": "p006-277"
  },
  {
    "author": "龔自珍",
    "paragraphs": [
      "少年擊劍更吹簫，劍氣簫心一例消。",
      "誰分蒼涼歸棹後，萬千哀樂聚今朝。"
    ],
    "tags": ["清", "七言绝句", "感懷", "壯志"],
    "title": "己亥雜詩·其九六",
    "id": "p006-278"
  },
  {
    "author": "黃遵憲",
    "paragraphs": [
      "寸寸山河寸寸金，侉離分裂力誰任。",
      "杜鵑再拜憂天淚，精衛無窮填海心。"
    ],
    "tags": ["清", "七言绝句", "愛國", "悲憤"],
    "title": "題梁任父同年",
    "id": "p006-279"
  },
  {
    "author": "丘逢甲",
    "paragraphs": [
      "春愁難遣強看山，往事驚心淚欲潸。",
      "四百萬人同一哭，去年今日割臺灣。"
    ],
    "tags": ["清", "七言绝句", "愛國", "悲憤"],
    "title": "春愁",
    "id": "p006-280"
  },
  {
    "author": "譚嗣同",
    "paragraphs": [
      "望門投止思張儉，忍死須臾待杜根。",
      "我自橫刀向天笑，去留肝膽兩崑崙。"
    ],
    "tags": ["清", "七言绝句", "就義", "豪邁"],
    "title": "獄中題壁",
    "id": "p006-281"
  },
  {
    "author": "梁啟超",
    "paragraphs": [
      "一雨縱橫亙二洲，浪淘天地入東流。",
      "卻餘人物淘難盡，又挾風雷作遠遊。"
    ],
    "tags": ["清", "七言绝句", "壯志", "變革"],
    "title": "太平洋遇雨",
    "id": "p006-282"
  },
  {
    "author": "秋瑾",
    "paragraphs": [
      "不惜千金買寶刀，貂裘換酒也堪豪。",
      "一腔熱血勤珍重，灑去猶能化碧濤。"
    ],
    "tags": ["清", "七言绝句", "壯志", "女俠"],
    "title": "對酒",
    "id": "p006-283"
  },
  {
    "author": "蘇曼殊",
    "paragraphs": [
      "春雨樓頭尺八簫，何時歸看浙江潮。",
      "芒鞋破缽無人識，踏過櫻花第幾橋。"
    ],
    "tags": ["清", "七言绝句", "羈旅", "禪意"],
    "title": "本事詩",
    "id": "p006-284"
  },
  {
    "author": "李叔同",
    "paragraphs": [
      "長亭外，古道邊，芳草碧連天。",
      "晚風拂柳笛聲殘，夕陽山外山。"
    ],
    "tags": ["近代", "歌词", "送別", "感傷"],
    "title": "送別",
    "id": "p006-285"
  },
  {
    "author": "王國維",
    "paragraphs": [
      "最是人間留不住，朱顏辭鏡花辭樹。"
    ],
    "tags": ["近代", "词句", "感懷", "時光"],
    "title": "蝶戀花·閱盡天涯離別苦（節選）",
    "id": "p006-286"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "上邪！我欲與君相知，長命無絕衰。",
      "山無陵，江水為竭，冬雷震震，夏雨雪，天地合，乃敢與君絕。"
    ],
    "tags": ["汉", "乐府", "愛情", "誓願"],
    "title": "上邪",
    "id": "p006-287"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "江南可採蓮，蓮葉何田田。",
      "魚戲蓮葉間。",
      "魚戲蓮葉東，魚戲蓮葉西，魚戲蓮葉南，魚戲蓮葉北。"
    ],
    "tags": ["汉", "乐府", "採蓮", "民歌"],
    "title": "江南",
    "id": "p006-288"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "十五從軍征，八十始得歸。",
      "道逢鄉里人，家中有阿誰？"
    ],
    "tags": ["汉", "乐府", "戰爭", "悲苦"],
    "title": "十五從軍征",
    "id": "p006-289"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "迢迢牽牛星，皎皎河漢女。",
      "纖纖擢素手，札札弄機杼。"
    ],
    "tags": ["汉", "古诗十九首", "七夕", "相思"],
    "title": "迢迢牽牛星",
    "id": "p006-290"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "行行重行行，與君生別離。",
      "相去萬餘里，各在天一涯。"
    ],
    "tags": ["汉", "古诗十九首", "離別", "思念"],
    "title": "行行重行行",
    "id": "p006-291"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "涉江採芙蓉，蘭澤多芳草。",
      "採之欲遺誰？所思在遠道。"
    ],
    "tags": ["汉", "古诗十九首", "思鄉", "懷人"],
    "title": "涉江採芙蓉",
    "id": "p006-292"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "生年不滿百，常懷千歲憂。",
      "晝短苦夜長，何不秉燭遊。"
    ],
    "tags": ["汉", "古诗十九首", "人生", "曠達"],
    "title": "生年不滿百",
    "id": "p006-293"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "庭中有奇樹，綠葉發華滋。",
      "攀條折其榮，將以遺所思。"
    ],
    "tags": ["汉", "古诗十九首", "愛情", "贈物"],
    "title": "庭中有奇樹",
    "id": "p006-294"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "敕勒川，陰山下。",
      "天似穹廬，籠蓋四野。",
      "天蒼蒼，野茫茫，風吹草低見牛羊。"
    ],
    "tags": ["北朝", "民歌", "草原", "壯闊"],
    "title": "敕勒歌",
    "id": "p006-295"
  },
  {
    "author": "無名氏",
    "paragraphs": [
      "木蘭唧唧復唧唧，木蘭當戶織。",
      "不聞機杼聲，惟聞女歎息。"
    ],
    "tags": ["北朝", "民歌", "敘事", "木蘭"],
    "title": "木蘭詩（節選）",
    "id": "p006-296"
  },
  {
    "author": "李隆基",
    "paragraphs": [
      "端午臨中夏，時清日復長。",
      "鹽梅已佐鼎，麴糵且傳觴。"
    ],
    "tags": ["唐", "五言古诗", "端午", "節日"],
    "title": "端午",
    "id": "p006-297"
  },
  {
    "author": "白居易",
    "paragraphs": [
      "汴水流，泗水流，流到瓜洲古渡頭。吳山點點愁。"
    ],
    "tags": ["唐", "词", "思念", "長相思"],
    "title": "長相思·汴水流",
    "id": "p006-298"
  },
  {
    "author": "劉禹錫",
    "paragraphs": [
      "山上層層桃李花，雲間煙火是人家。",
      "銀釧金釵來負水，長刀短笠去燒畬。"
    ],
    "tags": ["唐", "七言绝句", "巴楚", "風情"],
    "title": "竹枝詞·山上層層桃李花",
    "id": "p006-299"
  },
  {
    "author": "李賀",
    "paragraphs": [
      "茂陵劉郎秋風客，夜聞馬嘶曉無跡。",
      "畫欄桂樹懸秋香，三十六宮土花碧。"
    ],
    "tags": ["唐", "七言古诗", "懷古", "奇幻"],
    "title": "金銅仙人辭漢歌",
    "id": "p006-300"
  },
// ========================更新长篇1=============================
// ==================== 长篇补录 50首 ====================
{
  "author": "無名氏",
  "paragraphs": [
    "孔雀東南飛，五里一徘徊。",
    "十三能織素，十四學裁衣。",
    "十五彈箜篥，十六誦詩書。",
    "十七為君婦，心中常苦悲。",
    "君既為府吏，守節情不移。",
    "賤妾留空房，相見常日稀。",
    "雞鳴入機織，夜夜不得息。",
    "三日斷五匹，大人故嫌遲。",
    "非為織作遲，君家婦難為。",
    "妾不堪驅使，徒留無所施。",
    "便可白公姥，及時相遣歸。",
    "府吏得聞之，堂上啟阿母：",
    "兒已薄祿相，幸復得此婦。",
    "結髮同枕席，黃泉共為友。",
    "共事二三年，始爾未為久。",
    "女行無偏斜，何意致不厚。",
    "阿母謂府吏：何乃太區區！",
    "此婦無禮節，舉動自專由。",
    "吾意久懷忿，汝豈得自由。",
    "東家有賢女，自名秦羅敷。",
    "可憐體無比，阿母為汝求。",
    "便可速遣之，遣去慎莫留。",
    "府吏長跪告：伏惟啟阿母。",
    "今若遣此婦，終老不復取。",
    "阿母得聞之，槌床便大怒：",
    "小子無所畏，何敢助婦語！",
    "吾已失恩義，會不相從許。",
    "府吏默無聲，再拜還入戶。",
    "舉言謂新婦，哽咽不能語：",
    "我自不驅卿，逼迫有阿母。",
    "卿但暫還家，吾今且報府。",
    "不久當歸還，還必相迎取。",
    "以此下心意，慎勿違吾語。",
    "新婦謂府吏：勿復重紛紜。",
    "往昔初陽歲，謝家來貴門。",
    "奉事循公姥，進止敢自專？",
    "晝夜勤作息，伶俜縈苦辛。",
    "謂言無罪過，供養卒大恩。",
    "仍更被驅遣，何言復來還？",
    "妾有繡腰襦，葳蕤自生光。",
    "紅羅複斗帳，四角垂香囊。",
    "箱簾六七十，綠碧青絲繩。",
    "物物各自異，種種在其中。",
    "人賤物亦鄙，不足迎後人。",
    "留待作遺施，於今無會因。",
    "時時為安慰，久久莫相忘。",
    "雞鳴外欲曙，新婦起嚴妝。",
    "著我繡裌裙，事事四五通。",
    "足下躡絲履，頭上玳瑁光。",
    "腰若流紈素，耳著明月璫。",
    "指如削蔥根，口如含朱丹。",
    "纖纖作細步，精妙世無雙。",
    "上堂拜阿母，阿母怒不止。",
    "昔作女兒時，生小出野里。",
    "本自無教訓，兼愧貴家子。",
    "受母錢帛多，不堪母驅使。",
    "今日還家去，念母勞家裡。",
    "卻與小姑別，淚落連珠子。",
    "新婦初來時，小姑始扶床。",
    "今日被驅遣，小姑如我長。",
    "勤心養公姥，好自相扶將。",
    "初七及下九，嬉戲莫相忘。",
    "出門登車去，涕落百餘行。",
    "府吏馬在前，新婦車在後。",
    "隱隱何甸甸，俱會大道口。",
    "下馬入車中，低頭共耳語：",
    "誓不相隔卿，且暫還家去。",
    "吾今且赴府，不久當還歸。",
    "誓天不相負，新婦謂府吏：",
    "感君區區懷，君既若見錄。",
    "不久望君來，君當作磐石。",
    "妾當作蒲葦，蒲葦紉如絲。",
    "磐石無轉移，我有親父兄。",
    "性行暴如雷，恐不任我意。",
    "逆以煎我懷，舉手長勞勞。",
    "二情同依依，入門上家堂。",
    "進退無顏儀，阿母大拊掌。",
    "不圖子自歸，十三教汝織。",
    "十四能裁衣，十五彈箜篥。",
    "十六知禮儀，十七遣汝嫁。",
    "謂言無誓違，汝今無罪過。",
    "不迎而自歸，蘭芝慚阿母。",
    "兒實無罪過，阿母大悲摧。",
    "還家十餘日，縣令遣媒來。",
    "云有第三郎，窈窕世無雙。",
    "年始十八九，便言多令才。",
    "阿母謂阿女：汝可去應之。",
    "阿女含淚答：蘭芝初還時。",
    "府吏見丁寧，結誓不別離。",
    "今日違情義，恐此事非奇。",
    "自可斷來信，徐徐更謂之。",
    "阿母白媒人：貧賤有此女。",
    "始適還家門，不堪吏人婦。",
    "豈合令郎君？幸可廣問訊。",
    "不得便相許，媒人去數日。",
    "尋遣丞請還，說有蘭家女。",
    "承籍有宦官，云有第五郎。",
    "嬌逸未有婚，遣丞為媒人。",
    "主簿通語言，直說太守家。",
    "有此令郎君，既欲結大義。",
    "故遣來貴門，阿母謝媒人：",
    "女子先有誓，老姥豈敢言。",
    "阿兄得聞之，悵然心中煩。",
    "舉言謂阿妹：作計何不量！",
    "先嫁得府吏，後嫁得郎君。",
    "否泰如天地，足以榮汝身。",
    "不嫁義郎體，其往欲何云？",
    "蘭芝仰頭答：理實如兄言。",
    "謝家事夫婿，中道還兄門。",
    "處分適兄意，那得自任專。",
    "雖與府吏要，渠會永無緣。",
    "登即相許和，便可作婚姻。",
    "媒人下床去，諾諾復爾爾。",
    "還部白府君：下官奉使命。",
    "言談大有緣，府君得聞之。",
    "心中大歡喜，視曆復開書。",
    "便利此月內，六合正相應。",
    "良吉三十日，今已二十七。",
    "卿可去成婚，交語速裝束。",
    "絡繹如浮雲，青雀白鵠舫。",
    "四角龍子幡，婀娜隨風轉。",
    "金車玉作輪，躑躅青驄馬。",
    "流蘇金鏤鞍，齎錢三百萬。",
    "皆用青絲穿，雜綵三百匹。",
    "交廣市鮭珍，從人四五百。",
    "鬱鬱登郡門，阿母謂阿女：",
    "適得府君書，明日來迎汝。",
    "何不作衣裳？莫令事不舉。",
    "阿女默無聲，手巾掩口啼。",
    "淚落便如瀉，移我琉璃榻。",
    "出置前窗下，左手持刀尺。",
    "右手執綾羅，朝成繡裌裙。",
    "晚成單羅衫，晻晻日欲暝。",
    "愁思出門啼，府吏聞此變。",
    "因求假暫歸，未至二三里。",
    "摧藏馬悲哀，新婦識馬聲。",
    "躡履相逢迎，悵然遙相望。",
    "知是故人來，舉手拍馬鞍。",
    "嗟歎使心傷：自君別我後。",
    "人事不可量，果不如先願。",
    "又非君所詳，我有親父母。",
    "逼迫兼弟兄，以我應他人。",
    "君還何所望！府吏謂新婦：",
    "賀卿得高遷，磐石方且厚。",
    "可以卒千年，蒲葦一時紉。",
    "便作旦夕間，卿當日勝貴。",
    "吾獨向黃泉，新婦謂府吏：",
    "何意出此言！同是被逼迫。",
    "君爾妾亦然，黃泉下相見。",
    "勿違今日言，執手分道去。",
    "各各還家門，生人作死別。",
    "恨恨那可論，念與世間辭。",
    "千萬不復全，府吏還家去。",
    "上堂拜阿母：今日大風寒。",
    "寒風摧樹木，嚴霜結庭蘭。",
    "兒今日冥冥，令母在後單。",
    "故作不良計，勿復怨鬼神。",
    "命如南山石，四體康且直。",
    "阿母得聞之，零淚應聲落。",
    "汝是大家子，仕宦於臺閣。",
    "慎勿為婦死，貴賤情何薄。",
    "東家有賢女，窈窕豔城郭。",
    "阿母為汝求，便復在旦夕。",
    "府吏再拜還，長歎空房中。",
    "作計乃爾立，轉頭向戶裏。",
    "漸見愁煎迫，其日牛馬嘶。",
    "新婦入青廬，菴菴黃昏後。",
    "寂寂人定初，我命絕今日。",
    "魂去尸長留，攬裙脫絲履。",
    "舉身赴清池，府吏聞此事。",
    "心知長別離，徘徊庭樹下。",
    "自掛東南枝，兩家求合葬。",
    "合葬華山傍，東西植松柏。",
    "左右種梧桐，枝枝相覆蓋。",
    "葉葉相交通，中有雙飛鳥。",
    "自名為鴛鴦，仰頭相向鳴。",
    "夜夜達五更，行人駐足聽。",
    "寡婦起彷徨，多謝後世人。",
    "戒之慎勿忘。"
  ],
  "tags": ["汉", "乐府", "叙事诗", "爱情"],
  "title": "孔雀東南飛",
  "id": "long001"
},
{
  "author": "無名氏",
  "paragraphs": [
    "唧唧復唧唧，木蘭當戶織。",
    "不聞機杼聲，惟聞女歎息。",
    "問女何所思，問女何所憶。",
    "女亦無所思，女亦無所憶。",
    "昨夜見軍帖，可汗大點兵。",
    "軍書十二卷，卷卷有爺名。",
    "阿爺無大兒，木蘭無長兄。",
    "願為市鞍馬，從此替爺征。",
    "東市買駿馬，西市買鞍韉。",
    "南市買轡頭，北市買長鞭。",
    "朝辭爺孃去，暮宿黃河邊。",
    "不聞爺孃喚女聲，但聞黃河流水鳴濺濺。",
    "旦辭黃河去，暮至黑山頭。",
    "不聞爺孃喚女聲，但聞燕山胡騎聲啾啾。",
    "萬里赴戎機，關山度若飛。",
    "朔氣傳金柝，寒光照鐵衣。",
    "將軍百戰死，壯士十年歸。",
    "歸來見天子，天子坐明堂。",
    "策勳十二轉，賞賜百千強。",
    "可汗問所欲，木蘭不用尚書郎。",
    "願馳千里足，送兒還故鄉。",
    "爺孃聞女來，出郭相扶將。",
    "阿姊聞妹來，當戶理紅妝。",
    "小弟聞姊來，磨刀霍霍向豬羊。",
    "開我東閣門，坐我西閣床。",
    "脫我戰時袍，著我舊時裳。",
    "當窗理雲鬢，對鏡帖花黃。",
    "出門看火伴，火伴皆驚忙。",
    "同行十二年，不知木蘭是女郎。",
    "雄兔腳撲朔，雌兔眼迷離。",
    "雙兔傍地走，安能辨我是雄雌？"
  ],
  "tags": ["北朝", "民歌", "叙事诗", "巾帼"],
  "title": "木蘭詩",
  "id": "long002"
},
{
  "author": "韋莊",
  "paragraphs": [
    "中和癸卯春三月，洛陽城外花如雪。",
    "東西南北路人絕，綠楊悄悄香塵滅。",
    "路旁忽見如花人，獨向綠楊陰下歇。",
    "鳳側鸞欹鬢腳斜，紅攢黛斂眉心折。",
    "借問女郎何處來？含顰欲語聲先咽。",
    "回頭斂袂謝行人，喪亂漂淪何堪說。",
    "三年陷賊留秦地，依稀記得秦中事。",
    "君能為妾解金鞍，妾亦與君停玉趾。",
    "前年庚子臘月五，正閉金籠教鸚鵡。",
    "斜開鸞鏡懶梳頭，閒憑雕欄慵不語。",
    "忽看門外起紅塵，但見軍中摐金鼓。",
    "洛陽城外煙塵昏，洛陽城裡愁殺人。",
    "宅破天荒煙霧昏，血流漂杵屍填塹。",
    "家家流血如泉沸，處處冤聲聲動地。",
    "舞伎歌姬盡暗捐，嬰兒稚女皆生棄。",
    "東鄰有女眉新畫，傾國傾城不知價。",
    "長戈擁得上戎車，回首香閨淚盈把。",
    "旋抽金線學縫旗，才上雕鞍教走馬。",
    "有時馬上見良人，不敢回眸空淚下。",
    "西鄰有女真仙子，一寸橫波剪秋水。",
    "妝成只對鏡中春，年幼不知門外事。",
    "一夫躍上金鞍馬，卻被紅妝佯羞殺。",
    "須臾主父乘奔至，下馬入門癡似醉。",
    "適逢紫蓋去蒙塵，已見白旗來匝地。",
    "扶羸攜幼競相呼，上屋緣牆不知次。",
    "南鄰有女不記姓，昨日良媒新納聘。",
    "琉璃階上不聞行，翡翠簾間空見影。",
    "忽看庭際刀刃鳴，身首支離在俄頃。",
    "仰天掩面哭一聲，女弟女兄同入井。",
    "北鄰少婦行相促，旋拆雲鬟拭眉綠。",
    "已聞擊托壞高門，不覺攀緣上重屋。",
    "須臾四面火光來，欲下迴梯梯又摧。",
    "煙中大叫猶求救，梁上懸屍已作灰。",
    "妾身幸得全刀鋸，不敢踟躕久回顧。",
    "旋梳蟬鬢逐軍行，強展蛾眉出門去。",
    "舊里從茲不得歸，六親自此無尋處。",
    "一從陷賊經三載，終日驚憂心膽碎。",
    "夜臥千重劍戟圍，朝餐一似人肝膾。",
    "鴛鴦縱有豈成雙，翡翠雖多不成對。",
    "妾聞此語愁更愁，天遣時災非自由。",
    "神在山中猶避難，何須責望東諸侯。",
    "前年又出楊震關，舉頭雲際見荊山。",
    "如從地府到人間，頓覺時清身自閑。",
    "秦人被擄為奴婢，不識尊卑和彼此。",
    "出入麾幢作伍人，低昂羽翮隨波駛。",
    "豈知此後更為難，虎踞龍蟠在眼前。",
    "須臾卻立沙堤上，掩淚看山憶舊年。",
    "更聞鐘鼓動都城，想見樓臺簇煙霧。",
    "此時卻羨閑人醉，五陵無復經過地。",
    "但聞山路野花香，不見河橋柳色翠。",
    "斜陽古岸歸鴉晚，紅蓼花疏秋水淺。",
    "欲向空林寄一身，空林白骨無人辨。",
    "回首秦川不忍看，欲歸無路心悲酸。",
    "飄零且為溝中瘠，仰面長呼天漫漫。",
    "天漫漫兮地悠悠，空向蒼生問故丘。",
    "野草不開千里恨，山禽猶叫萬年愁。",
    "長安寂寂今何有，廢市荒街麥苗秀。",
    "採樵斫盡杏園花，修寨誅殘御溝柳。",
    "華軒繡轂皆銷散，甲第朱門無一半。",
    "含元殿上狐兔行，花萼樓前荊棘滿。",
    "昔時繁盛皆埋沒，舉目淒涼無故物。",
    "內庫燒為錦繡灰，天街踏盡公卿骨。",
    "此時泣血念家山，家山不見淚潺潺。",
    "一朝瓦解成灰土，四海無人為解顏。"
  ],
  "tags": ["唐", "七言古诗", "叙事", "战乱"],
  "title": "秦婦吟",
  "id": "long003"
},
{
  "author": "吳偉業",
  "paragraphs": [
    "鼎湖當日棄人間，破敵收京下玉關。",
    "慟哭六軍俱縞素，衝冠一怒為紅顏。",
    "紅顏流落非吾戀，逆賊天亡自荒宴。",
    "電掃黃巾定黑山，哭罷君親再相見。",
    "相見初經田竇家，侯門歌舞出如花。",
    "許將戚里箜篌伎，等取將軍油壁車。",
    "家本姑蘇浣花里，圓圓小字嬌羅綺。",
    "夢向夫差苑裡遊，宮娥擁入君王起。",
    "前身合是採蓮人，門前一片橫塘水。",
    "橫塘雙槳去如飛，何處豪家強載歸。",
    "此際豈知非薄命，此時只有淚沾衣。",
    "薰天意氣連宮掖，明眸皓齒無人惜。",
    "奪歸永巷閉良家，教就新聲傾坐客。",
    "坐客飛觴紅日暮，一曲哀弦向誰訴？",
    "白皙通侯最少年，揀取花枝屢回顧。",
    "早攜嬌鳥出樊籠，待得銀河幾時渡？",
    "恨殺軍書抵死催，苦留後約將人誤。",
    "相約恩深相見難，一朝蟻賊滿長安。",
    "可憐思婦樓頭柳，認作天邊粉絮看。",
    "遍索綠珠圍內第，強呼絳樹出雕欄。",
    "若非壯士全師勝，爭得蛾眉匹馬還？",
    "蛾眉馬上傳呼進，雲鬟不整驚魂定。",
    "蠟炬迎來在戰場，啼妝滿面殘紅印。",
    "專征簫鼓向秦川，金牛道上車千乘。",
    "斜谷雲深起畫樓，散關月落開妝鏡。",
    "傳來消息滿江鄉，烏桕紅經十度霜。",
    "教曲伎師憐尚在，浣紗女伴憶同行。",
    "舊巢共是銜泥燕，飛上枝頭變鳳凰。",
    "長向尊前悲老大，有人夫婿擅侯王。",
    "當時只受聲名累，貴戚名豪競延致。",
    "一斛明珠萬斛愁，關山漂泊腰肢細。",
    "錯怨狂風颺落花，無邊春色來天地。",
    "嘗聞傾國與傾城，翻使周郎受重名。",
    "妻子豈應關大計，英雄無奈是多情。",
    "全家白骨成灰土，一代紅妝照汗青。",
    "君不見館娃初起鴛鴦宿，越女如花看不足。",
    "香徑塵生烏自啼，屧廊人去苔空綠。",
    "換羽移宮萬里愁，珠歌翠舞古梁州。",
    "為君別唱吳宮曲，漢水東南日夜流。"
  ],
  "tags": ["清", "七言古诗", "叙事", "明末"],
  "title": "圓圓曲",
  "id": "long004"
},
{
  "author": "杜甫",
  "paragraphs": [
    "皇帝二載秋，閏八月初吉。",
    "杜子將北征，蒼茫問家室。",
    "維時遭艱虞，朝野少暇日。",
    "顧慚恩私被，詔許歸蓬蓽。",
    "拜辭詣闕下，怵惕久未出。",
    "雖乏諫諍姿，恐君有遺失。",
    "君誠中興主，經緯固密勿。",
    "東胡反未已，臣甫憤所切。",
    "揮涕戀行在，道途猶恍惚。",
    "乾坤含瘡痍，憂虞何時畢。",
    "靡靡逾阡陌，人煙眇蕭瑟。",
    "所遇多被傷，呻吟更流血。",
    "回首鳳翔縣，旌旗晚明滅。",
    "前登寒山重，屢得飲馬窟。",
    "邠郊入地底，涇水中蕩潏。",
    "猛虎立我前，蒼崖吼時裂。",
    "菊垂今秋花，石戴古車轍。",
    "青雲動高興，幽事亦可悅。",
    "山果多瑣細，羅生雜橡栗。",
    "或紅如丹砂，或黑如點漆。",
    "雨露之所濡，甘苦齊結實。",
    "緬思桃源內，益歎身世拙。",
    "坡陀望鄜畤，巖谷互出沒。",
    "我行已水濱，我僕猶木末。",
    "鴟鳥鳴黃桑，野鼠拱亂穴。",
    "夜深經戰場，寒月照白骨。",
    "潼關百萬師，往者散何卒。",
    "遂令半秦民，殘害為異物。",
    "況我墮胡塵，及歸盡華髮。",
    "經年至茅屋，妻子衣百結。",
    "慟哭松聲回，悲泉共幽咽。",
    "平生所嬌兒，顏色白勝雪。",
    "見耶背面啼，垢膩腳不襪。",
    "床前兩小女，補綻才過膝。",
    "海圖坼波濤，舊繡移曲折。",
    "天吳及紫鳳，顛倒在裋褐。",
    "老夫情懷惡，嘔泄臥數日。",
    "那無囊中帛，救汝寒凜栗。",
    "粉黛亦解苞，衾裯稍羅列。",
    "瘦妻面復光，癡女頭自櫛。",
    "學母無不為，曉妝隨手抹。",
    "移時施朱鉛，狼藉畫眉闊。",
    "生還對童稚，似欲忘飢渴。",
    "問事競挽鬚，誰能即嗔喝。",
    "翻思在賊愁，甘受雜亂聒。",
    "新歸且慰意，生理焉能說。",
    "至尊尚蒙塵，幾日休練卒。",
    "仰觀天色改，坐覺妖氛豁。",
    "陰風西北來，慘澹隨回紇。",
    "其王願助順，其俗善馳突。",
    "送兵五千人，驅馬一萬匹。",
    "此輩少為貴，四方服勇決。",
    "所用皆鷹騰，破敵過箭疾。",
    "聖心頗虛佇，時議氣欲奪。",
    "伊洛指掌收，西京不足拔。",
    "官軍請深入，蓄銳可俱發。",
    "此舉開青徐，旋瞻略恆碣。",
    "昊天積霜露，正氣有肅殺。",
    "禍轉亡胡歲，勢成擒胡月。",
    "胡命其能久，皇綱未宜絕。",
    "憶昨狼狽初，事與古先別。",
    "姦臣竟葅醢，同惡隨蕩析。",
    "不聞夏殷衰，中自誅褒妲。",
    "周漢獲再興，宣光果明哲。",
    "桓桓陳將軍，仗鉞奮忠烈。",
    "微爾人盡非，於今國猶活。",
    "淒涼大同殿，寂寞白獸闥。",
    "都人望翠華，佳氣向金闕。",
    "園陵固有神，掃灑數不缺。",
    "煌煌太宗業，樹立甚宏達。"
  ],
  "tags": ["唐", "五言古诗", "叙事", "爱国"],
  "title": "北征",
  "id": "long005"
},
{
  "author": "杜甫",
  "paragraphs": [
    "杜陵有布衣，老大意轉拙。",
    "許身一何愚，竊比稷與契。",
    "居然成濩落，白首甘契闊。",
    "蓋棺事則已，此志常覬豁。",
    "窮年憂黎元，歎息腸內熱。",
    "取笑同學翁，浩歌彌激烈。",
    "非無江海志，瀟灑送日月。",
    "生逢堯舜君，不忍便永訣。",
    "當今廊廟具，構廈豈云缺。",
    "葵藿傾太陽，物性固難奪。",
    "顧惟螻蟻輩，但自求其穴。",
    "胡為慕大鯨，輒擬偃溟渤。",
    "以茲悟生理，獨恥事干謁。",
    "兀兀遂至今，忍為塵埃沒。",
    "終愧巢與由，未能易其節。",
    "沈飲聊自遣，放歌破愁絕。",
    "歲暮百草零，疾風高岡裂。",
    "天衢陰崢嶸，客子中夜發。",
    "霜嚴衣帶斷，指直不得結。",
    "凌晨過驪山，御榻在嵽嵲。",
    "蚩尤塞寒空，蹴踏崖谷滑。",
    "瑤池氣鬱律，羽林相摩戛。",
    "君臣留歡娛，樂動殷樛嶱。",
    "賜浴皆長纓，與宴非短褐。",
    "彤庭所分帛，本自寒女出。",
    "鞭撻其夫家，聚斂貢城闕。",
    "聖人筐篚恩，實欲邦國活。",
    "臣如忽至理，君豈棄此物。",
    "多士盈朝廷，仁者宜戰慄。",
    "況聞內金盤，盡在衛霍室。",
    "中堂舞神仙，煙霧散玉質。",
    "煖客貂鼠裘，悲管逐清瑟。",
    "勸客駝蹄羹，霜橙壓香橘。",
    "朱門酒肉臭，路有凍死骨。",
    "榮枯咫尺異，惆悵難再述。",
    "北轅就涇渭，官渡又改轍。",
    "群水從西下，極目高崒兀。",
    "疑是崆峒來，恐觸天柱折。",
    "河梁幸未坼，枝撐聲窸窣。",
    "行旅相攀援，川廣不可越。",
    "老妻寄異縣，十口隔風雪。",
    "誰能久不顧，庶往共飢渴。",
    "入門聞號咷，幼子飢已卒。",
    "吾寧舍一哀，里巷亦嗚咽。",
    "所愧為人父，無食致夭折。",
    "豈知秋未登，貧窶有倉卒。",
    "生常免租稅，名不隸征伐。",
    "撫跡猶酸辛，平人固騷屑。",
    "默思失業徒，因念遠戍卒。",
    "憂端齊終南，澒洞不可掇。"
  ],
  "tags": ["唐", "五言古诗", "感怀", "民生"],
  "title": "自京赴奉先縣詠懷五百字",
  "id": "long006"
},
{
  "author": "元稹",
  "paragraphs": [
    "連昌宮中滿宮竹，歲久無人森似束。",
    "又有牆頭千葉桃，風動落花紅蔌蔌。",
    "宮邊老翁為余泣，小年進食曾因入。",
    "上皇正在望仙樓，太真同憑闌干立。",
    "樓上樓前盡珠翠，炫轉熒煌照天地。",
    "歸來如夢復如癡，何暇備言宮裡事。",
    "初過寒食一百六，店舍無煙宮樹綠。",
    "夜半月高弦索鳴，賀老琵琶定場屋。",
    "力士傳呼覓念奴，念奴潛伴諸郎宿。",
    "須臾覓得又連催，特敕街中許然燭。",
    "春嬌滿眼睡紅綃，掠削雲鬟旋裝束。",
    "飛上九天歌一聲，二十五郎吹管逐。",
    "逡巡大遍涼州徹，色色龜茲轟錄續。",
    "李謨擫笛傍宮牆，偷得新翻數般曲。",
    "平明大駕發行宮，萬人歌舞塗路中。",
    "百官隊仗避岐薛，楊氏諸姨車鬥風。",
    "明年十月東都破，御路猶存祿山過。",
    "驅令供頓不敢藏，萬姓無聲淚潛墮。",
    "兩京定後六七年，卻尋家舍行宮前。",
    "莊園燒盡有枯井，行宮門閉樹宛然。",
    "爾後相傳六皇帝，不到離宮門久閉。",
    "往來年少說長安，玄武樓成花萼廢。",
    "去年敕使因斫竹，偶值門開暫相逐。",
    "荊榛櫛比塞池塘，狐兔驕癡緣樹木。",
    "舞榭攲傾基尚在，文窗窈窕紗猶綠。",
    "塵埋粉壁舊花鈿，烏啄風箏碎珠玉。",
    "上皇偏愛臨砌花，依然御榻臨階斜。",
    "蛇出燕巢盤鬥栱，菌生香案正當衙。",
    "寢殿相連端正樓，太真梳洗樓上頭。",
    "晨光未出簾影黑，至今反掛珊瑚鉤。",
    "指似傍人因慟哭，卻出宮門淚相續。",
    "自從此後還閉門，夜夜狐狸上門屋。",
    "我聞此語心骨悲，太平誰致亂者誰。",
    "翁言野父何分別，耳聞眼見為君說。",
    "姚崇宋璟作相公，勸諫上皇言語切。",
    "燮理陰陽禾黍豐，調和中外無兵戎。",
    "長官清平太守好，揀選皆言由相公。",
    "開元之末姚宋死，朝廷漸漸由妃子。",
    "祿山宮裡養作兒，虢國門前鬧如市。",
    "弄權宰相不記名，依稀憶得楊與李。",
    "廟謨顛倒四海搖，五十年年來作瘡痏。",
    "今皇神聖丞相明，詔書才下吳蜀平。",
    "官軍又取淮西賊，此賊亦除天下寧。",
    "年年耕種宮前道，今年不遣子孫耕。",
    "老翁此意深望幸，努力廟謀休用兵。"
  ],
  "tags": ["唐", "七言古诗", "咏史", "讽喻"],
  "title": "連昌宮詞",
  "id": "long007"
},
{
  "author": "曹植",
  "paragraphs": [
    "謁帝承明廬，逝將歸舊疆。",
    "清晨發皇邑，日夕過首陽。",
    "伊洛廣且深，欲濟川無梁。",
    "汎舟越洪濤，怨彼東路長。",
    "顧瞻戀城闕，引領情內傷。",
    "太谷何寥廓，山樹鬱蒼蒼。",
    "霖雨泥我塗，流潦浩縱橫。",
    "中逵絕無軌，改轍登高岡。",
    "修坂造雲日，我馬玄以黃。",
    "玄黃猶能進，我思鬱以紆。",
    "鬱紆將何念，親愛在離居。",
    "本圖相與偕，中更不克俱。",
    "鴟梟鳴衡扼，豺狼當路衢。",
    "蒼蠅間白黑，讒巧令親疏。",
    "欲還絕無蹊，攬轡止踟躕。",
    "踟躕亦何留，相思無終極。",
    "秋風發微涼，寒蟬鳴我側。",
    "原野何蕭條，白日忽西匿。",
    "歸鳥赴喬林，翩翩厲羽翼。",
    "孤獸走索群，銜草不遑食。",
    "感物傷我懷，撫心長太息。",
    "太息將何為，天命與我違。",
    "奈何念同生，一往形不歸。",
    "孤魂翔故域，靈柩寄京師。",
    "存者忽復過，亡歿身自衰。",
    "人生處一世，去若朝露晞。",
    "年在桑榆間，影響不能追。",
    "自顧非金石，咄唶令心悲。",
    "心悲動我神，棄置莫復陳。",
    "丈夫志四海，萬里猶比鄰。",
    "恩愛苟不虧，在遠分日親。",
    "何必同衾幬，然後展慇勤。",
    "憂思成疾疢，無乃兒女仁。",
    "倉卒骨肉情，能不懷苦辛。",
    "苦辛何慮思，天命信可疑。",
    "虛無求列仙，松子久吾欺。",
    "變故在斯須，百年誰能持。",
    "離別永無會，執手將何時。",
    "王其愛玉體，俱享黃髮期。",
    "收淚即長路，援筆從此辭。"
  ],
  "tags": ["魏", "五言古诗", "送别", "感怀"],
  "title": "贈白馬王彪",
  "id": "long008"
},
{
  "author": "王粲",
  "paragraphs": [
    "西京亂無象，豺虎方遘患。",
    "復棄中國去，委身適荊蠻。",
    "親戚對我悲，朋友相追攀。",
    "出門無所見，白骨蔽平原。",
    "路有飢婦人，抱子棄草間。",
    "顧聞號泣聲，揮涕獨不還。",
    "未知身死處，何能兩相完。",
    "驅馬棄之去，不忍聽此言。",
    "南登霸陵岸，回首望長安。",
    "悟彼下泉人，喟然傷心肝。",
    "荊蠻非我鄉，何為久滯淫。",
    "方舟泝大江，日暮愁我心。",
    "山岡有餘映，巖阿增重陰。",
    "狐狸馳赴穴，飛鳥翔故林。",
    "流波激清響，猴猿臨岸吟。",
    "迅風拂裳袂，白露霑衣衿。",
    "獨夜不能寐，攝衣起撫琴。",
    "絲桐感人情，為我發悲音。",
    "羈旅無終極，憂思壯難任。",
    "邊城使心悲，昔吾親更之。",
    "冰雪截肌膚，風飄無止期。",
    "百里不見人，草木誰當遲。",
    "登城望亭燧，翩翩飛戍旗。",
    "行者不顧反，出門與家辭。",
    "子弟多俘虜，哭聲無時已。",
    "自古有羈旅，我何苦哀思。"
  ],
  "tags": ["魏", "五言古诗", "乱世", "悲悯"],
  "title": "七哀詩",
  "id": "long009"
},
{
  "author": "蔡琰",
  "paragraphs": [
    "漢季失權柄，董卓亂天常。",
    "志欲圖篡弒，先害諸賢良。",
    "逼迫遷舊邦，擁主以自強。",
    "海內興義師，欲共討不祥。",
    "卓眾來東下，金甲耀日光。",
    "平土人脆弱，來兵皆胡羌。",
    "獵野圍城邑，所向悉破亡。",
    "斬截無孑遺，屍骸相撐拒。",
    "馬邊懸男頭，馬後載婦女。",
    "長驅西入關，迥路險且阻。",
    "還顧邈冥冥，肝脾為爛腐。",
    "所略有萬計，不得令屯聚。",
    "或有骨肉俱，欲言不敢語。",
    "失意幾微間，輒言斃降虜。",
    "要當以亭刃，我曹不活汝。",
    "豈復惜性命，不堪其詈罵。",
    "或便加棰杖，毒痛參並下。",
    "旦則號泣行，夜則悲吟坐。",
    "欲死不能得，欲生無一可。",
    "彼蒼者何辜，乃遭此厄禍。",
    "邊荒與華異，人俗少義理。",
    "處所多霜雪，胡風春夏起。",
    "翩翩吹我衣，肅肅入我耳。",
    "感時念父母，哀歎無窮已。",
    "有客從外來，聞之常歡喜。",
    "迎問其消息，輒復非鄉里。",
    "邂逅徼時願，骨肉來迎己。",
    "己得自解免，當復棄兒子。",
    "天屬綴人心，念別無會期。",
    "存亡永乖隔，不忍與之辭。",
    "兒前抱我頸，問母欲何之。",
    "人言母當去，豈復有還時。",
    "阿母常仁惻，今何更不慈。",
    "我尚未成人，奈何不顧思。",
    "見此崩五內，恍惚生狂癡。",
    "號泣手撫摩，當發復回疑。",
    "兼有同時輩，相送告離別。",
    "慕我獨得歸，哀叫聲摧裂。",
    "馬為立踟躕，車為不轉轍。",
    "觀者皆歔欷，行路亦嗚咽。",
    "去去割情戀，遄征日遐邁。",
    "悠悠三千里，何時復交會。",
    "念我出腹子，胸臆為摧敗。",
    "既至家人盡，又復無中外。",
    "城郭為山林，庭宇生荊艾。",
    "白骨不知誰，縱橫莫覆蓋。",
    "出門無人聲，豺狼號且吠。",
    "煢煢對孤景，怛吒糜肝肺。",
    "登高遠眺望，魂神忽飛逝。",
    "奄若壽命盡，旁人相寬大。",
    "為復強視息，雖生何聊賴。",
    "託命於新人，竭心自勗厲。",
    "流離成鄙賤，常恐復捐廢。",
    "人生幾何時，懷憂終年歲。"
  ],
  "tags": ["汉", "五言古诗", "叙事", "悲愤"],
  "title": "悲憤詩",
  "id": "long010"
},

{
  "author": "李白",
  "paragraphs": [
    "噫吁嚱，危乎高哉！蜀道之难，难于上青天！",
    "蚕丛及鱼凫，开国何茫然！",
    "尔来四万八千岁，不与秦塞通人烟。",
    "西当太白有鸟道，可以横绝峨眉巅。",
    "地崩山摧壮士死，然后天梯石栈相钩连。",
    "上有六龙回日之高标，下有冲波逆折之回川。",
    "黄鹤之飞尚不得过，猿猱欲度愁攀援。",
    "青泥何盘盘，百步九折萦岩峦。",
    "扪参历井仰胁息，以手抚膺坐长叹。",
    "问君西游何时还？畏途巉岩不可攀。",
    "但见悲鸟号古木，雄飞雌从绕林间。",
    "又闻子规啼夜月，愁空山。",
    "蜀道之难，难于上青天，使人听此凋朱颜！",
    "连峰去天不盈尺，枯松倒挂倚绝壁。",
    "飞湍瀑流争喧豗，砯崖转石万壑雷。",
    "其险也如此，嗟尔远道之人胡为乎来哉！",
    "剑阁峥嵘而崔嵬，一夫当关，万夫莫开。",
    "所守或匪亲，化为狼与豺。",
    "朝避猛虎，夕避长蛇；磨牙吮血，杀人如麻。",
    "锦城虽云乐，不如早还家。",
    "蜀道之难，难于上青天，侧身西望长咨嗟！"
  ],
  "tags": ["唐", "七言古诗", "山水", "乐府"],
  "title": "蜀道難",
  "id": "long011"
},
{
  "author": "白居易",
  "paragraphs": [
    "汉皇重色思倾国，御宇多年求不得。",
    "杨家有女初长成，养在深闺人未识。",
    "天生丽质难自弃，一朝选在君王侧。",
    "回眸一笑百媚生，六宫粉黛无颜色。",
    "春寒赐浴华清池，温泉水滑洗凝脂。",
    "侍儿扶起娇无力，始是新承恩泽时。",
    "云鬓花颜金步摇，芙蓉帐暖度春宵。",
    "春宵苦短日高起，从此君王不早朝。",
    "承欢侍宴无闲暇，春从春游夜专夜。",
    "后宫佳丽三千人，三千宠爱在一身。",
    "金屋妆成娇侍夜，玉楼宴罢醉和春。",
    "姊妹弟兄皆列土，可怜光彩生门户。",
    "遂令天下父母心，不重生男重生女。",
    "骊宫高处入青云，仙乐风飘处处闻。",
    "缓歌慢舞凝丝竹，尽日君王看不足。",
    "渔阳鼙鼓动地来，惊破霓裳羽衣曲。",
    "九重城阙烟尘生，千乘万骑西南行。",
    "翠华摇摇行复止，西出都门百余里。",
    "六军不发无奈何，宛转蛾眉马前死。",
    "花钿委地无人收，翠翘金雀玉搔头。",
    "君王掩面救不得，回看血泪相和流。",
    "黄埃散漫风萧索，云栈萦纡登剑阁。",
    "峨嵋山下少人行，旌旗无光日色薄。",
    "蜀江水碧蜀山青，圣主朝朝暮暮情。",
    "行宫见月伤心色，夜雨闻铃肠断声。",
    "天旋地转回龙驭，到此踌躇不能去。",
    "马嵬坡下泥土中，不见玉颜空死处。",
    "君臣相顾尽沾衣，东望都门信马归。",
    "归来池苑皆依旧，太液芙蓉未央柳。",
    "芙蓉如面柳如眉，对此如何不泪垂？",
    "春风桃李花开日，秋雨梧桐叶落时。",
    "西宫南内多秋草，落叶满阶红不扫。",
    "梨园弟子白发新，椒房阿监青娥老。",
    "夕殿萤飞思悄然，孤灯挑尽未成眠。",
    "迟迟钟鼓初长夜，耿耿星河欲曙天。",
    "鸳鸯瓦冷霜华重，翡翠衾寒谁与共。",
    "悠悠生死别经年，魂魄不曾来入梦。",
    "临邛道士鸿都客，能以精诚致魂魄。",
    "为感君王辗转思，遂教方士殷勤觅。",
    "排空驭气奔如电，升天入地求之遍。",
    "上穷碧落下黄泉，两处茫茫皆不见。",
    "忽闻海上有仙山，山在虚无缥缈间。",
    "楼阁玲珑五云起，其中绰约多仙子。",
    "中有一人字太真，雪肤花貌参差是。",
    "金阙西厢叩玉扃，转教小玉报双成。",
    "闻道汉家天子使，九华帐里梦魂惊。",
    "揽衣推枕起徘徊，珠箔银屏迤逦开。",
    "云鬓半偏新睡觉，花冠不整下堂来。",
    "风吹仙袂飘飘举，犹似霓裳羽衣舞。",
    "玉容寂寞泪阑干，梨花一枝春带雨。",
    "含情凝睇谢君王，一别音容两渺茫。",
    "昭阳殿里恩爱绝，蓬莱宫中日月长。",
    "回头下望人寰处，不见长安见尘雾。",
    "唯将旧物表深情，钿合金钗寄将去。",
    "钗留一股合一扇，钗擘黄金合分钿。",
    "但教心似金钿坚，天上人间会相见。",
    "临别殷勤重寄词，词中有誓两心知。",
    "七月七日长生殿，夜半无人私语时。",
    "在天愿作比翼鸟，在地愿为连理枝。",
    "天长地久有时尽，此恨绵绵无绝期。"
  ],
  "tags": ["唐", "七言古诗", "叙事", "爱情"],
  "title": "長恨歌",
  "id": "long012"
},
{
  "author": "白居易",
  "paragraphs": [
    "浔阳江头夜送客，枫叶荻花秋瑟瑟。",
    "主人下马客在船，举酒欲饮无管弦。",
    "醉不成欢惨将别，别时茫茫江浸月。",
    "忽闻水上琵琶声，主人忘归客不发。",
    "寻声暗问弹者谁，琵琶声停欲语迟。",
    "移船相近邀相见，添酒回灯重开宴。",
    "千呼万唤始出来，犹抱琵琶半遮面。",
    "转轴拨弦三两声，未成曲调先有情。",
    "弦弦掩抑声声思，似诉平生不得志。",
    "低眉信手续续弹，说尽心中无限事。",
    "轻拢慢捻抹复挑，初为霓裳后六幺。",
    "大弦嘈嘈如急雨，小弦切切如私语。",
    "嘈嘈切切错杂弹，大珠小珠落玉盘。",
    "间关莺语花底滑，幽咽泉流冰下难。",
    "冰泉冷涩弦凝绝，凝绝不通声暂歇。",
    "别有幽愁暗恨生，此时无声胜有声。",
    "银瓶乍破水浆迸，铁骑突出刀枪鸣。",
    "曲终收拨当心画，四弦一声如裂帛。",
    "东船西舫悄无言，唯见江心秋月白。",
    "沉吟放拨插弦中，整顿衣裳起敛容。",
    "自言本是京城女，家在虾蟆陵下住。",
    "十三学得琵琶成，名属教坊第一部。",
    "曲罢曾教善才服，妆成每被秋娘妒。",
    "五陵年少争缠头，一曲红绡不知数。",
    "钿头银篦击节碎，血色罗裙翻酒污。",
    "今年欢笑复明年，秋月春风等闲度。",
    "弟走从军阿姨死，暮去朝来颜色故。",
    "门前冷落鞍马稀，老大嫁作商人妇。",
    "商人重利轻别离，前月浮梁买茶去。",
    "去来江口守空船，绕船月明江水寒。",
    "夜深忽梦少年事，梦啼妆泪红阑干。",
    "我闻琵琶已叹息，又闻此语重唧唧。",
    "同是天涯沦落人，相逢何必曾相识！",
    "我从去年辞帝京，谪居卧病浔阳城。",
    "浔阳地僻无音乐，终岁不闻丝竹声。",
    "住近湓江地低湿，黄芦苦竹绕宅生。",
    "其间旦暮闻何物？杜鹃啼血猿哀鸣。",
    "春江花朝秋月夜，往往取酒还独倾。",
    "岂无山歌与村笛，呕哑嘲哳难为听。",
    "今夜闻君琵琶语，如听仙乐耳暂明。",
    "莫辞更坐弹一曲，为君翻作琵琶行。",
    "感我此言良久立，却坐促弦弦转急。",
    "凄凄不似向前声，满座重闻皆掩泣。",
    "座中泣下谁最多？江州司马青衫湿。"
  ],
  "tags": ["唐", "七言古诗", "叙事", "音乐"],
  "title": "琵琶行",
  "id": "long013"
},
{
  "author": "高適",
  "paragraphs": [
    "汉家烟尘在东北，汉将辞家破残贼。",
    "男儿本自重横行，天子非常赐颜色。",
    "摐金伐鼓下榆关，旌旗逶迤碣石间。",
    "校尉羽书飞瀚海，单于猎火照狼山。",
    "山川萧条极边土，胡骑凭陵杂风雨。",
    "战士军前半死生，美人帐下犹歌舞。",
    "大漠穷秋塞草腓，孤城落日斗兵稀。",
    "身当恩遇常轻敌，力尽关山未解围。",
    "铁衣远戍辛勤久，玉箸应啼别离后。",
    "少妇城南欲断肠，征人蓟北空回首。",
    "边庭飘飖那可度，绝域苍茫更何有。",
    "杀气三时作阵云，寒声一夜传刁斗。",
    "相看白刃血纷纷，死节从来岂顾勋。",
    "君不见沙场征战苦，至今犹忆李将军。"
  ],
  "tags": ["唐", "七言古诗", "边塞", "战争"],
  "title": "燕歌行",
  "id": "long014"
},
{
  "author": "岑參",
  "paragraphs": [
    "君不见走马川行雪海边，平沙莽莽黄入天。",
    "轮台九月风夜吼，一川碎石大如斗，随风满地石乱走。",
    "匈奴草黄马正肥，金山西见烟尘飞，汉家大将西出师。",
    "将军金甲夜不脱，半夜军行戈相拨，风头如刀面如割。",
    "马毛带雪汗气蒸，五花连钱旋作冰，幕中草檄砚水凝。",
    "虏骑闻之应胆慑，料知短兵不敢接，车师西门伫献捷。"
  ],
  "tags": ["唐", "七言古诗", "边塞", "豪迈"],
  "title": "走馬川行奉送出師西征",
  "id": "long015"
},
{
  "author": "岑參",
  "paragraphs": [
    "北风卷地白草折，胡天八月即飞雪。",
    "忽如一夜春风来，千树万树梨花开。",
    "散入珠帘湿罗幕，狐裘不暖锦衾薄。",
    "将军角弓不得控，都护铁衣冷难着。",
    "瀚海阑干百丈冰，愁云惨淡万里凝。",
    "中军置酒饮归客，胡琴琵琶与羌笛。",
    "纷纷暮雪下辕门，风掣红旗冻不翻。",
    "轮台东门送君去，去时雪满天山路。",
    "山回路转不见君，雪上空留马行处。"
  ],
  "tags": ["唐", "七言古诗", "边塞", "送别"],
  "title": "白雪歌送武判官歸京",
  "id": "long016"
},
{
  "author": "李白",
  "paragraphs": [
    "海客谈瀛洲，烟涛微茫信难求。",
    "越人语天姥，云霞明灭或可睹。",
    "天姥连天向天横，势拔五岳掩赤城。",
    "天台四万八千丈，对此欲倒东南倾。",
    "我欲因之梦吴越，一夜飞度镜湖月。",
    "湖月照我影，送我至剡溪。",
    "谢公宿处今尚在，渌水荡漾清猿啼。",
    "脚著谢公屐，身登青云梯。",
    "半壁见海日，空中闻天鸡。",
    "千岩万转路不定，迷花倚石忽已暝。",
    "熊咆龙吟殷岩泉，栗深林兮惊层巅。",
    "云青青兮欲雨，水澹澹兮生烟。",
    "列缺霹雳，丘峦崩摧。",
    "洞天石扉，訇然中开。",
    "青冥浩荡不见底，日月照耀金银台。",
    "霓为衣兮风为马，云之君兮纷纷而来下。",
    "虎鼓瑟兮鸾回车，仙之人兮列如麻。",
    "忽魂悸以魄动，恍惊起而长嗟。",
    "惟觉时之枕席，失向来之烟霞。",
    "世间行乐亦如此，古来万事东流水。",
    "别君去时何时还？且放白鹿青崖间，须行即骑访名山。",
    "安能摧眉折腰事权贵，使我不得开心颜！"
  ],
  "tags": ["唐", "七言古诗", "游仙", "浪漫"],
  "title": "夢遊天姥吟留別",
  "id": "long017"
},
{
  "author": "李白",
  "paragraphs": [
    "弃我去者，昨日之日不可留。",
    "乱我心者，今日之日多烦忧。",
    "长风万里送秋雁，对此可以酣高楼。",
    "蓬莱文章建安骨，中间小谢又清发。",
    "俱怀逸兴壮思飞，欲上青天揽明月。",
    "抽刀断水水更流，举杯销愁愁更愁。",
    "人生在世不称意，明朝散发弄扁舟。"
  ],
  "tags": ["唐", "七言古诗", "感怀", "豪放"],
  "title": "宣州謝朓樓餞別校書叔雲",
  "id": "long018"
},
{
  "author": "李白",
  "paragraphs": [
    "君不见黄河之水天上来，奔流到海不复回。",
    "君不见高堂明镜悲白发，朝如青丝暮成雪。",
    "人生得意须尽欢，莫使金樽空对月。",
    "天生我材必有用，千金散尽还复来。",
    "烹羊宰牛且为乐，会须一饮三百杯。",
    "岑夫子，丹丘生，将进酒，杯莫停。",
    "与君歌一曲，请君为我倾耳听。",
    "钟鼓馔玉不足贵，但愿长醉不愿醒。",
    "古来圣贤皆寂寞，惟有饮者留其名。",
    "陈王昔时宴平乐，斗酒十千恣欢谑。",
    "主人何为言少钱，径须沽取对君酌。",
    "五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。"
  ],
  "tags": ["唐", "七言古诗", "饮酒", "豪放"],
  "title": "將進酒",
  "id": "long019"
},
{
  "author": "杜甫",
  "paragraphs": [
    "车辚辚，马萧萧，行人弓箭各在腰。",
    "耶娘妻子走相送，尘埃不见咸阳桥。",
    "牵衣顿足拦道哭，哭声直上干云霄。",
    "道旁过者问行人，行人但云点行频。",
    "或从十五北防河，便至四十西营田。",
    "去时里正与裹头，归来头白还戍边。",
    "边庭流血成海水，武皇开边意未已。",
    "君不闻汉家山东二百州，千村万落生荆杞。",
    "纵有健妇把锄犁，禾生陇亩无东西。",
    "况复秦兵耐苦战，被驱不异犬与鸡。",
    "长者虽有问，役夫敢申恨？",
    "且如今年冬，未休关西卒。",
    "县官急索租，租税从何出？",
    "信知生男恶，反是生女好。",
    "生女犹得嫁比邻，生男埋没随百草。",
    "君不见青海头，古来白骨无人收。",
    "新鬼烦冤旧鬼哭，天阴雨湿声啾啾。"
  ],
  "tags": ["唐", "七言古诗", "战争", "民生"],
  "title": "兵車行",
  "id": "long020"
},
{
  "author": "杜甫",
  "paragraphs": [
    "三年笛里关山月，万国兵前草木风。",
    "成王功大心转小，郭相谋深古来少。",
    "司徒清鉴悬明镜，尚书气与秋天杳。",
    "二三豪俊为时出，整顿乾坤济时了。",
    "东走无复忆鲈鱼，南飞觉有安巢鸟。",
    "青春复随冠冕入，紫禁正耐烟花绕。",
    "鹤禁通霄凤辇备，鸡鸣问寝龙楼晓。",
    "攀龙附凤势莫当，天下尽化为侯王。",
    "汝等岂知蒙帝力，时来不得夸身强。",
    "关中既留萧丞相，幕下复用张子房。",
    "张公一生江海客，身长九尺须眉苍。",
    "征起适遇风云会，扶颠始知筹策良。",
    "青袍白马更何有，后汉今周喜再昌。",
    "寸地尺天皆入贡，奇祥异瑞争来送。",
    "不知何国致白环，复道诸山得银瓮。",
    "隐士休歌紫芝曲，词人解撰河清颂。",
    "田家望望惜雨干，布谷处处催春种。",
    "淇上健儿归莫懒，城南思妇愁多梦。",
    "安得壮士挽天河，净洗甲兵长不用。"
  ],
  "tags": ["唐", "七言古诗", "叙事", "安史之乱"],
  "title": "洗兵馬",
  "id": "long021"
},
{
  "author": "張若虛",
  "paragraphs": [
    "春江潮水连海平，海上明月共潮生。",
    "滟滟随波千万里，何处春江无月明。",
    "江流宛转绕芳甸，月照花林皆似霰。",
    "空里流霜不觉飞，汀上白沙看不见。",
    "江天一色无纤尘，皎皎空中孤月轮。",
    "江畔何人初见月？江月何年初照人？",
    "人生代代无穷已，江月年年望相似。",
    "不知江月待何人，但见长江送流水。",
    "白云一片去悠悠，青枫浦上不胜愁。",
    "谁家今夜扁舟子？何处相思明月楼？",
    "可怜楼上月徘徊，应照离人妆镜台。",
    "玉户帘中卷不去，捣衣砧上拂还来。",
    "此时相望不相闻，愿逐月华流照君。",
    "鸿雁长飞光不度，鱼龙潜跃水成文。",
    "昨夜闲潭梦落花，可怜春半不还家。",
    "江水流春去欲尽，江潭落月复西斜。",
    "斜月沉沉藏海雾，碣石潇湘无限路。",
    "不知乘月几人归，落月摇情满江树。"
  ],
  "tags": ["唐", "七言古诗", "春江", "月夜"],
  "title": "春江花月夜",
  "id": "long022"
},
{
  "author": "李賀",
  "paragraphs": [
    "茂陵刘郎秋风客，夜闻马嘶晓无迹。",
    "画栏桂树悬秋香，三十六宫土花碧。",
    "魏官牵车指千里，东关酸风射眸子。",
    "空将汉月出宫门，忆君清泪如铅水。",
    "衰兰送客咸阳道，天若有情天亦老。",
    "携盘独出月荒凉，渭城已远波声小。"
  ],
  "tags": ["唐", "七言古诗", "怀古", "奇幻"],
  "title": "金銅仙人辭漢歌",
  "id": "long023"
},
{
  "author": "李賀",
  "paragraphs": [
    "吴丝蜀桐张高秋，空山凝云颓不流。",
    "江娥啼竹素女愁，李凭中国弹箜篌。",
    "昆山玉碎凤凰叫，芙蓉泣露香兰笑。",
    "十二门前融冷光，二十三丝动紫皇。",
    "女娲炼石补天处，石破天惊逗秋雨。",
    "梦入神山教神妪，老鱼跳波瘦蛟舞。",
    "吴质不眠倚桂树，露脚斜飞湿寒兔。"
  ],
  "tags": ["唐", "七言古诗", "音乐", "奇幻"],
  "title": "李憑箜篌引",
  "id": "long024"
},
{
  "author": "王維",
  "paragraphs": [
    "渔舟逐水爱山春，两岸桃花夹古津。",
    "坐看红树不知远，行尽青溪不见人。",
    "山口潜行始隈隩，山开旷望旋平陆。",
    "遥看一处攒云树，近入千家散花竹。",
    "樵客初传汉姓名，居人未改秦衣服。",
    "居人共住武陵源，还从物外起田园。",
    "月明松下房栊静，日出云中鸡犬喧。",
    "惊闻俗客争来集，竞引还家问都邑。",
    "平明闾巷扫花开，薄暮渔樵乘水入。",
    "初因避地去人间，及至成仙遂不还。",
    "峡里谁知有人事，世中遥望空云山。",
    "不疑灵境难闻见，尘心未尽思乡县。",
    "出洞无论隔山水，辞家终拟长游衍。",
    "自谓经过旧不迷，安知峰壑今来变。",
    "当时只记入山深，青溪几曲到云林。",
    "春来遍是桃花水，不辨仙源何处寻。"
  ],
  "tags": ["唐", "七言古诗", "山水", "桃源"],
  "title": "桃源行",
  "id": "long025"
},
{
  "author": "韓愈",
  "paragraphs": [
    "山石荦确行径微，黄昏到寺蝙蝠飞。",
    "升堂坐阶新雨足，芭蕉叶大栀子肥。",
    "僧言古壁佛画好，以火来照所见稀。",
    "铺床拂席置羹饭，疏粝亦足饱我饥。",
    "夜深静卧百虫绝，清月出岭光入扉。",
    "天明独去无道路，出入高下穷烟霏。",
    "山红涧碧纷烂漫，时见松枥皆十围。",
    "当流赤足踏涧石，水声激激风吹衣。",
    "人生如此自可乐，岂必局束为人鞿。",
    "嗟哉吾党二三子，安得至老不更归。"
  ],
  "tags": ["唐", "七言古诗", "纪游", "山水"],
  "title": "山石",
  "id": "long026"
},
{
  "author": "韓愈",
  "paragraphs": [
    "一封朝奏九重天，夕贬潮州路八千。",
    "欲为圣明除弊事，肯将衰朽惜残年。",
    "云横秦岭家何在？雪拥蓝关马不前。",
    "知汝远来应有意，好收吾骨瘴江边。"
  ],
  "tags": ["唐", "七言律诗", "贬谪", "悲壮"],
  "title": "左遷至藍關示侄孫湘",
  "id": "long027"
},
{
  "author": "柳宗元",
  "paragraphs": [
    "十一年前南渡客，四千里外北归人。",
    "诏书许逐阳和至，驿路开花处处新。"
  ],
  "tags": ["唐", "七言绝句", "归途", "喜悦"],
  "title": "詔追赴都二月至灞亭上",
  "id": "long028"
},
{
  "author": "劉禹錫",
  "paragraphs": [
    "王濬楼船下益州，金陵王气黯然收。",
    "千寻铁锁沉江底，一片降幡出石头。",
    "人世几回伤往事，山形依旧枕寒流。",
    "今逢四海为家日，故垒萧萧芦荻秋。"
  ],
  "tags": ["唐", "七言律诗", "怀古", "咏史"],
  "title": "西塞山懷古",
  "id": "long029"
},
{
  "author": "李商隱",
  "paragraphs": [
    "昨夜星辰昨夜风，画楼西畔桂堂东。",
    "身无彩凤双飞翼，心有灵犀一点通。",
    "隔座送钩春酒暖，分曹射覆蜡灯红。",
    "嗟余听鼓应官去，走马兰台类转蓬。"
  ],
  "tags": ["唐", "七言律诗", "爱情", "含蓄"],
  "title": "無題·昨夜星辰昨夜風",
  "id": "long030"
},
{
  "author": "李商隱",
  "paragraphs": [
    "相见时难别亦难，东风无力百花残。",
    "春蚕到死丝方尽，蜡炬成灰泪始干。",
    "晓镜但愁云鬓改，夜吟应觉月光寒。",
    "蓬山此去无多路，青鸟殷勤为探看。"
  ],
  "tags": ["唐", "七言律诗", "爱情", "坚贞"],
  "title": "無題·相見時難別亦難",
  "id": "long031"
},
{
  "author": "杜牧",
  "paragraphs": [
    "六王毕，四海一。蜀山兀，阿房出。",
    "覆压三百余里，隔离天日。",
    "骊山北构而西折，直走咸阳。",
    "二川溶溶，流入宫墙。",
    "五步一楼，十步一阁；",
    "廊腰缦回，檐牙高啄；",
    "各抱地势，钩心斗角。",
    "盘盘焉，囷囷焉，蜂房水涡，矗不知其几千万落。",
    "长桥卧波，未云何龙？",
    "复道行空，不霁何虹？",
    "高低冥迷，不知西东。",
    "歌台暖响，春光融融；",
    "舞殿冷袖，风雨凄凄。",
    "一日之内，一宫之间，而气候不齐。",
    "妃嫔媵嫱，王子皇孙，辞楼下殿，辇来于秦。",
    "朝歌夜弦，为秦宫人。",
    "明星荧荧，开妆镜也；",
    "绿云扰扰，梳晓鬟也；",
    "渭流涨腻，弃脂水也；",
    "烟斜雾横，焚椒兰也。",
    "雷霆乍惊，宫车过也；",
    "辘辘远听，杳不知其所之也。",
    "一肌一容，尽态极妍，缦立远视，而望幸焉。",
    "有不见者，三十六年。",
    "燕赵之收藏，韩魏之经营，齐楚之精英，",
    "几世几年，剽掠其人，倚叠如山。",
    "一旦不能有，输来其间。",
    "鼎铛玉石，金块珠砾，弃掷逦迤，秦人视之，亦不甚惜。",
    "嗟乎！一人之心，千万人之心也。",
    "秦爱纷奢，人亦念其家。",
    "奈何取之尽锱铢，用之如泥沙？",
    "使负栋之柱，多于南亩之农夫；",
    "架梁之椽，多于机上之工女；",
    "钉头磷磷，多于在庾之粟粒；",
    "瓦缝参差，多于周身之帛缕；",
    "直栏横槛，多于九土之城郭；",
    "管弦呕哑，多于市人之言语。",
    "使天下之人，不敢言而敢怒。",
    "独夫之心，日益骄固。",
    "戍卒叫，函谷举，楚人一炬，可怜焦土！",
    "呜呼！灭六国者六国也，非秦也。",
    "族秦者秦也，非天下也。",
    "嗟夫！使六国各爱其人，则足以拒秦；",
    "使秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也？",
    "秦人不暇自哀，而后人哀之；",
    "后人哀之而不鉴之，亦使后人而复哀后人也。"
  ],
  "tags": ["唐", "赋", "咏史", "讽喻"],
  "title": "阿房宮賦",
  "id": "long032"
},
{
  "author": "王勃",
  "paragraphs": [
    "豫章故郡，洪都新府。",
    "星分翼轸，地接衡庐。",
    "襟三江而带五湖，控蛮荆而引瓯越。",
    "物华天宝，龙光射牛斗之墟；",
    "人杰地灵，徐孺下陈蕃之榻。",
    "雄州雾列，俊采星驰。",
    "台隍枕夷夏之交，宾主尽东南之美。",
    "都督阎公之雅望，棨戟遥临；",
    "宇文新州之懿范，襜帷暂驻。",
    "十旬休假，胜友如云；",
    "千里逢迎，高朋满座。",
    "腾蛟起凤，孟学士之词宗；",
    "紫电青霜，王将军之武库。",
    "家君作宰，路出名区；",
    "童子何知，躬逢胜饯。",
    "时维九月，序属三秋。",
    "潦水尽而寒潭清，烟光凝而暮山紫。",
    "俨骖騑于上路，访风景于崇阿；",
    "临帝子之长洲，得天人之旧馆。",
    "层峦耸翠，上出重霄；",
    "飞阁流丹，下临无地。",
    "鹤汀凫渚，穷岛屿之萦回；",
    "桂殿兰宫，即冈峦之体势。",
    "披绣闼，俯雕甍，山原旷其盈视，川泽纡其骇瞩。",
    "闾阎扑地，钟鸣鼎食之家；",
    "舸舰弥津，青雀黄龙之舳。",
    "云销雨霁，彩彻区明。",
    "落霞与孤鹜齐飞，秋水共长天一色。",
    "渔舟唱晚，响穷彭蠡之滨；",
    "雁阵惊寒，声断衡阳之浦。",
    "遥襟甫畅，逸兴遄飞。",
    "爽籁发而清风生，纤歌凝而白云遏。",
    "睢园绿竹，气凌彭泽之樽；",
    "邺水朱华，光照临川之笔。",
    "四美具，二难并。",
    "穷睇眄于中天，极娱游于暇日。",
    "天高地迥，觉宇宙之无穷；",
    "兴尽悲来，识盈虚之有数。",
    "望长安于日下，目吴会于云间。",
    "地势极而南溟深，天柱高而北辰远。",
    "关山难越，谁悲失路之人？",
    "萍水相逢，尽是他乡之客。",
    "怀帝阍而不见，奉宣室以何年？",
    "嗟乎！时运不齐，命途多舛。",
    "冯唐易老，李广难封。",
    "屈贾谊于长沙，非无圣主；",
    "窜梁鸿于海曲，岂乏明时？",
    "所赖君子见机，达人知命。",
    "老当益壮，宁移白首之心？",
    "穷且益坚，不坠青云之志。",
    "酌贪泉而觉爽，处涸辙以犹欢。",
    "北海虽赊，扶摇可接；",
    "东隅已逝，桑榆非晚。",
    "孟尝高洁，空余报国之情；",
    "阮籍猖狂，岂效穷途之哭！",
    "勃，三尺微命，一介书生。",
    "无路请缨，等终军之弱冠；",
    "有怀投笔，慕宗悫之长风。",
    "舍簪笏于百龄，奉晨昏于万里。",
    "非谢家之宝树，接孟氏之芳邻。",
    "他日趋庭，叨陪鲤对；",
    "今兹捧袂，喜托龙门。",
    "杨意不逢，抚凌云而自惜；",
    "钟期既遇，奏流水以何惭？",
    "呜乎！胜地不常，盛筵难再；",
    "兰亭已矣，梓泽丘墟。",
    "临别赠言，幸承恩于伟饯；",
    "登高作赋，是所望于群公。",
    "敢竭鄙怀，恭疏短引；",
    "一言均赋，四韵俱成。",
    "请洒潘江，各倾陆海云尔。"
  ],
  "tags": ["唐", "骈文", "序", "写景"],
  "title": "滕王閣序",
  "id": "long033"
},
{
  "author": "李白",
  "paragraphs": [
    "夫天地者，万物之逆旅也；",
    "光阴者，百代之过客也。",
    "而浮生若梦，为欢几何？",
    "古人秉烛夜游，良有以也。",
    "况阳春召我以烟景，大块假我以文章。",
    "会桃花之芳园，序天伦之乐事。",
    "群季俊秀，皆为惠连；",
    "吾人咏歌，独惭康乐。",
    "幽赏未已，高谈转清。",
    "开琼筵以坐花，飞羽觞而醉月。",
    "不有佳咏，何伸雅怀？",
    "如诗不成，罚依金谷酒数。"
  ],
  "tags": ["唐", "骈文", "序", "宴饮"],
  "title": "春夜宴從弟桃花園序",
  "id": "long034"
},
{
  "author": "蘇軾",
  "paragraphs": [
    "壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。",
    "清风徐来，水波不兴。",
    "举酒属客，诵明月之诗，歌窈窕之章。",
    "少焉，月出于东山之上，徘徊于斗牛之间。",
    "白露横江，水光接天。",
    "纵一苇之所如，凌万顷之茫然。",
    "浩浩乎如冯虚御风，而不知其所止；",
    "飘飘乎如遗世独立，羽化而登仙。",
    "于是饮酒乐甚，扣舷而歌之。",
    "歌曰：“桂棹兮兰桨，击空明兮溯流光。",
    "渺渺兮予怀，望美人兮天一方。”",
    "客有吹洞箫者，倚歌而和之。",
    "其声呜呜然，如怨如慕，如泣如诉，",
    "余音袅袅，不绝如缕。",
    "舞幽壑之潜蛟，泣孤舟之嫠妇。",
    "苏子愀然，正襟危坐而问客曰：“何为其然也？”",
    "客曰：“‘月明星稀，乌鹊南飞’，此非曹孟德之诗乎？",
    "西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？",
    "方其破荆州，下江陵，顺流而东也，",
    "舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，",
    "固一世之雄也，而今安在哉？",
    "况吾与子渔樵于江渚之上，侣鱼虾而友麋鹿，",
    "驾一叶之扁舟，举匏樽以相属。",
    "寄蜉蝣于天地，渺沧海之一粟。",
    "哀吾生之须臾，羡长江之无穷。",
    "挟飞仙以遨游，抱明月而长终。",
    "知不可乎骤得，托遗响于悲风。”",
    "苏子曰：“客亦知夫水与月乎？",
    "逝者如斯，而未尝往也；",
    "盈虚者如彼，而卒莫消长也。",
    "盖将自其变者而观之，则天地曾不能以一瞬；",
    "自其不变者而观之，则物与我皆无尽也，而又何羡乎！",
    "且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。",
    "惟江上之清风，与山间之明月，",
    "耳得之而为声，目遇之而成色，",
    "取之无禁，用之不竭。",
    "是造物者之无尽藏也，而吾与子之所共适。”",
    "客喜而笑，洗盏更酌。",
    "肴核既尽，杯盘狼藉。",
    "相与枕藉乎舟中，不知东方之既白。"
  ],
  "tags": ["北宋", "赋", "游记", "哲理"],
  "title": "前赤壁賦",
  "id": "long035"
},
{
  "author": "蘇軾",
  "paragraphs": [
    "是岁十月之望，步自雪堂，将归于临皋。",
    "二客从予过黄泥之坂。",
    "霜露既降，木叶尽脱。",
    "人影在地，仰见明月，顾而乐之，行歌相答。",
    "已而叹曰：“有客无酒，有酒无肴，月白风清，如此良夜何？”",
    "客曰：“今者薄暮，举网得鱼，巨口细鳞，状如松江之鲈。",
    "顾安所得酒乎？”",
    "归而谋诸妇。",
    "妇曰：“我有斗酒，藏之久矣，以待子不时之需。”",
    "于是携酒与鱼，复游于赤壁之下。",
    "江流有声，断岸千尺。",
    "山高月小，水落石出。",
    "曾日月之几何，而江山不可复识矣。",
    "予乃摄衣而上，履巉岩，披蒙茸，",
    "踞虎豹，登虬龙，攀栖鹘之危巢，俯冯夷之幽宫。",
    "盖二客不能从焉。",
    "划然长啸，草木震动，山鸣谷应，风起水涌。",
    "予亦悄然悲，肃然而恐，凛乎其不可留也。",
    "反而登舟，放乎中流，听其所止而休焉。",
    "时夜将半，四顾寂寥。",
    "适有孤鹤，横江东来。",
    "翅如车轮，玄裳缟衣，戛然长鸣，掠予舟而西也。",
    "须臾客去，予亦就睡。",
    "梦一道士，羽衣蹁跹，过临皋之下，揖予而言曰：“赤壁之游乐乎？”",
    "问其姓名，俯而不答。",
    "“呜呼！噫嘻！我知之矣。",
    "畴昔之夜，飞鸣而过我者，非子也耶？”",
    "道士顾笑，予亦惊悟。",
    "开户视之，不见其处。"
  ],
  "tags": ["北宋", "赋", "游记", "梦幻"],
  "title": "後赤壁賦",
  "id": "long036"
},
{
  "author": "歐陽修",
  "paragraphs": [
    "环滁皆山也。",
    "其西南诸峰，林壑尤美。",
    "望之蔚然而深秀者，琅琊也。",
    "山行六七里，渐闻水声潺潺，而泻出于两峰之间者，酿泉也。",
    "峰回路转，有亭翼然临于泉上者，醉翁亭也。",
    "作亭者谁？山之僧智仙也。",
    "名之者谁？太守自谓也。",
    "太守与客来饮于此，饮少辄醉，而年又最高，故自号曰醉翁也。",
    "醉翁之意不在酒，在乎山水之间也。",
    "山水之乐，得之心而寓之酒也。",
    "若夫日出而林霏开，云归而岩穴暝，晦明变化者，山间之朝暮也。",
    "野芳发而幽香，佳木秀而繁阴，风霜高洁，水落而石出者，山间之四时也。",
    "朝而往，暮而归，四时之景不同，而乐亦无穷也。",
    "至于负者歌于途，行者休于树，前者呼，后者应，伛偻提携，往来而不绝者，滁人游也。",
    "临溪而渔，溪深而鱼肥；酿泉为酒，泉香而酒洌；山肴野蔌，杂然而前陈者，太守宴也。",
    "宴酣之乐，非丝非竹，射者中，弈者胜，觥筹交错，起坐而喧哗者，众宾欢也。",
    "苍颜白发，颓然乎其间者，太守醉也。",
    "已而夕阳在山，人影散乱，太守归而宾客从也。",
    "树林阴翳，鸣声上下，游人去而禽鸟乐也。",
    "然而禽鸟知山林之乐，而不知人之乐；",
    "人知从太守游而乐，而不知太守之乐其乐也。",
    "醉能同其乐，醒能述以文者，太守也。",
    "太守谓谁？庐陵欧阳修也。"
  ],
  "tags": ["北宋", "散文", "游记", "山水"],
  "title": "醉翁亭記",
  "id": "long037"
},
{
  "author": "范仲淹",
  "paragraphs": [
    "庆历四年春，滕子京谪守巴陵郡。",
    "越明年，政通人和，百废具兴。",
    "乃重修岳阳楼，增其旧制，刻唐贤今人诗赋于其上。",
    "属予作文以记之。",
    "予观夫巴陵胜状，在洞庭一湖。",
    "衔远山，吞长江，浩浩汤汤，横无际涯；",
    "朝晖夕阴，气象万千。",
    "此则岳阳楼之大观也，前人之述备矣。",
    "然则北通巫峡，南极潇湘，迁客骚人，多会于此，览物之情，得无异乎？",
    "若夫淫雨霏霏，连月不开，阴风怒号，浊浪排空；",
    "日星隐曜，山岳潜形；",
    "商旅不行，樯倾楫摧；",
    "薄暮冥冥，虎啸猿啼。",
    "登斯楼也，则有去国怀乡，忧谗畏讥，满目萧然，感极而悲者矣。",
    "至若春和景明，波澜不惊，上下天光，一碧万顷；",
    "沙鸥翔集，锦鳞游泳；岸芷汀兰，郁郁青青。",
    "而或长烟一空，皓月千里，浮光跃金，静影沉璧，渔歌互答，此乐何极！",
    "登斯楼也，则有心旷神怡，宠辱偕忘，把酒临风，其喜洋洋者矣。",
    "嗟夫！予尝求古仁人之心，或异二者之为，何哉？",
    "不以物喜，不以己悲。",
    "居庙堂之高则忧其民，处江湖之远则忧其君。",
    "是进亦忧，退亦忧。",
    "然则何时而乐耶？",
    "其必曰“先天下之忧而忧，后天下之乐而乐”乎！",
    "噫！微斯人，吾谁与归？",
    "时六年九月十五日。"
  ],
  "tags": ["北宋", "散文", "游记", "忧乐"],
  "title": "岳陽樓記",
  "id": "long038"
},
{
  "author": "王安石",
  "paragraphs": [
    "褒禅山亦谓之华山。",
    "唐浮图慧褒始舍于其址，而卒葬之；以故其后名之曰“褒禅”。",
    "今所谓慧空禅院者，褒之庐冢也。",
    "距其院东五里，所谓华山洞者，以其乃华山之阳名之也。",
    "距洞百余步，有碑仆道，其文漫灭，独其为文犹可识，曰“花山”。",
    "今言“华”如“华实”之“华”者，盖音谬也。",
    "其下平旷，有泉侧出，而记游者甚众，所谓前洞也。",
    "由山以上五六里，有穴窈然，入之甚寒，问其深，则其好游者不能穷也，谓之后洞。",
    "余与四人拥火以入，入之愈深，其进愈难，而其见愈奇。",
    "有怠而欲出者，曰：“不出，火且尽。”遂与之俱出。",
    "盖余所至，比好游者尚不能十一，然视其左右，来而记之者已少。",
    "盖其又深，则其至又加少矣。",
    "方是时，余之力尚足以入，火尚足以明也。",
    "既其出，则或咎其欲出者，而余亦悔其随之而不得极夫游之乐也。",
    "于是余有叹焉。",
    "古人之观于天地、山川、草木、虫鱼、鸟兽，往往有得，以其求思之深而无不在也。",
    "夫夷以近，则游者众；险以远，则至者少。",
    "而世之奇伟、瑰怪，非常之观，常在于险远，而人之所罕至焉，故非有志者不能至也。",
    "有志矣，不随以止也，然力不足者，亦不能至也。",
    "有志与力，而又不随以怠，至于幽暗昏惑而无物以相之，亦不能至也。",
    "然力足以至焉，于人为可讥，而在己为有悔；",
    "尽吾志也而不能至者，可以无悔矣，其孰能讥之乎？此余之所得也。",
    "余于仆碑，又以悲夫古书之不存，后世之谬其传而莫能名者，何可胜道也哉！",
    "此所以学者不可以不深思而慎取之也。",
    "四人者：庐陵萧君圭君玉，长乐王回深父，余弟安国平父、安上纯父。",
    "至和元年七月某日，临川王某记。"
  ],
  "tags": ["北宋", "散文", "游记", "哲理"],
  "title": "遊褒禪山記",
  "id": "long039"
},
{
  "author": "司馬遷",
  "paragraphs": [
    "项王军壁垓下，兵少食尽，汉军及诸侯兵围之数重。",
    "夜闻汉军四面皆楚歌，项王乃大惊曰：“汉皆已得楚乎？是何楚人之多也！”",
    "项王则夜起，饮帐中。",
    "有美人名虞，常幸从；骏马名骓，常骑之。",
    "于是项王乃悲歌慷慨，自为诗曰：",
    "力拔山兮气盖世,时不利兮骓不逝。",
    "骓不逝兮可奈何，虞兮虞兮奈若何！”",
    "歌数阕，美人和之。",
    "项王泣数行下，左右皆泣，莫能仰视。",
    "于是项王乃上马骑，麾下壮士骑从者八百余人，直夜溃围南出，驰走。",
    "平明，汉军乃觉之，令骑将灌婴以五千骑追之。",
    "项王渡淮，骑能属者百余人耳。",
    "项王至阴陵，迷失道，问一田父，田父绐曰“左”。",
    "左，乃陷大泽中。以故汉追及之。",
    "项王乃复引兵而东，至东城，乃有二十八骑。",
    "汉骑追者数千人。",
    "项王自度不得脱。",
    "谓其骑曰：“吾起兵至今八岁矣，身七十余战，所当者破，所击者服，未尝败北，遂霸有天下。",
    "然今卒困于此，此天之亡我，非战之罪也。",
    "今日固决死，愿为诸君快战，必三胜之，为诸君溃围，斩将，刈旗，令诸君知天亡我，非战之罪也。”",
    "乃分其骑以为四队，四向。",
    "汉军围之数重。",
    "项王谓其骑曰：“吾为公取彼一将。”",
    "令四面骑驰下，期山东为三处。",
    "于是项王大呼驰下，汉军皆披靡，遂斩汉一将。",
    "是时，赤泉侯为骑将，追项王，项王瞋目而叱之，赤泉侯人马俱惊，辟易数里。",
    "与其骑会为三处。",
    "汉军不知项王所在，乃分军为三，复围之。",
    "项王乃驰，复斩汉一都尉，杀数十百人，复聚其骑，亡其两骑耳。",
    "乃谓其骑曰：“何如？”骑皆伏曰：“如大王言。”",
    "于是项王乃欲东渡乌江。",
    "乌江亭长檥船待，谓项王曰：“江东虽小，地方千里，众数十万人，亦足王也。",
    "愿大王急渡。今独臣有船，汉军至，无以渡。”",
    "项王笑曰：“天之亡我，我何渡为！",
    "且籍与江东子弟八千人渡江而西，今无一人还，纵江东父兄怜而王我，我何面目见之？",
    "纵彼不言，籍独不愧于心乎？”",
    "乃谓亭长曰：“吾知公长者。",
    "吾骑此马五岁，所当无敌，尝一日行千里，不忍杀之，以赐公。”",
    "乃令骑皆下马步行，持短兵接战。",
    "独籍所杀汉军数百人。",
    "项王身亦被十余创。",
    "顾见汉骑司马吕马童，曰：“若非吾故人乎？”",
    "马童面之，指王翳曰：“此项王也。”",
    "项王乃曰：“吾闻汉购我头千金，邑万户，吾为若德。”",
    "乃自刎而死。"
  ],
  "tags": ["汉", "散文", "传记", "英雄"],
  "title": "項羽本紀（垓下之圍節選）",
  "id": "long040"
},

{
  "author": "曹植",
  "paragraphs": [
    "黃初三年，余朝京師，還濟洛川。古人有言，斯水之神，名曰宓妃。感宋玉對楚王神女之事，遂作斯賦。其辭曰：",
    "余從京域，言歸東藩。背伊闕，越轘轅，經通谷，陵景山。日既西傾，車殆馬煩。爾乃稅駕乎蘅皋，秣駟乎芝田，容與乎陽林，流眄乎洛川。於是精移神駭，忽焉思散。俯則未察，仰以殊觀。睹一麗人，於巖之畔。乃援御者而告之曰：「爾有覿於彼者乎？彼何人斯？若此之豔也！」御者對曰：「臣聞河洛之神，名曰宓妃。然則君王所見，無乃是乎？其狀若何？臣願聞之。」",
    "余告之曰：其形也，翩若驚鴻，婉若游龍。榮曜秋菊，華茂春松。髣髴兮若輕雲之蔽月，飄颻兮若流風之迴雪。遠而望之，皎若太陽升朝霞；迫而察之，灼若芙蕖出淥波。穠纖得衷，修短合度。肩若削成，腰如約素。延頸秀項，皓質呈露。芳澤無加，鉛華弗御。雲髻峨峨，修眉聯娟。丹唇外朗，皓齒內鮮。明眸善睞，靨輔承權。瓌姿豔逸，儀靜體閑。柔情綽態，媚於語言。奇服曠世，骨像應圖。披羅衣之璀粲兮，珥瑤碧之華琚。戴金翠之首飾，綴明珠以耀軀。踐遠遊之文履，曳霧綃之輕裾。微幽蘭之芳藹兮，步踟躕於山隅。",
    "於是忽焉縱體，以遨以嬉。左倚采旄，右蔭桂旗。攘皓腕於神滸兮，采湍瀨之玄芝。余情悅其淑美兮，心振蕩而不怡。無良媒以接歡兮，託微波而通辭。願誠素之先達兮，解玉佩以要之。嗟佳人之信修兮，羌習禮而明詩。抗瓊珶以和予兮，指潛淵而為期。執眷眷之款實兮，懼斯靈之我欺。感交甫之棄言兮，悵猶豫而狐疑。收和顏而靜志兮，申禮防以自持。",
    "於是洛靈感焉，徙倚彷徨。神光離合，乍陰乍陽。竦輕軀以鶴立，若將飛而未翔。踐椒塗之郁烈，步蘅薄而流芳。超長吟以永慕兮，聲哀厲而彌長。爾乃眾靈雜遝，命儔嘯侶。或戲清流，或翔神渚，或采明珠，或拾翠羽。從南湘之二妃，攜漢濱之游女。歎匏瓜之無匹兮，詠牽牛之獨處。揚輕袂之猗靡兮，翳修袖以延佇。體迅飛鳧，飄忽若神。凌波微步，羅襪生塵。動無常則，若危若安。進止難期，若往若還。轉眄流精，光潤玉顏。含辭未吐，氣若幽蘭。華容婀娜，令我忘餐。",
    "於是屏翳收風，川后靜波。馮夷鳴鼓，女媧清歌。騰文魚以警乘，鳴玉鸞以偕逝。六龍儼其齊首，載雲車之容裔。鯨鯢踴而夾轂，水禽翔而為衛。於是越北沚，過南岡，紆素領，迴清陽。動朱唇以徐言，陳交接之大綱。恨人神之道殊兮，怨盛年之莫當。抗羅袂以掩涕兮，淚流襟之浪浪。悼良會之永絕兮，哀一逝而異鄉。無微情以效愛兮，獻江南之明璫。雖潛處於太陰，長寄心於君王。忽不悟其所舍，悵神宵而蔽光。",
    "於是背下陵高，足往神留。遺情想像，顧望懷愁。冀靈體之復形，御輕舟而上溯。浮長川而忘返，思綿綿而增慕。夜耿耿而不寐，沾繁霜而至曙。命僕夫而就駕，吾將歸乎東路。攬騑轡以抗策，悵盤桓而不能去。"
  ],
  "tags": ["魏", "赋", "神话", "爱情"],
  "title": "洛神賦",
  "id": "long011"
},
{
  "author": "王勃",
  "paragraphs": [
    "豫章故郡，洪都新府。星分翼軫，地接衡廬。襟三江而帶五湖，控蠻荊而引甌越。物華天寶，龍光射牛斗之墟；人傑地靈，徐孺下陳蕃之榻。雄州霧列，俊采星馳。臺隍枕夷夏之交，賓主盡東南之美。都督閻公之雅望，棨戟遙臨；宇文新州之懿範，襜帷暫駐。十旬休假，勝友如雲；千里逢迎，高朋滿座。騰蛟起鳳，孟學士之詞宗；紫電青霜，王將軍之武庫。家君作宰，路出名區；童子何知，躬逢勝餞。",
    "時維九月，序屬三秋。潦水盡而寒潭清，煙光凝而暮山紫。儼驂騑於上路，訪風景於崇阿。臨帝子之長洲，得仙人之舊館。層巒聳翠，上出重霄；飛閣流丹，下臨無地。鶴汀鳧渚，窮島嶼之縈迴；桂殿蘭宮，列岡巒之體勢。披繡闥，俯雕甍，山原曠其盈視，川澤紆其駭矚。閭閻撲地，鐘鳴鼎食之家；舸艦迷津，青雀黃龍之舳。雲銷雨霽，彩徹區明。落霞與孤鶩齊飛，秋水共長天一色。漁舟唱晚，響窮彭蠡之濱；雁陣驚寒，聲斷衡陽之浦。",
    "遙襟甫暢，逸興遄飛。爽籟發而清風生，纖歌凝而白雲遏。睢園綠竹，氣凌彭澤之樽；鄴水朱華，光照臨川之筆。四美具，二難並。窮睇眄於中天，極娛遊於暇日。天高地迥，覺宇宙之無窮；興盡悲來，識盈虛之有數。望長安於日下，目吳會於雲間。地勢極而南溟深，天柱高而北辰遠。關山難越，誰悲失路之人？萍水相逢，盡是他鄉之客。懷帝閽而不見，奉宣室以何年？",
    "嗟乎！時運不齊，命途多舛。馮唐易老，李廣難封。屈賈誼於長沙，非無聖主；竄梁鴻於海曲，豈乏明時？所賴君子見機，達人知命。老當益壯，寧移白首之心？窮且益堅，不墜青雲之志。酌貪泉而覺爽，處涸轍以猶歡。北海雖賒，扶搖可接；東隅已逝，桑榆非晚。孟嘗高潔，空餘報國之情；阮籍猖狂，豈效窮途之哭！",
    "勃，三尺微命，一介書生。無路請纓，等終軍之弱冠；有懷投筆，慕宗愨之長風。舍簪笏於百齡，奉晨昏於萬里。非謝家之寶樹，接孟氏之芳鄰。他日趨庭，叨陪鯉對；今茲捧袂，喜託龍門。楊意不逢，撫凌雲而自惜；鍾期既遇，奏流水以何慚？",
    "嗚呼！勝地不常，盛筵難再。蘭亭已矣，梓澤丘墟。臨別贈言，幸承恩於偉餞；登高作賦，是所望於群公。敢竭鄙懷，恭疏短引。一言均賦，四韻俱成。請灑潘江，各傾陸海云爾。",
    "滕王高閣臨江渚，佩玉鳴鸞罷歌舞。畫棟朝飛南浦雲，珠簾暮卷西山雨。閒雲潭影日悠悠，物換星移幾度秋。閣中帝子今何在？檻外長江空自流。"
  ],
  "tags": ["唐", "骈文", "序", "写景"],
  "title": "滕王閣序",
  "id": "long012"
},
{
  "author": "李白",
  "paragraphs": [
    "噫吁嚱，危乎高哉！蜀道之難，難於上青天！",
    "蠶叢及魚鳧，開國何茫然！",
    "爾來四萬八千歲，不與秦塞通人煙。",
    "西當太白有鳥道，可以橫絕峨眉巔。",
    "地崩山摧壯士死，然後天梯石棧相鉤連。",
    "上有六龍回日之高標，下有衝波逆折之回川。",
    "黃鶴之飛尚不得過，猿猱欲度愁攀援。",
    "青泥何盤盤，百步九折縈巖巒。",
    "捫參歷井仰脅息，以手撫膺坐長嘆。",
    "問君西遊何時還？畏途巉巖不可攀。",
    "但見悲鳥號古木，雄飛雌從繞林間。",
    "又聞子規啼夜月，愁空山。",
    "蜀道之難，難於上青天，使人聽此凋朱顏！",
    "連峰去天不盈尺，枯松倒掛倚絕壁。",
    "飛湍瀑流爭喧豗，砯崖轉石萬壑雷。",
    "其險也如此，嗟爾遠道之人胡為乎來哉！",
    "劍閣崢嶸而崔嵬，一夫當關，萬夫莫開。",
    "所守或匪親，化為狼與豺。",
    "朝避猛虎，夕避長蛇；磨牙吮血，殺人如麻。",
    "錦城雖雲樂，不如早還家。",
    "蜀道之難，難於上青天，側身西望長咨嗟！"
  ],
  "tags": ["唐", "乐府", "山水", "险峻"],
  "title": "蜀道難",
  "id": "long013"
},
{
  "author": "白居易",
  "paragraphs": [
    "漢皇重色思傾國，御宇多年求不得。",
    "楊家有女初長成，養在深閨人未識。",
    "天生麗質難自棄，一朝選在君王側。",
    "回眸一笑百媚生，六宮粉黛無顏色。",
    "春寒賜浴華清池，溫泉水滑洗凝脂。",
    "侍兒扶起嬌無力，始是新承恩澤時。",
    "雲鬢花顏金步搖，芙蓉帳暖度春宵。",
    "春宵苦短日高起，從此君王不早朝。",
    "承歡侍宴無閒暇，春從春遊夜專夜。",
    "後宮佳麗三千人，三千寵愛在一身。",
    "金屋妝成嬌侍夜，玉樓宴罷醉和春。",
    "姊妹弟兄皆列土，可憐光彩生門戶。",
    "遂令天下父母心，不重生男重生女。",
    "驪宮高處入青雲，仙樂風飄處處聞。",
    "緩歌慢舞凝絲竹，盡日君王看不足。",
    "漁陽鼙鼓動地來，驚破霓裳羽衣曲。",
    "九重城闕煙塵生，千乘萬騎西南行。",
    "翠華搖搖行復止，西出都門百餘里。",
    "六軍不發無奈何，宛轉蛾眉馬前死。",
    "花鈿委地無人收，翠翹金雀玉搔頭。",
    "君王掩面救不得，回看血淚相和流。",
    "黃埃散漫風蕭索，雲棧縈紆登劍閣。",
    "峨嵋山下少人行，旌旗無光日色薄。",
    "蜀江水碧蜀山青，聖主朝朝暮暮情。",
    "行宮見月傷心色，夜雨聞鈴腸斷聲。",
    "天旋地轉迴龍馭，到此躊躇不能去。",
    "馬嵬坡下泥土中，不見玉顏空死處。",
    "君臣相顧盡沾衣，東望都門信馬歸。",
    "歸來池苑皆依舊，太液芙蓉未央柳。",
    "芙蓉如面柳如眉，對此如何不淚垂。",
    "春風桃李花開日，秋雨梧桐葉落時。",
    "西宮南內多秋草，落葉滿階紅不掃。",
    "梨園弟子白髮新，椒房阿監青娥老。",
    "夕殿螢飛思悄然，孤燈挑盡未成眠。",
    "遲遲鐘鼓初長夜，耿耿星河欲曙天。",
    "鴛鴦瓦冷霜華重，翡翠衾寒誰與共。",
    "悠悠生死別經年，魂魄不曾來入夢。",
    "臨邛道士鴻都客，能以精誠致魂魄。",
    "為感君王輾轉思，遂教方士殷勤覓。",
    "排空馭氣奔如電，升天入地求之遍。",
    "上窮碧落下黃泉，兩處茫茫皆不見。",
    "忽聞海上有仙山，山在虛無縹緲間。",
    "樓閣玲瓏五雲起，其中綽約多仙子。",
    "中有一人字太真，雪膚花貌參差是。",
    "金闕西廂叩玉扃，轉教小玉報雙成。",
    "聞道漢家天子使，九華帳裡夢魂驚。",
    "攬衣推枕起徘徊，珠箔銀屏迤邐開。",
    "雲鬢半偏新睡覺，花冠不整下堂來。",
    "風吹仙袂飄飄舉，猶似霓裳羽衣舞。",
    "玉容寂寞淚闌干，梨花一枝春帶雨。",
    "含情凝睇謝君王，一別音容兩渺茫。",
    "昭陽殿裡恩愛絕，蓬萊宮中日月長。",
    "回頭下望人寰處，不見長安見塵霧。",
    "唯將舊物表深情，鈿合金釵寄將去。",
    "釵留一股合一扇，釵擘黃金合分鈿。",
    "但教心似金鈿堅，天上人間會相見。",
    "臨別殷勤重寄詞，詞中有誓兩心知。",
    "七月七日長生殿，夜半無人私語時。",
    "在天願作比翼鳥，在地願為連理枝。",
    "天長地久有時盡，此恨綿綿無絕期。"
  ],
  "tags": ["唐", "叙事诗", "爱情", "讽喻"],
  "title": "長恨歌",
  "id": "long014"
},
{
  "author": "白居易",
  "paragraphs": [
    "潯陽江頭夜送客，楓葉荻花秋瑟瑟。",
    "主人下馬客在船，舉酒欲飲無管弦。",
    "醉不成歡慘將別，別時茫茫江浸月。",
    "忽聞水上琵琶聲，主人忘歸客不發。",
    "尋聲暗問彈者誰，琵琶聲停欲語遲。",
    "移船相近邀相見，添酒回燈重開宴。",
    "千呼萬喚始出來，猶抱琵琶半遮面。",
    "轉軸撥弦三兩聲，未成曲調先有情。",
    "弦弦掩抑聲聲思，似訴平生不得志。",
    "低眉信手續續彈，說盡心中無限事。",
    "輕攏慢捻抹復挑，初為《霓裳》後《六幺》。",
    "大弦嘈嘈如急雨，小弦切切如私語。",
    "嘈嘈切切錯雜彈，大珠小珠落玉盤。",
    "間關鶯語花底滑，幽咽泉流冰下難。",
    "冰泉冷澀弦凝絕，凝絕不通聲暫歇。",
    "別有幽愁暗恨生，此時無聲勝有聲。",
    "銀瓶乍破水漿迸，鐵騎突出刀槍鳴。",
    "曲終收撥當心畫，四弦一聲如裂帛。",
    "東船西舫悄無言，唯見江心秋月白。",
    "沉吟放撥插弦中，整頓衣裳起斂容。",
    "自言本是京城女，家在蝦蟆陵下住。",
    "十三學得琵琶成，名屬教坊第一部。",
    "曲罷曾教善才服，妝成每被秋娘妒。",
    "五陵年少爭纏頭，一曲紅綃不知數。",
    "鈿頭銀篦擊節碎，血色羅裙翻酒污。",
    "今年歡笑復明年，秋月春風等閒度。",
    "弟走從軍阿姨死，暮去朝來顏色故。",
    "門前冷落鞍馬稀，老大嫁作商人婦。",
    "商人重利輕別離，前月浮梁買茶去。",
    "去來江口守空船，繞船月明江水寒。",
    "夜深忽夢少年事，夢啼妝淚紅闌干。",
    "我聞琵琶已歎息，又聞此語重唧唧。",
    "同是天涯淪落人，相逢何必曾相識！",
    "我從去年辭帝京，謫居臥病潯陽城。",
    "潯陽地僻無音樂，終歲不聞絲竹聲。",
    "住近湓江地低濕，黃蘆苦竹繞宅生。",
    "其間旦暮聞何物？杜鵑啼血猿哀鳴。",
    "春江花朝秋月夜，往往取酒還獨傾。",
    "豈無山歌與村笛，嘔啞嘲哳難為聽。",
    "今夜聞君琵琶語，如聽仙樂耳暫明。",
    "莫辭更坐彈一曲，為君翻作《琵琶行》。",
    "感我此言良久立，卻坐促弦弦轉急。",
    "淒淒不似向前聲，滿座重聞皆掩泣。",
    "座中泣下誰最多？江州司馬青衫濕。"
  ],
  "tags": ["唐", "叙事诗", "音乐", "感怀"],
  "title": "琵琶行",
  "id": "long015"
},
{
  "author": "杜甫",
  "paragraphs": [
    "暮投石壕村，有吏夜捉人。",
    "老翁逾牆走，老婦出門看。",
    "吏呼一何怒，婦啼一何苦。",
    "聽婦前致詞：三男鄴城戍。",
    "一男附書至，二男新戰死。",
    "存者且偷生，死者長已矣。",
    "室中更無人，惟有乳下孫。",
    "有孫母未去，出入無完裙。",
    "老嫗力雖衰，請從吏夜歸。",
    "急應河陽役，猶得備晨炊。",
    "夜久語聲絕，如聞泣幽咽。",
    "天明登前途，獨與老翁別。"
  ],
  "tags": ["唐", "叙事诗", "战争", "民生"],
  "title": "石壕吏",
  "id": "long016"
},
{
  "author": "杜甫",
  "paragraphs": [
    "兔絲附蓬麻，引蔓故不長。",
    "嫁女與征夫，不如棄路旁。",
    "結髮為妻子，席不暖君床。",
    "暮婚晨告別，無乃太匆忙。",
    "君行雖不遠，守邊赴河陽。",
    "妾身未分明，何以拜姑嫜。",
    "父母養我時，日夜令我藏。",
    "生女有所歸，雞狗亦得將。",
    "君今往死地，沉痛迫中腸。",
    "誓欲隨君去，形勢反蒼黃。",
    "勿為新婚念，努力事戎行。",
    "婦人在軍中，兵氣恐不揚。",
    "自嗟貧家女，久致羅襦裳。",
    "羅襦不復施，對君洗紅妝。",
    "仰視百鳥飛，大小必雙翔。",
    "人事多錯迕，與君永相望。"
  ],
  "tags": ["唐", "叙事诗", "战争", "新婚"],
  "title": "新婚別",
  "id": "long017"
},
{
  "author": "杜甫",
  "paragraphs": [
    "四郊未寧靜，垂老不得安。",
    "子孫陣亡盡，焉用身獨完。",
    "投杖出門去，同行為辛酸。",
    "幸有牙齒存，所悲骨髓乾。",
    "男兒既介冑，長揖別上官。",
    "老妻臥路啼，歲暮衣裳單。",
    "孰知是死別，且復傷其寒。",
    "此去必不歸，還聞勸加餐。",
    "土門壁甚堅，杏園度亦難。",
    "勢異鄴城下，縱死時猶寬。",
    "人生有離合，豈擇衰老端。",
    "憶昔少壯日，遲回竟長歎。",
    "萬國盡征戍，烽火被岡巒。",
    "積屍草木腥，流血川原丹。",
    "何鄉為樂土，安敢尚盤桓。",
    "棄絕蓬室居，塌然摧肺肝。"
  ],
  "tags": ["唐", "叙事诗", "战争", "老者"],
  "title": "垂老別",
  "id": "long018"
},
{
  "author": "杜甫",
  "paragraphs": [
    "寂寞天寶後，園廬但蒿藜。",
    "我里百餘家，世亂各東西。",
    "存者無消息，死者為塵泥。",
    "賤子因陣敗，歸來尋舊蹊。",
    "人行見空巷，日瘦氣慘淒。",
    "但對狐與狸，豎毛怒我啼。",
    "四鄰何所有，一二老寡妻。",
    "宿鳥戀本枝，安辭且窮棲。",
    "方春獨荷鋤，日暮還灌畦。",
    "縣吏知我至，召令習鼓鞞。",
    "雖從本州役，內顧無所攜。",
    "近行止一身，遠去終轉迷。",
    "家鄉既盪盡，遠近理亦齊。",
    "永痛長病母，五年委溝谿。",
    "生我不得力，終身兩酸嘶。",
    "人生無家別，何以為蒸黎。"
  ],
  "tags": ["唐", "叙事诗", "战争", "无家"],
  "title": "無家別",
  "id": "long019"
},
{
  "author": "杜甫",
  "paragraphs": [
    "戍鼓斷人行，邊秋一雁聲。",
    "露從今夜白，月是故鄉明。",
    "有弟皆分散，無家問死生。",
    "寄書長不達，況乃未休兵。"
  ],
  "tags": ["唐", "五言律诗", "思乡", "兄弟"],
  "title": "月夜憶舍弟",
  "id": "long020"
},
{
  "author": "杜甫",
  "paragraphs": [
    "國破山河在，城春草木深。",
    "感時花濺淚，恨別鳥驚心。",
    "烽火連三月，家書抵萬金。",
    "白頭搔更短，渾欲不勝簪。"
  ],
  "tags": ["唐", "五言律诗", "爱国", "感伤"],
  "title": "春望",
  "id": "long021"
},
{
  "author": "李白",
  "paragraphs": [
    "棄我去者，昨日之日不可留；",
    "亂我心者，今日之日多煩憂。",
    "長風萬里送秋雁，對此可以酣高樓。",
    "蓬萊文章建安骨，中間小謝又清發。",
    "俱懷逸興壯思飛，欲上青天攬明月。",
    "抽刀斷水水更流，舉杯消愁愁更愁。",
    "人生在世不稱意，明朝散髮弄扁舟。"
  ],
  "tags": ["唐", "七言古诗", "感怀", "豪放"],
  "title": "宣州謝朓樓餞別校書叔雲",
  "id": "long022"
},
{
  "author": "李白",
  "paragraphs": [
    "君不見黃河之水天上來，奔流到海不復回。",
    "君不見高堂明鏡悲白髮，朝如青絲暮成雪。",
    "人生得意須盡歡，莫使金樽空對月。",
    "天生我材必有用，千金散盡還復來。",
    "烹羊宰牛且為樂，會須一飲三百杯。",
    "岑夫子，丹丘生，將進酒，杯莫停。",
    "與君歌一曲，請君為我傾耳聽。",
    "鐘鼓饌玉不足貴，但願長醉不復醒。",
    "古來聖賢皆寂寞，惟有飲者留其名。",
    "陳王昔時宴平樂，斗酒十千恣歡謔。",
    "主人何為言少錢，徑須沽取對君酌。",
    "五花馬，千金裘，呼兒將出換美酒，與爾同銷萬古愁。"
  ],
  "tags": ["唐", "乐府", "饮酒", "豪放"],
  "title": "將進酒",
  "id": "long023"
},
{
  "author": "李白",
  "paragraphs": [
    "海客談瀛洲，煙濤微茫信難求。",
    "越人語天姥，雲霞明滅或可睹。",
    "天姥連天向天橫，勢拔五嶽掩赤城。",
    "天台四萬八千丈，對此欲倒東南傾。",
    "我欲因之夢吳越，一夜飛度鏡湖月。",
    "湖月照我影，送我至剡溪。",
    "謝公宿處今尚在，淥水蕩漾清猿啼。",
    "腳著謝公屐，身登青雲梯。",
    "半壁見海日，空中聞天雞。",
    "千巖萬轉路不定，迷花倚石忽已暝。",
    "熊咆龍吟殷巖泉，栗深林兮驚層巔。",
    "雲青青兮欲雨，水澹澹兮生煙。",
    "列缺霹靂，丘巒崩摧。",
    "洞天石扉，訇然中開。",
    "青冥浩蕩不見底，日月照耀金銀臺。",
    "霓為衣兮風為馬，雲之君兮紛紛而來下。",
    "虎鼓瑟兮鸞回車，仙之人兮列如麻。",
    "忽魂悸以魄動，恍驚起而長嗟。",
    "惟覺時之枕席，失向來之煙霞。",
    "世間行樂亦如此，古來萬事東流水。",
    "別君去兮何時還？且放白鹿青崖間，須行即騎訪名山。",
    "安能摧眉折腰事權貴，使我不得開心顏！"
  ],
  "tags": ["唐", "七言古诗", "记梦", "游仙"],
  "title": "夢遊天姥吟留別",
  "id": "long024"
},
{
  "author": "屈原",
  "paragraphs": [
    "帝高陽之苗裔兮，朕皇考曰伯庸。",
    "攝提貞於孟陬兮，惟庚寅吾以降。",
    "皇覽揆余初度兮，肇錫余以嘉名。",
    "名余曰正則兮，字余曰靈均。",
    "紛吾既有此內美兮，又重之以修能。",
