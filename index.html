        // 全局变量
        let voices = [];
        let currentUtterance = null;
        let isPaused = false;
        let isUserCancelled = false;

        const speechSupported = ('speechSynthesis' in window) && ('SpeechSynthesisUtterance' in window);

        // 在用户手势下尝试触发浏览器加载音色（某些浏览器仅在用户交互时加载）
        function enableSpeech() {
            if (!speechSupported) {
                alert('当前浏览器不支持语音合成 (Web Speech API)。');
                return;
            }

            // 尝试触发 voices 加载
            try {
                const loaded = window.speechSynthesis.getVoices();
                // 在某些实现中需要在用户手势内调用 speak 才会实际加载音色
                if (!loaded || loaded.length === 0) {
                    try {
                        const probe = new SpeechSynthesisUtterance('正在启用朗读功能');
                        probe.lang = 'zh-CN';
                        // 将音量置为 0 避免打扰（部分浏览器可能忽略静音）
                        probe.volume = 0;
                        window.speechSynthesis.speak(probe);
                    } catch (e) {
                        // ignore
                    }
                }
                // 重新初始化音色列表
                setTimeout(initVoiceList, 300);
                setTimeout(initVoiceList, 1200);
                initVoiceList();

                const btn = document.getElementById('enableSpeechBtn');
                if (btn) btn.textContent = '🔊 已启用（选择音色）';
            } catch (e) {
                console.error('启用朗读失败：', e);
                alert('尝试启用朗读时发生错误，请查看控制台获取详情。');
            }
        }

        // 初始化语音列表（更稳健地支持不同浏览器）
        function initVoiceList() {
            if (!speechSupported) {
                const voiceSelect = document.getElementById('voiceSelect');
                voiceSelect.innerHTML = '<option value="-1">当前浏览器不支持语音合成</option>';
                voiceSelect.disabled = true;
                document.getElementById('speedSelect').disabled = true;
                // 禁用所有朗读按钮
                document.querySelectorAll('.read-btn').forEach(b => {
                    b.disabled = true;
                    b.title = '当前浏览器不支持 Web Speech API，朗读功能不可用';
                });
                return;
            }

            voices = window.speechSynthesis.getVoices() || [];

            const voiceSelect = document.getElementById('voiceSelect');
            voiceSelect.innerHTML = '<option value="">自动选择（推荐晓晓/云希）</option>';

            // 过滤出中文或可能的优先中文音色
            const chineseVoices = voices.filter(voice => {
                const lname = (voice.lang || '').toLowerCase();
                const nm = (voice.name || '').toLowerCase();
                return lname.includes('zh') || nm.includes('xiaoxiao') || nm.includes('xiao') || nm.includes('晓') || nm.includes('云');
            });

            // 对候选音色按优先级排序
            chineseVoices.sort((a, b) => {
                const aName = (a.name || '').toLowerCase();
                const bName = (b.name || '').toLowerCase();
                if (aName.includes('晓晓')) return -1;
                if (bName.includes('晓晓')) return 1;
                if (aName.includes('云希')) return -1;
                if (bName.includes('云希')) return 1;
                return (a.name || '').localeCompare(b.name || '');
            });

            // 将 option.value 设置为 voice.name（或 voice.voiceURI）以便跨浏览器识别
            chineseVoices.forEach((voice) => {
                const option = document.createElement('option');
                const id = voice.name || voice.voiceURI || (voice.lang + '|' + Math.random().toString(36).slice(2,8));
                option.value = id;
                let showName = voice.name || `${voice.lang}`;
                if ((voice.name || '').toLowerCase().includes('xiaoxiao')) showName = '晓晓（柔和女声）';
                if ((voice.name || '').toLowerCase().includes('xiaoxi')) showName = '云希（清甜女声）';
                option.textContent = showName;
                // 存储 voice id 到 data 属性，方便查找（兼容不同浏览器）
                option.dataset.voiceId = id;
                voiceSelect.appendChild(option);
            });

            if (!voices || voices.length === 0) {
                const option = document.createElement('option');
                option.value = "-2";
                option.textContent = "未加载任何系统音色（请点击启用朗读）";
                voiceSelect.appendChild(option);
                // 当浏览器尚未加载任何 voice 时，保留朗读按钮可用，让用户点击启用
                voiceSelect.disabled = true;
            } else if (chineseVoices.length === 0) {
                const option = document.createElement('option');
                option.value = "";
                option.textContent = "无中文语音，使用系统默认（可能非中文）";
                voiceSelect.appendChild(option);
                voiceSelect.disabled = false;
            } else {
                voiceSelect.disabled = false;
            }
        }

        if (speechSupported && window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = initVoiceList;
            // 多次尝试获取 voices（某些浏览器延迟加载）
            setTimeout(initVoiceList, 500);
            setTimeout(initVoiceList, 1500);
            initVoiceList();
        } else {
            // 仍然调用以进行降级处理
            initVoiceList();
        }

        // 随机展示一首诗
        function showRandomPoem() {
            const randomIndex = Math.floor(Math.random() * ALL_TANG_POEMS.length);
            const poem = ALL_TANG_POEMS[randomIndex];
            renderPoem(poem, randomIndex);
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        }

        // 搜索功能（支持简体关键词匹配繁体内容）
        // 计算两首诗的相似度（0-1之间，1表示完全相同）
        function calculateSimilarity(poem1, poem2) {
            // 合并诗的内容用于比较
            const content1 = (poem1.title + poem1.author + (poem1.paragraphs || []).join(''));
            const content2 = (poem2.title + poem2.author + (poem2.paragraphs || []).join(''));
            
            // 使用编辑距离算法计算相似度
            const longer = content1.length > content2.length ? content1 : content2;
            const shorter = content1.length > content2.length ? content2 : content1;
            
            if (longer.length === 0) return 1.0;
            
            const editDistance = getEditDistance(longer, shorter);
            return (longer.length - editDistance) / longer.length;
        }

        // 计算编辑距离（Levenshtein距离）
        function getEditDistance(s1, s2) {
            const costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) {
                        costs[j] = j;
                    } else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        }
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        // 通过点击标签搜索诗词
        function searchByTag(tag) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = tag;
            // 只在桌面端自动focus，移动端避免弹出键盘
            if (!isMobileDevice()) {
                searchInput.focus();
            }
            searchPoem();
        }

        // 检测是否为移动设备
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 规范化文本：去除常见标点、空白并统一为简体，便于搜索比较
        function normalizeTextForSearch(s) {
            if (!s) return '';
            // 先统一为字符串
            let t = String(s);
            // 去掉中文全角中括号/书名号/标点等常见干扰字符
            t = t.replace(/[\s\u3000\[\]【】<>（）()《》“”"'。，,、：:；;！？?!·••—\-\uFF0C\u3001\u3002]/g, '');
            // 转为简体以做统一比较
            try {
                t = convertToSimplified(t);
            } catch (e) {
                // 如果转换函数不可用则忽略
            }
            return t;
        }

        // 计算搜索相关度评分（使用规范化文本比较，提高对繁简和标点的容错）
        function calculateMatchScore(text, keyword) {
            if (!text || !keyword) return 0;

            const normText = normalizeTextForSearch(text);
            const normKeyword = normalizeTextForSearch(keyword);

            if (!normText || !normKeyword) return 0;

            // 精确匹配得分最高
            if (normText === normKeyword) return 100;

            // 开头匹配得分高
            if (normText.startsWith(normKeyword)) return 80;

            // 包含匹配
            const index = normText.indexOf(normKeyword);
            if (index !== -1) {
                // 越靠前得分越高
                return 50 + (30 - Math.min(index, 30));
            }

            // 检查是否包含所有字符（模糊匹配）
            let keywordIndex = 0;
            for (let i = 0; i < normText.length && keywordIndex < normKeyword.length; i++) {
                if (normText[i] === normKeyword[keywordIndex]) {
                    keywordIndex++;
                }
            }
            if (keywordIndex === normKeyword.length) {
                // 完全模糊匹配得分较低
                return 20;
            }

            return 0;
        }

        // 同义词映射
        const synonymMap = {
            '春': ['春天', '春日', '春季'],
            '月': ['月亮', '月光', '月色'],
            '离别': ['别离', '分别', '重别'],
            '相思': ['思念', '想念'],
            '边塞': ['边疆', '塞外', '边关'],
            '送别': ['送人', '赠别'],
            '山': ['山林', '山川'],
            '水': ['江水', '河水'],
            '李白': ['太白', '李翰林'],
            '杜甫': ['杜工部']
        };

        // 获取关键词及其同义词
        function getKeywordVariants(keyword) {
            const variants = [keyword];
            
            // 添加同义词
            if (synonymMap[keyword]) {
                variants.push(...synonymMap[keyword]);
            }
            
            // 添加简/繁体转换后的版本
            const traditional = convertToTraditional(keyword);
            if (traditional !== keyword && !variants.includes(traditional)) {
                variants.push(traditional);
            }
            
            return variants;
        }

        function searchPoem() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                document.getElementById('resultArea').innerHTML = '<p class="empty-tip">请输入搜索关键词，如：李白、春、离别、边塞等</p>';
                return;
            }

            // 获取关键词的所有变体（包括同义词）
            const keywordVariants = getKeywordVariants(keyword);
            const traditionalKeyword = convertToTraditional(keyword);

            const results = [];
            
            ALL_TANG_POEMS.forEach((poem, index) => {
                let maxScore = 0;
                let matchType = ''; // 记录匹配类型，用于排序

                // 检查所有关键词变体
                for (const variant of keywordVariants) {
                    // 标题匹配
                    const titleScore = calculateMatchScore(poem.title, variant) * 3;
                    if (titleScore > maxScore) {
                        maxScore = titleScore;
                        matchType = 'title';
                    }

                    // 作者匹配
                    const authorScore = calculateMatchScore(poem.author, variant) * 4;
                    if (authorScore > maxScore) {
                        maxScore = authorScore;
                        matchType = 'author';
                    }

                    // 标签匹配
                    if (poem.tags) {
                        for (const tag of poem.tags) {
                            const tagScore = calculateMatchScore(tag, variant) * 2;
                            if (tagScore > maxScore) {
                                maxScore = tagScore;
                                matchType = 'tag';
                            }
                        }
                    }

                    // 内容匹配（诗句中出现关键词）
                    if (poem.content) {
                        const contentScore = calculateMatchScore(poem.content, variant);
                        if (contentScore > 0 && contentScore > maxScore) {
                            maxScore = contentScore;
                            matchType = 'content';
                        }
                    }
                }

                // 只有得分大于0才认为是匹配
                if (maxScore > 0) {
                    results.push({ poem, index, score: maxScore, matchType });
                }
            });

            // 按得分降序排序（相关度高的在前）
            results.sort((a, b) => b.score - a.score);

            // 进行基于内容相似度的去重，只保留相似度最高的
            const finalResults = [];
            const processedIndices = new Set();
            
            for (let i = 0; i < results.length; i++) {
                if (processedIndices.has(i)) continue;
                
                finalResults.push(results[i]);
                processedIndices.add(i);
                
                // 检查后续结果中是否有与当前结果极其相似的
                for (let j = i + 1; j < results.length; j++) {
                    if (processedIndices.has(j)) continue;
                    
                    const similarity = calculateSimilarity(results[i].poem, results[j].poem);
                    if (similarity > 0.85) { // 85%相似度被认为是重复
                        processedIndices.add(j);
                    }
                }
            }

            if (finalResults.length === 0) {
                document.getElementById('resultArea').innerHTML = `<p class="empty-tip">未找到「${keyword}」相关的诗词<br><small style="color: #999; margin-top: 10px; display: block;">提示：可以搜索诗名、作者名或标签</small></p>`;
            } else {
                let html = `<p class="search-info">✓ 找到 ${finalResults.length} 条结果</p>`;
                finalResults.forEach(({ poem, index }) => {
                    html += renderPoemHtml(poem, index);
                });
                document.getElementById('resultArea').innerHTML = html;
            }
        }

        // 渲染诗词卡片
        function renderPoem(poem, index) {
            document.getElementById('resultArea').innerHTML = renderPoemHtml(poem, index);
        }

        function renderPoemHtml(poem, index) {
            let tagsHtml = '';
            if (poem.tags && poem.tags.length > 0) {
                tagsHtml = `<div class="poem-tags">${poem.tags.map(tag => `<span class="tag-item" onclick="searchByTag('${tag}')">${tag}</span>`).join('')}</div>`;
            }

            // 根据当前模式转换文本
            const title = isSimplified ? convertToSimplified(poem.title) : poem.title;
            const author = isSimplified ? convertToSimplified(poem.author) : poem.author;
            const content = poem.paragraphs.map(p => 
                isSimplified ? convertToSimplified(p) : p
            ).join('<br>');

            return `
                <div class="poem-card">
                    <div class="poem-title">${title}</div>
                    <div class="poem-author">【${author}】</div>
                    <div class="poem-content">
                        ${content}
                    </div>
                    ${tagsHtml}
                    <button class="read-btn" onclick="toggleReadPoemByIndex(this, ${index})">
                        🎤 朗读
                    </button>
                </div>
            `;
        }

        // 通过索引朗读诗词
        function toggleReadPoemByIndex(btn, index) {
            // 停止正在进行的朗读
            if (window.speechSynthesis.speaking) {
                isUserCancelled = true;
                window.speechSynthesis.cancel();
                btn.textContent = '🎤 朗读';
                btn.classList.remove('stop');
                return;
            }

            // 从数组中获取诗词数据
            const poem = ALL_TANG_POEMS[index];
            if (!poem || !poem.title || !poem.author || !poem.paragraphs || poem.paragraphs.length === 0) {
                alert('诗词数据不完整，无法朗读');
                return;
            }

            // 拼接朗读文本
            let readText = `${poem.title}。作者，${poem.author}。`;
            poem.paragraphs.forEach((line, idx) => {
                readText += line;
                readText += (idx === poem.paragraphs.length - 1) ? '。' : '，';
            });

            // 创建朗读实例
            currentUtterance = new SpeechSynthesisUtterance(readText);
            currentUtterance.lang = 'zh-CN';
            currentUtterance.rate = parseFloat(document.getElementById('speedSelect').value);
            currentUtterance.pitch = 0.9;
            currentUtterance.volume = 1;

            // 选择音色：选项的 value 存储 voice.name 或 voice.voiceURI
            const selectedVoiceId = document.getElementById('voiceSelect').value;
            let chosenVoice = null;
            if (selectedVoiceId && selectedVoiceId !== "-1") {
                chosenVoice = voices.find(v => (v.name === selectedVoiceId) || (v.voiceURI === selectedVoiceId));
            }

            if (chosenVoice) {
                currentUtterance.voice = chosenVoice;
            } else {
                // 回退到最合适的中文音色
                const bestVoice = voices.find(v => {
                    const nm = (v.name || '').toLowerCase();
                    const ln = (v.lang || '').toLowerCase();
                    return nm.includes('晓晓') || nm.includes('xiaoxiao') || ln.includes('zh');
                });
                if (bestVoice) {
                    currentUtterance.voice = bestVoice;
                }
            }

            // 状态更新
            btn.textContent = '⏹️ 停止';
            btn.classList.add('stop');
            isUserCancelled = false;
            
            currentUtterance.onend = () => {
                btn.textContent = '🎤 朗读';
                btn.classList.remove('stop');
            };
            
            currentUtterance.onerror = (err) => {
                // 如果是用户主动取消，不显示错误提示
                if (isUserCancelled) {
                    return;
                }
                // 错误处理：仅在生产环境记录，不显示过多提示
                const errorMsg = err && err.error ? err.error : '未知错误';
                if (console && console.error) {
                    console.error('朗读错误详情：', errorMsg);
                }
                btn.textContent = '🎤 朗读';
                btn.classList.remove('stop');
            };

            window.speechSynthesis.speak(currentUtterance);
        }

        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchPoem();
            }
        });
    </script>
